<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ora:#d44000;--ora-dk:#b03500;
  --bg:#f2ede6;--surf:#fff;
  --txt:#0d1117;--sub:#4a5568;--mut:#8a8d92;
  --bdr:#e2dbd2;
  --font:'Inter',system-ui,sans-serif;
  --display:'Barlow Condensed','Inter',system-ui,sans-serif;
}
html,body{height:100%}
body{font-family:var(--font);background:linear-gradient(155deg,#0a0805,#15100b,#1c1510);color:#fff;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(212,64,0,.14),transparent 55%),radial-gradient(ellipse at 75% 30%,rgba(90,95,207,.07),transparent 50%)}

.inner{position:relative;z-index:1;max-width:480px}

.num{font-family:var(--display);font-size:clamp(100px,20vw,160px);font-weight:900;line-height:.9;letter-spacing:-.04em;color:rgba(255,255,255,.07);user-select:none;margin-bottom:-12px}

.icon{font-size:40px;margin-bottom:20px}

h1{font-family:var(--display);font-size:clamp(28px,5vw,40px);font-weight:800;color:#fff;line-height:1.05;letter-spacing:-.02em;margin-bottom:12px}

p{font-size:15px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:36px;max-width:38ch;margin-left:auto;margin-right:auto}

.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

.btn-primary{font-size:14px;font-weight:700;color:#fff;background:var(--ora);text-decoration:none;padding:12px 24px;border-radius:10px;transition:all .18s}
.btn-primary:hover{background:var(--ora-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,64,0,.25)}

.btn-ghost{font-size:14px;font-weight:600;color:rgba(255,255,255,.55);text-decoration:none;padding:12px 20px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);transition:all .18s}
.btn-ghost:hover{border-color:rgba(255,255,255,.28);color:#fff;background:rgba(255,255,255,.05)}

.brand{position:absolute;top:24px;left:28px;display:flex;align-items:center;gap:8px;text-decoration:none}
.brand-text{font-family:var(--display);font-size:20px;font-weight:800;color:var(--ora)}
</style>
</head>
<body>

<a href="/" class="brand">
  <svg width="26" height="26" viewBox="0 0 180 180" fill="none"><rect width="180" height="180" rx="40" fill="#18103a"/><rect x="34" y="40" width="26" height="96" rx="6" fill="#fff"/><rect x="34" y="116" width="82" height="26" rx="6" fill="#fff"/><circle cx="142" cy="44" r="13" fill="#d44000"/></svg>
  <span class="brand-text">Ledger</span>
</a>

<div class="inner">
  <div class="num">404</div>
  <div class="icon">📋</div>
  <h1>This page didn't log its hours.</h1>
  <p>Whatever you were looking for isn't here. Maybe a bad link, maybe a typo. Either way — let's get you back on track.</p>
  <div class="links">
    <a href="/" class="btn-primary">Open the App →</a>
    <a href="/landing" class="btn-ghost">Home</a>
    <a href="/contact" class="btn-ghost">Contact</a>
  </div>
</div>

</body>
</html>
