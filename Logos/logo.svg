<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18103a"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Faint ruled ledger lines -->
  <rect x="26" y="55"  width="128" height="5" rx="2.5" fill="#fff" opacity=".12"/>
  <rect x="26" y="80"  width="128" height="5" rx="2.5" fill="#fff" opacity=".12"/>
  <rect x="26" y="105" width="128" height="5" rx="2.5" fill="#fff" opacity=".12"/>
  <rect x="26" y="130" width="128" height="5" rx="2.5" fill="#fff" opacity=".12"/>
  <!-- White L mark -->
  <rect x="34" y="40"  width="26" height="96" rx="6" fill="#fff"/>
  <rect x="34" y="116" width="82" height="26" rx="6" fill="#fff"/>
  <!-- Orange active-entry dot -->
  <circle cx="142" cy="44" r="13" fill="#e85d04"/>
</svg>
