<style>
/* ── TOKENS ── */
:root{
  --bg:#f2ede6;--surf:#ffffff;--surf2:#f7f2eb;--surf3:#ede7df;
  --bdr:#e2dbd2;--bdr2:#c9c0b4;
  --txt:#0d1117;--sub:#4a5568;--mut:#8a8d92;
  --ora:#d44000;--ora-dk:#b03500;--ora-bg:#fff7ed;--ora-bdr:#fdba74;
  --navy:#18103a;--navy-dk:#0a0618;--navy-mid:#1e1540;
  --ind:#5a5fcf;--ind-bg:#eef0ff;
  --grn:#0ea574;--grn-bg:#ecfdf5;
  --red:#e84040;--red-bg:#fff1f1;
  --amb:#f59e0b;--amb-bg:#fffbeb;
  --pur:#9333ea;--pur-bg:#faf5ff;
  --tea:#0fb5aa;--tea-bg:#f0fdfa;
  --bg-rgb:242,237,230;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.06);
  --shadow-btn:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --r:14px;--r-sm:9px;--r-lg:20px;
  --transition:.18s cubic-bezier(.4,0,.2,1);
  /* ── SPACING SCALE (4pt) ── */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;--sp-8:64px;
  --font-display:'Barlow Condensed','Inter',system-ui,sans-serif;
}
body.dark{
  --bg:#0c0905;--surf:#15100b;--surf2:#1e1812;--surf3:#261f17;
  --bg-rgb:12,9,5;
  --bdr:#2e2519;--bdr2:#3d3124;
  --txt:#edf0f7;--sub:#8a96b8;--mut:#4a4540;
  --ora-bg:#221200;--ora-bdr:#7a3500;
  --ind-bg:#191d42;--grn-bg:#021c14;--red-bg:#1e0808;
  --amb-bg:#1a1200;--pur-bg:#160a28;--tea-bg:#031a18;
  --shadow:0 1px 4px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 20px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.3);
  --shadow-lg:0 12px 48px rgba(0,0,0,.6),0 4px 16px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;background:var(--bg)}
html,body{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,select,textarea{font-family:inherit;font-size:inherit}
a{color:var(--ind);text-decoration:none;transition:opacity var(--transition)}
a:hover{opacity:.75}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(212,64,0,.28);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(212,64,0,.45)}
::-webkit-scrollbar-track{background:transparent}
:focus-visible{outline:2px solid var(--ora);outline-offset:2px;border-radius:4px}
button:focus-visible,a:focus-visible{border-radius:var(--r-sm)}
@keyframes ledger-dot{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── LAYOUT ── */
.app-wrap{display:flex;flex-direction:column;min-height:100vh}
.topnav{background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topnav-inner{max-width:1160px;margin:0 auto;padding:0 var(--sp-5);height:64px;display:flex;align-items:center;gap:var(--sp-5)}
.nav-logo{font-size:22px;font-weight:900;color:var(--ora);letter-spacing:0;font-family:var(--font-display);flex-shrink:0;cursor:pointer;transition:opacity var(--transition)}
.nav-logo:hover{opacity:.85}
.nav-logo span{color:var(--ind)}
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center}
.nav-tab{padding:7px 16px;border-radius:9px;border:none;background:transparent;color:var(--mut);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:-.01em}
.nav-tab:hover{background:var(--surf2);color:var(--sub)}
.nav-tab.active{background:var(--ora-bg);color:var(--ora);font-weight:700;box-shadow:0 0 0 1px var(--ora-bdr)}
.nav-right{display:flex;gap:var(--sp-2);align-items:center;flex-shrink:0}
.page{max-width:1160px;margin:0 auto;padding:var(--sp-6) var(--sp-5) 96px;width:100%}
.feed-layout{display:grid;grid-template-columns:284px 1fr 264px;gap:var(--sp-6);align-items:start}
.sidebar-left,.sidebar-right{position:sticky;top:88px}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:20px 22px}
.card+.card{margin-top:var(--sp-4)}
.section-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
* + .section-title{margin-top:var(--sp-6)}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all var(--transition);display:inline-flex;align-items:center;gap:6px;letter-spacing:-.01em}
.btn-primary{background:var(--ora);color:#fff;box-shadow:var(--shadow-btn)}
.btn-primary:hover{background:var(--ora-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,64,0,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-ind{background:var(--ind);color:#fff;box-shadow:var(--shadow-btn)}
.btn-ind:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--bdr)}
.btn-ghost:hover{background:var(--surf2);color:var(--txt);border-color:var(--bdr2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}
.btn-green{background:var(--grn);color:#fff;box-shadow:var(--shadow-btn)}
.btn-red{background:var(--red);color:#fff;box-shadow:var(--shadow-btn)}
.post-btn{background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;font-size:13px;cursor:pointer;transition:all var(--transition);box-shadow:0 2px 8px rgba(212,64,0,.3);letter-spacing:-.01em}
.post-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(212,64,0,.4)}
.post-btn:active{transform:translateY(0)}

/* ── AVATAR ── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:13px}
.av-sm{width:36px;height:36px;font-size:12px}
.av-md{width:44px;height:44px;font-size:14px}
.av-lg{width:72px;height:72px;font-size:22px}
.av-xl{width:88px;height:88px;font-size:28px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge-FAR{background:rgba(239,68,68,.12);color:#dc2626}
.badge-AUD{background:rgba(79,142,247,.12);color:#2563eb}
.badge-REG{background:rgba(16,185,129,.12);color:#059669}
.badge-BAR{background:rgba(212,64,0,.12);color:#d97706}
.badge-ISC{background:rgba(168,85,247,.12);color:#9333ea}
.badge-TCP{background:rgba(20,184,166,.12);color:#0d9488}
.badge-passed{background:var(--grn-bg);color:var(--grn);border:1px solid #a7f3d0}

.ac-header{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-4) 0}
.ac-user-name{font-weight:700;font-size:13px}
.ac-meta{font-size:11px;color:var(--mut);margin-top:2px}
.ac-body{padding:var(--sp-3) var(--sp-4) 0}
.ac-section-row{display:flex;align-items:center;gap:10px;margin-bottom:var(--sp-2)}
.ac-section-label{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px}
.ac-hours{font-size:42px;font-weight:900;color:var(--txt);line-height:1;letter-spacing:-.01em;font-family:var(--font-display);font-variant-numeric:tabular-nums}
.ac-hours-lbl{font-size:10px;color:var(--mut);margin-top:2px}
.ac-caption{font-size:13px;color:var(--sub);margin:var(--sp-2) 0 var(--sp-3);line-height:1.65}
.ac-stats-row{display:flex;gap:var(--sp-4);padding:var(--sp-3) 0;border-top:1px solid var(--bdr)}
.ac-stat{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:4px}
.ac-stat strong{color:var(--sub);font-weight:600}
.ac-actions{display:flex;gap:0;border-top:1px solid var(--bdr);margin-top:var(--sp-2)}
.ac-action{flex:1;padding:var(--sp-3) var(--sp-2);border:none;background:transparent;color:var(--mut);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:0}
.ac-action:hover{background:var(--surf2);color:var(--txt)}
.ac-action.props-given{color:var(--ora);background:var(--ora-bg)}
.ac-action.props-given:hover{background:var(--ora-bg)}

/* ── DIFFICULTY STARS ── */
.diff-stars{display:flex;gap:2px}
.diff-star{font-size:10px;opacity:.3}
.diff-star.on{opacity:1}

/* ── FEELING CHIP ── */
.feeling-chip{font-size:13px}

/* ── PROGRESS BAR ── */
.prog-bar{height:9px;background:var(--surf2);border-radius:9px;overflow:hidden}
.prog-fill{height:100%;border-radius:9px;transition:width .55s cubic-bezier(.4,0,.2,1)}

.profile-name{font-size:28px;font-weight:900;margin:var(--sp-2) 0 4px;letter-spacing:-.01em;font-family:var(--font-display)}
.profile-state{font-size:12px;opacity:.7;margin-bottom:var(--sp-3)}
.profile-stats{display:flex;gap:var(--sp-5);flex-wrap:wrap}
.profile-stat-val{font-size:32px;font-weight:900;letter-spacing:-.01em;line-height:1;font-family:var(--font-display);font-variant-numeric:tabular-nums}
.profile-stat-lbl{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.07em;margin-top:4px}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-3);margin-bottom:var(--sp-4)}
.stat-box{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:var(--sp-5);text-align:left;animation:fadeIn .4s cubic-bezier(.22,.61,.36,1) both}
.stats-grid .stat-box:nth-child(1){animation-delay:0ms}
.stats-grid .stat-box:nth-child(2){animation-delay:65ms}
.stats-grid .stat-box:nth-child(3){animation-delay:130ms}
.stats-grid .stat-box:nth-child(4){animation-delay:195ms}
.stat-val{font-size:38px;font-weight:900;line-height:1;letter-spacing:-.01em;font-family:var(--font-display);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:11px;color:var(--mut);margin-top:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* ── ACHIEVEMENTS ── */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.ach-item{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px 6px;text-align:center;transition:all .2s}
.ach-item.earned{border-color:var(--amb);background:var(--amb-bg)}
.ach-item.earned:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ach-icon{font-size:22px;margin-bottom:4px}
.ach-name{font-size:10px;font-weight:700;color:var(--sub);line-height:1.3;text-transform:uppercase;letter-spacing:.04em}
.ach-item.earned .ach-name{color:var(--amb)}
.ach-item:not(.earned){opacity:.4;filter:grayscale(1)}

/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--bdr)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:16px;font-weight:900;color:var(--mut);width:28px;text-align:center;flex-shrink:0;font-family:var(--font-display);font-variant-numeric:tabular-nums}
.lb-rank.gold{color:#f59e0b;font-size:20px}
.lb-rank.silver{color:#94a3b8;font-size:18px}
.lb-rank.bronze{color:#d97706;font-size:17px}
.lb-name{flex:1;font-size:13px;font-weight:600}
.lb-hrs{font-size:13px;font-weight:700;color:var(--ora);font-variant-numeric:tabular-nums}
.lb-you{background:var(--ora-bg);border-radius:8px;padding:var(--sp-3);margin:-2px}

/* ── CHALLENGE CARD ── */
.challenge-card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:var(--sp-4);margin-bottom:var(--sp-3)}
.challenge-title{font-size:13px;font-weight:700;margin-bottom:4px}
.challenge-meta{font-size:11px;color:var(--mut);margin-bottom:var(--sp-2)}
.challenge-participants{font-size:11px;color:var(--sub);margin-top:var(--sp-2)}

/* ── FRIEND CARD ── */
.friend-card{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--bdr)}
.friend-card:last-child{border-bottom:none}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:13px;font-weight:700}
.friend-meta{font-size:11px;color:var(--mut);margin-top:1px}
.follow-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--ora);background:transparent;color:var(--ora);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.follow-btn.following{background:var(--ora);color:#fff;border-color:var(--ora)}
.follow-btn:hover{opacity:.8}

/* ── COMMENTS ── */
.comments-wrap{background:var(--surf2);padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--bdr)}
.comment-row{display:flex;gap:var(--sp-2);margin-bottom:var(--sp-2)}
.comment-row:last-child{margin-bottom:0}
.comment-body{flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:var(--sp-2) var(--sp-3)}
.comment-author{font-size:11px;font-weight:700;color:var(--sub)}
.comment-text{font-size:12px;color:var(--txt);margin-top:2px;line-height:1.55}
.add-comment{display:flex;gap:var(--sp-2);margin-top:var(--sp-3)}
.add-comment input{flex:1;padding:7px 11px;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:12px;outline:none}
.add-comment input:focus{border-color:var(--ora)}

/* ── EXAM SECTION PILLS ── */
.exam-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.exam-pill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--surf);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--sub)}
.exam-pill.active-FAR{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.exam-pill.active-AUD{border-color:#2563eb;background:#eff6ff;color:#2563eb}
.exam-pill.active-REG{border-color:#059669;background:#ecfdf5;color:#059669}
.exam-pill.active-BAR{border-color:#d97706;background:#fffbeb;color:#d97706}
.exam-pill.active-ISC{border-color:#9333ea;background:#faf5ff;color:#9333ea}
.exam-pill.active-TCP{border-color:#0d9488;background:#f0fdfa;color:#0d9488}

/* ── DASH PACING CARD ── */
.pacing-card{padding:var(--sp-4) 0;display:flex;align-items:center;gap:var(--sp-4);border-bottom:1px solid var(--bdr)}
.pacing-card:last-of-type{border-bottom:none;padding-bottom:0}
.pc-bar-wrap{flex:1;min-width:0}
.pc-name{font-size:13px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.pc-pace{font-size:11px;color:var(--mut);margin-top:6px}
.pc-pace.on-pace{color:var(--grn)}
.pc-pace.behind{color:var(--red)}
.pc-pace.ahead{color:var(--ind)}

/* ── WEEKLY CHART ── */
.week-chart{display:flex;align-items:flex-end;gap:5px;height:104px;margin:var(--sp-3) 0 var(--sp-2)}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.week-bar{width:100%;background:var(--ora);border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.22,.61,.36,1)}
.week-bar.today-bar{background:var(--ind)}
.week-day-lbl{font-size:10px;color:var(--mut);font-weight:600;text-transform:uppercase}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:var(--sp-4);backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r-lg);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.22,.61,.36,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-5) var(--sp-6) 0}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.modal-close{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;line-height:1;padding:3px 7px;border-radius:7px;transition:all var(--transition)}
.modal-close:hover{background:var(--surf2);color:var(--txt)}
.modal-body{padding:var(--sp-4) var(--sp-6) var(--sp-5)}

/* ── FORMS ── */
.form-grp{margin-bottom:16px}
.form-grp label{display:block;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.form-grp input,.form-grp select,.form-grp textarea{width:100%;padding:10px 13px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:var(--r-sm);color:var(--txt);font-size:14px;outline:none;transition:border-color var(--transition),box-shadow var(--transition);font-family:inherit;letter-spacing:-.01em}
.form-grp input:focus,.form-grp select:focus,.form-grp textarea:focus{border-color:var(--ora);box-shadow:0 0 0 3px rgba(212,64,0,.12)}
.form-grp input::placeholder,.form-grp textarea::placeholder{color:var(--mut)}
.form-grp textarea{min-height:84px;resize:vertical;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feeling-row{display:flex;gap:8px;flex-wrap:wrap}
.feeling-opt{font-size:22px;padding:7px 11px;border-radius:9px;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;transition:all var(--transition);line-height:1}
.feeling-opt:hover{border-color:var(--bdr2);background:var(--surf)}
.feeling-opt.selected{border-color:var(--ora);background:var(--ora-bg);transform:scale(1.12)}
.diff-row{display:flex;gap:6px;flex-wrap:wrap}
.diff-opt{padding:6px 13px;border-radius:var(--r-sm);border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;font-size:12px;font-weight:600;transition:all var(--transition);color:var(--mut)}
.diff-opt:hover{border-color:var(--bdr2);color:var(--sub)}
.diff-opt.selected{border-color:var(--ind);background:var(--ind-bg);color:var(--ind)}

/* ── AUTH SCREEN ── */
.auth-wrap{min-height:100vh;display:flex;background:var(--bg)}
.auth-left{flex:1;background:linear-gradient(155deg,#0a0805,#15100b,#1c1510,#0d0a07);display:flex;flex-direction:column;justify-content:center;padding:64px 56px;position:relative;overflow:hidden}
.auth-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at -10% 80%,rgba(212,64,0,.5),transparent 45%),radial-gradient(ellipse at 90% 10%,rgba(90,95,207,.2),transparent 40%)}
.auth-left::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(212,64,0,.4),transparent 60%)}
.auth-left-inner{position:relative;z-index:1}
.auth-brand{font-size:44px;font-weight:900;color:#fff;letter-spacing:0;margin-bottom:6px;line-height:1;font-family:var(--font-display)}
.auth-brand-sub{font-size:15px;color:rgba(255,255,255,.55);margin-bottom:48px;line-height:1.6}
.auth-feature{display:flex;align-items:flex-start;gap:15px;margin-bottom:22px}
.auth-feature-icon{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;backdrop-filter:blur(4px)}
.auth-feature-text strong{display:block;font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;letter-spacing:-.01em}
.auth-feature-text span{font-size:12px;color:rgba(255,255,255,.5);line-height:1.55}
.auth-social-proof{margin-top:44px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;color:rgba(255,255,255,.4)}
.auth-social-proof strong{color:rgba(255,255,255,.65)}

.auth-right{width:500px;display:flex;flex-direction:column;justify-content:center;padding:52px;background:var(--surf)}
.auth-right-logo{font-size:26px;font-weight:900;color:var(--ora);letter-spacing:0;margin-bottom:6px;font-family:var(--font-display)}
.auth-tabs{display:flex;gap:0;background:var(--surf2);border-radius:11px;padding:4px;margin-bottom:26px;border:1px solid var(--bdr)}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);border-radius:8px;transition:all var(--transition);letter-spacing:-.01em}
.auth-tab.active{background:var(--surf);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
.google-btn{width:100%;padding:13px 20px;border:1.5px solid var(--bdr);background:var(--surf);border-radius:11px;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;font-size:14px;font-weight:600;color:var(--txt);transition:all var(--transition);margin-bottom:18px;letter-spacing:-.01em}
.google-btn:hover{border-color:var(--bdr2);background:var(--surf2);box-shadow:var(--shadow);transform:translateY(-1px)}
.google-btn:active{transform:translateY(0)}
.google-icon{width:20px;height:20px;flex-shrink:0}
.auth-divider{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.auth-divider span{font-size:11px;color:var(--mut);font-weight:500;white-space:nowrap;letter-spacing:.02em}
.auth-form-btn{width:100%;padding:13px;background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:all var(--transition);margin-top:4px;letter-spacing:-.01em;box-shadow:0 2px 8px rgba(212,64,0,.3)}
.auth-form-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,64,0,.38)}
.auth-form-btn:active{transform:translateY(0)}
.auth-form-btn:disabled{opacity:.6;transform:none;cursor:not-allowed}
.auth-terms{font-size:11px;color:var(--mut);text-align:center;margin-top:16px;line-height:1.7}
.auth-terms a{color:var(--ind)}

/* Google account picker modal */
.google-picker{background:var(--surf);border-radius:16px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.2);animation:modalIn .2s ease;overflow:hidden}
.google-picker-hdr{padding:20px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px}
.google-picker-accounts{padding:8px 0}
.google-account-row{display:flex;align-items:center;gap:12px;padding:12px 22px;cursor:pointer;transition:background .12s}
.google-account-row:hover{background:var(--surf2)}
.google-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#34a853);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.google-picker-footer{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;gap:8px}

/* ── ONBOARDING ── */
.onboard-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.onboard-box{width:100%;max-width:540px}
.onboard-logo{font-size:48px;font-weight:900;color:var(--ora);letter-spacing:0;line-height:1;font-family:var(--font-display)}
.onboard-logo span{color:var(--ind)}
.onboard-sub{font-size:15px;color:var(--sub);margin-top:8px;line-height:1.6;margin-bottom:28px;letter-spacing:-.01em}
.ob-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;margin-bottom:14px;box-shadow:var(--shadow)}
.ob-card h3{font-size:14px;font-weight:800;margin-bottom:18px;color:var(--txt);letter-spacing:-.02em}
.disc-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.disc-opt{background:var(--surf2);border:2px solid var(--bdr);border-radius:11px;padding:15px 10px;cursor:pointer;transition:all var(--transition);text-align:center}
.disc-opt:hover{border-color:var(--bdr2);background:var(--surf);box-shadow:var(--shadow)}
.disc-opt.sel{border-color:var(--ora);background:var(--ora-bg);box-shadow:0 0 0 3px rgba(212,64,0,.1)}
.disc-code{font-size:22px;font-weight:900;margin-bottom:3px;letter-spacing:0;font-family:var(--font-display)}
.disc-name{font-size:10px;color:var(--mut);line-height:1.3}
.disc-rate{font-size:10px;font-weight:700;margin-top:4px}
.ob-big-btn{width:100%;padding:14px;background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:all var(--transition);box-shadow:0 2px 10px rgba(212,64,0,.3);letter-spacing:-.02em}
.ob-big-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,64,0,.38)}
.ob-big-btn:active{transform:translateY(0)}
.steps{display:flex;gap:6px;margin-bottom:26px}
.step-dot{height:3px;border-radius:2px;background:var(--bdr);flex:1;transition:all .35s cubic-bezier(.4,0,.2,1)}
.step-dot.done{background:var(--ora)}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:28px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:flex-end}
.toast{padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.22);transform:translateX(calc(100% + 32px));transition:transform .3s cubic-bezier(.22,.61,.36,1);pointer-events:auto;letter-spacing:-.01em;max-width:320px}
.toast.show{transform:translateX(0)}
.toast-ok{background:var(--grn);color:#fff}
.toast-err{background:var(--red);color:#fff}
.toast-info{background:var(--ind);color:#fff}
.toast-ach{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}

/* ── INLINE ICONS (text emoji substitutes) ── */
.icon-props{margin-right:4px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--mut)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:13px;line-height:1.7}

/* ── SCORE WINDOW BANNER ── */
.score-banner{background:var(--amb-bg);border:1px solid #fde68a;border-radius:10px;padding:12px 14px;font-size:12px;color:var(--sub);line-height:1.7;margin-bottom:16px}
.score-banner strong{color:var(--amb)}

/* ── SECTION STATUS SELECTOR ── */
.section-status-row{display:flex;gap:8px;flex-wrap:wrap}
.section-status-opt{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--surf2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--mut)}
.section-status-opt.sel-planned{border-color:var(--mut);color:var(--sub);background:var(--surf)}
.section-status-opt.sel-studying{border-color:var(--amb);color:var(--amb);background:var(--amb-bg)}
.section-status-opt.sel-passed{border-color:var(--grn);color:var(--grn);background:var(--grn-bg)}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;font-weight:700;color:var(--mut);text-align:center;padding:var(--sp-1) 0 var(--sp-2);text-transform:uppercase;letter-spacing:.06em}
.cal-day{min-height:76px;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:6px;cursor:pointer;transition:all .12s;position:relative}
.cal-day:hover{border-color:var(--bdr2)}
.cal-day.other-month{opacity:.3;pointer-events:none}
.cal-day.is-today{border-color:var(--ora)!important;background:var(--ora-bg)}
.cal-day-num{font-size:10px;font-weight:600;color:var(--sub);margin-bottom:3px}
.cal-day.is-today .cal-day-num{background:var(--ora);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.cal-pill{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:700;color:#fff;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

@media(max-width:860px){
  .auth-left{display:none}
  .auth-right{width:100%;padding:32px 24px;min-height:100vh}
}
@keyframes props-bounce{0%{transform:scale(1)}30%{transform:scale(1.38)}60%{transform:scale(.93)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.props-anim{animation:props-bounce .45s cubic-bezier(.22,.61,.36,1)}

/* ── SCORE BLOCKS ── */
.score-block{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.score-pass{background:var(--grn-bg);border:1.5px solid var(--grn);color:var(--grn)}
.score-close{background:var(--amb-bg);border:1.5px solid var(--amb);color:var(--amb)}
.score-fail{background:var(--red-bg);border:1.5px solid var(--red);color:var(--red)}

/* ── HEAT MAP ── */
.heat-cell{width:11px;height:11px;border-radius:2px;transition:transform .1s}
.heat-cell:hover{transform:scale(1.4)}

/* ── TIPS CARD HOVER ── */
.tip-deep-card{transition:box-shadow .2s,transform .2s}
.tip-deep-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}

/* ── PROFILE AVATAR EDIT ── */
.profile-av-wrap{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0;cursor:pointer;overflow:hidden;position:relative}
.profile-av-edit-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;opacity:0;transition:opacity .18s;border-radius:50%;text-transform:uppercase;letter-spacing:.06em}
.profile-av-wrap:hover .profile-av-edit-overlay{opacity:1}

/* ── FOLLOW LIST ── */
.fol-user-row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;cursor:pointer;transition:background .12s}
.fol-user-row:hover{background:var(--surf2)}
.fol-user-meta{flex:1;min-width:0}
.fol-user-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fol-user-sub{font-size:11px;color:var(--mut);margin-top:1px}

/* ── USER PROFILE MODAL ── */
.uprofile-hero{background:linear-gradient(155deg,#0e0804,#1c1008,#0e0804);border-radius:18px 18px 0 0;padding:24px 24px 20px;color:#fff;position:relative;overflow:hidden}
.uprofile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at -10% 65%,rgba(212,64,0,.6),transparent 45%),radial-gradient(ellipse at 95% 5%,rgba(90,95,207,.2),transparent 40%)}
.uprofile-body{padding:20px 22px 24px}

/* ── CLUBS ── */
.my-club-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf2);cursor:pointer;transition:all .15s;margin-bottom:8px}
.my-club-card:hover{border-color:var(--ind);box-shadow:var(--shadow)}
.club-ico{width:44px;height:44px;border-radius:12px;background:var(--ind-bg);border:1px solid rgba(99,102,241,.25);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* ── CLUB CHAT ── */
.club-chat-area{min-height:240px;max-height:380px;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:10px}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-row.mine{flex-direction:row-reverse}
.chat-bub{max-width:72%;padding:9px 13px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}
.chat-bub-them{background:var(--surf2);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.chat-bub-mine{background:var(--ind);color:#fff;border-bottom-right-radius:4px}
.chat-system{text-align:center;font-size:10px;color:var(--mut);font-style:italic;padding:4px 0}
.chat-meta{font-size:10px;color:var(--mut);margin-top:3px}
.chat-meta-them{text-align:left}
.chat-footer{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--bdr);margin-top:4px}
.chat-inp{flex:1;padding:9px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:22px;color:var(--txt);font-size:13px;outline:none;transition:border .15s}
.chat-inp:focus{border-color:var(--ind)}
.chat-send{padding:9px 18px;background:var(--ind);color:#fff;border:none;border-radius:22px;cursor:pointer;font-size:13px;font-weight:700;transition:opacity .13s}
.chat-send:hover{opacity:.85}
.club-member-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;font-size:11px;font-weight:600;margin:2px}
/* ── SESSION TIMER OVERLAY ── */
.sess-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)}
.sess-overlay.open{display:flex}
.sess-box{background:var(--surf);border:1px solid var(--bdr);border-radius:22px;width:100%;max-width:490px;overflow:hidden;animation:modalIn .2s ease}
.sess-color-bar{height:5px;width:100%;transition:background .3s}
.sess-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-4) var(--sp-5) 0}
.sess-status{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px}
.sess-st-setup{background:rgba(212,64,0,.1);color:var(--ora)}
.sess-st-live{background:rgba(239,68,68,.12);color:#ef4444}
.sess-st-paused{background:rgba(245,158,11,.12);color:#f59e0b}
.sess-st-done{background:rgba(16,185,129,.12);color:#10b981}
.sess-close-btn{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1}
.sess-close-btn:hover{background:var(--surf2);color:var(--txt)}
.sess-body{padding:var(--sp-5) var(--sp-5) var(--sp-6)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:rec-pulse 1.1s infinite}
@keyframes rec-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.sess-fgrp{margin-bottom:14px}
.sess-fgrp label{display:block;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sess-fgrp select,.sess-fgrp input{width:100%;padding:10px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none;transition:border .15s}
.sess-fgrp select:focus,.sess-fgrp input:focus{border-color:var(--ora)}
.sess-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sess-start-btn{width:100%;padding:14px;background:var(--ora);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.sess-start-btn:hover{background:#b03500;transform:translateY(-1px)}
.sess-exam-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;padding:5px 14px;border-radius:20px;margin-bottom:12px}
.sess-clock{font-size:72px;font-weight:900;letter-spacing:-.01em;line-height:1;text-align:center;font-family:var(--font-display);font-variant-numeric:tabular-nums;transition:color .3s;margin:10px 0 6px}
.sess-clock-lbl{text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:18px}
.sess-topic-row{text-align:center;margin-bottom:24px}
.sess-topic-lbl{font-size:12px;color:var(--mut);margin-bottom:3px}
.sess-topic-val{font-size:15px;font-weight:700}
.sess-ctrl-row{display:flex;gap:10px;justify-content:center}
.sess-ctrl{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:11px;font-size:13px;font-weight:700;border:2px solid transparent;cursor:pointer;transition:all .13s}
.sess-ctrl-pause{background:rgba(245,158,11,.1);color:#f59e0b;border-color:rgba(245,158,11,.2)}
.sess-ctrl-pause:hover{background:rgba(245,158,11,.2)}
.sess-ctrl-resume{background:rgba(212,64,0,.1);color:var(--ora);border-color:rgba(212,64,0,.2)}
.sess-ctrl-resume:hover{background:rgba(212,64,0,.2)}
.sess-ctrl-end{background:rgba(239,68,68,.08);color:#ef4444;border-color:rgba(239,68,68,.18)}
.sess-ctrl-end:hover{background:rgba(239,68,68,.18)}
.sess-recap-hero{text-align:center;padding:6px 0 18px}
.sess-recap-icon{font-size:44px;margin-bottom:8px}
.sess-recap-title{font-size:24px;font-weight:900;margin-bottom:3px;font-family:var(--font-display);letter-spacing:-.01em}
.sess-recap-sub{font-size:13px;color:var(--sub)}
.sess-rstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.sess-rstat{background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:12px;text-align:center}
.sess-rstat-val{font-size:32px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.01em;font-family:var(--font-display);font-variant-numeric:tabular-nums}
.sess-rstat-lbl{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em}
.sess-divider{height:1px;background:var(--bdr);margin:18px 0}
.concept-inp-wrap{display:flex;gap:8px;margin-bottom:9px}
.concept-inp{flex:1;padding:9px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none}
.concept-inp:focus{border-color:var(--ora)}
.concept-add-btn{padding:9px 14px;background:var(--ora);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
.concept-tags-wrap{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:14px}
.concept-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(212,64,0,.1);border:1px solid rgba(212,64,0,.25);color:var(--ora);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px}
.concept-tag-x{cursor:pointer;opacity:.55;font-size:14px;line-height:1}
.concept-tag-x:hover{opacity:1}
.feeling-row-r{display:flex;gap:7px;margin-top:6px}
.feeling-r-btn{flex:1;padding:9px 4px;border-radius:10px;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;font-size:19px;text-align:center;transition:all .15s}
.feeling-r-btn:hover{border-color:var(--bdr2);transform:scale(1.05)}
.feeling-r-btn.sel{border-color:var(--ora);background:var(--ora-bg);transform:scale(1.08)}
.diff-r-row{display:flex;gap:7px;margin-top:6px}
.diff-r-btn{flex:1;padding:9px;border-radius:10px;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;font-size:12px;font-weight:700;text-align:center;transition:all .13s;color:var(--mut)}
.diff-r-btn:hover{border-color:var(--bdr2)}
.diff-r-btn.sel{border-color:var(--ind);background:var(--ind-bg);color:var(--ind)}
.sess-notes-ta{width:100%;padding:10px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none;resize:vertical;min-height:72px;font-family:inherit;transition:border .15s}
.sess-notes-ta:focus{border-color:var(--ora)}
.sess-save-btn{width:100%;padding:14px;background:var(--grn);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.sess-save-btn:hover{background:#059669;transform:translateY(-1px)}
/* Active session chip in nav */
.active-sess-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#ef4444;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .13s}
.active-sess-chip:hover{background:rgba(239,68,68,.2)}
.active-sess-time{font-variant-numeric:tabular-nums;font-size:12px;font-weight:900}

/* ── PREMIUM / PAYWALL ── */
.pro-lock-wrap{position:relative;overflow:hidden;border-radius:var(--r)}
.pro-lock-icon{font-size:34px;margin-bottom:8px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.7))}
.pro-lock-label{font-size:11px;font-weight:800;color:var(--txt);text-align:center;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.pro-lock-cta{background:linear-gradient(135deg,#d44000,#d97706);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 4px 14px rgba(212,64,0,.5);letter-spacing:.03em}
.pro-lock-cta:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(212,64,0,.6)}
.pro-plan-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.07em;vertical-align:middle;line-height:1}
.badge-pro{background:linear-gradient(135deg,#d44000,#d97706);color:#fff}
.badge-elite{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff}
.badge-trial{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff}
.badge-cram{background:linear-gradient(135deg,#6366f1,#4338ca);color:#fff}
/* Nav pro badge */
.nav-pro-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.nav-pro-chip-pro{background:linear-gradient(135deg,#d44000,#d97706);color:#fff;box-shadow:0 2px 8px rgba(212,64,0,.4)}
.nav-pro-chip-elite{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(168,85,247,.4)}
.nav-pro-chip-trial{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;box-shadow:0 2px 8px rgba(20,184,166,.3)}
.nav-pro-chip-free{background:transparent;color:var(--ind);border:1.5px solid var(--ind);font-size:10px}
.nav-pro-chip-free:hover{background:var(--ind-bg)}
/* Upgrade modal */
.upgrade-modal-box{background:var(--surf);border:1px solid var(--bdr);border-radius:26px;width:100%;max-width:940px;max-height:94vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s cubic-bezier(.22,.61,.36,1);position:relative}
.upgrade-hero{background:linear-gradient(155deg,#0a0805,#15100b,#1c1510,#0d0a07);padding:44px 44px 36px;border-radius:26px 26px 0 0;position:relative;overflow:hidden;text-align:center}
.upgrade-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(212,64,0,.38),transparent 52%),radial-gradient(ellipse at 85% 100%,rgba(99,102,241,.22),transparent 48%)}
.upgrade-hero-inner{position:relative;z-index:1}
.billing-toggle{display:inline-flex;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:30px;padding:4px;margin-top:20px;gap:0}
.billing-opt{padding:7px 24px;border-radius:26px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);transition:all var(--transition);white-space:nowrap;letter-spacing:-.01em}
.billing-opt.active{background:rgba(255,255,255,.15);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.savings-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.22);border:1px solid rgba(16,185,129,.38);color:#6ee7b7;font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.07em;margin-left:8px;vertical-align:middle}
.plan-cards-row{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:14px;padding:32px 36px 22px;align-items:start}
/* FIXED: overflow:visible so badge isn't clipped */
.plan-card{background:var(--surf);border:2px solid var(--bdr);border-radius:20px;padding:24px;position:relative;transition:all var(--transition);overflow:visible}
.plan-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.plan-card.popular{border-color:var(--ora);box-shadow:0 0 0 1px var(--ora),0 10px 36px rgba(212,64,0,.18)}
.plan-popular-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#d44000,#b03500);color:#fff;font-size:9px;font-weight:800;padding:4px 18px;border-radius:20px;white-space:nowrap;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 4px 14px rgba(212,64,0,.5)}
.plan-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:12px}
.plan-price{font-size:42px;font-weight:900;line-height:1;letter-spacing:-2.5px;color:var(--txt)}
.plan-price sup{font-size:18px;font-weight:700;vertical-align:super;letter-spacing:0;margin-right:1px}
.plan-period{font-size:11px;color:var(--mut);margin-top:4px;letter-spacing:-.01em}
.plan-sep{height:1px;background:var(--bdr);margin:16px 0}
.plan-feat{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--sub);margin-bottom:9px;line-height:1.5}
.plan-feat-on{color:var(--grn);flex-shrink:0;font-weight:900;font-size:13px}
.plan-feat-off{color:var(--mut);flex-shrink:0;opacity:.35;font-size:13px}
.plan-cta{width:100%;padding:13px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;margin-top:16px;transition:all var(--transition);letter-spacing:-.01em}
.plan-cta-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--bdr)}
.plan-cta-ghost:hover{background:var(--surf2);border-color:var(--bdr2);color:var(--txt)}
.plan-cta-pro{background:linear-gradient(135deg,#d44000,#b03500);color:#fff;box-shadow:0 4px 16px rgba(212,64,0,.38)}
.plan-cta-pro:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(212,64,0,.48)}
.plan-cta-elite{background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;box-shadow:0 4px 16px rgba(147,51,234,.32)}
.plan-cta-elite:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(147,51,234,.42)}
.plan-cta-active{background:var(--grn-bg);color:var(--grn);border:1.5px solid rgba(14,165,116,.35);cursor:default}
/* Cram card */
.cram-section{margin:0 36px 22px;background:linear-gradient(135deg,#0f0c29,#1e1b4b,#312e81);border-radius:20px;padding:24px 28px;position:relative;overflow:hidden;color:#fff;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.cram-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 78% 50%,rgba(212,64,0,.32),transparent 52%)}
.cram-inner{position:relative;z-index:1}
.cram-feat-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cram-feat-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.02em}
.cram-cta{background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:800;cursor:pointer;transition:all var(--transition);white-space:nowrap;box-shadow:0 4px 18px rgba(212,64,0,.5);letter-spacing:-.01em}
.cram-cta:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(212,64,0,.55)}
/* Student discount */
.student-section{margin:0 36px 22px;background:var(--tea-bg);border:1px solid rgba(15,181,170,.3);border-radius:14px;padding:15px 22px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all var(--transition)}
.student-section:hover{background:var(--grn-bg);border-color:rgba(14,165,116,.35);transform:translateY(-1px)}
/* Testimonials */
.testimonials-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:0 36px 32px}
.testimonial-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:14px;padding:18px;transition:box-shadow var(--transition)}
.testimonial-card:hover{box-shadow:var(--shadow-md)}
.testimonial-text{font-size:12.5px;color:var(--sub);line-height:1.7;font-style:italic;margin-bottom:12px}
.testimonial-author{font-size:12.5px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.testimonial-meta{font-size:10px;color:var(--mut);margin-top:2px}
.stars{color:#f59e0b;font-size:12px;letter-spacing:1px;margin-bottom:8px}
/* Free tier banner */
.free-limit-banner{background:linear-gradient(135deg,var(--ora-bg),var(--amb-bg));border:1px solid var(--ora-bdr);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;cursor:pointer;transition:all var(--transition)}
.free-limit-banner:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
/* Challenge locked overlay */
.challenge-pro-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.03em}
.challenge-pro-badge:hover{opacity:.88}
/* Upsell inline card */
.upsell-inline{background:linear-gradient(135deg,var(--ind-bg),var(--pur-bg));border:1px solid rgba(90,95,207,.2);border-radius:14px;padding:15px 18px;display:flex;align-items:center;gap:14px;margin-top:12px;cursor:pointer;transition:all var(--transition)}
.upsell-inline:hover{border-color:rgba(90,95,207,.4);box-shadow:var(--shadow-md);transform:translateY(-1px)}
/* Social connect */
.social-link-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all var(--transition)}
.social-link-row:hover{border-color:var(--bdr2);background:var(--surf)}
.social-link-row.connected{border-color:var(--grn);background:var(--grn-bg)}
.soc-icon{width:34px;height:34px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.soc-li{background:#0077b5}
.soc-fb{background:#1877f2}
.soc-link-info{flex:1;min-width:0}
.soc-link-name{font-size:13px;font-weight:700;letter-spacing:-.01em}
.soc-link-url{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── PRO LOCK OVERLAY ── */
.pro-lock-overlay{position:absolute;inset:0;background:rgba(var(--bg-rgb,242,237,230),.88);backdrop-filter:blur(4px);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10;padding:20px;cursor:pointer;transition:background var(--transition)}
.pro-lock-overlay:hover{background:rgba(var(--bg-rgb,242,237,230),.95)}
.pro-lock-icon{font-size:28px}
.pro-lock-title{font-size:13px;font-weight:800;color:var(--txt);text-align:center;letter-spacing:-.02em}
.pro-lock-sub{font-size:11.5px;color:var(--sub);text-align:center;line-height:1.55;max-width:220px}
.pro-lock-cta{background:linear-gradient(135deg,#d44000,#b03500);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:12px;font-weight:800;cursor:pointer;transition:all var(--transition);box-shadow:0 3px 12px rgba(212,64,0,.35);letter-spacing:-.01em}
.pro-lock-cta:hover{transform:translateY(-1px) scale(1.04);box-shadow:0 6px 18px rgba(212,64,0,.45)}
/* ── ACTIVITY CARD ── */
.activity-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .22s,transform .22s,border-color .22s}
.activity-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--bdr2)}
/* ── PROFILE HERO ── */
.profile-hero{background:linear-gradient(155deg,#0e0804,#1c1008,#0e0804);border-radius:var(--r);padding:var(--sp-6);color:#fff;position:relative;overflow:hidden;margin-bottom:var(--sp-5)}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at -10% 65%,rgba(212,64,0,.65),transparent 48%),radial-gradient(ellipse at 95% 5%,rgba(90,95,207,.22),transparent 40%)}
.profile-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(212,64,0,.5),transparent 60%)}
.profile-hero-inner{position:relative;z-index:1}
/* ── SETTINGS ── */
.settings-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all var(--transition);font-size:13px;font-weight:500;color:var(--sub)}
.settings-nav-item:hover{background:var(--surf2);color:var(--txt)}
.settings-nav-item.active{background:var(--ora-bg);color:var(--ora);font-weight:700}
/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .feed-layout{grid-template-columns:1fr;max-width:640px;margin:0 auto}
  .sidebar-left,.sidebar-right{position:static;display:none}
  .sidebar-right.mobile-show{display:block}
}
@media(max-width:900px){
  .plan-cards-row{grid-template-columns:1fr;padding:var(--sp-5) var(--sp-5) var(--sp-3)}
  .testimonials-grid{grid-template-columns:1fr 1fr;padding:0 var(--sp-5) var(--sp-5)}
  .cram-section{margin:0 var(--sp-5) var(--sp-4);grid-template-columns:1fr}
  .student-section{margin:0 var(--sp-5) var(--sp-4)}
}
@media(max-width:860px){
  .auth-left{display:none}
  .auth-right{width:100%;padding:var(--sp-6) var(--sp-5);min-height:100vh}
}
@media(max-width:640px){
  .page{padding:var(--sp-4) var(--sp-3) calc(88px + env(safe-area-inset-bottom,0px))}
  .nav-tabs{display:none}
  .topnav-inner{height:56px;padding:0 var(--sp-3)}
  #nav-log-btn,.nav-btn-msg,.nav-btn-set{display:none!important}
  .form-row{grid-template-columns:1fr}
  .disc-opts{grid-template-columns:1fr 1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .toast-wrap{bottom:calc(72px + env(safe-area-inset-bottom,0px));right:var(--sp-3);left:var(--sp-3)}
  .toast{max-width:100%}
  .modal-overlay.open{align-items:flex-end;padding:0}
  .modal-box{border-radius:var(--r-lg) var(--r-lg) 0 0;max-height:92vh}
  .cal-day{min-height:58px;padding:4px}
  .testimonials-grid{grid-template-columns:1fr;padding:0 var(--sp-4) var(--sp-4)}
  .plan-cards-row{padding:var(--sp-4) var(--sp-4) var(--sp-3)}
  .cram-section,.student-section{margin:0 var(--sp-4) var(--sp-3)}
  .auth-right{padding:var(--sp-5) var(--sp-4)}
}
/* ── MOBILE BOTTOM NAV ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);z-index:200;padding:5px 0;padding-bottom:calc(5px + env(safe-area-inset-bottom,0px))}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:stretch}
.mob-nav-btn{background:none;border:none;cursor:pointer;padding:5px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.03em;min-width:54px;border-radius:var(--r-sm);transition:color var(--transition);-webkit-tap-highlight-color:transparent}
.mob-nav-btn.active{color:var(--ora)}
.mob-nav-btn:active{opacity:.6}
.mob-nav-icon{font-size:17px;line-height:1.1}
/* ── SESSION FAB ── */
.session-fab{display:none;position:fixed;z-index:150;right:var(--sp-4);bottom:calc(80px + env(safe-area-inset-bottom,0px));width:50px;height:50px;border-radius:50%;background:var(--ora);color:#fff;border:none;cursor:pointer;font-size:16px;font-weight:800;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(212,64,0,.45),0 1px 4px rgba(0,0,0,.15);transition:transform var(--transition),box-shadow var(--transition);-webkit-tap-highlight-color:transparent}
.session-fab:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(212,64,0,.55)}
.session-fab:active{transform:scale(.93)}
@media(max-width:640px){
  .mob-nav{display:block}
  .session-fab{display:flex}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(212,64,0,.4)}50%{box-shadow:0 0 0 8px rgba(212,64,0,0)}}
@keyframes slide-up-banner{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fade-in{animation:fadeIn .22s cubic-bezier(.22,.61,.36,1) both}
/* ── TAB DIRECTIONAL TRANSITIONS ── */
@keyframes tabSlideRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
@keyframes tabSlideLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
.tab-right{animation:tabSlideRight .28s cubic-bezier(.22,.61,.36,1) both}
.tab-left{animation:tabSlideLeft .28s cubic-bezier(.22,.61,.36,1) both}
/* ── PACING CARDS STAGGER ── */
.pacing-card{animation:fadeIn .38s cubic-bezier(.22,.61,.36,1) both}
.pacing-card:nth-child(1){animation-delay:0ms}
.pacing-card:nth-child(2){animation-delay:80ms}
.pacing-card:nth-child(3){animation-delay:160ms}
.pacing-card:nth-child(4){animation-delay:240ms}
.pacing-card:nth-child(5){animation-delay:240ms}
.pacing-card:nth-child(6){animation-delay:240ms}
/* ── SESSION FAB IDLE RING ── */
@keyframes fab-ring{0%{transform:scale(1);opacity:.65}65%{transform:scale(1.75);opacity:0}100%{transform:scale(1.75);opacity:0}}
.session-fab::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--ora);opacity:0;animation:fab-ring 3s cubic-bezier(.16,1,.3,1) infinite 1.5s;pointer-events:none}
/* ── ACTIVITY CARD ENTER ── */
.activity-card{animation:fadeIn .3s cubic-bezier(.22,.61,.36,1) both}
/* ── ACCESSIBILITY ── */
@media(prefers-reduced-motion:reduce){

<script>

const FIREBASE_ENABLED = true;

let firebaseApp = null;
let firebaseAuth = null;
let firebaseDb = null;
function initFirebase(){
  if(!FIREBASE_ENABLED) return;
  try {
    if(!firebase.apps.length) firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    else firebaseApp = firebase.app();
    firebaseAuth = firebase.auth();
    try{
      firebaseDb = firebase.firestore();
    }catch(e){
      setTimeout(()=>{ try{ firebaseDb=firebase.firestore(); }catch(e2){} },500);
    }
    // Persist auth across page reloads
    firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    // Listen for auth state changes from Google sign-in
    firebaseAuth.onAuthStateChanged(user=>{
      if(user && !AUTH){
        // Email/password users must verify their email before accessing the app
        const isEmailUser = user.providerData.some(p=>p.providerId==='password');
        if(isEmailUser && !user.emailVerified){
          // Silently wait — they'll sign in manually after verifying
          return;
        }
        const method = user.providerData[0]?.providerId==='google.com' ? 'google' : 'email';
        AUTH = {
          uid: user.uid,
          displayName: user.displayName || user.email.split('@')[0],
          email: user.email,
          method,
          photoURL: user.photoURL || null,
          created: Date.now()
        };
        saveAuth(AUTH);
        // Restore this user's saved state (survives signout)
        if(!S) S = loadState(AUTH.uid) || null;
        if(!S) renderOnboarding();
        else { renderApp(); writeUserProfile(); }
      }
    });
  } catch(e){ console.warn('Firebase init failed:', e.message); }
}

async function signInWithGoogle(){
  if(!FIREBASE_ENABLED){
    // Fallback: simulate Google sign-in (demo mode)
    simulateGoogleSignIn();
    return;
  }
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    const result = await firebaseAuth.signInWithPopup(provider);
    const user = result.user;
    AUTH = {
      uid: user.uid,
      displayName: user.displayName || user.email.split('@')[0],
      email: user.email,
      method: 'google',
      photoURL: user.photoURL || null,
      created: Date.now()
    };
    saveAuth(AUTH);
    // Restore this user's saved state (survives signout)
    S = loadState(AUTH.uid) || null;
    if(!S) renderOnboarding();
    else renderApp();
  } catch(e){
    if(e.code !== 'auth/popup-closed-by-user'){
      showToast('Sign-in failed: ' + e.message,'err');
    }
  }
}

async function signInWithEmailFirebase(email, password){
  if(!FIREBASE_ENABLED) return false;
  try {
    const cred = await firebaseAuth.signInWithEmailAndPassword(email, password);
    if(!cred.user.emailVerified){
      // Keep signed in so they can resend, but don't grant app access
      return 'unverified';
    }
    AUTH = { uid: cred.user.uid, displayName: cred.user.displayName||email.split('@')[0], email, method:'email', created: Date.now() };
    saveAuth(AUTH);
    return true;
  } catch(e){
    const msg = e.code==='auth/wrong-password'||e.code==='auth/invalid-credential' ? 'Incorrect password'
              : e.code==='auth/user-not-found' ? 'No account with that email'
              : e.message;
    showToast(msg,'err');
    return false;
  }
}

async function signUpWithEmailFirebase(email, password, name){
  if(!FIREBASE_ENABLED) return false;
  try {
    const cred = await firebaseAuth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    // Send verification email — user must verify before accessing the app
    await cred.user.sendEmailVerification({
      url: 'https://ledgercpa.vercel.app'
    });
    // Don't set AUTH yet — wait for verification
    return 'verify';
  } catch(e){
    showToast(e.code==='auth/email-already-in-use'?'Account already exists — sign in instead':e.message,'err');
    return false;
  }
}

async function resendVerificationEmail(){
  if(!FIREBASE_ENABLED) return;
  try {
    const user = firebaseAuth.currentUser;
    if(!user){ showToast('Please sign in first','err'); return; }
    await user.sendEmailVerification({ url: 'https://ledgercpa.vercel.app' });
    showToast('Verification email sent — check your inbox ✓','ok');
  } catch(e){
    showToast('Could not send email: '+e.message,'err');
  }
}

function signOut(){
  if(FIREBASE_ENABLED && firebaseAuth){
    firebaseAuth.signOut().catch(()=>{});
  }
  if(S) saveState(); // persist latest state under UID key before clearing auth
  clearAuth();
  AUTH=null; S=null;
  SUB={tier:'free',billingCycle:'monthly',startDate:null,trialUsed:false,studentVerified:false};
  saveSub(SUB);
  showToast('Signed out','info');
  setTimeout(()=>location.reload(),500);
}

const KEY = 'pf2:state'; // legacy key (pre-per-user)
// Per-user state keys so multiple accounts on the same device stay separate
// and logout never loses data
function getStateKey(uid){ return uid ? 'pf2:state:u:'+uid : KEY; }
function loadState(uid){
  try{
    const userKey = uid ? getStateKey(uid) : null;
    // Try per-user key first (new)
    if(userKey){ const r=localStorage.getItem(userKey); if(r) return JSON.parse(r); }
    // Fall back to legacy key and migrate it to the user-scoped key
    const legacy=localStorage.getItem(KEY);
    if(legacy){
      const parsed=JSON.parse(legacy);
      if(userKey){ localStorage.setItem(userKey,legacy); localStorage.removeItem(KEY); }
      return parsed;
    }
    return null;
  }catch{return null;}
}
function saveState(){
  if(!S)return;
  try{localStorage.setItem(getStateKey(AUTH?.uid),JSON.stringify(S));}
  catch(e){showToast('Storage full — clear old data in Settings','err');}
}

async function searchFirestoreUsers(q){
  if(!firebaseDb) return [];
  try{
    const ql=q.toLowerCase().trim();
    let snap;
    if(ql){
      snap=await firebaseDb.collection('users')
        .where('displayNameLower','>=',ql)
        .where('displayNameLower','<=',ql+'\uf8ff')
        .limit(20).get();
    } else {
      snap=await firebaseDb.collection('users')
        .orderBy('createdAt','desc').limit(30).get();
    }
    return snap.docs.map(d=>d.data());
  }catch(e){return [];}
}

function todayStr(){return new Date().toISOString().slice(0,10);}
function timeAgo(isoStr){
  const diff=(Date.now()-new Date(isoStr))/1000;
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
function esc(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg,type='ok'){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.textContent=msg;
  wrap.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);},3500);
}
function getDailyTip(){return CPA_TIPS[Math.floor(Date.now()/86400000)%CPA_TIPS.length];}
function getStreak(){
  if(!S||!S.activities.length)return 0;
  let streak=0;
  const today=new Date();today.setHours(0,0,0,0);
  const logDates=new Set(S.activities.map(a=>a.date.slice(0,10)));
  let check=new Date(today);
  while(true){
    const key=check.toISOString().slice(0,10);
    if(logDates.has(key)){streak++;check.setDate(check.getDate()-1);}
    else if(check.getTime()===today.getTime()){check.setDate(check.getDate()-1);}
    else break;
  }
  return streak;
}
function getTotalHours(){if(!S)return 0;return S.activities.reduce((a,act)=>a+(act.hours||0),0);}
function getWeekHours(){
  if(!S)return 0;
  const weekAgo=new Date(Date.now()-7*86400000);
  return S.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
}
function getSectionHours(section){
  if(!S)return 0;
  return S.activities.filter(a=>a.section===section).reduce((a,b)=>a+(b.hours||0),0);
}
function checkAchievements(){
  if(!S)return;
  const totalHrs=getTotalHours();
  const streak=getStreak();
  const passedCount=(S.sectionPassed||[]).length;
  const propCount=S.propsGiven||0;
  const followCount=(S.following||[]).filter(Boolean).length;
  const earned=new Set(S.achievements||[]);
  const newOnes=[];

  const check=(id,cond)=>{if(cond&&!earned.has(id)){earned.add(id);newOnes.push(id);}};
  const sessionCount=S.activities.length;
  check('first_session',sessionCount>=1);
  check('sessions_5',sessionCount>=5);
  check('sessions_10',sessionCount>=10);
  check('sessions_25',sessionCount>=25);
  check('sessions_50',sessionCount>=50);
  check('sessions_100',sessionCount>=100);

  // Hours
  check('hrs_10',totalHrs>=10);
  check('hrs_25',totalHrs>=25);
  check('hrs_50',totalHrs>=50);
  check('hrs_100',totalHrs>=100);
  check('hrs_150',totalHrs>=150);
  check('hrs_250',totalHrs>=250);
  check('hrs_500',totalHrs>=500);

  // Streaks
  check('streak_3',streak>=3);
  check('streak_7',streak>=7);
  check('streak_14',streak>=14);
  check('streak_30',streak>=30);
  check('streak_60',streak>=60);
  check('streak_100',streak>=100);

  // Session intensity
  check('marathon',S.activities.some(a=>a.hours>=5));
  check('deep_work',S.activities.some(a=>a.hours>=6));
  check('all_day',S.activities.some(a=>a.hours>=8));

  // Time of day
  check('early_bird',S.activities.some(a=>{const h=new Date(a.date).getHours();return h<6;}));
  check('night_owl',S.activities.some(a=>{const h=new Date(a.date).getHours();return h===0||h===1||h===2||h===3;}));

  // Section progress
  check('section_pass',passedCount>=1);
  check('two_sections',passedCount>=2);
  check('three_sections',passedCount>=3);
  check('all_pass',passedCount>=4);

  // Social
  check('first_follow',followCount>=1);
  check('social',followCount>=5);
  check('social_10',followCount>=10);
  check('props_10',propCount>=10);
  check('props_25',propCount>=25);
  check('props_50',propCount>=50);

  // Weekly patterns
  const now=new Date();
  const startOfWeek=new Date(now);
  startOfWeek.setDate(now.getDate()-now.getDay());
  startOfWeek.setHours(0,0,0,0);
  const thisWeekDates=new Set();
  const thisWeekHrs=S.activities.filter(a=>new Date(a.date)>=startOfWeek).reduce((s,a)=>s+(a.hours||0),0);
  S.activities.forEach(a=>{if(new Date(a.date)>=startOfWeek)thisWeekDates.add(a.date.slice(0,10));});
  check('consistent',thisWeekDates.size>=5);
  check('perfect_week',thisWeekDates.size>=7);
  check('big_week',thisWeekHrs>=20);

  // Daily double (2 sessions same day)
  const byDay={};
  S.activities.forEach(a=>{const d=a.date.slice(0,10);byDay[d]=(byDay[d]||0)+1;});
  check('daily_double',Object.values(byDay).some(v=>v>=2));

  // All 4 sections studied
  const studiedSections=new Set(S.activities.map(a=>a.section));
  const allFour=['FAR','AUD','REG'].every(s=>studiedSections.has(s))&&[...studiedSections].some(s=>['BAR','ISC','TCP','UDP'].includes(s));
  check('section_diverse',allFour);

  S.achievements=Array.from(earned);
  saveState();

  newOnes.forEach(id=>{
    const ach=ACHIEVEMENTS.find(a=>a.id===id);
    if(ach)setTimeout(()=>showToast(`${ach.icon} Achievement Unlocked: ${ach.name}!`,'ach'),500);
  });
}

function activatePlan(tier){
  // ── Beta mode: free switching, no payment required ──
  // Route to Stripe only when STRIPE_ENABLED=true AND real keys are configured
  if(STRIPE_ENABLED && tier!=='trial' && !STRIPE_CONFIG.paymentLinks.pro_monthly.includes('REPLACE')){
    const keyMap={pro:'pro_'+(_upgradeBilling==='annual'?'annual':'monthly'),elite:'elite_'+(_upgradeBilling==='annual'?'annual':'monthly'),cram:'cram_plan'};
    redirectToStripeCheckout(keyMap[tier]||'pro_monthly');
    return;
  }
  if(tier==='free'){
    SUB={...SUB,tier:'free',startDate:null};
    saveSub(SUB);
    closeUpgradeModal();
    showToast('Switched to Free tier','info');
  } else if(tier==='pro'&&!SUB.trialUsed){
    SUB={...SUB,tier:'trial',billingCycle:_upgradeBilling,startDate:Date.now(),trialEnd:Date.now()+7*86400000,trialUsed:true};
    saveSub(SUB);
    closeUpgradeModal();
    showToast('🎉 7-day free trial started! Enjoy all Pro features.','ok');
  } else if(tier==='pro'){
    SUB={...SUB,tier:'pro',billingCycle:_upgradeBilling,startDate:Date.now()};
    saveSub(SUB);
    closeUpgradeModal();
    showToast('Ledger Pro activated! Welcome to Pro.','ok');
  } else if(tier==='elite'){
    SUB={...SUB,tier:'elite',billingCycle:_upgradeBilling,startDate:Date.now()};
    saveSub(SUB);
    closeUpgradeModal();
    showToast('⚡ Ledger Elite activated! You\'re unstoppable.','ok');
  } else if(tier==='cram'){
    SUB={...SUB,tier:'cram',billingCycle:'one_time',startDate:Date.now(),cramEnd:Date.now()+183*86400000};
    saveSub(SUB);
    closeUpgradeModal();
    showToast('📚 6-Month Cram Plan activated! Let\'s get you that CPA.','ok');
  }
  renderApp();
}

function init(){
  initFirebase();
  // Pre-populate invite code from URL so new users join an existing cohort
  const urlJoinCode=new URLSearchParams(window.location.search).get('join');
  if(urlJoinCode&&obData){obData.firmCode=urlJoinCode.toUpperCase();}
  if(urlJoinCode&&S&&!S.firmCode){S.firmCode=urlJoinCode.toUpperCase();saveState();}
  if(!AUTH){renderAuth();return;}
  if(!S){renderOnboarding();return;}
  renderApp();
  // Sync returning user's profile to Firestore (firebaseDb may not be ready yet, writeUserProfile retries)
  setTimeout(writeUserProfile, 1200);
}

function addGoogleAccount(){
  const name=document.getElementById('g-name-inp')?.value?.trim();
  const email=document.getElementById('g-email-inp')?.value?.trim();
  if(!name){showToast('Enter your name','err');return;}
  if(!email||!email.includes('@')){showToast('Enter a valid email','err');return;}
  const accounts=getGoogleAccounts();
  // avoid duplicates
  if(!accounts.find(a=>a.email===email)){
    accounts.push({displayName:name,email,googleId:'g_'+Date.now()});
    saveGoogleAccounts(accounts);
  }
  selectGoogleAccountByEmail(email,name);
}

function selectGoogleAccount(idx){
  const accounts=getGoogleAccounts();
  const a=accounts[idx];if(!a)return;
  selectGoogleAccountByEmail(a.email,a.displayName,a.googleId);
}

function selectGoogleAccountByEmail(email,displayName,googleId){
  const uid=googleId||'g_'+Date.now();
  AUTH={uid,googleId:uid,email,displayName,method:'google',createdAt:Date.now()};
  saveAuth(AUTH);
  closeGooglePicker();
  // Restore this user's saved state (survives signout)
  S = loadState(AUTH.uid) || null;
  // Pre-fill onboarding name
  obData.name=displayName.split(' ')[0]||displayName;
  showToast(`Signed in as ${displayName} ✓`,'ok');
  setTimeout(()=>{if(!S){renderOnboarding();}else{renderApp();}},300);
}

function openGooglePicker(){

async function handleEmailAuth(){
  const email=document.getElementById('auth-email')?.value?.trim();
  const pass=document.getElementById('auth-pass')?.value?.trim();
  const name=authMode==='signup'?document.getElementById('auth-name')?.value?.trim():'';
  if(authMode==='signup'&&!name){showToast('Enter your full name','err');return;}
  if(!email||!email.includes('@')){showToast('Enter a valid email address','err');return;}
  if(!pass||pass.length<8){showToast('Password must be at least 8 characters','err');return;}

  // ── Real Firebase path ──────────────────────────────
  if(FIREBASE_ENABLED){
    const btn=document.querySelector('.auth-form-btn');
    if(btn){btn.disabled=true;btn.textContent='Please wait…';}
    if(authMode==='signup'){
      const result=await signUpWithEmailFirebase(email,pass,name);
      if(result==='verify'){
        renderEmailVerificationScreen(email,false);
      }
      // if false, error toast already shown
    } else {
      const result=await signInWithEmailFirebase(email,pass);
      if(result==='unverified'){
        renderEmailVerificationScreen(email,true);
      } else if(result===true){
        // Restore this user's saved state (survives signout)
        S = loadState(AUTH?.uid) || null;
        if(!S) renderOnboarding(); else renderApp();
      }
    }
    return;
  }

  // ── Demo / offline path ─────────────────────────────
  const displayName=authMode==='signup'?name:(email.split('@')[0]);
  const accounts=getGoogleAccounts();
  let existing=accounts.find(a=>a.email===email);
  if(authMode==='signin'&&!existing){showToast('No account with that email — sign up instead','err');return;}
  if(authMode==='signup'&&existing){showToast('An account with that email already exists — sign in instead','err');return;}
  if(authMode==='signup'){
    accounts.push({displayName,email,googleId:'e_'+Date.now()});
    saveGoogleAccounts(accounts);
    existing=accounts[accounts.length-1];
  }
  const uid=existing?.googleId||'e_'+Date.now();
  AUTH={uid,googleId:uid,email,displayName,method:'email',createdAt:Date.now()};
  saveAuth(AUTH);
  // Restore this user's saved state (survives signout)
  S = loadState(AUTH.uid) || null;
  obData.name=displayName.split(' ')[0]||displayName;
  showToast(`${authMode==='signup'?'Account created':'Signed in'} as ${displayName} ✓`,'ok');
  setTimeout(()=>{if(!S){renderOnboarding();}else{renderApp();}},300);
}

function getChallengeProgress(ch){
  const acts=S.activities||[];
  const weekAgo=new Date(Date.now()-7*86400000);
  switch(ch.type){
    case 'hours_total': return Math.min(ch.target,parseFloat(getTotalHours().toFixed(1)));
    case 'hours_session': return Math.min(ch.target,Math.max(0,...[0,...acts.map(a=>a.hours||0)]));
    case 'hours_week': return Math.min(ch.target,parseFloat(acts.filter(a=>new Date(a.date)>weekAgo).reduce((s,a)=>s+(a.hours||0),0).toFixed(1)));
    case 'hours_section_week': return Math.min(ch.target,parseFloat(acts.filter(a=>a.section===ch.section&&new Date(a.date)>weekAgo).reduce((s,a)=>s+(a.hours||0),0).toFixed(1)));
    case 'sessions_total': return Math.min(ch.target,acts.length);
    case 'streak': return Math.min(ch.target,getStreak());
    case 'pass_section': return Math.min(ch.target,(S.sectionPassed||[]).length);
    case 'pass_all': return Math.min(4,(S.sectionPassed||[]).length);
    case 'sections_studied': return Math.min(ch.target,[...new Set(acts.map(a=>a.section))].length);
    default: return 0;
  }
}
function isChallengeDone(ch){ return getChallengeProgress(ch)>=ch.target; }
function isJoined(chId){ return (S.challenges||[]).includes(chId); }
function joinChallenge(chId){
  const ch=CHALLENGES.find(c=>c.id===chId);if(!ch)return;
  if(!S.challenges)S.challenges=[];
  if(S.challenges.includes(chId)){showToast('Already joined!','info');return;}
  S.challenges.push(chId);
  saveState();
  renderTab();
  showToast('Challenge joined! Progress tracks automatically 🎯','ok');
}
function leaveChallenge(chId){
  S.challenges=(S.challenges||[]).filter(id=>id!==chId);
  saveState();
  renderTab();
  showToast('Left challenge','info');
}
function useStreakShield(){
  if(!isPro()){openUpgradeModal('Streak Shield');return;}
  const used=S.shieldsUsed||0;
  const max=isElite()?999:3;
  if(used>=max){showToast('No shields left this month. Resets on the 1st.','err');return;}
  S.shieldsUsed=(used+1);
  saveState();
  showToast('🛡️ Streak Shield used! Your streak is protected.','ok');
  renderTab();
}
function checkChallengeAchievements(){
  const joined=S.challenges||[];
  const newlyCompleted=[];
  CHALLENGES.forEach(ch=>{
    if(!joined.includes(ch.id))return;
    const prog=getChallengeProgress(ch);
    const wasComplete=(S.challengeCompleted||[]).includes(ch.id);
    if(prog>=ch.target&&!wasComplete){
      if(!S.challengeCompleted)S.challengeCompleted=[];
      S.challengeCompleted.push(ch.id);
      newlyCompleted.push(ch);
    }
  });
  if(newlyCompleted.length){
    saveState();
    newlyCompleted.forEach((ch,i)=>{
      setTimeout(()=>showToast('🏅 Challenge complete: '+ch.title+'! Reward: '+ch.reward,'ok'),500+i*600);
    });
  }
}

function switchTab(tab){
  const prevTab=currentTab;
  currentTab=tab;
  const tabOrder=['feed','dashboard','profile','explore','studylab','tips'];
  const labelMap={feed:'Feed',dashboard:'Dashboard',profile:'Profile',explore:'Explore',studylab:'Study Lab',tips:'Exam Hub'};
  document.querySelectorAll('.nav-tab').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim().startsWith(labelMap[tab]||tab));
  });
  document.querySelectorAll('[data-mnav]').forEach(b=>{
    b.classList.toggle('active',b.dataset.mnav===tab);
  });
  const page=document.getElementById('page-content');
  if(page){
    const prevIdx=tabOrder.indexOf(prevTab);
    const nextIdx=tabOrder.indexOf(tab);
    const dir=nextIdx>=prevIdx?'tab-right':'tab-left';
    page.classList.remove('fade-in','tab-right','tab-left');
    void page.offsetWidth;
    page.classList.add(dir);
  }
  renderTab();
}

function renderTab(){
  const el=document.getElementById('page-content');
  if(!el)return;
  if(currentTab==='feed')el.innerHTML=buildFeed();
  else if(currentTab==='dashboard')el.innerHTML=buildDashboard();
  else if(currentTab==='profile')el.innerHTML=buildProfile();
  else if(currentTab==='explore')el.innerHTML=buildExplore();
  else if(currentTab==='studylab')el.innerHTML=buildStudyLab();
  else if(currentTab==='tips')el.innerHTML=buildTips();
  attachTabHandlers();
}

function buildMiniLeaderboard(){
  // Personal weekly progress — no rankings, just your week vs your goal
  const weekAgo=new Date(Date.now()-7*86400000);
  const weekHrs=S.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
  const weekGoal=S.hoursPerWeek||15;
  const pct=Math.min(100,Math.round(weekHrs/weekGoal*100));
  const streak=getStreak();
  // Last 4 weeks comparison (this week vs prior 3)
  const weeklyTotals=[];
  for(let w=0;w<4;w++){
    const start=new Date(Date.now()-(w+1)*7*86400000);
    const end=new Date(Date.now()-w*7*86400000);
    const h=S.activities.filter(a=>{const d=new Date(a.date);return d>=start&&d<end;}).reduce((s,a)=>s+(a.hours||0),0);
    weeklyTotals.push(h);
  }
  const prior3avg=weeklyTotals.slice(1).reduce((a,b)=>a+b,0)/3;
  const trend=weekHrs>prior3avg+0.5?'↑ ahead of your recent average':weekHrs<prior3avg-0.5?'↓ below your recent average':'→ on pace with your average';
  const trendColor=weekHrs>prior3avg+0.5?'var(--grn)':weekHrs<prior3avg-0.5?'var(--red)':'var(--mut)';
  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:22px;font-weight:900;color:var(--ora)">${weekHrs.toFixed(1)}h <span style="font-size:12px;color:var(--mut);font-weight:500">/ ${weekGoal}h goal</span></div>
      <div style="font-size:11px;font-weight:700;color:${trendColor}">${trend}</div>
    </div>
    <div class="prog-bar" style="height:8px;margin-bottom:8px"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'var(--grn)':pct>=60?'var(--ind)':'var(--ora)'}"></div></div>
    <div style="display:flex;gap:16px">
      <div style="font-size:11px;color:var(--mut)">🔥 <strong style="color:var(--txt)">${streak}d</strong> streak</div>
      <div style="font-size:11px;color:var(--mut)">📅 <strong style="color:var(--txt)">${Math.round(getTotalHours())}h</strong> total</div>
      <div style="font-size:11px;color:var(--mut)">💯 <strong style="color:var(--txt)">${pct}%</strong> of week goal</div>
    </div>
  </div>`;
}
