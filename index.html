function _getPlanTip(mode){
  const m=ACTIVITY_MODES[mode]||ACTIVITY_MODES.new_material;
  return m.tips[Math.floor(Math.random()*m.tips.length)];
}

// Returns sections ranked by urgency (most behind = highest priority)
function _sectionPriority(activeSections){
  return activeSections.slice().sort((a,b)=>{
    const urgA=(EXAMS[a]?.studyHours||150-getSectionHours(a))/(EXAMS[a]?.studyHours||150);
    const urgB=(EXAMS[b]?.studyHours||150-getSectionHours(b))/(EXAMS[b]?.studyHours||150);
    return urgB-urgA; // highest urgency first
  });
}

function generateAIPlan(){
  if(!isElite()) return;
  const sections=S.sections||[];
  const passed=S.sectionPassed||[];
  const active=sections.filter(s=>!passed.includes(s));
  if(!active.length && !sections.length){ showToast('Add exam sections in your profile first','err'); return; }
  const allActive=active.length?active:sections;

  // Find nearest exam date across all active sections
  let daysLeft=60; let nearestDate=null; let primarySec=allActive[0]||'FAR';
  allActive.forEach(s=>{
    const d=S.examDates?.[s];
    if(d){const dl=Math.ceil((new Date(d+' 00:00')-new Date())/86400000);if(dl>0&&(nearestDate===null||dl<daysLeft)){daysLeft=dl;nearestDate=d;primarySec=s;}}
  });
  if(!nearestDate){
    nearestDate=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
    daysLeft=60;
  }
  const planDays=Math.max(7,Math.min(daysLeft,84));
  const hrsPerWeek=S.hoursPerWeek||15;

  // Section urgency — rank by % of recommended hours remaining
  // This is Option C: data-driven section priority
  const ranked=_sectionPriority(allActive);
  const sectionStats={};
  allActive.forEach(s=>{
    const logged=getSectionHours(s);
    const target=EXAMS[s]?.studyHours||150;
    const pct=Math.min(100,Math.round(logged/target*100));
    sectionStats[s]={logged,target,pct,remaining:Math.max(0,target-logged)};
  });

  // Build phases based on days remaining
  let phases=[];
  if(planDays>=28){
    const p1=Math.floor(planDays*.45),p2=Math.floor(planDays*.72),p3=Math.floor(planDays*.88);
    phases=[
      {n:1,mode:'new_material',name:'Phase 1 · New Material',icon:'📖',start:1,end:p1,focus:'Work through your study material section by section',color:'#6366f1'},
      {n:2,mode:'mcq_practice',name:'Phase 2 · MCQ Blitz',icon:'⚡',start:p1+1,end:p2,focus:'500+ practice questions — build speed & pattern recognition',color:'#d44000'},
      {n:3,mode:'tbs_practice',name:'Phase 3 · TBS Focus',icon:'🎯',start:p2+1,end:p3,focus:'Task-based simulations & targeted weak-area drilling',color:'#059669'},
      {n:4,mode:'final_review',name:'Phase 4 · Final Sprint',icon:'🚀',start:p3+1,end:planDays,focus:'Mock exams, weak areas, and mental preparation',color:'#9333ea'},
    ];
  } else if(planDays>=14){
    const p1=Math.floor(planDays*.55);
    phases=[
      {n:1,mode:'mcq_practice',name:'Phase 1 · MCQ Blitz',icon:'⚡',start:1,end:p1,focus:'Drill practice questions fast — identify weak areas',color:'#d44000'},
      {n:2,mode:'final_review',name:'Phase 2 · Final Sprint',icon:'🚀',start:p1+1,end:planDays,focus:'TBS practice, mock exam, and targeted review',color:'#9333ea'},
    ];
  } else {
    phases=[{n:1,mode:'final_review',name:'Exam Crunch',icon:'🔥',start:1,end:planDays,focus:'High-yield MCQs and TBS only — no new material',color:'#ef4444'}];
  }

  // Build day-by-day plan
  // Section assigned each day = highest-urgency section that still has hours remaining
  // We rotate so no section gets neglected
  const studyMask=[false,true,true,true,true,true,true]; // Sun off, Mon-Sat on
  const today=new Date();today.setHours(0,0,0,0);
  const days=[];
  let studyDayNum=0;

  // Final sprint days alternate mock exam & final review
  const sprintModes=['mock_exam','final_review','mcq_practice','final_review','mock_exam','final_review'];

  for(let i=0;i<planDays;i++){
    const dt=new Date(today);dt.setDate(today.getDate()+i);
    const dow=dt.getDay();
    const isStudy=studyMask[dow];
    const dateStr=dt.toISOString().slice(0,10);
    const dayNum=i+1;
    const phase=phases.find(p=>dayNum>=p.start&&dayNum<=p.end)||phases[phases.length-1];

    let hrs=0,section=primarySec,mode=phase.mode;
    if(isStudy){
      const base=hrsPerWeek/6;
      // Ramp hours slightly as exam approaches
      const rampFactor=1+Math.min(0.3,(planDays-dayNum)/planDays*0.4);
      hrs=Math.min(8,Math.max(1.5,parseFloat((base*rampFactor).toFixed(1))));

      // Pick section: rotate through ranked sections, weighted by remaining hours
      // Simple round-robin weighted — most urgent section gets more days
      if(allActive.length>1){
        const slot=studyDayNum%allActive.length;
        // Extra day for most urgent section every other rotation
        section=studyDayNum%(allActive.length*2)<allActive.length?ranked[slot%ranked.length]:ranked[Math.min(1,slot)%ranked.length];
      } else {
        section=allActive[0]||primarySec;
      }

      // Final sprint: mix mock exams and targeted review
      if(phase.n===phases[phases.length-1].n && phases.length>1){
        mode=sprintModes[studyDayNum%sprintModes.length];
      }

      studyDayNum++;
    }

    days.push({dayNum,date:dateStr,section,mode,hours:hrs,phase:phase.n,phaseColor:phase.color,isStudy,done:false});
  }

  S.aiStudyPlan={
    generated:new Date().toISOString(),
    primarySec,
    examDate:nearestDate,
    daysLeft:planDays,
    sectionStats,
    phases,
    days,
  };
  saveState();
}

    '<div style="font-size:16px;font-weight:800;color:var(--txt);margin-bottom:6px">Analyzing your study data…</div>'+

    '<div style="font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:8px">AI Study Plan</div>'+

    '<div style="font-size:12px;color:var(--sub);max-width:300px;margin:0 auto 24px;line-height:1.6;background:var(--surf2);border-radius:10px;padding:10px 14px">📖 Your Becker, Gleim, or Roger material tells you <em>what</em> to study. This plan tells you <em>when</em>, <em>how long</em>, and <em>which mode</em> to be in each day.</div>'+
    '<button onclick="runGeneratePlan()" style="padding:14px 36px;background:linear-gradient(135deg,var(--ora),#b03500);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 18px rgba(212,64,0,.38);animation:pulse-glow 2s infinite">✨ Generate My Plan</button>'+
    '<div style="font-size:11px;color:var(--mut);margin-top:14px">Takes ~2 seconds · Regenerate any time</div>'+
    '</div>';

  const today=new Date().toISOString().slice(0,10);
  const todayEntry=plan.days.find(d=>d.date===today);
  const studyDays=plan.days.filter(d=>d.isStudy);
  const doneDays=studyDays.filter(d=>d.done).length;
  const pct=studyDays.length?Math.round(doneDays/studyDays.length*100):0;
  const daysLeft=Math.max(0,Math.ceil((new Date(plan.examDate+' 00:00')-new Date())/86400000));

  // Section urgency strip
  const stats=plan.sectionStats||{};
  const secStrip=Object.keys(stats).map(s=>{
    const st=stats[s];
    const ex=EXAMS[s]||{};
    const behind=st.pct<50;
    return '<div style="flex:1;min-width:100px;background:var(--surf2);border-radius:10px;padding:10px 12px;border:1px solid '+(behind?ex.color+'44':'var(--bdr)')+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">'+
        '<span class="badge badge-'+s+'">'+s+'</span>'+
        '<span style="font-size:11px;font-weight:800;color:'+(behind?ex.color:'var(--grn)')+'">'+st.pct+'%</span>'+
      '</div>'+
      '<div style="height:4px;background:var(--surf);border-radius:2px;overflow:hidden"><div style="height:4px;background:'+ex.color+';width:'+st.pct+'%;border-radius:2px"></div></div>'+
      '<div style="font-size:10px;color:var(--mut);margin-top:4px">'+st.logged.toFixed(0)+'h / '+st.target+'h'+( behind?' · needs attention':'')+'</div>'+
    '</div>';
  }).join('');

  // Today block
  let todayBlock='';
  if(todayEntry&&todayEntry.isStudy){
    const m=ACTIVITY_MODES[todayEntry.mode]||ACTIVITY_MODES.new_material;
    const exCol=EXAMS[todayEntry.section]?.color||'var(--ora)';
    todayBlock='<div style="background:linear-gradient(135deg,var(--ora-bg),rgba(212,64,0,.04));border:2px solid var(--ora);border-radius:14px;padding:18px;margin-bottom:20px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
        '<div style="font-size:10px;font-weight:800;color:var(--ora);text-transform:uppercase;letter-spacing:.1em">📍 Today — Day '+todayEntry.dayNum+' of '+plan.daysLeft+'</div>'+
        (todayEntry.done
          ?'<span style="background:#10b981;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px">✓ Done</span>'
          :'<button onclick="markPlanDayDone(\''+today+'\')" style="background:var(--ora);color:#fff;border:none;border-radius:20px;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer">Mark Done ✓</button>')+
      '</div>'+
      // Mode pill + section
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="background:'+m.color+';color:#fff;border-radius:8px;padding:6px 13px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px">'+m.icon+' '+m.label+'</div>'+
        '<span class="badge badge-'+todayEntry.section+'">'+todayEntry.section+'</span>'+
        '<span style="font-size:13px;font-weight:700;color:var(--sub)">'+todayEntry.hours+'h</span>'+
      '</div>'+
      // What to actually do
      '<div style="font-size:13px;color:var(--txt);line-height:1.55;margin-bottom:8px">'+m.desc+'</div>'+
      '<div style="font-size:11px;color:var(--mut);font-style:italic;border-top:1px solid var(--bdr);padding-top:8px">💡 '+_getPlanTip(todayEntry.mode)+'</div>'+
    '</div>';
  } else if(todayEntry&&!todayEntry.isStudy){
    todayBlock='<div style="background:var(--surf2);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px">'+
      '<div style="font-size:28px">🛌</div>'+
      '<div><div style="font-size:13px;font-weight:700">Rest Day</div><div style="font-size:11px;color:var(--mut)">Recovery is part of the plan. Your brain consolidates memory during rest.</div></div>'+
    '</div>';
  }

  // Phase roadmap cards
  const phaseCards=plan.phases.map(p=>{
    const pd=plan.days.filter(d=>d.phase===p.n&&d.isStudy);
    const done=pd.filter(d=>d.done).length;
    const pp=pd.length?Math.round(done/pd.length*100):0;
    const isCurrent=todayEntry&&todayEntry.phase===p.n;
    return '<div style="flex:1;min-width:120px;background:var(--surf);border:1.5px solid '+(isCurrent?p.color:'var(--bdr)')+';border-radius:12px;padding:12px 13px;'+(isCurrent?'box-shadow:0 2px 12px '+p.color+'28;':'')+'">'+
      '<div style="font-size:20px;margin-bottom:3px">'+p.icon+'</div>'+
      '<div style="font-size:10px;font-weight:800;color:'+p.color+';margin-bottom:2px">'+p.name+'</div>'+
      '<div style="font-size:10px;color:var(--mut);margin-bottom:7px;line-height:1.4">'+p.focus+'</div>'+
      '<div style="font-size:10px;color:var(--sub);margin-bottom:4px">'+done+'/'+pd.length+' days</div>'+
      '<div style="height:4px;background:var(--surf2);border-radius:2px"><div style="height:4px;background:'+p.color+';border-radius:2px;width:'+pp+'%;transition:width .6s"></div></div>'+
    '</div>';
  }).join('');

  // Next 7 days
  const next7=plan.days.filter(d=>d.date>=today).slice(0,7);
  const weekRows=next7.map(d=>{
    const dt=new Date(d.date+'T12:00:00');
    const lbl=dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const isT=d.date===today;
    const m=ACTIVITY_MODES[d.mode]||ACTIVITY_MODES.new_material;
    const exCol=d.isStudy&&EXAMS[d.section]?EXAMS[d.section].color:'var(--mut)';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);'+(isT?'background:var(--ora-bg);border-radius:8px;padding:10px 8px;margin:0 -4px;':'')+'">'+
      '<div style="width:86px;flex-shrink:0;font-size:11px;font-weight:'+(isT?'800':'600')+';color:'+(isT?'var(--ora)':'var(--sub)')+'">'+lbl+(isT?' 📍':'')+'</div>'+
      (d.isStudy
        ?'<div style="flex:1;min-width:0;display:flex;align-items:center;gap:8px">'+
            '<span style="font-size:14px;flex-shrink:0">'+m.icon+'</span>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:12px;font-weight:700;color:var(--txt)">'+m.label+'</div>'+
              '<div style="display:flex;align-items:center;gap:6px;margin-top:1px">'+
                '<span class="badge badge-'+d.section+'" style="font-size:9px;padding:1px 6px">'+d.section+'</span>'+
                '<span style="font-size:10px;color:var(--mut)">'+d.hours+'h</span>'+
              '</div>'+
            '</div>'+
          '</div>'+
          (d.done?'<span style="font-size:15px;flex-shrink:0">✅</span>':'<span style="font-size:15px;flex-shrink:0;opacity:.2">⬜</span>')
        :'<div style="flex:1;font-size:11px;color:var(--mut);font-style:italic">Rest day 🛌</div>')+
    '</div>';
  }).join('');

  const totalHrsPlanned=studyDays.reduce((sum,d)=>sum+d.hours,0);

  return '<div class="card card-pad">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
      '<div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<div class="section-title" style="margin-bottom:0">🤖 AI Study Plan</div>'+
          '<span style="background:linear-gradient(135deg,var(--ora),#b03500);color:#fff;font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase">Elite</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--mut);margin-top:2px">'+daysLeft+' days to exam · '+Math.round(totalHrsPlanned)+'h planned · '+pct+'% done</div>'+
      '</div>'+
      '<button onclick="regeneratePlan()" style="padding:6px 12px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:8px;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer">↺ Redo</button>'+
    '</div>'+

    // Progress bar
    '<div style="margin-bottom:18px">'+
      '<div style="height:7px;background:var(--surf2);border-radius:4px;overflow:hidden"><div style="height:7px;background:linear-gradient(90deg,var(--ora),#b03500);border-radius:4px;width:'+pct+'%;transition:width .6s"></div></div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:4px">'+
        '<span style="font-size:10px;color:var(--mut)">'+doneDays+' days done</span>'+
        '<span style="font-size:10px;color:var(--mut)">'+daysLeft+' days to exam</span>'+
      '</div>'+
    '</div>'+

    // Section priority
    (Object.keys(stats).length>0?
      '<div style="font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Section Priority · Based on Your Hours</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">'+secStrip+'</div>'
    :'')+

    // Today
    todayBlock+

    // Roadmap
    '<div style="font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Your Roadmap</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">'+phaseCards+'</div>'+

    // Week ahead
    '<div style="font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Next 7 Days</div>'+
    weekRows+

    '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr);font-size:10px;color:var(--mut);text-align:center">'+
      'Generated '+timeAgo(plan.generated)+' · Your study material (Becker/Gleim/etc.) guides the <em>what</em> — this plan guides the <em>when</em>'+
    '</div>'+
  '</div>';
}

// Basic schedule for Pro/Free
let _scheduleEditMode=false;
function _generateBasicSchedule(){
  const sections=S.sections||['FAR'];
  const weeklyHrs=S.hoursPerWeek||15;
  const studyDays=[1,2,3,4,5];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const hrsPerDay=weeklyHrs/studyDays.length;
  return days.map((d,i)=>{
    if(!studyDays.includes(i)) return{day:d,active:false,hours:0,section:''};
    const pick=sections[studyDays.indexOf(i)%sections.length];
    return{day:d,active:true,hours:parseFloat(hrsPerDay.toFixed(1)),section:pick};
  });
}
function saveStudySchedule(){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  S.studySchedule=days.map((d,i)=>({day:d,active:document.getElementById('sched-active-'+i)?.checked||false,hours:parseFloat(document.getElementById('sched-hrs-'+i)?.value)||0,section:document.getElementById('sched-sec-'+i)?.value||''}));
  S.hoursPerWeek=parseInt(document.getElementById('sched-weekly-hrs')?.value||S.hoursPerWeek||15);
  saveState();_scheduleEditMode=false;
  showToast('Schedule saved ✓','ok');
  const el=document.getElementById('schedule-section');
  if(el) el.outerHTML=buildStudySchedule();
}
function toggleScheduleEdit(){
  _scheduleEditMode=!_scheduleEditMode;
  const el=document.getElementById('schedule-section');
  if(el) el.outerHTML=buildStudySchedule();
}

function buildStudySchedule(){
  if(isElite()) return '<div id="schedule-section">'+_buildAIPlanUI()+'</div>';

  const pro=isPro();
  const schedule=S.studySchedule||_generateBasicSchedule();
  const sections=S.sections||['FAR'];
  const weeklyHrs=S.hoursPerWeek||15;
  const editMode=_scheduleEditMode&&pro;
  const totalPlanned=schedule.filter(d=>d.active).reduce((s,d)=>s+d.hours,0);

  const dayRows=schedule.map((item,i)=>{
    const isToday=new Date().getDay()===i;
    const color=item.section&&EXAMS[item.section]?EXAMS[item.section].color:'var(--mut)';
    if(editMode) return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);'+(isToday?'background:var(--ora-bg);border-radius:8px;padding:10px 8px;':'')+'">'+
      '<input type="checkbox" id="sched-active-'+i+'"'+(item.active?' checked':'')+' style="accent-color:var(--ora);width:15px;height:15px;cursor:pointer">'+
      '<div style="width:34px;font-size:11px;font-weight:800;color:'+(isToday?'var(--ora)':'var(--mut)')+'">'+item.day+'</div>'+
      '<select id="sched-sec-'+i+'" style="padding:5px 8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:12px;font-weight:700;outline:none">'+
        sections.map(s=>'<option value="'+s+'"'+(s===item.section?' selected':'')+'>'+s+'</option>').join('')+
      '</select>'+
      '<input id="sched-hrs-'+i+'" type="number" min="0" max="12" step="0.5" value="'+(item.hours||0)+'" style="width:56px;padding:5px 8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:12px;font-weight:700;outline:none;text-align:center">'+
      '<span style="font-size:11px;color:var(--mut)">hrs</span>'+
    '</div>';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);'+(isToday?'background:var(--ora-bg);border-radius:8px;padding:10px 8px;margin:0 -4px;':'')+'">'+
      '<div style="width:34px;font-size:11px;font-weight:800;color:'+(isToday?'var(--ora)':'var(--sub)')+'">'+item.day+(isToday?' 📍':'')+'</div>'+
      (item.active&&item.section
        ?'<div style="flex:1;background:'+color+'18;border:1px solid '+color+'33;border-radius:7px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:700;color:'+color+'">'+item.section+' — '+EXAMS[item.section]?.full?.split(' ')[0]+'</span><span style="font-size:12px;font-weight:800;color:'+color+'">'+item.hours+'h</span></div>'
        :'<div style="flex:1;background:var(--surf2);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--mut);font-style:italic">Rest day 🛌</div>')+
    '</div>';
  }).join('');

  const editControls=editMode?'<div style="background:var(--ind-bg);border:1px solid rgba(90,95,207,.2);border-radius:10px;padding:14px;margin-bottom:14px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'+
      '<span style="font-size:12px;font-weight:600;color:var(--sub)">Weekly goal:</span>'+
      '<input id="sched-weekly-hrs" type="range" min="5" max="30" value="'+weeklyHrs+'" style="flex:1;accent-color:var(--ind)" oninput="document.getElementById(\'sched-hrs-lbl\').textContent=this.value+\'h\'">'+
      '<span id="sched-hrs-lbl" style="font-size:13px;font-weight:800;color:var(--ind);min-width:30px">'+weeklyHrs+'h</span>'+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
      '<button onclick="saveStudySchedule()" style="flex:1;padding:9px;background:var(--grn);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer">✓ Save</button>'+
      '<button onclick="toggleScheduleEdit()" style="padding:9px 14px;background:transparent;border:1.5px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer">Cancel</button>'+
    '</div>'+
  '</div>':'';

  return '<div id="schedule-section"><div class="card card-pad">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
      '<div><div class="section-title" style="margin-bottom:2px">Study Schedule</div>'+
      '<div style="font-size:11px;color:var(--mut)">'+totalPlanned.toFixed(1)+'h planned this week</div></div>'+
      (pro
        ?'<button onclick="toggleScheduleEdit()" style="padding:6px 14px;background:'+(editMode?'var(--ind)':'var(--surf2)')+';border:1.5px solid '+(editMode?'var(--ind)':'var(--bdr)')+';border-radius:8px;font-size:11px;font-weight:700;color:'+(editMode?'#fff':'var(--sub)')+';cursor:pointer">✏️ Customize</button>'
        :'<button onclick="openUpgradeModal(null)" style="padding:6px 14px;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:8px;font-size:11px;font-weight:600;color:var(--mut);cursor:pointer">🤖 AI Plan (Elite)</button>')+
    '</div>'+editControls+dayRows+
    (!pro?'<div style="margin-top:14px;padding:12px;background:linear-gradient(135deg,var(--ora-bg),rgba(212,64,0,.04));border:1px solid var(--ora-bdr);border-radius:10px;text-align:center"><div style="font-size:12px;font-weight:700;color:var(--ora);margin-bottom:4px">🤖 Want an AI-generated plan?</div><div style="font-size:11px;color:var(--sub);margin-bottom:8px">Elite members get a day-by-day personalized roadmap based on their exam date and progress.</div><button onclick="openUpgradeModal(null)" style="padding:7px 18px;background:var(--ora);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Upgrade to Elite ✦</button></div>':'') +
  '</div></div>';
}

};

function drawShareCard(canvas, milestoneId, statLine){
  const cfg=SHARE_MILESTONES[milestoneId];
  if(!cfg)return;
  const W=canvas.width,H=canvas.height;
  const ctx=canvas.getContext('2d');

  // Background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#18103a');bg.addColorStop(1,'#06030f');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Subtle ledger lines
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let y=44;y<H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Left accent bar
  const bar=ctx.createLinearGradient(0,0,0,H);
  bar.addColorStop(0,cfg.accent);bar.addColorStop(1,cfg.accent+'55');
  ctx.fillStyle=bar;ctx.fillRect(0,0,7,H);

  // Ledger wordmark (top-left)
  ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.font='700 13px Inter,system-ui,sans-serif';
  ctx.fillText('LEDGER',28,34);

  // Big emoji
  ctx.font='76px serif';
  ctx.fillText(cfg.emoji,28,138);

  // Headline
  ctx.fillStyle='#ffffff';
  ctx.font='800 46px Inter,system-ui,sans-serif';
  ctx.fillText(cfg.headline,28,216);

  // Sub-text
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.font='400 19px Inter,system-ui,sans-serif';
  ctx.fillText(cfg.sub,28,256);

  // Stat line
  ctx.fillStyle='rgba(255,255,255,.38)';
  ctx.font='600 14px Inter,system-ui,sans-serif';
  ctx.fillText(statLine,28,H-44);

  // URL (bottom-right, accent color)
  ctx.fillStyle=cfg.accent;
  ctx.font='700 14px Inter,system-ui,sans-serif';
  const url='ledgercpa.vercel.app';
  ctx.fillText(url,W-ctx.measureText(url).width-28,H-44);

  // Bottom separator
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(28,H-28);ctx.lineTo(W-28,H-28);ctx.stroke();
}

function showShareModal(milestoneId){
  const cfg=SHARE_MILESTONES[milestoneId];
  if(!cfg)return;
  // Don't show same milestone twice
  const shownKey='share_shown_'+milestoneId;
  if(localStorage.getItem(shownKey))return;
  localStorage.setItem(shownKey,'1');

  const streak=getStreak();
  const totalHrs=Math.round(getTotalHours());
  const passed=(S.sectionPassed||[]).join(', ')||'';
  let statLine=S.name||'Ledger';
  if(milestoneId.startsWith('streak'))statLine+=` · ${streak}-day streak`;
  else if(milestoneId.startsWith('hrs'))statLine+=` · ${totalHrs} total hours logged`;
  else if(passed)statLine+=` · Passed: ${passed}`;

  const overlay=document.createElement('div');
  overlay.id='share-card-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease';
  overlay.innerHTML=`
<div style="background:var(--surf);border-radius:20px;padding:24px;max-width:520px;width:100%;box-shadow:var(--shadow-lg)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-size:16px;font-weight:800">Share your milestone</div>
      <div style="font-size:12px;color:var(--mut);margin-top:2px">Download the card and post it wherever CPAs hang out</div>
    </div>
    <button onclick="document.getElementById('share-card-overlay').remove()" style="background:var(--surf2);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;color:var(--mut)">×</button>
  </div>
  <canvas id="share-canvas" width="800" height="420" style="width:100%;border-radius:12px;display:block;margin-bottom:16px"></canvas>
  <div style="display:flex;gap:10px">
    <button id="share-download-btn" style="flex:1;padding:11px;background:var(--ora);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Download Card</button>
    <button onclick="navigator.clipboard.writeText('Just hit: ${cfg.headline.replace(/'/g,"\\'")} while studying for the CPA exam. Tracking every hour on Ledger — ledgercpa.vercel.app').then(()=>showToast('Caption copied!','ok'))" style="flex:1;padding:11px;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt)">Copy Caption</button>
  </div>
  <div style="margin-top:10px;text-align:center;font-size:11px;color:var(--mut)">Great for LinkedIn · r/CPA · Twitter</div>
</div>`;
  document.body.appendChild(overlay);

  document.fonts.ready.then(()=>{
    const canvas=document.getElementById('share-canvas');
    if(!canvas)return;
    drawShareCard(canvas,milestoneId,statLine);
    document.getElementById('share-download-btn').onclick=()=>{
      const a=document.createElement('a');
      a.download='ledger-milestone.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
    };
  });
}

function checkShareTrigger(priorAchSet){
  const newOnes=(S.achievements||[]).filter(id=>!priorAchSet.has(id));
  const trigger=newOnes.find(id=>SHARE_MILESTONES[id]);
  if(trigger)setTimeout(()=>showShareModal(trigger),1400);
}

// TRIAL URGENCY MODAL
// ═══════════════════════════════════════════════
function checkTrialUrgency(){
  if(!isOnTrial())return;
  const daysLeft=getTrialDaysLeft();
  if(daysLeft>3)return;
  const shownKey='trial_urgency_shown_d'+daysLeft;
  if(localStorage.getItem(shownKey))return;
  localStorage.setItem(shownKey,'1');

  // Build usage stats from actual session data
  const weekAgo=new Date(Date.now()-7*86400000);
  const weekSessions=S.activities.filter(a=>new Date(a.date)>weekAgo);
  const weekHrs=weekSessions.reduce((a,b)=>a+(b.hours||0),0).toFixed(1);
  const leaderboardUses=parseInt(localStorage.getItem('lb_views')||'0');
  const heatmapNote=weekSessions.length>0?`${weekSessions.length} sessions logged this week`:'';

  const urgencyColor=daysLeft===1?'var(--red)':daysLeft===2?'var(--ora)':'var(--amb)';
  const urgencyMsg=daysLeft===1?'Last day of your trial.':daysLeft===2?'2 days left in your trial.':'3 days left in your trial.';

  const overlay=document.createElement('div');
  overlay.id='trial-urgency-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease';
  overlay.innerHTML=`
<div style="background:var(--surf);border-radius:20px;padding:28px;max-width:440px;width:100%;box-shadow:var(--shadow-lg)">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <div style="width:10px;height:10px;border-radius:50%;background:${urgencyColor};box-shadow:0 0 0 3px ${urgencyColor}33"></div>
    <div style="font-size:12px;font-weight:800;color:${urgencyColor};text-transform:uppercase;letter-spacing:.06em">${urgencyMsg}</div>
  </div>
  <div style="font-size:22px;font-weight:900;letter-spacing:-.02em;margin-bottom:6px">Don't lose what you've built.</div>
  <div style="font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:20px">When your trial ends, you lose access to everything you've been using this week.</div>
  <div style="background:var(--surf2);border-radius:12px;padding:14px 16px;margin-bottom:20px">
    <div style="font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">What you've used on trial</div>
    ${weekHrs>0?`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:13px;color:var(--sub)">Full heatmap + session history</span><span style="font-size:13px;font-weight:800">${weekHrs}h logged</span></div>`:''}
    ${heatmapNote?`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:13px;color:var(--sub)">Study sessions tracked</span><span style="font-size:13px;font-weight:800">${heatmapNote}</span></div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:13px;color:var(--sub)">Full Study Circle + community view</span><span style="font-size:13px;font-weight:800;color:var(--ora)">Reverts to blurred</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0"><span style="font-size:13px;color:var(--sub)">Streak Shield protection</span><span style="font-size:13px;font-weight:800;color:var(--ora)">Goes away</span></div>
  </div>
  <button onclick="document.getElementById('trial-urgency-overlay').remove();activatePlan('pro')" style="width:100%;padding:14px;background:linear-gradient(135deg,var(--ora),var(--ora-dk));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(212,64,0,.35);margin-bottom:10px">Keep Pro Access — $20/mo</button>
  <button onclick="document.getElementById('trial-urgency-overlay').remove()" style="width:100%;padding:11px;background:transparent;border:none;color:var(--mut);font-size:13px;cursor:pointer">Not now — I'll lose access in ${daysLeft} day${daysLeft>1?'s':''}</button>
</div>`;
  document.body.appendChild(overlay);
}

// ═══════════════════════════════════════════════
// STREAK URGENCY BANNER
// ═══════════════════════════════════════════════
function hasLoggedToday(){
  if(!S||!S.activities)return false;
  const today=new Date().toISOString().slice(0,10);
  return S.activities.some(a=>a.date.slice(0,10)===today);
}

function checkStreakUrgency(){
  if(!S||isPro())return;
  const streak=getStreak();
  if(streak<5)return;
  if(hasLoggedToday())return;
  const hour=new Date().getHours();
  if(hour<20)return; // only after 8pm
  if(document.getElementById('streak-urgency-banner'))return;
  const dismissKey='streak_urgency_dismissed_'+new Date().toISOString().slice(0,10);
  if(localStorage.getItem(dismissKey))return;

  const banner=document.createElement('div');
  banner.id='streak-urgency-banner';
  banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:1200;max-width:420px;width:calc(100% - 32px);animation:slide-up-banner .3s ease forwards';
  banner.innerHTML=`
<div style="background:linear-gradient(135deg,#18103a,#1e1540);color:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.45);display:flex;align-items:flex-start;gap:12px">
  <div style="font-size:26px;flex-shrink:0;line-height:1;margin-top:2px">🔥</div>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:800;margin-bottom:3px">Your ${streak}-day streak ends at midnight.</div>
    <div style="font-size:11px;opacity:.7;margin-bottom:10px;line-height:1.5">Log a session to keep it alive. Pro members get Streak Shields — miss a day without losing your streak.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="document.getElementById('streak-urgency-banner').remove();openSessionModal()" style="padding:7px 14px;background:var(--ora);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Log Session Now</button>
      <button onclick="document.getElementById('streak-urgency-banner').remove();openUpgradeModal('Streak Shield')" style="padding:7px 14px;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">Get Streak Shield</button>
    </div>
  </div>
  <button onclick="document.getElementById('streak-urgency-banner').remove();localStorage.setItem('${dismissKey}','1')" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;padding:0;flex-shrink:0;line-height:1;margin-top:-2px" title="Dismiss">&times;</button>
</div>`;
  document.body.appendChild(banner);
}
