function giveProps(actId,userId){
  if(userId==='you'){showToast("Can't give yourself props 😄",'err');return;}
  // Find in mock friends
  const friend=MOCK_FRIENDS.find(f=>f.id===userId);
  let act=null;
  if(friend)act=friend.activities.find(a=>a.id===actId);
  if(!act){showToast("Activity not found",'err');return;}
  const hasProps=act.kudos.includes('you');
  if(hasProps){act.kudos=act.kudos.filter(k=>k!=='you');}
  else{act.kudos.push('you');S.propsGiven=(S.propsGiven||0)+1;saveState();checkAchievements();}
  // Animate button
  const btn=document.querySelector(`[data-aid="${actId}"][data-uid="${userId}"] .ac-action`)||
    document.querySelector(`.activity-card[data-aid="${actId}"] .ac-action`);
  if(btn)btn.classList.add('props-anim');
  if(!hasProps)showToast('Props given! 👏','ok');
  renderTab();
}

function openComments(actId,userId){
  let act=null;
  let actOwner='';
  if(userId==='you'){
    act=S.activities.find(a=>a.id===actId);
    actOwner=S.name;
  } else {
    const friend=MOCK_FRIENDS.find(f=>f.id===userId);
    if(friend){act=friend.activities.find(a=>a.id===actId);actOwner=friend.name;}
  }
  if(!act)return;
  const renderCommentsBody=()=>{
    const comments=act.comments||[];
    const commentsHTML=comments.length?comments.map(c=>`
    <div class="comment-row">
      <div class="avatar" style="width:28px;height:28px;font-size:9px;border-radius:50%;background:var(--ind);color:#fff;flex-shrink:0">${c.user.slice(0,2)}</div>
      <div class="comment-body">
        <div class="comment-author">${c.user}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px">No comments yet. Be the first!</div>`;
    document.getElementById('comments-modal-body').innerHTML=`
<div style="margin-bottom:10px;padding:10px;background:var(--surf2);border-radius:8px;font-size:12px;color:var(--sub)">
  <strong>${actOwner}</strong> · ${act.section} · ${act.hours}h
  ${act.caption?`<br><span style="color:var(--mut)">"${act.caption}"</span>`:''}
</div>
<div class="comments-wrap" style="background:transparent;padding:0;border:none">${commentsHTML}</div>
<div class="add-comment">
  <input id="comment-input" type="text" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment('${actId}','${userId}')">
  <button class="btn btn-ind btn-sm" onclick="addComment('${actId}','${userId}')">Post</button>
</div>`;
  };
  renderCommentsBody();
  document.getElementById('comments-modal').classList.add('open');
}
function closeCommentsModal(){document.getElementById('comments-modal').classList.remove('open');}
function addComment(actId,userId){
  const input=document.getElementById('comment-input');
  const text=input?.value?.trim();
  if(!text)return;
  let act=null;
  if(userId==='you'){act=S.activities.find(a=>a.id===actId);}
  else{const f=MOCK_FRIENDS.find(f=>f.id===userId);if(f)act=f.activities.find(a=>a.id===actId);}
  if(!act)return;
  if(!act.comments)act.comments=[];
  act.comments.push({user:S.name,text});
  if(userId==='you')saveState();
  input.value='';
  openComments(actId,userId);
  renderTab();
}

function shareActivity(actId){
  if(navigator.share){navigator.share({title:'Ledger Study Session',text:`Check out my CPA study session on Ledger!`,url:window.location.href});}
  else{navigator.clipboard?.writeText(window.location.href);showToast('Link copied to clipboard!','info');}
}

function toggleFollow(fId,btn){
  const following=S.following||[];
  const idx=following.indexOf(fId);
  if(idx>=0){following.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following');}
  else{following.push(fId);btn.textContent='Following';btn.classList.add('following');}
  S.following=following;
  saveState();
  checkAchievements();
  showToast(idx>=0?'Unfollowed':'Following! Their sessions will now appear in your feed.','ok');
}

function updateSectionStatus(section,status){
  if(!S.sectionStatus)S.sectionStatus={};
  S.sectionStatus[section]=status;
  if(status==='passed'){
    if(!S.sectionPassed)S.sectionPassed=[];
    if(!S.sectionPassed.includes(section)){S.sectionPassed.push(section);showToast(`🎉 ${section} marked as PASSED!`,'ok');}
    checkAchievements();
  } else {
    S.sectionPassed=(S.sectionPassed||[]).filter(s=>s!==section);
  }
  saveState();
  renderTab();
}

function openDayLog(dateStr){
  const logs=(S.activities||[]).filter(a=>a.date.slice(0,10)===dateStr);
  const fmt=new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const examOn=Object.entries(S.examDates||{}).find(([,v])=>v===dateStr);
  let html='';
  if(examOn)html+=`<div style="background:${EXAMS[examOn[0]].color}15;border:1px solid ${EXAMS[examOn[0]].color}44;border-radius:10px;padding:12px 14px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:${EXAMS[examOn[0]].color}">🎯 EXAM TARGET DATE</div><div style="font-size:14px;font-weight:700">${examOn[0]} — ${EXAMS[examOn[0]].full}</div></div>`;
  if(logs.length){
    html+=logs.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surf2);border-radius:8px;margin-bottom:6px">
      <div><span class="badge badge-${a.section}" style="margin-right:6px">${a.section}</span><strong>${a.hours}h</strong>${a.caption?`<div style="font-size:11px;color:var(--mut);margin-top:2px">${a.caption}</div>`:''}</div>
      <button onclick="deleteActivity('${a.id}')" style="background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;padding:0 4px">×</button>
    </div>`).join('');
  } else if(!examOn){html+=`<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px">No sessions on this day.</div>`;}
  // Temp show as alert-like using toast
  const modal=document.getElementById('post-modal');
  document.getElementById('post-modal-body').innerHTML=`
<div style="font-size:13px;color:var(--sub);margin-bottom:14px;font-weight:600">${fmt}</div>
${html}
<div style="display:flex;gap:8px;margin-top:8px">
  <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="closePostModal();openSessionModal()">▶ Start Session</button>
  <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closePostModal();openPostModal()">+ Quick Log</button>
</div>`;
  document.getElementById('post-modal').querySelector('.modal-title').textContent=fmt;
  modal.classList.add('open');
}

function deleteActivity(id){
  S.activities=S.activities.filter(a=>a.id!==id);
  saveState();
  closePostModal();
  showToast('Session deleted','info');
  renderTab();
}

function openSessionModal(prefSection='', prefMaterial=''){
  const overlay=document.getElementById('sess-overlay');
  if(!overlay)return;
  if(!S){showToast('Complete setup first','err');return;}
  if(TS.phase==='active'||TS.phase==='paused'){overlay.classList.add('open');renderSessCard();return;}
  if(prefSection)TS.section=prefSection;
  else if(!TS.section&&S.sections?.length)TS.section=S.sections[0];
  if(prefMaterial)TS.material=prefMaterial;
  TS.phase='setup';
  TS.date=todayStr();
  overlay.classList.add('open');
  renderSessCard();
}

function closeSessOverlay(){
  if(TS.phase==='active'){pauseTimer();}
  document.getElementById('sess-overlay')?.classList.remove('open');
}

        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:5px"><span>Goal progress</span><span>${goalPct}% · ${fmtDur(goalSecs)} target</span></div>

      </div>`:''}

    box.innerHTML=`

      </div>
      <div class="sess-rstats">

        <div class="sess-rstat"><div class="sess-rstat-val" style="color:${col2}">${TS.section}</div><div class="sess-rstat-lbl">Section</div></div>

        <div class="sess-fgrp" style="margin-bottom:0">

        </div>

          <label>Difficulty (1–5)</label>
          <div class="diff-r-row" id="diff-r-row">${diffHTML}</div>
        </div>
      </div>
      <div class="sess-2col" style="margin-bottom:14px">
        <div class="sess-fgrp" style="margin-bottom:0">
          <label>Section</label>
          <select id="recap-sec" style="width:100%;padding:9px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none">${sectionOpts}</select>
        </div>
        <div class="sess-fgrp" style="margin-bottom:0">
          <label>Date</label>
          <input id="recap-date" type="date" value="${TS.date||todayStr()}" style="width:100%;padding:9px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none">
        </div>
      </div>
      <button class="sess-save-btn" onclick="saveSession()">✓ Post to Feed</button>
      <button onclick="discardSession()" style="width:100%;margin-top:8px;padding:10px;background:transparent;border:1px solid var(--bdr);border-radius:10px;color:var(--mut);cursor:pointer;font-size:12px">Discard Session</button>

function ssUpdateSection(){
  const sec=document.getElementById('ss-sec')?.value;
  if(sec){
    TS.section=sec;
    const ex=EXAMS[sec];
    if(ex){
      const bar=document.querySelector('.sess-color-bar');
      if(bar)bar.style.background=`linear-gradient(90deg,${ex.color},${ex.color}88)`;
    }
  }
}

function startTimer(){
  const sec=document.getElementById('ss-sec')?.value||TS.section;
  const mat=document.getElementById('ss-mat')?.value?.trim()||'';
  const goal=parseFloat(document.getElementById('ss-goal')?.value)||0;
  const date=document.getElementById('ss-date')?.value||todayStr();
  if(!sec){showToast('Select a section','err');return;}
  TS.section=sec;TS.material=mat;TS.goalHours=goal;TS.date=date;
  TS.elapsed=0;TS.startTime=Date.now();TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();
  updateNavChip();
}

function pauseTimer(){
  if(TS.phase!=='active')return;
  clearInterval(timerInterval);timerInterval=null;
  TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='paused';
  renderSessCard();updateNavChip();
}

function resumeTimer(){
  if(TS.phase!=='paused')return;
  TS.startTime=Date.now()-(TS.elapsed*1000);
  TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();updateNavChip();
}

function endSession(){
  clearInterval(timerInterval);timerInterval=null;
  if(TS.phase==='active')TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='recap';
  renderSessCard();updateNavChip();
}

function updateNavChip(){
  const chip=document.getElementById('nav-sess-chip');
  const btn=document.getElementById('nav-log-btn');
  if(!chip)return;
  const isActive=TS.phase==='active'||TS.phase==='paused';
  if(isActive){
    chip.style.display='inline-flex';
    chip.innerHTML=`<span class="active-sess-chip" onclick="openSessionModal()"><span class="rec-dot" ${TS.phase==='paused'?'style="animation:none;opacity:.4"':''}></span>${TS.section} <span class="active-sess-time" id="topbar-timer">${fmtElapsed(TS.elapsed)}</span></span>`;
    if(btn){btn.textContent='Resume';btn.onclick=()=>openSessionModal();}
  } else {
    chip.style.display='none';
    if(btn){btn.textContent='▶ Start Session';btn.onclick=()=>openSessionModal();}
  }
}

function addConceptTag(){
  const inp=document.getElementById('concept-inp');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val||TS.concepts.includes(val))return;
  TS.concepts.push(val);
  inp.value='';
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
  inp.focus();
}

function removeConceptTag(idx){
  TS.concepts.splice(idx,1);
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
}

function setSessFeeling(f){
  TS.feeling=f;
  document.querySelectorAll('.feeling-r-btn').forEach(b=>b.classList.toggle('sel',b.textContent===f));
}

function setSessDiff(d){
  TS.difficulty=d;
  document.querySelectorAll('.diff-r-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===d));
}

function saveSession(){
  const notes=document.getElementById('sess-notes-ta')?.value?.trim()||'';
  const section=document.getElementById('recap-sec')?.value||TS.section;
  const date=document.getElementById('recap-date')?.value||TS.date||todayStr();
  const hours=parseFloat((TS.elapsed/3600).toFixed(2));
  if(!section){showToast('No section selected','err');return;}
  if(TS.elapsed<30){showToast('Session too short (< 30s)','err');return;}
  const act={
    id:'u'+Date.now(),
    date:date+'T'+new Date().toTimeString().slice(0,8),
    section,hours:Math.max(0.1,hours),
    material:TS.material,
    caption:notes,
    difficulty:TS.difficulty,
    feeling:TS.feeling,
    concepts:[...TS.concepts],
    elapsed:TS.elapsed,
    kudos:[],comments:[]
  };
  S.activities.push(act);
  saveState();checkAchievements();checkChallengeAchievements();
  document.getElementById('sess-overlay')?.classList.remove('open');
  tsReset();updateNavChip();
  showToast(`Session posted! ${fmtDur(act.elapsed)} for ${section} 🎉`,'ok');
  currentTab='feed';renderApp();
}

function discardSession(){
  clearInterval(timerInterval);timerInterval=null;
  tsReset();
  document.getElementById('sess-overlay')?.classList.remove('open');
  updateNavChip();
}

function openSocialModal(platform){
  const labels={linkedin:{name:'LinkedIn',icon:'in',iconCls:'soc-li',placeholder:'https://linkedin.com/in/yourname'},facebook:{name:'Facebook',icon:'f',iconCls:'soc-fb',placeholder:'https://facebook.com/yourname'}};
  const l=labels[platform];
  if(!S.social)S.social={linkedin:'',facebook:''};
  const current=S.social[platform]||'';
  let el=document.getElementById('social-modal');
  if(!el){
    el=document.createElement('div');

function saveSocialLink(platform){
  const url=document.getElementById('social-url-inp')?.value?.trim();

  if(!url.startsWith('http')){showToast('Enter a valid URL starting with https://','err');return;}
  if(!S.social)S.social={linkedin:'',facebook:''};
  S.social[platform]=url;
  saveState();closeSocialModal();
  showToast(`${platform==='linkedin'?'LinkedIn':'Facebook'} connected! ✓`,'ok');
  renderTab();
}
function removeSocialLink(platform){
  if(!S.social)S.social={linkedin:'',facebook:''};
  S.social[platform]='';
  saveState();closeSocialModal();
  showToast('Disconnected','info');
  renderTab();
}

function openFollowModal(type){
  let el=document.getElementById('follow-modal');

    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:420px"><div class="modal-hdr"><div class="modal-title" id="follow-modal-title"></div><button class="modal-close" onclick="closeFollowModal()">×</button></div><div class="modal-body" id="follow-modal-body" style="padding-top:4px"></div></div>`;

  const weekAgo=new Date(Date.now()-7*86400000);

    users=MOCK_FRIENDS.filter(f=>(S.following||[]).includes(f.id));

      </div>

function openUserProfile(userId){
  if(userId==='you'){switchTab('profile');return;}
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  if(!f)return;
  let el=document.getElementById('uprofile-modal');
  if(!el){
    el=document.createElement('div');
    el.id='uprofile-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:540px;padding:0;overflow:hidden;border-radius:18px"><div id="uprofile-content"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)closeUserProfile();});
    document.body.appendChild(el);
  }
  renderUserProfile(userId);
  el.classList.add('open');
}

function renderUserProfile(userId){
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  if(!f)return;
  const isFollowing=(S.following||[]).includes(userId);
  const weekAgo=new Date(Date.now()-7*86400000);
  const wHrs=f.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
  const sectionHrsMap={};
  f.activities.forEach(a=>{sectionHrsMap[a.section]=(sectionHrsMap[a.section]||0)+(a.hours||0);});
  const allSecs=[...new Set([...f.passedSections,f.currentSection].filter(Boolean))];
  const sectionProgress=allSecs.map(s=>{
    const ex=EXAMS[s];if(!ex)return'';
    const hrs=f.passedSections.includes(s)?ex.studyHours:(sectionHrsMap[s]||0);
    const pct=Math.min(100,Math.round(hrs/ex.studyHours*100));
    const passed=f.passedSections.includes(s);
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:7px"><span class="badge badge-${s}">${s}</span>${passed?`<span class="badge badge-passed">Passed ✅</span>`:''}</div>
        <span style="font-size:11px;color:var(--mut)">${hrs.toFixed(0)}h / ${ex.studyHours}h</span>
      </div>
      <div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${pct}%;background:${ex.color}"></div></div>
    </div>`;
  }).join('');
  const recentActs=f.activities.slice(0,3).map(a=>{
    const ex=EXAMS[a.section];
    return`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);align-items:flex-start">
      <div style="width:34px;height:34px;border-radius:8px;background:${ex.color}20;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${ex.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700">${a.section} — ${a.hours}h</div>
        ${a.material?`<div style="font-size:11px;color:var(--ind);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📖 ${a.material}</div>`:''}
        ${a.caption?`<div style="font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">"${a.caption}"</div>`:''}
      </div>
      <div style="font-size:10px;color:var(--mut);flex-shrink:0">${timeAgo(a.date)}</div>
    </div>`;
  }).join('');
  const doc=document.getElementById('uprofile-content');
  if(!doc)return;
  doc.innerHTML=`
<div class="uprofile-hero">
  <div style="position:relative;z-index:1">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="avatar av-xl" style="background:${f.color};color:#fff;border:3px solid rgba(255,255,255,.4)">${f.initials}</div>
        <div>
          <div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:3px">${f.name} ${f.passedSections.length===4?'🏆':''}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.75)">${f.state}${f.passedSections.length?' · ✅ '+f.passedSections.join(', ')+' Passed':''}</div>
          ${f.bio?`<div style="font-size:12px;color:rgba(255,255,255,.65);margin-top:8px;max-width:300px;line-height:1.5;font-style:italic">"${f.bio}"</div>`:''}
        </div>
      </div>
      <button class="modal-close" onclick="closeUserProfile()" style="color:rgba(255,255,255,.7);font-size:26px">×</button>
    </div>
    <div style="display:flex;gap:22px">
      ${[{v:f.totalHours,l:'Total Hrs'},{v:f.streak+'d',l:'Streak'},{v:f.activities.length,l:'Sessions'},{v:wHrs.toFixed(1)+'h',l:'This Week'}].map(s=>`<div><div style="font-size:18px;font-weight:900;color:#fff">${s.v}</div><div style="font-size:9px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em">${s.l}</div></div>`).join('')}
    </div>
  </div>
</div>
<div class="uprofile-body">
  <div style="display:flex;gap:8px;margin-bottom:18px">
    <button class="btn ${isFollowing?'btn-ghost':'btn-primary'}" style="flex:1;justify-content:center" onclick="toggleFollowProfile('${userId}',this)">${isFollowing?'✓ Following':'+ Follow'}</button>
    <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeUserProfile();openDirectMessage('${userId}')">💬 Message</button>
    ${isFollowing?`<button class="btn btn-ghost btn-sm" onclick="closeUserProfile();promptInviteToClub('${userId}')">🏛️ Invite to Club</button>`:''}
  </div>
  ${allSecs.length?`<div style="margin-bottom:18px"><div class="section-title">Exam Progress</div>${sectionProgress}</div>`:''}
  ${recentActs?`<div><div class="section-title">Recent Sessions</div>${recentActs}</div>`:''}
</div>`;
}

function closeUserProfile(){document.getElementById('uprofile-modal')?.classList.remove('open');}

function toggleFollowProfile(userId,btn){
  const following=S.following||[];
  const idx=following.indexOf(userId);
  if(idx>=0){following.splice(idx,1);}else{following.push(userId);}
  S.following=following;saveState();checkAchievements();
  const isNow=(S.following||[]).includes(userId);
  btn.textContent=isNow?'✓ Following':'+ Follow';
  btn.className=`btn ${isNow?'btn-ghost':'btn-primary'}`;
  btn.style.flex='1';btn.style.justifyContent='center';
  showToast(isNow?'Following! Sessions will appear in your feed.':'Unfollowed','ok');
  renderUserProfile(userId);
}

function openDirectMessage(userId){
  // Find or create a direct club with this user
  const f=MOCK_FRIENDS.find(x=>x.id===userId);if(!f)return;
  if(!S.clubs)S.clubs=[];
  let directClub=(S.clubs).find(c=>c.members.length===2&&c.members.includes('you')&&c.members.includes(userId));
  if(!directClub){
    const clubId='c'+Date.now();
    directClub={id:clubId,name:`${f.name}`,icon:f.initials[0]||'💬',desc:'Direct message',isPrivate:true,isDM:true,members:['you',userId],created:Date.now()};
    S.clubs.push(directClub);
    if(!S.clubMessages)S.clubMessages={};
    S.clubMessages[clubId]=[{author:'system',text:`Conversation started with ${f.name}`,time:new Date().toISOString(),isSystem:true}];
    saveState();
  }
  openClubChat(directClub.id);
}

function promptInviteToClub(userId){
  const f=MOCK_FRIENDS.find(x=>x.id===userId);if(!f)return;
  const myClubs=(S.clubs||[]).filter(c=>!c.isDM&&c.members.includes('you'));
  if(!myClubs.length){
    if(confirm(`You have no study clubs yet. Create one and invite ${f.name}?`)){createClubModal();}
    return;
  }
  let el=document.getElementById('invite-club-modal');
  if(!el){
    el=document.createElement('div');
    el.id='invite-club-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px"><div class="modal-hdr"><div class="modal-title" id="invite-club-title"></div><button class="modal-close" onclick="document.getElementById('invite-club-modal').classList.remove('open')">×</button></div><div class="modal-body" id="invite-club-body"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
    document.body.appendChild(el);
  }
  document.getElementById('invite-club-title').textContent=`Invite ${f.name} to a Club`;
  document.getElementById('invite-club-body').innerHTML=myClubs.map(c=>`
  <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;border:1px solid var(--bdr);margin-bottom:8px;transition:all .15s" onclick="inviteToClub('${c.id}','${userId}',this)" onmouseover="this.style.borderColor='var(--ind)'" onmouseout="this.style.borderColor='var(--bdr)'">
    <div style="font-size:22px">${c.icon}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:700">${c.name}</div><div style="font-size:11px;color:var(--mut)">${c.members.length} members</div></div>
    <span style="font-size:12px;color:var(--ind);font-weight:600">Invite →</span>
  </div>`).join('');
  el.classList.add('open');
}

function inviteToClub(clubId,userId,el){
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  if(!club||!f)return;
  if(club.members.includes(userId)){showToast(`${f.name} is already in this club!`,'info');return;}
  club.members.push(userId);
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'system',text:`${f.name} was invited to the club`,time:new Date().toISOString(),isSystem:true});
  saveState();
  document.getElementById('invite-club-modal')?.classList.remove('open');
  showToast(`${f.name} invited to ${club.name}! 🎉`,'ok');
  renderTab();
}

function getClubMemberName(memberId){
  if(memberId==='you'||memberId==='system')return memberId==='system'?'System':S.name;
  return MOCK_FRIENDS.find(f=>f.id===memberId)?.name||'Unknown';
}
function getClubMemberInitials(memberId){
  if(memberId==='you')return S.name.slice(0,2).toUpperCase();
  const f=MOCK_FRIENDS.find(x=>x.id===memberId);
  return f?f.initials:'??';
}
function getClubMemberColor(memberId){
  if(memberId==='you')return'#6366f1';
  return MOCK_FRIENDS.find(f=>f.id===memberId)?.color||'#94a3b8';
}

function selectClubIcon(icon,el){
  window._selectedClubIcon=icon;
  document.querySelectorAll('[data-ico]').forEach(e=>{e.style.borderColor='var(--bdr)';e.style.background='var(--surf2)';});
  el.style.borderColor='var(--ind)';el.style.background='var(--ind-bg)';
}
function closeCreateClubModal(){document.getElementById('create-club-modal')?.classList.remove('open');}
function saveNewClub(){
  const name=document.getElementById('ncn')?.value?.trim();
  if(!name){showToast('Enter a club name','err');return;}
  const desc=document.getElementById('ncd')?.value?.trim()||'';
  const icon=window._selectedClubIcon||'📚';
  const members=['you'];
  document.querySelectorAll('[id^="cm-"]').forEach(cb=>{if(cb.checked)members.push(cb.value);});
  const clubId='c'+Date.now();
  const club={id:clubId,name,icon,desc,isPrivate:true,members,created:Date.now()};
  if(!S.clubs)S.clubs=[];
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[clubId]=[
    {author:'system',text:`${S.name} created "${name}"`,time:new Date().toISOString(),isSystem:true},
    ...members.filter(m=>m!=='you').map(m=>({author:'system',text:`${getClubMemberName(m)} was invited`,time:new Date().toISOString(),isSystem:true}))
  ];
  saveState();
  closeCreateClubModal();
  showToast(`${icon} "${name}" created!`,'ok');
  renderTab();
  setTimeout(()=>openClubChat(clubId),200);
}

function openClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  let el=document.getElementById('club-chat-modal');
  if(!el){
    el=document.createElement('div');
    el.id='club-chat-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:520px;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden"><div id="club-chat-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)closeClubChat();});
    document.body.appendChild(el);
  }
  renderClubChat(clubId);
  el.classList.add('open');
}

function renderClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  const msgs=(S.clubMessages||{})[clubId]||[];
  const memberAvatars=club.members.slice(0,6).map((m,i)=>`<div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${getClubMemberColor(m)};color:#fff;border:2px solid var(--surf);margin-left:${i===0?0:-8}px;flex-shrink:0" title="${getClubMemberName(m)}">${getClubMemberInitials(m)}</div>`).join('');
  const msgHTML=msgs.map(msg=>{
    if(msg.isSystem)return`<div class="chat-system">— ${msg.text} —</div>`;
    const isMine=msg.author==='you';
    const name=getClubMemberName(msg.author);
    const initials=getClubMemberInitials(msg.author);
    const color=getClubMemberColor(msg.author);
    const timeStr=new Date(msg.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return`<div class="chat-row${isMine?' mine':''}">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${color};color:#fff;flex-shrink:0">${initials}</div>
      <div>
        ${!isMine?`<div style="font-size:10px;color:var(--mut);margin-bottom:2px;font-weight:600">${name}</div>`:''}
        <div class="chat-bub ${isMine?'chat-bub-mine':'chat-bub-them'}">${msg.text}</div>
        <div class="chat-meta${!isMine?' chat-meta-them':''}">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  const el=document.getElementById('club-chat-content');
  if(!el)return;
  const memberCount=club.members.length;
  const dmOtherId=club.isDM?club.members.find(m=>m!=='you'):null;
  const dmFriend=dmOtherId?MOCK_FRIENDS.find(f=>f.id===dmOtherId):null;
  const dmAvatarHtml=dmFriend?('<div class="avatar" style="width:34px;height:34px;border-radius:50%;background:'+getClubMemberColor(dmOtherId)+';color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">'+getClubMemberInitials(dmOtherId)+'</div>'):'💬';
  const iconHtml=club.isDM?dmAvatarHtml:('<span style="font-size:24px">'+club.icon+'</span>');
  const placeholderName=club.isDM&&dmFriend?dmFriend.name.split(' ')[0]:club.name;
  el.innerHTML=`
<div style="flex-shrink:0;padding:16px 20px 14px;border-bottom:1px solid var(--bdr)">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex-shrink:0">${iconHtml}</div>
    <div style="min-width:0;flex:1">
      <div style="font-size:15px;font-weight:800">${club.name}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:1px">${club.isDM?'Direct message':'🔒 Private · '+memberCount+' member'+(memberCount!==1?'s':'')}</div>
    </div>
    <div style="display:flex;align-items:center;padding-right:4px">${memberAvatars}</div>
    <button class="modal-close" onclick="closeClubChat()" style="flex-shrink:0">×</button>
  </div>
</div>
<div class="club-chat-area" id="cca-${clubId}" style="flex:1;padding:12px 20px;height:auto;min-height:0">${msgHTML||'<div class="chat-system">— No messages yet. Say hello! 👋 —</div>'}</div>
<div class="chat-footer" style="flex-shrink:0;padding:10px 20px 16px;border-top:1px solid var(--bdr)">
  <input class="chat-inp" id="cci-${clubId}" placeholder="Message ${placeholderName}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendClubMessage('${clubId}');}">
  <button class="chat-send" onclick="sendClubMessage('${clubId}')">Send</button>
</div>`;
  setTimeout(()=>{
    const area=document.getElementById('cca-'+clubId);
    if(area)area.scrollTop=area.scrollHeight;
    document.getElementById('cci-'+clubId)?.focus();
  },50);
}

function sendClubMessage(clubId){
  const inp=document.getElementById('cci-'+clubId);
  const text=inp?.value?.trim();if(!text)return;
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'you',text,time:new Date().toISOString()});
  saveState();
  inp.value='';
  renderClubChat(clubId);
  // Simulate a reply from a club member for live feel
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const others=(club?.members||[]).filter(m=>m!=='you');
  if(others.length){
    const replies=['Great session! 💪','Keep grinding! 🔥','Same! I just wrapped a session too.','How many MCQs did you do?',"That topic is no joke — you've got this though!",'🧠 Big brain energy','Let\'s crush this exam together 🎯','Nice work! What material did you cover?','On a roll!! 🔥','Solid. That chapter is super testable.'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    const responder=others[Math.floor(Math.random()*others.length)];
    setTimeout(()=>{
      if(!(S.clubMessages||{})[clubId])return;
      S.clubMessages[clubId].push({author:responder,text:reply,time:new Date().toISOString()});
      saveState();
      renderClubChat(clubId);
    },1100+Math.random()*1200);
  }
}
function closeClubChat(){document.getElementById('club-chat-modal')?.classList.remove('open');}

function joinPublicClub(pubId){
  const pc=PUBLIC_CLUBS.find(c=>c.id===pubId);if(!pc)return;
  if(!S.clubs)S.clubs=[];
  if(S.clubs.find(c=>c.id===pubId)){showToast('Already a member!','info');return;}
  const club={id:pubId,name:pc.name,icon:pc.icon,desc:pc.desc,isPrivate:false,isDM:false,isPublic:true,
    members:['you'],created:Date.now()};
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[pubId]=[
    {author:'system',text:'You joined '+pc.name+'! Welcome to the community 🎉',time:new Date().toISOString(),isSystem:true}
  ];
  saveState();
  renderTab();
  showToast('Joined '+pc.name+'! 🎉','ok');
}

// HEAT MAP
// ═══════════════════════════════════════════════
function buildHeatMap(){
  const logMap={};
  (S.activities||[]).forEach(a=>{
    const d=a.date.slice(0,10);
    logMap[d]=(logMap[d]||0)+(a.hours||0);
  });
  const weeks=16;
  const today=new Date();today.setHours(0,0,0,0);
  // align to Sunday
  const startDay=new Date(today);
  startDay.setDate(today.getDate()-today.getDay()-(weeks-1)*7);

  const cols=[];
  for(let w=0;w<weeks;w++){
    const cells=[];
    for(let d=0;d<7;d++){
      const cur=new Date(startDay);
      cur.setDate(startDay.getDate()+w*7+d);
      if(cur>today){cells.push(`<div style="width:11px;height:11px;border-radius:2px;background:var(--surf2)"></div>`);continue;}
      const key=cur.toISOString().slice(0,10);
      const hrs=logMap[key]||0;
      const intensity=hrs===0?0:hrs<1?1:hrs<2?2:hrs<3?3:4;
      const colors=['var(--surf2)','#fde68a','#fbbf24','#f59e0b','#d97706'];
      const dark_colors=['#1c2030','#4d3800','#7c5e00','#b38600','#d4a000'];
      const bg=isDark?dark_colors[intensity]:colors[intensity];
      cells.push(`<div style="width:11px;height:11px;border-radius:2px;background:${bg};cursor:default" title="${key}: ${hrs.toFixed(1)}h"></div>`);
    }
    cols.push(`<div style="display:flex;flex-direction:column;gap:2px">${cells.join('')}</div>`);
  }
  const monthLabels=[];
  for(let w=0;w<weeks;w+=4){
    const d=new Date(startDay);d.setDate(startDay.getDate()+w*7);
    monthLabels.push(`<div style="flex:1;font-size:9px;color:var(--mut)">${d.toLocaleDateString('en-US',{month:'short'})}</div>`);
  }
  const totalDays=Object.keys(logMap).filter(d=>{const dt=new Date(d+'T12:00:00');return dt>=startDay&&dt<=today;}).length;
  return`
<div style="overflow-x:auto">
  <div style="display:flex;gap:2px;margin-bottom:4px">${monthLabels.join('')}</div>
  <div style="display:flex;gap:2px">${cols.join('')}</div>
  <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--mut)">
    Less
    ${['var(--surf2)','#fde68a','#fbbf24','#f59e0b','#d97706'].map(c=>`<div style="width:11px;height:11px;border-radius:2px;background:${c}"></div>`).join('')}
    More &nbsp;·&nbsp; ${totalDays} active days in last 16 weeks
  </div>
</div>`;
}

// SCORE TRACKER
// ═══════════════════════════════════════════════
function buildScoreTracker(){
  const scores=S.practiceScores||{};
  const sections=S.sections||['FAR','AUD','REG','TCP'];
  const rows=sections.map(s=>{
    const ex=EXAMS[s];
    const sScores=scores[s]||[];
    const latest=sScores.length?sScores[sScores.length-1]:null;
    const avg=sScores.length?Math.round(sScores.reduce((a,b)=>a+b.score,0)/sScores.length):null;
    const trend=sScores.length>=2?(sScores[sScores.length-1].score>sScores[sScores.length-2].score?'📈':'📉'):'—';
    const passed=(S.sectionPassed||[]).includes(s);
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <span class="badge badge-${s}" style="min-width:46px;justify-content:center">${s}</span>
      <div style="flex:1">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${sScores.slice(-5).map((sc,i)=>`<div style="text-align:center">
            <div style="width:34px;height:34px;border-radius:8px;background:${sc.score>=75?'var(--grn-bg)':sc.score>=65?'var(--amb-bg)':'var(--red-bg)'};border:1.5px solid ${sc.score>=75?'var(--grn)':sc.score>=65?'var(--amb)':'var(--red)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${sc.score>=75?'var(--grn)':sc.score>=65?'var(--amb)':'var(--red)'}">${sc.score}</div>
            <div style="font-size:8px;color:var(--mut);margin-top:2px">${sc.label||'P'+(i+1)}</div>
          </div>`).join('')}
          ${sScores.length===0?`<span style="font-size:12px;color:var(--mut)">No scores logged yet</span>`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${avg!==null?`<div style="font-size:18px;font-weight:900;color:${avg>=75?'var(--grn)':avg>=65?'var(--amb)':'var(--red)'}">${avg}</div><div style="font-size:9px;color:var(--mut)">avg ${trend}</div>`:''}
        ${passed?`<div class="badge badge-passed" style="margin-top:4px">Passed ✅</div>`:''}
      </div>
      <button class="btn btn-ghost btn-xs" onclick="openScoreModal('${s}')">+ Score</button>
    </div>`;
  }).join('');
  return`
<div style="font-size:11px;color:var(--mut);margin-bottom:10px">Log your Becker/Gleim practice exam scores. Target: 75+ consistently before scheduling.</div>
${rows}`;
}

function submitScore(section){
  const score=parseInt(document.getElementById('sc-score')?.value);
  const label=document.getElementById('sc-label')?.value?.trim()||'';
  const date=document.getElementById('sc-date')?.value||todayStr();
  if(isNaN(score)||score<0||score>99){showToast('Enter a valid score 0–99','err');return;}
  if(!S.practiceScores)S.practiceScores={};
  if(!S.practiceScores[section])S.practiceScores[section]=[];
  S.practiceScores[section].push({score,label,date});
  saveState();
  closePostModal();
  showToast(`${section} score ${score} logged! ${score>=75?'🎯 Exam-ready territory!':'Keep grinding 💪'}`,'ok');

}

function selectEpAvatar(emoji, el){
  document.getElementById('ep-avatar-val').value=emoji;
  document.querySelectorAll('.ep-av-opt').forEach(e=>{e.style.borderColor='var(--bdr)';e.style.background='var(--surf2)';});
  el.style.borderColor='var(--ora)';el.style.background='var(--ora-bg)';
  // Update preview if no photo
  const preview=document.getElementById('ep-avatar-preview');
  const emojiSpan=document.getElementById('ep-emoji-preview');
  if(emojiSpan){emojiSpan.textContent=emoji;}
  else if(preview&&!S.profilePic){preview.innerHTML=`<span id="ep-emoji-preview">${emoji}</span>`;}
}

function handleProfilePicUpload(input){
  const file=input.files?.[0];
  if(!file)return;
  if(file.size>5*1024*1024){showToast('Image must be under 5MB','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    // Update preview
    const preview=document.getElementById('ep-avatar-preview');
    if(preview){
      preview.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
      // Add remove button below if not present
    }
    // Store temporarily
    window._pendingProfilePic=dataUrl;
    showToast('Photo ready — click Save Profile to apply ✓','ok');
  };
  reader.readAsDataURL(file);
}

function removeProfilePic(){
  S.profilePic='';
  window._pendingProfilePic=null;
  saveState();
  closeEditProfile();
  showToast('Profile photo removed','info');
  renderApp();
}

function saveEditProfile(){
  const name=document.getElementById('ep-name')?.value?.trim();
  if(!name){showToast('Enter your name','err');return;}
  S.name=name;
  S.state=document.getElementById('ep-state')?.value||S.state;
  S.hoursPerWeek=parseInt(document.getElementById('ep-hrs')?.value)||S.hoursPerWeek||15;
  S.bio=document.getElementById('ep-bio')?.value?.trim()||'';
  S.school=document.getElementById('ep-school')?.value?.trim()||'';
  S.classYear=document.getElementById('ep-classyear')?.value||'';
  S.avatar=document.getElementById('ep-avatar-val')?.value||S.avatar||'🎓';
  if(window._pendingProfilePic){S.profilePic=window._pendingProfilePic;window._pendingProfilePic=null;}
  (S.sections||[]).forEach(s=>{
    const d=document.getElementById('ep-date-'+s)?.value;
    if(d){if(!S.examDates)S.examDates={};S.examDates[s]=d;}
  });
  saveState();
  closeEditProfile();
  showToast('Profile saved! ✓','ok');
  renderApp();
}

function renderAppSettingsSection(){

// PDF REPORT GENERATION (jsPDF)
// ═══════════════════════════════════════════════
function generatePDFReport(){
  if(typeof window.jspdf==='undefined'){showToast('PDF library loading, try again','err');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,margin=18;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const weekAgo=new Date(Date.now()-7*86400000);

  // — Color helpers —
  const hexToRgb=hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];};
  const setFill=(hex)=>doc.setFillColor(...hexToRgb(hex));
  const setTxt=(hex)=>doc.setTextColor(...hexToRgb(hex));
  const setDraw=(hex)=>doc.setDrawColor(...hexToRgb(hex));

  // ── HEADER BANNER ──
  setFill('#1e1b4b'); doc.rect(0,0,W,38,'F');
  setFill('#f97316'); doc.rect(0,34,W,4,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22); setTxt('#ffffff');
  doc.text('LEDGER',margin,20);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); setTxt('rgba(255,255,255,0.6)');
  doc.text('Social CPA Study Platform',margin,27);
  doc.setFontSize(9); setTxt('#f97316');
  doc.text('WEEKLY PROGRESS REPORT',W-margin,27,{align:'right'});
  doc.setFontSize(8); setTxt('#94a3b8');
  doc.text(dateStr,W-margin,20,{align:'right'});

  let y=50;

  // ── CANDIDATE INFO ──
  doc.setFont('helvetica','bold'); doc.setFontSize(14); setTxt('#0f172a');
  doc.text(S.name||'CPA Candidate',margin,y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); setTxt('#64748b');
  doc.text((S.state||'')+(S.school?' · '+S.school:'')+(S.disc?' · '+S.disc+' Discipline':''),margin,y); y+=10;

  // ── STATS GRID ──
  const stats=[
    {v:Math.round(getTotalHours()),l:'Total Hours',c:'#f97316'},
    {v:getWeekHours().toFixed(1),l:'This Week',c:'#6366f1'},
    {v:getStreak(),l:'Day Streak',c:'#f59e0b'},
    {v:(S.activities||[]).length,l:'Sessions',c:'#10b981'},
    {v:(S.sectionPassed||[]).length+'/4',l:'Sections Passed',c:'#14b8a6'},
    {v:subTierLabel(),l:'Plan',c:'#a855f7'},
  ];
  const boxW=(W-margin*2-10)/3;const boxH=18;
  stats.forEach((s,i)=>{
    const col=i%3; const row=Math.floor(i/3);
    const bx=margin+col*(boxW+5); const by=y+row*(boxH+4);
    setFill('#f8fafc'); setDraw('#e2e8f0'); doc.roundedRect(bx,by,boxW,boxH,3,3,'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(14); setTxt(s.c);
    doc.text(String(s.v),bx+boxW/2,by+10,{align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7); setTxt('#94a3b8');
    doc.text(s.l.toUpperCase(),bx+boxW/2,by+15,{align:'center'});
  }); y+=boxH*2+4+8;

  // ── SECTION PROGRESS ──
  doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
  doc.text('EXAM SECTION PROGRESS',margin,y); y+=6;
  const secColors={FAR:'#ef4444',AUD:'#4f8ef7',REG:'#10b981',TCP:'#14b8a6',BAR:'#f59e0b',ISC:'#a855f7'};
  const secs=S.sections||['FAR','AUD','REG','TCP'];
  const secData=secs.map(s=>{
    const ex=EXAMS[s]; const hrs=getSectionHours(s); const pct=Math.min(100,Math.round(hrs/ex.studyHours*100));
    const passed=(S.sectionPassed||[]).includes(s);
    return[s,ex.full,hrs+'h / '+ex.studyHours+'h',pct+'%',passed?'✓ Passed':S.sectionStatus?.[s]||'Planned'];
  });
  doc.autoTable({
    startY:y,
    head:[['Section','Name','Hours','Progress','Status']],
    body:secData,
    theme:'grid',
    headStyles:{fillColor:[30,27,75],textColor:[255,255,255],fontSize:8,fontStyle:'bold',cellPadding:3},
    bodyStyles:{fontSize:8,cellPadding:3},
    columnStyles:{0:{cellWidth:16,fontStyle:'bold'},1:{cellWidth:60},2:{cellWidth:28},3:{cellWidth:24},4:{cellWidth:30}},
    margin:{left:margin,right:margin},
    alternateRowStyles:{fillColor:[248,250,252]},
  });
  y=doc.lastAutoTable.finalY+8;

  // ── WEEKLY SESSIONS ──
  const weekActs=(S.activities||[]).filter(a=>new Date(a.date)>weekAgo);
  if(weekActs.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('THIS WEEK\'S SESSIONS',margin,y); y+=4;
    doc.autoTable({
      startY:y,
      head:[['Date','Section','Hours','Topic','Difficulty']],
      body:weekActs.map(a=>[
        new Date(a.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        a.section, a.hours+'h',
        (a.material||'General Study').slice(0,40),
        '★'.repeat(a.difficulty||3)+'☆'.repeat(5-(a.difficulty||3))
      ]),
      theme:'grid',
      headStyles:{fillColor:[99,102,241],textColor:[255,255,255],fontSize:8,fontStyle:'bold',cellPadding:3},
      bodyStyles:{fontSize:8,cellPadding:3},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:18},2:{cellWidth:18},3:{cellWidth:90},4:{cellWidth:26}},
      margin:{left:margin,right:margin},
      alternateRowStyles:{fillColor:[248,250,252]},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── ACHIEVEMENTS ──
  const earned=(S.achievements||[]);
  if(earned.length){
    if(y>230){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('ACHIEVEMENTS ('+earned.length+'/'+ACHIEVEMENTS.length+')',margin,y); y+=6;
    const achNames=earned.map(id=>ACHIEVEMENTS.find(a=>a.id===id)?.name||id).join(' · ');
    doc.setFont('helvetica','normal'); doc.setFontSize(8); setTxt('#475569');
    const lines=doc.splitTextToSize(achNames,W-margin*2);
    doc.text(lines,margin,y); y+=lines.length*4+6;
  }

  // ── ALL-TIME SESSIONS TABLE ──
  const allActs=(S.activities||[]).slice().reverse();
  if(allActs.length>weekActs.length){
    if(y>220){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('ALL SESSIONS ('+allActs.length+' total)',margin,y); y+=4;
    doc.autoTable({
      startY:y,
      head:[['Date','Section','Hours','Topic','Notes']],
      body:allActs.slice(0,50).map(a=>[
        new Date(a.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}),
        a.section, a.hours+'h',
        (a.material||'—').slice(0,35),
        (a.caption||'—').slice(0,30),
      ]),
      theme:'striped',
      headStyles:{fillColor:[30,27,75],textColor:[255,255,255],fontSize:7,fontStyle:'bold',cellPadding:2.5},
      bodyStyles:{fontSize:7,cellPadding:2.5},
      columnStyles:{0:{cellWidth:24},1:{cellWidth:16},2:{cellWidth:16},3:{cellWidth:76},4:{cellWidth:52}},
      margin:{left:margin,right:margin},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── FOOTER ──
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    setFill('#f1f5f9'); doc.rect(0,287,W,10,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); setTxt('#94a3b8');
    doc.text('Generated by Ledger — ledger-cpa.com · '+dateStr,margin,293);
    doc.text('Page '+i+' of '+pageCount,W-margin,293,{align:'right'});
  }

  const fileName='ledger-report-'+S.name.replace(/\s+/g,'-').toLowerCase()+'-'+now.toISOString().slice(0,10)+'.pdf';
  doc.save(fileName);
  showToast('📄 PDF report downloaded!','ok');
}

const EXAM_QUESTIONS = {

    {q:"Under GASB standards, which basis of accounting is used for governmental funds?",choices:["Accrual basis","Modified accrual basis","Cash basis","Full accrual basis"],correct:1,exp:"Governmental funds use modified accrual accounting. Revenue is recognized when available and measurable; expenditures when incurred (with exceptions)."},
    {q:"A company uses FIFO inventory. Ending inventory is $500,000. If LIFO were used, ending inventory would be $430,000. What is the LIFO reserve?",choices:["$70,000","$500,000","$430,000","$930,000"],correct:0,exp:"LIFO Reserve = FIFO Inventory – LIFO Inventory = $500,000 – $430,000 = $70,000."},
    {q:"Under ASC 842, how does a lessee report an operating lease on the balance sheet?",choices:["Off balance sheet; disclose only in footnotes","Record a right-of-use asset and a lease liability","Record only the lease liability","Record only the right-of-use asset"],correct:1,exp:"ASC 842 requires lessees to recognize a right-of-use (ROU) asset and a corresponding lease liability for virtually all leases on the balance sheet."},
    {q:"Which fund type would a city use to account for water utility operations?",choices:["General Fund","Special Revenue Fund","Enterprise Fund","Agency Fund"],correct:2,exp:"Enterprise funds (proprietary funds) account for activities financed and operated in a manner similar to a private business, such as utilities."},
    {q:"Under the allowance method, when a specific account is written off, net realizable value of accounts receivable:",choices:["Decreases","Increases","Remains unchanged","Depends on the amount"],correct:2,exp:"Writing off a specific account debits the Allowance and credits AR by equal amounts. Both gross AR and the allowance decrease by the same amount, so NRV is unchanged."},
    {q:"A company issues $1,000,000 of 8% bonds at 105. The premium on issuance is:",choices:["$50,000","$80,000","$105,000","$45,000"],correct:0,exp:"Premium = Issue price – Face value = ($1,000,000 × 1.05) – $1,000,000 = $1,050,000 – $1,000,000 = $50,000."},
    {q:"Under SFAS 87 (ASC 715), the service cost component of net periodic pension cost is reported in:",choices:["Other comprehensive income","Operating expenses","Financing activities","Non-operating income"],correct:1,exp:"Service cost is the actuarial present value of benefits earned by employees during the period and is classified as an operating expense."},
    {q:"Which of the following is a required financial statement for a nongovernmental nonprofit organization?",choices:["Statement of Cash Flows","Statement of Activities","Statement of Financial Position","All of the above"],correct:3,exp:"GAAP (ASC 958) requires nonprofits to present: Statement of Financial Position, Statement of Activities, Statement of Cash Flows, and Statement of Functional Expenses (for voluntary health/welfare)."},
    {q:"Under IFRS, development costs that meet specific criteria are:",choices:["Always expensed immediately","Capitalized as an intangible asset","Amortized over 40 years","Written off in the period incurred"],correct:1,exp:"Under IAS 38, development costs are capitalized when technical feasibility, intent to complete, ability to use/sell, probable future benefits, adequate resources, and ability to reliably measure costs are all demonstrated."},
    {q:"Comprehensive income equals net income plus:",choices:["Unrealized gains on available-for-sale securities only","All items in other comprehensive income (OCI)","Operating income","Retained earnings changes"],correct:1,exp:"Comprehensive income = Net income + Other comprehensive income (OCI). OCI includes unrealized gains/losses on AFS securities, foreign currency translation, pension adjustments, and cash flow hedge gains/losses."},
    {q:"Which of the following is NOT a characteristic of the general fund?",choices:["Accounts for most basic governmental services","Uses modified accrual accounting","Can run a deficit","Is a proprietary fund"],correct:3,exp:"The general fund is a governmental fund, not a proprietary fund. Proprietary funds include enterprise and internal service funds and use full accrual accounting."},
    {q:"A $200,000 machine with a 10-year life and $20,000 salvage value is depreciated using double-declining balance. Depreciation in Year 1 is:",choices:["$18,000","$36,000","$40,000","$20,000"],correct:2,exp:"DDB rate = 2/10 = 20%. Year 1 depreciation = $200,000 × 20% = $40,000. Note: salvage value is ignored until it would cause book value to go below salvage."},

    {q:"Which of the following best describes inherent risk?",choices:["The risk that the audit team makes a material error","The susceptibility of an assertion to material misstatement, assuming no related controls","The risk that internal controls fail to prevent misstatements","The risk that misstatements are not detected on a test basis"],correct:1,exp:"Inherent risk is the susceptibility of an assertion to material misstatement before considering any related controls. It reflects the nature of the account or transaction."},
    {q:"In which situation is a disclaimer of opinion most appropriate?",choices:["A material uncertainty exists about going concern","The auditor cannot obtain sufficient appropriate audit evidence","The financial statements contain a material misstatement","The client changes accounting principles"],correct:1,exp:"A disclaimer of opinion is issued when the auditor is unable to obtain sufficient appropriate audit evidence. It represents a failure of scope, not a finding of misstatement."},
    {q:"Which of the following is NOT a type of analytical procedure?",choices:["Ratio analysis","Trend analysis","Regression analysis","Vouching source documents"],correct:3,exp:"Vouching involves examining source documents and is a substantive test of details, not an analytical procedure. Analytical procedures involve plausible relationships among data."},
    {q:"The concept of 'professional skepticism' means the auditor assumes:",choices:["Management is dishonest","Nothing — it means critical thinking without assuming honesty or dishonesty","All information is accurate unless proven otherwise","All management representations are false"],correct:1,exp:"Professional skepticism is neither suspicious nor naive — it involves a questioning mind and critical assessment of audit evidence, without assuming management is honest or dishonest."},
    {q:"When assessing control risk, the auditor is assessing the risk that:",choices:["Material misstatements will not be prevented or detected by internal controls","The auditor will choose the wrong test","Management will override controls","Employees will commit fraud"],correct:0,exp:"Control risk is the risk that material misstatements in an assertion will not be prevented or detected on a timely basis by internal controls."},
    {q:"A material weakness in internal control is one where:",choices:["A single deficiency that cannot prevent material misstatement","A deficiency, or combination, where there is a reasonable possibility of material misstatement not being prevented or detected","Any control deficiency exists","More than one control fails"],correct:1,exp:"A material weakness is a deficiency (or combination) in ICFR where there is a reasonable possibility that a material misstatement of the financial statements will not be prevented, or detected and corrected, on a timely basis."},
    {q:"Which of the following is considered the most reliable form of audit evidence?",choices:["Oral representations from management","Internally generated documents reviewed by auditor","Externally generated documents received directly by auditor","Internally generated unreviewed documents"],correct:2,exp:"Externally generated evidence received directly by the auditor (e.g., confirmations sent back to auditor, bank statements) provides the highest reliability because it bypasses client controls."},
    {q:"The engagement letter is primarily designed to:",choices:["Comply with SEC requirements","Establish the terms of the engagement and reduce misunderstanding","Replace the management representation letter","Describe the client's internal controls"],correct:1,exp:"The engagement letter documents the agreed-upon terms of the engagement, responsibilities of both parties, and scope — primarily to reduce misunderstandings."},
    {q:"Sampling risk in auditing refers to:",choices:["The risk of selecting a non-representative sample","The possibility that the auditor's conclusion based on a sample may differ from the conclusion if the entire population were examined","The risk that the sample is too small","Both A and C"],correct:1,exp:"Sampling risk is the risk that the auditor's conclusion based on a sample differs from what it would be if the entire population were tested. It is an inherent aspect of statistical sampling."},
    {q:"Under PCAOB standards, an integrated audit includes an audit of:",choices:["Financial statements only","Internal control over financial reporting only","Both financial statements and ICFR","Management's discussion and analysis"],correct:2,exp:"An integrated audit (required for large accelerated filers under SOX Section 404(b)) includes both an audit of the financial statements and an audit of ICFR."},
    {q:"Which of the following would most likely be considered a related party transaction requiring disclosure?",choices:["A purchase from a major supplier at market price","A loan to the CEO at below-market interest rates","Routine accounts payable to a vendor","Monthly utility payments"],correct:1,exp:"Related party transactions include loans to/from officers, directors, or major shareholders — especially at non-arm's length terms. These require disclosure under ASC 850."},
  ],
  REG: [
    {q:"A sole proprietor has net self-employment income of $100,000. What is the deductible portion of self-employment tax for AGI purposes?",choices:["$7,065","$14,130","$7,650","$15,300"],correct:0,exp:"SE tax = $100,000 × 92.35% × 15.3% = $14,130. The deductible portion for AGI = 50% of SE tax = $14,130 / 2 = $7,065."},
    {q:"Under the UCC, a firm offer made by a merchant is irrevocable for a maximum of:",choices:["30 days","60 days","90 days","3 months"],correct:3,exp:"Under UCC Article 2, a firm offer by a merchant (in a signed writing) is irrevocable for the time stated, or if no time is stated, for a reasonable time not exceeding 3 months."},
    {q:"Which of the following assets does NOT qualify for the Section 179 expensing deduction?",choices:["Machinery used in a manufacturing business","A computer used in a dental office","Residential rental property","Office furniture"],correct:2,exp:"Section 179 applies to tangible personal property and certain qualified real property improvements. Residential rental real property does NOT qualify for Section 179."},
    {q:"Under the discharge of contract by impossibility doctrine, which of the following would excuse performance?",choices:["Increased cost of performance","The subject matter of the contract is destroyed without fault of either party","Financial difficulty of one party","A party finding a better deal"],correct:1,exp:"Impossibility excuses performance when: (1) the subject matter is destroyed, (2) the contract becomes illegal, or (3) a key person dies/becomes incapacitated. Increased cost alone is not sufficient."},
    {q:"For tax purposes, capital gains on property held MORE than one year are taxed at:",choices:["Ordinary income rates","0%, 15%, or 20% preferential rates","A flat 28% rate","The same rate as dividends only"],correct:1,exp:"Long-term capital gains (property held >1 year) are taxed at preferential rates of 0%, 15%, or 20% depending on taxable income. Short-term gains are taxed at ordinary rates."},
    {q:"In a Chapter 7 bankruptcy, which claim has the HIGHEST priority?",choices:["Secured creditors","Unsecured priority claims (wages)","Domestic support obligations","Administrative expenses of the bankruptcy estate"],correct:2,exp:"Under the Bankruptcy Code, domestic support obligations (child support, alimony) have the highest priority among unsecured claims in a Chapter 7 distribution."},
    {q:"The statute of limitations for an IRS audit of a 'substantially false' return is:",choices:["3 years","6 years","No limit — indefinite","5 years"],correct:2,exp:"If a taxpayer files a fraudulent return or willfully attempts to evade tax, there is NO statute of limitations. The IRS can assess taxes at any time."},
    {q:"Which of the following correctly describes an 'S Corporation'?",choices:["A corporation taxed at both corporate and individual levels","A pass-through entity with no corporate-level tax, limited to 100 shareholders","Subject to corporate AMT","Unlimited number of shareholders allowed"],correct:1,exp:"An S Corp is a pass-through entity with no entity-level income tax. It is limited to 100 shareholders, one class of stock, and only eligible shareholders (citizens/residents, certain trusts/estates)."},
    {q:"In agency law, an agent acting with 'apparent authority' means:",choices:["The principal explicitly authorized the act","A third party reasonably believes the agent has authority based on the principal's conduct","The agent exceeded actual authority and is personally liable","The agent had written authorization"],correct:1,exp:"Apparent authority arises when a third party reasonably believes an agent has authority based on representations or conduct of the principal (not the agent). The principal is bound."},
    {q:"A partnership distributes property with FMV of $50,000 and an adjusted basis of $30,000 to a partner. What is the partner's basis in the property?",choices:["$50,000","$30,000","$20,000","$0"],correct:1,exp:"In a non-liquidating distribution, a partner's basis in distributed property equals the partnership's adjusted basis in that property ($30,000), not the FMV. Gain is generally not recognized."},
    {q:"Under the UETA (Uniform Electronic Transactions Act), an electronic signature is:",choices:["Only valid if notarized","Valid and enforceable with the same legal effect as a handwritten signature","Only valid for commercial transactions over $500","Not admissible as evidence"],correct:1,exp:"Under UETA (and ESIGN Act), electronic signatures and records have the same legal effect as paper signatures. They are valid and enforceable in contract formation and enforcement."},
    {q:"A taxpayer sells her primary residence that she owned and lived in for 3 years for $450,000 (basis $200,000). How much of the $250,000 gain is taxable?",choices:["$250,000 fully taxable","$0 — fully excluded under Section 121","$0 for single filer up to $250,000 exclusion","$150,000"],correct:1,exp:"Section 121 excludes up to $250,000 ($500,000 MFJ) of gain if the taxpayer owned and used the home as a principal residence for at least 2 of the last 5 years. The full $250,000 gain is excluded."},
  ],
  TCP: [
    {q:"Under the check-the-box regulations, a single-member LLC is treated as a _____ by default.",choices:["C Corporation","S Corporation","Disregarded entity (sole proprietorship)","Partnership"],correct:2,exp:"A domestic single-member LLC is treated as a disregarded entity (ignored for tax purposes) by default. The owner reports income/expenses directly on their return unless an election is made."},
    {q:"The built-in gains (BIG) tax applies to S corporations that:",choices:["Have losses in the first year","Were previously C corporations and converted to S status, then dispose of appreciated assets within the recognition period","Have more than 100 shareholders","Distribute earnings in excess of AAA"],correct:1,exp:"The BIG tax (Section 1374) applies to net recognized built-in gains from assets held at S election date, when the disposition occurs within 5 years of the S election (the recognition period)."},
    {q:"A corporation has a $100,000 charitable contribution. Its taxable income before the deduction is $500,000. What is the deductible amount?",choices:["$100,000","$50,000","$10,000","$25,000"],correct:1,exp:"Corporate charitable contributions are limited to 10% of taxable income before the deduction. 10% × $500,000 = $50,000. The excess $50,000 can be carried forward for 5 years."},
    {q:"Which of the following is included in a corporation's earnings and profits (E&P)?",choices:["Federal income taxes","Capital loss carryovers","Tax-exempt interest income","NOL deductions"],correct:2,exp:"Tax-exempt interest income is included in E&P even though it is excluded from taxable income. E&P measures the corporation's economic ability to pay dividends."},
    {q:"A parent corporation owns 80% of a subsidiary. In a consolidated return, intercompany sales between the companies are:",choices:["Recognized immediately","Eliminated until the goods are sold to a third party","Subject to double taxation","Always taxable at corporate rates"],correct:1,exp:"Intercompany transactions within a consolidated group are deferred (eliminated) until the goods or services are sold to parties outside the group, at which point the deferred gain is recognized."},
    {q:"Under Section 351, no gain or loss is recognized when property is transferred to a corporation if the transferors:",choices:["Transfer property and receive only stock","Control at least 80% of the corporation immediately after the exchange","Both A and B","Neither A nor B — gain is always recognized"],correct:2,exp:"Section 351 non-recognition requires: (1) property is transferred in exchange for stock, and (2) the transferors as a group control (own ≥80% of voting stock and ≥80% of all other stock classes) the corporation immediately after the transfer."},
    {q:"The dividends received deduction (DRD) for a C corporation owning 20% of the distributing corporation is:",choices:["50%","65%","70%","100%"],correct:1,exp:"For corporate shareholders owning ≥20% but <80%, the DRD is 65%. Less than 20% ownership = 50% DRD. 80% or more ownership = 100% DRD (if consolidated return requirements met)."},
    {q:"Which of the following correctly describes the 'accumulated earnings tax'?",choices:["Applies to all C corporations regardless of intent","Is a penalty tax on unreasonable accumulations of earnings beyond the reasonable needs of the business","Applies only to S corporations","Is calculated at 15%"],correct:1,exp:"The accumulated earnings tax (AET) is a 20% penalty tax imposed on C corporations that accumulate earnings beyond the reasonable needs of the business to avoid shareholder dividends."},
    {q:"Under the at-risk rules, a partner may deduct losses only to the extent of:",choices:["Their capital account balance","Their share of partnership liabilities plus cash contributed","Their amount at risk — essentially economic exposure in the activity","Their outside basis only"],correct:2,exp:"The at-risk rules (Section 465) limit loss deductions to the taxpayer's amount at risk — the amount they could actually lose economically. This generally includes cash contributed, adjusted basis of property contributed, and certain borrowed amounts for which the taxpayer is personally liable."},
    {q:"A calendar-year C corporation must file its income tax return by:",choices:["March 15","April 15","March 15 with 6-month extension available","April 15 with 6-month extension available"],correct:3,exp:"C corporations with a December 31 year-end must file by April 15. They may request an automatic 6-month extension (to October 15) by filing Form 7004. However, any tax owed is still due by April 15."},
    {q:"In a stock redemption treated as a dividend (not a sale), the shareholder's basis in the redeemed shares is:",choices:["Lost permanently","Added to the basis of remaining shares","Creates a capital loss deduction","Reduces E&P of the corporation"],correct:1,exp:"When a redemption is recharacterized as a dividend (fails the sale/exchange tests), the redeemed shares' basis transfers to the shareholder's remaining shares (or to related party shares)."},
    {q:"The Section 163(j) limitation on business interest expense deduction is generally limited to:",choices:["30% of adjusted taxable income","50% of adjusted gross income","25% of business income","No limit — all business interest is deductible"],correct:0,exp:"Under Section 163(j), the deduction for net business interest expense is limited to 30% of adjusted taxable income (ATI). Disallowed amounts carry forward indefinitely."},
  ],
};

// Flatten all questions with section tags
const ALL_EXAM_QUESTIONS = Object.entries(EXAM_QUESTIONS).flatMap(([sec,qs])=>qs.map((q,i)=>({...q,section:sec,id:sec+'_'+i})));

let _examSim = {
  active: false,
  section: 'FAR',
  questions: [],
  current: 0,
  answers: {},
  flagged: new Set(),
  startTime: null,
  timeLimit: 240, // minutes
  timerInterval: null,
  phase: 'setup', // setup | active | review
};

function openExamSimulator(){
  if(!isPro()){ openUpgradeModal('Full Exam Simulator'); return; }
  _examSim.phase = 'setup';
  let el = document.getElementById('exam-sim-overlay');
  if(!el){
    el = document.createElement('div');
    el.id = 'exam-sim-overlay';
    el.style.cssText = 'display:none;position:fixed;inset:0;background:var(--bg);z-index:700;overflow-y:auto;animation:fadeIn .2s ease';
    document.body.appendChild(el);
  }
  el.style.display = 'block';
  renderExamSimSetup();
}

function closeExamSimulator(){
  if(_examSim.timerInterval) clearInterval(_examSim.timerInterval);
  _examSim.active = false;
  const el = document.getElementById('exam-sim-overlay');
  if(el) el.style.display = 'none';
  renderTab(); // refresh explore tab
}

function renderExamSimSetup(){
  const el = document.getElementById('exam-sim-overlay'); if(!el) return;
  const history = (S.examSimHistory||[]);
  const secAvg = sec => {
    const runs = history.filter(h=>h.section===sec||sec==='Mixed');
    if(!runs.length) return null;
    return Math.round(runs.reduce((a,b)=>a+b.pct,0)/runs.length);
  };
  const secCard = (sec,icon,color) => {
    const avg = secAvg(sec);
    const qs = sec==='Mixed'?ALL_EXAM_QUESTIONS:EXAM_QUESTIONS[sec]||[];
    return '<div onclick="startExamSim(\''+sec+'\')" style="background:var(--surf);border:2px solid var(--bdr);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .2s;text-align:center" onmouseover="this.style.borderColor=\''+color+'\';this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 8px 24px rgba(0,0,0,.12)\'" onmouseout="this.style.borderColor=\'var(--bdr)\';this.style.transform=\'\';this.style.boxShadow=\'\'">'+'<div style="font-size:32px;margin-bottom:8px">'+icon+'</div>'+'<div style="font-size:18px;font-weight:900;color:'+color+';margin-bottom:4px">'+sec+'</div>'+'<div style="font-size:11px;color:var(--mut);margin-bottom:10px">'+qs.length+' questions</div>'+(avg!==null?'<div style="font-size:13px;font-weight:700;color:'+(avg>=75?'var(--grn)':avg>=60?'var(--amb)':'var(--red)')+'">Avg: '+avg+'%</div>':'<div style="font-size:11px;color:var(--mut)">Not taken yet</div>')+'</div>';
  };
  el.innerHTML =
  '<div style="max-width:700px;margin:0 auto;padding:32px 20px">'+
  '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">'+
  '<div><div style="font-size:24px;font-weight:900">🎯 Exam Simulator</div><div style="font-size:13px;color:var(--mut);margin-top:3px">Practice CPA-style MCQs with instant feedback and scoring</div></div>'+
  '<button onclick="closeExamSimulator()" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)">← Back</button>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px">'+
  secCard('FAR','📊','#ef4444')+
  secCard('AUD','🔍','#4f8ef7')+
  secCard('REG','⚖️','#10b981')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px">'+
  secCard('TCP','🧮','#14b8a6')+
  secCard('Mixed','🎲','#a855f7')+
  '</div>'+
  (history.length?
  '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:20px">'+
  '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:12px">Recent Results</div>'+
  history.slice(-5).reverse().map(h=>'<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)"><span class="badge badge-'+h.section+'" style="flex-shrink:0">'+h.section+'</span><div style="flex:1;font-size:12px;color:var(--sub)">'+h.correct+'/'+h.total+' correct · '+new Date(h.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div><span style="font-size:16px;font-weight:900;color:'+(h.pct>=75?'var(--grn)':h.pct>=60?'var(--amb)':'var(--red)')+'">'+h.pct+'%</span></div>').join('')+
  '</div>':'');
}

function startExamSim(section){
  const qs = section==='Mixed'
    ? [...ALL_EXAM_QUESTIONS].sort(()=>Math.random()-.5).slice(0,20)
    : (EXAM_QUESTIONS[section]||[]).map((q,i)=>({...q,section,id:section+'_'+i}));
  _examSim = {
    active: true, section, questions: qs, current: 0,
    answers: {}, flagged: new Set(),
    startTime: Date.now(), timeLimit: section==='Mixed'?30:60,
    timerInterval: null, phase: 'active'
  };
  renderExamSimActive();
  _examSim.timerInterval = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-_examSim.startTime)/1000);
    const remaining = _examSim.timeLimit*60 - elapsed;
    if(remaining<=0){ clearInterval(_examSim.timerInterval); submitExamSim(); return; }
    const el = document.getElementById('exam-timer');
    if(el){
      const m=Math.floor(remaining/60), s=remaining%60;
      el.textContent = m+':'+String(s).padStart(2,'0');
      el.style.color = remaining<300?'var(--red)':remaining<600?'var(--amb)':'var(--grn)';
    }
  },1000);
}

  const el = document.getElementById('exam-sim-overlay'); if(!el) return;

  const q = questions[current];
  const total = questions.length;
  const answered = Object.keys(answers).length;
  const secColor = {FAR:'#ef4444',AUD:'#4f8ef7',REG:'#10b981',TCP:'#14b8a6',Mixed:'#a855f7'}[section]||'#6366f1';
  const isFlagged = flagged.has(current);
  const choiceLetters = ['A','B','C','D'];

  el.innerHTML =
  '<div style="max-width:740px;margin:0 auto;padding:20px 16px">'+
  // Header
  '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">'+
  '<span class="badge badge-'+section+'" style="font-size:11px">'+section+'</span>'+
  '<div style="flex:1;font-size:12px;color:var(--mut)">Question '+(current+1)+' of '+total+' · '+answered+' answered · '+flagged.size+' flagged</div>'+
  '<div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:7px 14px"><span>⏱</span><span id="exam-timer" style="color:var(--grn);font-variant-numeric:tabular-nums">'+timeLimit+':00</span></div>'+
  '<button onclick="if(confirm(\'Submit now with '+answered+'/'+total+' answered?\'))submitExamSim()" style="background:var(--grn);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer">Submit</button>'+
  '<button onclick="closeExamSimulator()" style="background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mut)">✕ Exit</button>'+
  '</div>'+
  // Progress bar
  '<div style="height:4px;background:var(--surf2);border-radius:4px;margin-bottom:20px;overflow:hidden"><div style="height:100%;width:'+(answered/total*100)+'%;background:'+secColor+';border-radius:4px;transition:width .3s"></div></div>'+
  // Question panel
  '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:24px 26px;margin-bottom:14px">'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'+
  '<div style="font-size:11px;font-weight:700;color:'+secColor+';text-transform:uppercase;letter-spacing:.08em">Multiple Choice</div>'+
  '<button onclick="toggleExamFlag('+current+')" style="background:'+(isFlagged?'var(--amb-bg)':'var(--surf2)')+';border:1px solid '+(isFlagged?'var(--amb)':'var(--bdr)')+';border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;color:'+(isFlagged?'var(--amb)':'var(--mut)')+'">🚩 '+(isFlagged?'Flagged':'Flag')+' for Review</button>'+
  '</div>'+
  '<div style="font-size:15px;font-weight:600;line-height:1.6;margin-bottom:20px;color:var(--txt)">'+q.q+'</div>'+
  q.choices.map((c,i)=>'<div onclick="selectExamAnswer('+current+','+i+')" style="display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:2px solid '+(answers[current]===i?secColor:'var(--bdr)')+';background:'+(answers[current]===i?secColor+'14':'var(--surf2)')+';border-radius:11px;margin-bottom:9px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor=\''+secColor+'\'" onmouseout="this.style.borderColor=\''+(answers[current]===i?secColor:'var(--bdr)')+'\'"><span style="width:24px;height:24px;border-radius:50%;background:'+(answers[current]===i?secColor:'var(--bdr)')+';color:'+(answers[current]===i?'#fff':'var(--sub)')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">'+choiceLetters[i]+'</span><span style="font-size:13px;line-height:1.5;color:var(--txt);padding-top:2px">'+c+'</span></div>').join('')+
  '</div>'+
  // Navigation
  '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(32px,1fr));gap:5px;margin-bottom:16px">'+
  questions.map((_,i)=>'<button onclick="jumpExamQuestion('+i+')" style="height:32px;border-radius:7px;border:1.5px solid '+(i===current?secColor:flagged.has(i)?'var(--amb)':answers[i]!==undefined?secColor+'66':'var(--bdr)')+';background:'+(i===current?secColor:answers[i]!==undefined?secColor+'22':'transparent')+';cursor:pointer;font-size:10px;font-weight:700;color:'+(i===current?'#fff':answers[i]!==undefined?secColor:'var(--mut)')+'">'+( i+1)+'</button>').join('')+

  // Prev/Next
  '<div style="display:flex;gap:10px">'+
  '<button onclick="jumpExamQuestion('+(Math.max(0,current-1))+')" '+(current===0?'disabled style="opacity:.3"':'')+' style="flex:1;padding:12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">← Previous</button>'+
