function selectExamAnswer(qIdx, choiceIdx){
  _examSim.answers[qIdx] = choiceIdx;
  renderExamSimActive();
}

function toggleExamFlag(qIdx){
  if(_examSim.flagged.has(qIdx)) _examSim.flagged.delete(qIdx);
  else _examSim.flagged.add(qIdx);
  renderExamSimActive();
}

function jumpExamQuestion(idx){
  _examSim.current = idx;
  renderExamSimActive();
}

function submitExamSim(){
  if(_examSim.timerInterval) clearInterval(_examSim.timerInterval);
  _examSim.phase = 'review';
  const {questions, answers, section, startTime} = _examSim;
  const total = questions.length;
  const correct = questions.filter((q,i)=>answers[i]===q.correct).length;
  const pct = Math.round(correct/total*100);
  const timeTaken = Math.round((Date.now()-startTime)/1000);
  const tm = Math.floor(timeTaken/60)+'m '+( timeTaken%60)+'s';
  // Save to history
  if(!S.examSimHistory) S.examSimHistory=[];
  S.examSimHistory.push({section,correct,total,pct,timeTaken,date:Date.now()});
  saveState();
  renderExamSimResults(correct,total,pct,tm);
}

function renderExamSimResults(correct,total,pct,tm){
  const el = document.getElementById('exam-sim-overlay'); if(!el) return;
  const {questions,answers,section} = _examSim;
  const secColor = {FAR:'#ef4444',AUD:'#4f8ef7',REG:'#10b981',TCP:'#14b8a6',Mixed:'#a855f7'}[section]||'#6366f1';
  const grade = pct>=75?{label:'PASS',color:'var(--grn)',icon:'🎉'}:pct>=60?{label:'CLOSE',color:'var(--amb)',icon:'📈'}:{label:'NEEDS WORK',color:'var(--red)',icon:'📚'};
  const choiceLetters=['A','B','C','D'];

  el.innerHTML =
  '<div style="max-width:740px;margin:0 auto;padding:32px 16px">'+
  // Score hero
  '<div style="background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:20px;padding:32px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden">'+
  '<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,.35),transparent 55%)"></div>'+
  '<div style="position:relative;z-index:1">'+
  '<div style="font-size:48px;margin-bottom:10px">'+grade.icon+'</div>'+
  '<div style="font-size:64px;font-weight:900;color:'+grade.color+';line-height:1;letter-spacing:-3px">'+pct+'%</div>'+
  '<div style="font-size:16px;font-weight:800;color:'+grade.color+';margin-top:4px;text-transform:uppercase;letter-spacing:.1em">'+grade.label+'</div>'+
  '<div style="color:rgba(255,255,255,.6);font-size:13px;margin-top:8px">'+correct+' of '+total+' correct · '+tm+'</div>'+
  '<div style="display:flex;justify-content:center;gap:20px;margin-top:18px">'+
  '<div style="text-align:center"><div style="font-size:22px;font-weight:900;color:#fff">'+correct+'</div><div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase">Correct</div></div>'+
  '<div style="text-align:center"><div style="font-size:22px;font-weight:900;color:var(--red)">'+(total-correct)+'</div><div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase">Incorrect</div></div>'+
  '<div style="text-align:center"><div style="font-size:22px;font-weight:900;color:var(--amb)">'+(total-Object.keys(answers).length)+'</div><div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase">Unanswered</div></div>'+
  '</div>'+
  '</div>'+
  '</div>'+
  // Action buttons
  '<div style="display:flex;gap:10px;margin-bottom:24px">'+
  '<button onclick="startExamSim(\''+section+'\')" style="flex:1;padding:13px;background:'+secColor+';color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer">↺ Retake '+section+'</button>'+
  '<button onclick="renderExamSimSetup()" style="flex:1;padding:13px;background:var(--surf);border:1px solid var(--bdr);border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">Choose Section</button>'+
  '<button onclick="closeExamSimulator()" style="padding:13px 20px;background:var(--surf2);border:1px solid var(--bdr);border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mut)">Exit</button>'+
  '</div>'+
  // Review all questions
  '<div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:12px">Answer Review</div>'+
  questions.map((q,i)=>{
    const userAns = answers[i];
    const isCorrect = userAns===q.correct;
    const unanswered = userAns===undefined;
    return '<div style="background:var(--surf);border:1px solid '+(isCorrect?'var(--grn)':unanswered?'var(--bdr)':'var(--red)')+';border-left:4px solid '+(isCorrect?'var(--grn)':unanswered?'var(--mut)':'var(--red)')+';border-radius:12px;padding:18px 20px;margin-bottom:12px">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
    '<span style="background:'+(isCorrect?'var(--grn)':unanswered?'var(--mut)':'var(--red)')+';color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">'+(isCorrect?'✓':unanswered?'—':'✗')+'</span>'+
    '<span style="font-size:11px;font-weight:700;color:var(--mut)">Q'+(i+1)+' · '+q.section+'</span>'+
    '</div>'+
    '<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:12px;line-height:1.5">'+q.q+'</div>'+
    q.choices.map((c,ci)=>'<div style="display:flex;gap:9px;align-items:flex-start;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:'+(ci===q.correct?'var(--grn-bg)':ci===userAns&&!isCorrect?'var(--red-bg)':'transparent')+';border:1px solid '+(ci===q.correct?'rgba(16,185,129,.35)':ci===userAns&&!isCorrect?'rgba(239,68,68,.3)':'transparent')+'">'+'<span style="font-size:11px;font-weight:800;color:'+(ci===q.correct?'var(--grn)':ci===userAns&&!isCorrect?'var(--red)':'var(--mut)')+';flex-shrink:0;margin-top:1px">'+choiceLetters[ci]+'</span>'+'<span style="font-size:12px;color:var(--sub);line-height:1.4">'+c+'</span>'+(ci===q.correct?'<span style="margin-left:auto;font-size:10px;font-weight:800;color:var(--grn);flex-shrink:0">✓ Correct</span>':ci===userAns&&!isCorrect?'<span style="margin-left:auto;font-size:10px;font-weight:800;color:var(--red);flex-shrink:0">Your answer</span>':'')+'</div>').join('')+
    '<div style="margin-top:10px;padding:10px 12px;background:var(--ind-bg);border:1px solid rgba(99,102,241,.2);border-radius:8px;font-size:11px;color:var(--ind);line-height:1.6"><strong>Explanation:</strong> '+q.exp+'</div>'+
    '</div>';
  }).join('')+
  '</div>';
}

// ═══════════════════════════════════════════════
// MOBILE BOTTOM NAV
// ═══════════════════════════════════════════════
function injectMobileNav(){
  if(document.getElementById('mobile-nav'))return;
  const nav=document.createElement('div');
  nav.id='mobile-nav';
  nav.style.cssText='display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);z-index:200;padding:6px 0 env(safe-area-inset-bottom,6px)';
  nav.innerHTML=`<div style="display:flex;justify-content:space-around">
    ${[{id:'feed',icon:'🏠',label:'Feed'},{id:'dashboard',icon:'📊',label:'Dash'},{id:'profile',icon:'👤',label:'Profile'},{id:'explore',icon:'🔍',label:'Explore'},{id:'tips',icon:'💡',label:'Tips'}].map(t=>`
    <button onclick="switchTab('${t.id}')" data-mnav="${t.id}" style="background:none;border:none;cursor:pointer;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--mut);font-size:11px;font-weight:600;border-radius:8px">
      <span style="font-size:20px">${t.icon}</span>${t.label}
    </button>`).join('')}
  </div>`;
  document.body.appendChild(nav);
  const style=document.createElement('style');
  style.textContent='@media(max-width:640px){#mobile-nav{display:block!important}.page{padding-bottom:100px!important}}';
  document.head.appendChild(style);
}
injectMobileNav();

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
