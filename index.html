  ISC: [
    {q:'The CIA triad in information security stands for:',choices:['Control, Integrity, Authentication','Confidentiality, Integrity, Availability','Compliance, Integration, Access','Certification, Identity, Authorization'],correct:1,exp:'CIA: Confidentiality (protect from unauthorized access), Integrity (ensure accuracy/completeness), Availability (ensure timely access).'},
    {q:'A SOC 1 report focuses on:',choices:['Customer data security posture','Internal controls relevant to user entities\' financial reporting','IT infrastructure performance metrics','Third-party vendor management'],correct:1,exp:'SOC 1 (SSAE 18) reports on internal controls relevant to the user entity\'s financial reporting.'},
    {q:'Which is a preventive control?',choices:['Audit trail logging','Exception reporting','Password complexity policy','Daily reconciliation reports'],correct:2,exp:'Password policies prevent unauthorized access (preventive). Audit trails and exception reports are detective controls.'},
    {q:'Encryption at rest protects data:',choices:['While transmitted over a network','Stored on disk, database, or other storage media','In active memory during processing','During backup transmission'],correct:1,exp:'Encryption at rest protects stored data; encryption in transit protects data moving across networks.'},
    {q:'Segregation of duties prevents:',choices:['System downtime','One person from initiating, authorizing, and recording the same transaction','Network security breaches','Database corruption'],correct:1,exp:'SoD ensures no single person can both authorize and record a transaction, reducing fraud and error risk.'},
    {q:'A general IT control differs from an application control because it:',choices:['Applies to one specific application only','Is performed manually','Applies across the overall IT environment supporting multiple applications','Requires end-user interaction'],correct:2,exp:'General IT controls (access management, change control, operations) apply across the IT environment. Application controls are specific to individual systems.'},
    {q:'Multi-factor authentication (MFA) requires:',choices:['Two different passwords','Something you know + something you have or are (two or more independent factors)','Biometrics only','PIN plus password (both knowledge factors)'],correct:1,exp:'MFA combines two or more factor types: knowledge (password), possession (token/phone), or inherence (biometric).'},
    {q:'A SQL injection attack exploits:',choices:['Weak network firewall configuration','Unsanitized user input fields in database-connected applications','Physical access to database servers','Social engineering of database administrators'],correct:1,exp:'SQL injection inserts malicious code through input fields, potentially allowing attackers to read, modify, or delete database content.'},
    {q:'Change management controls ensure that:',choices:['Users cannot change their own passwords','System changes are authorized, tested in non-production, and documented before deployment','Daily backups run without fail','Access logs are reviewed monthly'],correct:1,exp:'IT change management ensures all changes are properly authorized, tested, documented, and approved before going into production.'},
    {q:'A SOC 2 report evaluates controls related to:',choices:['Financial statement controls only','Security, availability, processing integrity, confidentiality, and/or privacy (Trust Service Criteria)','Physical facility security','Hardware and network performance'],correct:1,exp:'SOC 2 reports assess controls against the AICPA Trust Service Criteria: security, availability, processing integrity, confidentiality, privacy.'},
    {q:'RPO (Recovery Point Objective) defines:',choices:['How quickly systems must be restored after failure','The maximum acceptable amount of data loss, measured in time','The cost of the recovery process','The number of staff needed for recovery operations'],correct:1,exp:'RPO defines the maximum acceptable data loss measured in time (e.g., "we can tolerate losing up to 4 hours of data").'},
    {q:'An intrusion detection system (IDS) is classified as which type of control?',choices:['Preventive','Detective','Corrective','Compensating'],correct:1,exp:'An IDS detects and alerts on suspicious activity \u2014 it is a detective control, not preventive.'},
    {q:'Data masking is used to:',choices:['Encrypt data in transit between systems','Replace sensitive production data with realistic but fictitious data for non-production use','Create daily backups of production data','Monitor who accesses sensitive records'],correct:1,exp:'Data masking substitutes real sensitive data with realistic test data, allowing development/testing without exposing production data.'},
    {q:'The purpose of a disaster recovery plan (DRP) is to:',choices:['Prevent all system failures from occurring','Restore IT operations and systems to a functional state after a disruption','Train users on new applications','Ensure SOX compliance'],correct:1,exp:'A DRP outlines the steps to restore IT systems, applications, and data after a disaster or significant disruption.'},
    {q:'RTO (Recovery Time Objective) defines:',choices:['Maximum acceptable data loss','The maximum tolerable downtime \u2014 how quickly systems must be restored','Cost to restore systems','Data backup frequency'],correct:1,exp:'RTO is the maximum acceptable time to restore systems after a failure. RPO covers data loss; RTO covers downtime.'},
    {q:'A phishing attack primarily targets:',choices:['Network infrastructure vulnerabilities','Human users through deceptive messages to steal credentials','Database servers directly','Physical security perimeters'],correct:1,exp:'Phishing exploits human psychology by tricking users into revealing credentials or installing malware via deceptive emails/messages.'},
    {q:'A business continuity plan (BCP) differs from a DRP in that a BCP:',choices:['Focuses only on IT systems','Addresses the continuation of ALL critical business functions, not just IT','Is required only by public companies','Covers only natural disaster scenarios'],correct:1,exp:'A BCP covers all critical business processes (people, facilities, suppliers, communications), while a DRP focuses specifically on IT system recovery.'},
    {q:'Which is a characteristic of a hot site in disaster recovery?',choices:['An empty facility with power and connectivity only','A facility with some equipment but no current data','A fully equipped, live-data backup facility that can be activated immediately','A mobile data center on a truck'],correct:2,exp:'A hot site is a fully operational backup facility with mirrored data that can take over operations almost immediately. Cold sites have space/utilities; warm sites have some equipment.'},
    {q:'COBIT (Control Objectives for Information and Related Technologies) is primarily a framework for:',choices:['Network security protocols','IT governance and management of enterprise IT','Software development methodologies','Cloud infrastructure management'],correct:1,exp:'COBIT is a framework created by ISACA for IT governance, enabling organizations to align IT strategy with business goals and manage IT risks and resources.'},
    {q:'A key control for preventing unauthorized access to a database would be:',choices:['Daily backup procedures','Role-based access control (RBAC) limiting access by job function','Antivirus software on workstations','Regular server hardware maintenance'],correct:1,exp:'Role-based access control (RBAC) restricts database access based on defined job roles, ensuring employees can only access data necessary for their function.'},
    {q:'Penetration testing (pen testing) is a security practice that:',choices:['Monitors network traffic in real time','Simulates cyberattacks to identify and exploit vulnerabilities before attackers do','Updates software patches across all systems','Trains employees to identify phishing attempts'],correct:1,exp:'Pen testing involves authorized simulated attacks to discover and exploit security vulnerabilities before malicious actors can.'},
    {q:'Which of the following BEST describes a zero-day exploit?',choices:['An attack using outdated malware','A vulnerability that is unknown to the software vendor and has no patch available','A denial-of-service attack','An attack occurring on the first day of system deployment'],correct:1,exp:'A zero-day exploit targets a vulnerability that is unknown to the vendor (zero days of patch availability), making it especially dangerous.'},
    {q:'Under NIST\'s Cybersecurity Framework, the five core functions are:',choices:['Plan, Test, Deploy, Monitor, Respond','Identify, Protect, Detect, Respond, Recover','Assess, Plan, Implement, Review, Report','Audit, Control, Monitor, Remediate, Document'],correct:1,exp:'The NIST CSF\'s five functions: Identify (understand risks), Protect (implement safeguards), Detect (identify events), Respond (act on incidents), Recover (restore capabilities).'},
    {q:'The concept of "least privilege" in access control means:',choices:['All users get the same minimum level of access','Users are granted only the permissions necessary to perform their job functions','Admin accounts are shared to minimize user counts','Access is granted only during business hours'],correct:1,exp:'Least privilege: users get the minimum access rights needed to perform their duties, reducing the attack surface and limiting damage from compromised accounts.'},
    {q:'Data integrity controls ensure that:',choices:['Data is confidential and encrypted','Data is accurate, complete, and has not been altered without authorization','Data is available 24/7','Data is backed up hourly'],correct:1,exp:'Data integrity controls detect and prevent unauthorized modification of data, ensuring it remains accurate and complete throughout its lifecycle.'},
    {q:'An audit log (audit trail) is an example of which type of control?',choices:['Preventive','Detective','Corrective','Directive'],correct:1,exp:'Audit logs are detective controls \u2014 they record events so that unauthorized activity can be identified and investigated after the fact.'},
    {q:'Tokenization replaces sensitive data (e.g., credit card numbers) with:',choices:['Encrypted versions of the original data','A non-sensitive placeholder (token) with no exploitable mathematical relationship to the original','A hash of the original data','Compressed data'],correct:1,exp:'Tokenization substitutes sensitive data with a random, non-sensitive token stored in a token vault. Unlike encryption, tokens have no mathematical relationship to the original data.'},
    {q:'The COSO Internal Control framework\'s five components are:',choices:['Plan, Act, Check, Do, Review','Control Environment, Risk Assessment, Control Activities, Information & Communication, Monitoring','Identify, Assess, Control, Monitor, Improve','Governance, Risk, Compliance, Audit, Technology'],correct:1,exp:'COSO 2013: Control Environment, Risk Assessment, Control Activities, Information & Communication, and Monitoring Activities.'},
    {q:'Which type of malware encrypts a victim\'s files and demands payment for decryption?',choices:['Spyware','Ransomware','Adware','Trojan horse'],correct:1,exp:'Ransomware encrypts files or locks systems, demanding ransom (usually cryptocurrency) for decryption keys. It\'s one of the most prevalent cyber threats today.'},
    {q:'The primary risk addressed by a data loss prevention (DLP) solution is:',choices:['Malware infiltration','Unauthorized transfer or exfiltration of sensitive data outside the organization','System availability during attacks','Credential theft'],correct:1,exp:'DLP solutions monitor, detect, and block the unauthorized transfer or exfiltration of sensitive data, protecting against insider threats and accidental data leakage.'},
  ],
}

// ── Quiz engine state ──
let _quiz = {
  active: false,
  section: null,
  type: null,
  questions: [],
  current: 0,
  selected: null,
  answered: false,
  score: 0,
  timerInterval: null,
  timeLeft: 0,
  results: [],
};

function openQuizModal(section, type) {
  if (!isPro() && type !== 'mcq') { openUpgradeModal('Question Bank — ' + type); return; }

  const allQs = QB_QUESTIONS[section] || [];
  if (!allQs.length) { showToast('Questions coming soon for ' + section, 'info'); return; }

  // Build question set based on type
  let qs = [];
  if (type === 'mcq') {
    qs = isPro() ? [...allQs] : allQs.slice(0, 5);
  } else if (type === 'timed') {
    qs = [...allQs].sort(function(){ return Math.random() - 0.5; }).slice(0, 10);
  } else if (type === 'random') {
    qs = [...allQs].sort(function(){ return Math.random() - 0.5; });
  } else if (type === 'sims') {
    // SIMs: show 3 scenario-based questions with explanation focus
    qs = [...allQs].filter(function(_,i){ return i%3===0; }).slice(0,5);
  }

  _quiz = {
    active: true, section, type,
    questions: qs, current: 0,
    selected: null, answered: false,
    score: 0, timerInterval: null,
    timeLeft: type === 'timed' ? qs.length * 60 : 0,
    results: [],
  };

  let overlay = document.getElementById('quiz-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'quiz-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:700;overflow-y:auto;animation:fadeIn .2s ease';
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'block';
  _renderQuiz();

  if (type === 'timed') {
    _quiz.timerInterval = setInterval(function() {
      _quiz.timeLeft--;
      const el = document.getElementById('quiz-timer');
      if (el) {
        const m = Math.floor(_quiz.timeLeft / 60), s = _quiz.timeLeft % 60;
        el.textContent = m + ':' + String(s).padStart(2,'0');
        el.style.color = _quiz.timeLeft < 60 ? 'var(--red)' : _quiz.timeLeft < 180 ? 'var(--amb)' : 'var(--grn)';
      }
      if (_quiz.timeLeft <= 0) { clearInterval(_quiz.timerInterval); _finishQuiz(); }
    }, 1000);
  }
}

function closeQuizOverlay() {
  if (_quiz.timerInterval) clearInterval(_quiz.timerInterval);
  _quiz.active = false;
  const overlay = document.getElementById('quiz-overlay');
  if (overlay) overlay.style.display = 'none';
}

function _renderQuiz() {
  const overlay = document.getElementById('quiz-overlay');
  if (!overlay) return;
  const { section, type, questions, current, selected, answered, score, timeLeft } = _quiz;
  const q = questions[current];
  const total = questions.length;
  const sec = QB_SECTIONS.find(function(s){ return s.code === section; });
  const color = sec ? sec.color : '#6366f1';
  const choiceLetters = ['A','B','C','D'];
  const typeLabels = {mcq:'MCQ Practice', sims:'Task-Based SIMs', timed:'Timed Set', random:'Random Quiz'};
  const pct = total > 0 ? Math.round(current / total * 100) : 0;

  const timerHTML = type === 'timed'
    ? '<div style="display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px"><span>⏱</span><span id="quiz-timer" style="font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--grn)">' + Math.floor(timeLeft/60) + ':' + String(timeLeft%60).padStart(2,'0') + '</span></div>'
    : '';

  const choicesHTML = q.choices.map(function(c, i) {
    let bg = 'var(--surf2)', border = '2px solid var(--bdr)', txtColor = 'var(--txt)', badge = '';
    if (answered) {
      if (i === q.correct) { bg = 'var(--grn-bg)'; border = '2px solid var(--grn)'; badge = '<span style="margin-left:auto;font-size:11px;font-weight:800;color:var(--grn);flex-shrink:0">✓ Correct</span>'; }
      else if (i === selected && i !== q.correct) { bg = 'var(--red-bg)'; border = '2px solid var(--red)'; badge = '<span style="margin-left:auto;font-size:11px;font-weight:800;color:var(--red);flex-shrink:0">✗ Wrong</span>'; }
      else { border = '2px solid var(--bdr)'; }
    } else if (i === selected) {
      bg = color + '15'; border = '2px solid ' + color;
    }
    const click = answered ? '' : 'onclick="_selectAnswer(' + i + ')"';
    return '<div ' + click + ' style="display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:' + border + ';background:' + bg + ';border-radius:11px;margin-bottom:9px;cursor:' + (answered?'default':'pointer') + ';transition:all .15s">' +
      '<span style="width:26px;height:26px;border-radius:50%;background:' + (i===selected&&!answered ? color : answered&&i===q.correct ? 'var(--grn)' : answered&&i===selected ? 'var(--red)' : 'var(--bdr2)') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">' + choiceLetters[i] + '</span>' +
      '<span style="font-size:13px;line-height:1.55;color:' + txtColor + ';padding-top:3px;flex:1">' + c + '</span>' +
      badge +
    '</div>';
  }).join('');

  const expHTML = answered
    ? '<div style="background:var(--ind-bg);border:1px solid rgba(90,95,207,.25);border-radius:10px;padding:14px 16px;margin-top:4px">' +
        '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ind);margin-bottom:6px">📖 Explanation</div>' +
        '<div style="font-size:13px;color:var(--sub);line-height:1.65">' + q.exp + '</div>' +
      '</div>'
    : '';

  const actionBtn = answered
    ? (current < total - 1
        ? '<button onclick="_nextQuestion()" style="flex:1;padding:13px;background:' + color + ';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer">Next Question →</button>'
        : '<button onclick="_finishQuiz()" style="flex:1;padding:13px;background:var(--grn);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer">🎉 See Results</button>'
      )
    : '<button onclick="_submitAnswer()" style="flex:1;padding:13px;background:' + (selected===null?'var(--bdr)':'var(--ind)') + ';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer" ' + (selected===null?'disabled':'') + '>Submit Answer</button>';

  overlay.innerHTML =
    '<div style="max-width:720px;margin:0 auto;padding:24px 16px 80px">' +
    // Header
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">' +
      '<button onclick="closeQuizOverlay()" style="padding:8px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)">← Back</button>' +
      '<span class="badge badge-' + section + '" style="font-size:12px;padding:4px 10px">' + section + '</span>' +
      '<div style="font-size:13px;font-weight:700;color:var(--sub);flex:1">' + typeLabels[type] + '</div>' +
      timerHTML +
      '<div style="font-size:12px;color:var(--mut)">' + (current+1) + ' / ' + total + '</div>' +
    '</div>' +
    // Progress bar
    '<div style="height:5px;background:var(--bdr);border-radius:4px;margin-bottom:24px;overflow:hidden">' +
      '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:4px;transition:width .4s"></div>' +
    '</div>' +
    // Question card
    '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:26px;margin-bottom:16px;box-shadow:var(--shadow-md)">' +
      '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:' + color + ';margin-bottom:12px">Question ' + (current+1) + ' of ' + total + '</div>' +
      '<div style="font-size:16px;font-weight:600;line-height:1.6;color:var(--txt);margin-bottom:22px">' + q.q + '</div>' +
      choicesHTML +
      expHTML +
    '</div>' +
    // Action
    '<div style="display:flex;gap:10px">' +
      actionBtn +
    '</div>' +
    '</div>';
}

function _selectAnswer(idx) {
  if (_quiz.answered) return;
  _quiz.selected = idx;
  _renderQuiz();
}

function _submitAnswer() {
  if (_quiz.selected === null) return;
  _quiz.answered = true;
  const q = _quiz.questions[_quiz.current];
  const correct = _quiz.selected === q.correct;
  if (correct) _quiz.score++;
  _quiz.results.push({ correct, selected: _quiz.selected, correctIdx: q.correct });
  _renderQuiz();
}

function _nextQuestion() {
  _quiz.current++;
  _quiz.selected = null;
  _quiz.answered = false;
  _renderQuiz();
}

function _finishQuiz() {
  if (_quiz.timerInterval) clearInterval(_quiz.timerInterval);
  const { section, score, questions, results, type } = _quiz;
  const total = questions.length;
  const pct = Math.round(score / total * 100);
  const sec = QB_SECTIONS.find(function(s){ return s.code === section; });
  const color = sec ? sec.color : '#6366f1';
  const grade = pct >= 75 ? {label:'Great job!', icon:'🎉', c:'var(--grn)'} : pct >= 55 ? {label:'Keep pushing', icon:'📈', c:'var(--amb)'} : {label:'Keep studying', icon:'📚', c:'var(--red)'};

  // Save progress
  S.qbProgress = S.qbProgress || {};
  S.qbProgress[section] = S.qbProgress[section] || {mcqDone:0, simsDone:0};
  if (type === 'sims') S.qbProgress[section].simsDone = (S.qbProgress[section].simsDone||0) + score;
  else S.qbProgress[section].mcqDone = Math.min((S.qbProgress[section].mcqDone||0) + total, 9999);
  saveState();

  const overlay = document.getElementById('quiz-overlay');
  if (!overlay) return;

  const reviewRows = questions.map(function(q, i) {
    const r = results[i] || {};
    const letters = ['A','B','C','D'];
    return '<div style="padding:14px 0;border-bottom:1px solid var(--bdr)">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        '<span style="width:22px;height:22px;border-radius:50%;background:' + (r.correct?'var(--grn)':'var(--red)') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">' + (r.correct?'✓':'✗') + '</span>' +
        '<span style="font-size:12px;color:var(--sub)">Q' + (i+1) + '</span>' +
      '</div>' +
      '<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:8px;line-height:1.5">' + q.q + '</div>' +
      '<div style="font-size:12px;color:' + (r.correct?'var(--grn)':'var(--red)') + ';font-weight:700;margin-bottom:4px">' + (r.correct?'Your answer: ':'You chose: ') + letters[r.selected!==undefined?r.selected:r.correctIdx] + ' — ' + q.choices[r.selected!==undefined?r.selected:r.correctIdx] + '</div>' +
      (!r.correct && r.selected !== undefined ? '<div style="font-size:12px;color:var(--grn);font-weight:700;margin-bottom:6px">Correct: ' + letters[q.correct] + ' — ' + q.choices[q.correct] + '</div>' : '') +
      '<div style="font-size:11px;color:var(--sub);background:var(--ind-bg);border-radius:7px;padding:9px 12px;line-height:1.6">' + q.exp + '</div>' +
    '</div>';
  }).join('');

  overlay.innerHTML =
    '<div style="max-width:720px;margin:0 auto;padding:32px 16px 80px">' +
    // Score hero
    '<div style="background:linear-gradient(155deg,#0e0804,#1c1008,#0e0804);border-radius:20px;padding:36px 28px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden">' +
      '<div style="position:absolute;inset:0;background:radial-gradient(ellipse at -10% 65%,rgba(212,64,0,.6),transparent 50%),radial-gradient(ellipse at 100% 0%,rgba(90,95,207,.2),transparent 40%)"></div>' +
      '<div style="position:relative;z-index:1">' +
        '<div style="font-size:44px;margin-bottom:10px">' + grade.icon + '</div>' +
        '<div style="font-size:68px;font-weight:900;color:' + grade.c + ';line-height:1;letter-spacing:-3px">' + pct + '%</div>' +
        '<div style="font-size:16px;font-weight:800;color:' + grade.c + ';margin-top:6px">' + grade.label + '</div>' +
        '<div style="color:rgba(255,255,255,.6);font-size:13px;margin-top:8px">' + score + ' of ' + total + ' correct</div>' +
      '</div>' +
    '</div>' +
    // Actions
    '<div style="display:flex;gap:10px;margin-bottom:24px">' +
      '<button onclick="openQuizModal(\'' + section + '\',\'' + type + '\')" style="flex:1;padding:12px;background:' + color + ';color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer">↺ Retry</button>' +
      '<button onclick="closeQuizOverlay()" style="flex:1;padding:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">← Back to Question Bank</button>' +
    '</div>' +
    // Review
    '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:20px 22px">' +
      '<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:4px">Answer Review</div>' +
      reviewRows +
    '</div>' +
    '</div>';
}

function openQBSection(code) {
  const sec = QB_SECTIONS.find(function(s){ return s.code === code; });
  if (!sec) return;
  const pro = isPro();
  const prog = (S.qbProgress || {})[code] || {mcqDone:0, simsDone:0};

  let overlay = document.getElementById('qb-section-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'qb-section-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:650;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
    overlay.addEventListener('click', function(e){ if(e.target===overlay) closeQBSection(); });
    document.body.appendChild(overlay);
  }

  const modes = [
    {type:'mcq',    icon:'\u{1F4DD}', label:'MCQ Practice',      desc: pro ? 'Work through all ' + sec.mcqTotal + '+ questions' : 'Try 5 free questions', free:true},
    {type:'random', icon:'\u{1F500}', label:'Random Quiz',        desc:'Shuffled questions, any order',  free:false},
    {type:'timed',  icon:'\u23F1', label:'Timed Set',          desc:'10 questions, beat the clock',   free:false},

  const modeCards = modes.map(function(m) {

      'onmouseover="if(' + (!locked) + '){this.style.borderColor=\'' + sec.color + '\';this.style.background=\'' + sec.color + '12\'}" ' +
      'onmouseout="this.style.borderColor=\'var(--bdr)\';this.style.background=\'var(--surf2)\'">' +
      '<span style="font-size:24px;width:36px;text-align:center;flex-shrink:0">' + m.icon + '</span>' +
      '<div style="flex:1">' +
        '<div style="font-size:14px;font-weight:700;color:' + (locked ? 'var(--mut)' : 'var(--txt)') + '">' + m.label + (locked ? ' <span style="font-size:10px;font-weight:800;color:var(--ora);background:var(--ora-bg);padding:2px 7px;border-radius:20px;margin-left:4px">PRO</span>' : '') + '</div>' +
        '<div style="font-size:12px;color:var(--mut);margin-top:2px">' + m.desc + '</div>' +
      '</div>' +
      '<span style="font-size:18px;color:' + (locked ? 'var(--bdr2)' : sec.color) + '">' + (locked ? '\uD83D\uDD12' : '\u203A') + '</span>' +
    '</div>';
  }).join('');

  const pct = Math.min(100, Math.round((prog.mcqDone || 0) / sec.mcqTotal * 100));

  overlay.innerHTML =
    '<div style="background:var(--surf);border-radius:20px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden">' +
    // Header
    '<div style="background:' + sec.color + ';padding:24px 24px 20px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<span style="font-size:13px;font-weight:900;color:#fff;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;letter-spacing:.02em">' + code + '</span>' +
        '</div>' +
        '<button onclick="closeQBSection()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">\u00d7</button>' +

let _prRange = 7; // 7 or 30

function openProgressReport() {
  let el = document.getElementById('progress-report-modal');
  if (!el) {
    el = document.createElement('div');
    el.id = 'progress-report-modal';
    el.style.cssText = 'display:none;position:fixed;inset:0;background:var(--bg);z-index:600;overflow-y:auto';
    document.body.appendChild(el);
  }
  el.style.display = 'block';
  renderProgressReport();
}

function closeProgressReport() {
  const el = document.getElementById('progress-report-modal');
  if (el) el.style.display = 'none';
}

function renderProgressReport() {
  const el = document.getElementById('progress-report-modal');
  if (!el) return;
  const days = _prRange;
  const cutoff = new Date(Date.now() - days * 86400000);
  const acts = (S.activities || []).filter(function(a){ return new Date(a.date) >= cutoff; });
  const totalHrs = acts.reduce(function(s,a){ return s+(a.hours||0); }, 0);
  const sessions = acts.length;
  const streak = getStreak();
  const sectionsActive = [...new Set(acts.map(function(a){ return a.section; }))].length;

  // 7-day chart
  const today = todayStr();
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0,10);
    const hrs = (S.activities||[]).filter(function(a){ return a.date.slice(0,10)===d; }).reduce(function(s,b){ return s+(b.hours||0); },0);
    last7.push({d, hrs, isToday: d===today, day: new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})});
  }
  const maxHrs = Math.max(...last7.map(function(d){ return d.hrs; }), 1);
  const chartBars = last7.map(function(d) {
    return '<div class="week-bar-wrap">' +
      '<div class="week-bar' + (d.isToday?' today-bar':'') + '" style="height:' + Math.max(4,Math.round(d.hrs/maxHrs*88)) + 'px" title="' + d.hrs.toFixed(1) + 'h"></div>' +
      '<div class="week-day-lbl">' + d.day.slice(0,1) + '</div>' +
    '</div>';
  }).join('');

  // Section breakdown
  const sectionRows = (S.sections || []).map(function(s) {
    const target = getHourGoal(s);
    const logged = getSectionHours(s);
    const rangeHrs = acts.filter(function(a){ return a.section===s; }).reduce(function(sum,a){ return sum+(a.hours||0); },0);
    const pct = Math.min(100, Math.round(logged / target * 100));
    return '<div style="margin-bottom:14px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="badge badge-' + s + '">' + s + '</span>' +
          '<span style="font-size:12px;font-weight:600">' + EXAMS[s].full + '</span>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<span style="font-size:13px;font-weight:800;color:' + EXAMS[s].color + '">' + rangeHrs.toFixed(1) + 'h</span>' +
          '<span style="font-size:10px;color:var(--mut)"> this period · ' + logged + 'h total</span>' +
        '</div>' +
      '</div>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%;background:' + EXAMS[s].color + '"></div></div>' +
      '<div style="font-size:10px;color:var(--mut);margin-top:3px">' + pct + '% of ' + target + 'h target</div>' +
    '</div>';
  }).join('');

  // Days studied in last 30
  const last30dates = new Set();
  const thirtyAgo = new Date(Date.now() - 30 * 86400000);
  (S.activities||[]).forEach(function(a){ if(new Date(a.date)>=thirtyAgo) last30dates.add(a.date.slice(0,10)); });
  const daysStudied30 = last30dates.size;
  const habitScore = Math.round(daysStudied30 / 30 * 100);

  // Top study day
  const dayCounts = {};
  (S.activities||[]).forEach(function(a){
    const dow = new Date(a.date).toLocaleDateString('en-US',{weekday:'long'});
    dayCounts[dow] = (dayCounts[dow]||0) + (a.hours||0);
  });
  const topDay = Object.keys(dayCounts).sort(function(a,b){ return dayCounts[b]-dayCounts[a]; })[0] || 'N/A';

  // Insights
  const insights = [];
  const weekHrs = getWeekHours();
  const weekGoal = S.hoursPerWeek || 15;
  if (weekHrs >= weekGoal) {
    insights.push('You hit your weekly goal of ' + weekGoal + 'h this week. Keep this pace to stay on track for your exam dates.');
  } else {
    insights.push('You\'ve logged ' + weekHrs.toFixed(1) + 'h this week vs your ' + weekGoal + 'h goal. ' + (weekGoal - weekHrs).toFixed(1) + 'h more to reach it.');
  }
  if (streak >= 7) {
    insights.push('Your ' + streak + '-day streak is exceptional — consistency is the #1 predictor of passing. Protect it.');
  } else if (streak > 0) {
    insights.push('You\'re on a ' + streak + '-day streak. Aim for 7 days to build lasting study momentum.');
  }
  if (habitScore >= 70) {
    insights.push('You studied ' + daysStudied30 + ' of the last 30 days (' + habitScore + '%). That study habit score puts you in the top tier of CPA candidates.');
  } else {
    insights.push('You studied ' + daysStudied30 + '/30 days (' + habitScore + '% habit score). Increasing consistency — even short sessions — will compound your progress.');
  }

  el.innerHTML =
    '<div style="max-width:860px;margin:0 auto;padding:32px 24px 80px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">' +
        '<div>' +
          '<h1 style="font-size:26px;font-weight:900;letter-spacing:-.03em">📊 Your Progress Report</h1>' +
          '<p style="font-size:12px;color:var(--mut);margin-top:3px">' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + ' · ' + S.name + '</p>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div style="display:flex;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;overflow:hidden">' +
            '<button onclick="_prRange=7;renderProgressReport()" style="padding:6px 14px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:' + (days===7?'var(--ora)':'transparent') + ';color:' + (days===7?'#fff':'var(--sub)') + '">7 Days</button>' +
            '<button onclick="_prRange=30;renderProgressReport()" style="padding:6px 14px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:' + (days===30?'var(--ora)':'transparent') + ';color:' + (days===30?'#fff':'var(--sub)') + '">30 Days</button>' +
          '</div>' +
          '<button onclick="closeProgressReport()" style="padding:8px 16px;background:var(--surf);border:1.5px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)">✕ Close</button>' +
        '</div>' +
      '</div>' +

      '<div class="stats-grid" style="margin-bottom:20px">' +
        [
          {v:totalHrs.toFixed(1),l:'Hours ('+days+'d)',c:'var(--ora)'},
          {v:sessions,l:'Sessions',c:'var(--ind)'},
          {v:streak+'d',l:'Active Streak',c:'#f59e0b'},
          {v:sectionsActive,l:'Sections Active',c:'var(--grn)'},
        ].map(function(s){ return '<div class="stat-box" style="border-top:3px solid '+s.c+'"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>'; }).join('') +
      '</div>' +

      '<div class="card card-pad" style="margin-bottom:16px">' +
        '<div class="section-title">Section Breakdown</div>' +
        sectionRows +
      '</div>' +

      '<div class="card card-pad" style="margin-bottom:16px">' +
        '<div class="section-title">Study Trend — Last 7 Days</div>' +
        '<div class="week-chart">' + chartBars + '</div>' +
        '<div style="font-size:10px;color:var(--mut);text-align:center;margin-top:4px">Hours per day · <span style="color:var(--ind)">■</span> Today</div>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' +
        '<div class="card card-pad">' +
          '<div class="section-title">Session Consistency</div>' +
          '<div style="font-size:32px;font-weight:900;color:' + (habitScore>=70?'var(--grn)':habitScore>=40?'var(--amb)':'var(--red)') + '">' + habitScore + '%</div>' +
          '<div style="font-size:12px;color:var(--sub);margin-top:4px">' + daysStudied30 + ' of last 30 days studied</div>' +
          '<div class="prog-bar" style="margin-top:10px"><div class="prog-fill" style="width:' + habitScore + '%;background:' + (habitScore>=70?'var(--grn)':habitScore>=40?'var(--amb)':'var(--red)') + '"></div></div>' +
        '</div>' +
        '<div class="card card-pad">' +
          '<div class="section-title">Study Patterns</div>' +
          '<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Top Study Day</div>' +
          '<div style="font-size:18px;font-weight:800;color:var(--ora)">' + topDay + '</div></div>' +
          '<div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Total Hours (All Time)</div>' +
          '<div style="font-size:18px;font-weight:800;color:var(--ind)">' + Math.round(getTotalHours()) + 'h</div></div>' +
        '</div>' +
      '</div>' +

      '<div class="card card-pad">' +
        '<div class="section-title">Study Insights</div>' +
        insights.map(function(ins){ return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)">' +
          '<span style="color:var(--ora);font-size:16px;flex-shrink:0">→</span>' +
          '<p style="font-size:13px;color:var(--sub);line-height:1.65;margin:0">' + ins + '</p>' +
        '</div>'; }).join('') +
      '</div>' +

      '<div class="card card-pad" id="pr-ai-advice-card">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
          '<div style="display:flex;align-items:center;gap:8px">' +
            '<div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--ind),var(--pur));display:flex;align-items:center;justify-content:center;font-size:14px">🤖</div>' +
            '<div class="section-title" style="margin:0">AI Study Advice</div>' +
          '</div>' +
          (_fcGetApiKey()
            ? '<div style="font-size:10px;font-weight:700;color:var(--grn);display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block"></span>Powered by Claude</div>'
            : '<button onclick="openFcApiKeyModal()" style="font-size:10px;font-weight:700;color:var(--ind);background:none;border:none;cursor:pointer;padding:0">+ Add API key</button>') +
        '</div>' +
        '<div id="pr-ai-advice-body">' +
          (_fcGetApiKey()
            ? '<div style="display:flex;align-items:center;gap:8px;color:var(--mut);font-size:12px"><span style="width:8px;height:8px;border-radius:50%;background:var(--ind);animation:ledger-dot 1.2s infinite;display:inline-block"></span>Analyzing your progress...</div>'
            : '<div style="font-size:12px;color:var(--mut);line-height:1.6">Add your Claude API key to get personalized AI advice based on your actual study data — specific next steps, weak areas to focus on, and a realistic path to your exam dates.</div>') +
        '</div>' +
      '</div>' +
    '</div>';

  if (_fcGetApiKey()) {
    _prLoadAIAdvice(totalHrs, sessions, streak, habitScore, daysStudied30, days);
  }
}

function _prLoadAIAdvice(totalHrs, sessions, streak, habitScore, daysStudied30, rangeDays) {
  const secs = S.sections || [];
  const sectionLines = secs.map(function(s) {
    const logged = getSectionHours(s);
    const goal = getHourGoal(s);
    const examDate = S.examDates && S.examDates[s];
    const daysLeft = examDate ? Math.max(0, Math.round((new Date(examDate+' 00:00:00') - Date.now()) / 86400000)) : null;
    const scores = (S.practiceScores||{})[s]||[];
    const avgScore = scores.length ? Math.round(scores.slice(-5).reduce(function(a,b){return a+(b.score||0);},0)/Math.min(5,scores.length)) : null;
    return '- ' + s + ': ' + logged.toFixed(1) + '/' + goal + 'h' +
      (daysLeft !== null ? ', ' + daysLeft + 'd to exam' : '') +
      (avgScore !== null ? ', avg score ' + avgScore + '%' : ', no practice scores yet');
  }).join('\n');
  const readiness = calcReadinessScore();
  const prompt = 'A CPA candidate has the following study data for the last ' + rangeDays + ' days:\n\n' +
    'Total hours logged: ' + totalHrs.toFixed(1) + 'h\n' +
    'Sessions: ' + sessions + '\n' +
    'Active streak: ' + streak + ' days\n' +
    'Habit score: ' + habitScore + '% (' + daysStudied30 + '/30 days studied)\n' +
    'Readiness score: ' + readiness.score + '/100\n' +
    'Section progress:\n' + sectionLines + '\n\n' +
    'Give 4-5 specific, actionable bullet points of advice. Be direct and concrete — name specific sections, concepts, or exam areas they should focus on. Mention any red flags you see in the data. End with one motivating sentence. Format as bullet points starting with •.';

  _fcCallAI(prompt, 500).then(function(advice) {
    const body = document.getElementById('pr-ai-advice-body');
    if (!body) return;
    if (!advice) {
      body.innerHTML = '<div style="font-size:12px;color:var(--mut)">Could not load AI advice. Check your API key in Study Tools.</div>';
      return;
    }
    const bullets = advice.split('\n').filter(function(l){ return l.trim(); });
    body.innerHTML = bullets.map(function(line) {
      const clean = line.replace(/^[•\-\*]\s*/, '');
      const isBullet = /^[•\-\*]/.test(line.trim());
      if (!isBullet && bullets.indexOf(line) === bullets.length - 1) {
        return '<p style="font-size:12px;color:var(--ind);font-weight:700;margin:12px 0 0;line-height:1.55">' + clean + '</p>';
      }
      return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)">' +
        '<span style="color:var(--ind);font-size:14px;flex-shrink:0;margin-top:1px">•</span>' +
        '<p style="font-size:12px;color:var(--sub);line-height:1.65;margin:0">' + clean + '</p>' +
      '</div>';
    }).join('');
  }).catch(function() {
    const body = document.getElementById('pr-ai-advice-body');
    if (body) body.innerHTML = '<div style="font-size:12px;color:var(--mut)">Could not load AI advice.</div>';
  });
}

function _coachReply(msg) {
  const lower = msg.toLowerCase();
  for (let i = 0; i < _coachResponses.length; i++) {
    if (_coachResponses[i].k.some(function(k){ return lower.includes(k); })) {
      return _coachResponses[i].r;
    }
  }
  const secs = S.sections || [];
  const focSec = secs[0] || 'FAR';
  const hrs = Math.round(getTotalHours());
  const streak = getStreak();
  return 'Based on your ' + hrs + ' hours logged and ' + streak + '-day streak: you\'re on the right track. The single highest-impact thing you can do right now is spend 60 minutes reviewing your most recent wrong answers in ' + focSec + '. Understanding why you got something wrong is worth more than any new material. Keep going.';
}

function _coachBuildContext() {
  const secs = S.sections || [];
  const streak = getStreak();
  const totalHrs = Math.round(getTotalHours());
  const weekHrs = getWeekHours().toFixed(1);
  const readiness = calcReadinessScore();
  const sectionData = secs.map(function(s) {
    const logged = getSectionHours(s);
    const goal = getHourGoal(s);
    const examDate = S.examDates && S.examDates[s];
    const daysLeft = examDate ? Math.max(0, Math.round((new Date(examDate+' 00:00:00') - Date.now()) / 86400000)) : null;
    const scores = (S.practiceScores||{})[s]||[];
    const avgScore = scores.length ? Math.round(scores.slice(-5).reduce(function(a,b){return a+(b.score||0);},0)/Math.min(5,scores.length)) : null;
    return s + ': ' + logged + '/' + goal + 'h logged' +
      (daysLeft !== null ? ', ' + daysLeft + ' days to exam' : '') +
      (avgScore !== null ? ', avg practice score ' + avgScore + '%' : '');
  }).join('\n');
  return 'Student context:\n' +
    'Sections: ' + secs.join(', ') + '\n' +
    'Total hours: ' + totalHrs + 'h\n' +
    'This week: ' + weekHrs + 'h\n' +
    'Streak: ' + streak + ' days\n' +
    'Readiness score: ' + readiness.score + '/100\n' +
    'Section progress:\n' + sectionData;
}

async function _coachAskAI(msg) {
  const key = _fcGetApiKey();
  if (!key) return null;
  const ctx = _coachBuildContext();
  const systemPrompt = 'You are Ledger, an expert CPA exam tutor and study coach with deep knowledge of all CPA exam sections: FAR (Financial Accounting & Reporting), AUD (Auditing & Attestation), REG (Regulation/Tax), ISC (Information Systems & Controls), TCP (Tax Compliance & Planning), and BAR (Business Analysis & Reporting).\n\nYou have expert-level knowledge of:\n- GAAP, IFRS, GASB, FASB Codification\n- Federal taxation (individual, corporate, partnership, S-corp, estate/gift)\n- Auditing standards (GAAS, PCAOB, SSARS, SSAE)\n- Business law, contracts, secured transactions, bankruptcy\n- IT controls, SOC reports, cybersecurity frameworks\n- CPA exam structure, scoring, and test-taking strategy\n- Spaced repetition, active recall, and adult learning science\n\nYou have access to the student\'s real study data shown below. Give specific, accurate, actionable answers. When answering accounting/tax/audit questions, give the technically correct answer with the relevant standard or code section when applicable. Be direct and concise — no filler. If the student asks a specific accounting question, answer it precisely. If they ask for study advice, make it specific to their data.\n\n' + ctx;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },

        model: 'claude-haiku-4-5-20251001',

function sendCoachMessage() {
  const inp = document.getElementById('coach-input');
  if (!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = '';
  if (!window._coachChat) window._coachChat = [];
  window._coachChat.push({mine:true, text:msg});
  const msgsEl = document.getElementById('coach-chat-msgs');
  if (!msgsEl) return;
  if (msgsEl.querySelector('[style*="Ask me anything"]')) msgsEl.innerHTML = '';
  const mineDiv = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><div style="max-width:80%;padding:9px 13px;border-radius:16px 16px 4px 16px;font-size:12px;line-height:1.55;background:var(--ind);color:#fff">' + msg + '</div></div>';
  msgsEl.innerHTML += mineDiv;
  msgsEl.scrollTop = msgsEl.scrollHeight;
  const typingId = 'ledger-typing-' + Date.now();
  const typingDiv = '<div id="' + typingId + '" style="display:flex;margin-bottom:8px"><div style="padding:10px 14px;border-radius:16px 16px 16px 4px;background:var(--surf2);border:1px solid var(--bdr);display:flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:var(--mut);animation:ledger-dot 1.2s infinite;display:inline-block"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--mut);animation:ledger-dot 1.2s infinite .2s;display:inline-block"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--mut);animation:ledger-dot 1.2s infinite .4s;display:inline-block"></span></div></div>';
  msgsEl.innerHTML += typingDiv;
  msgsEl.scrollTop = msgsEl.scrollHeight;

  function _showReply(reply) {
    window._coachChat.push({mine:false, text:reply});
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();
    const replyWrap = document.createElement('div');
    replyWrap.style.cssText = 'display:flex;margin-bottom:8px';
    const replyBub = document.createElement('div');
    replyBub.style.cssText = 'max-width:82%;padding:9px 13px;border-radius:16px 16px 16px 4px;font-size:12px;line-height:1.6;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);white-space:pre-wrap';
    replyWrap.appendChild(replyBub);
    msgsEl.appendChild(replyWrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    let i = 0;
    const speed = Math.max(6, Math.min(18, Math.round(6000 / reply.length)));
    function typeNext() {
      if (i <= reply.length) {
        replyBub.textContent = reply.slice(0, i);
        i++;
        msgsEl.scrollTop = msgsEl.scrollHeight;
        if (i <= reply.length) setTimeout(typeNext, speed);
      }
    }
    typeNext();
  }

  const hasKey = !!_fcGetApiKey();
  if (hasKey) {
    _coachAskAI(msg).then(function(aiReply) {
      if (aiReply) {
        _showReply(aiReply);
      } else {
        _showReply(_coachReply(msg));
      }
    }).catch(function() {
      _showReply(_coachReply(msg));
    });
  } else {
    const fallback = _coachReply(msg);
    const delay = 600 + Math.min(fallback.length * 8, 1400);
    setTimeout(function() { _showReply(fallback); }, delay);
  }
}

function _buildQBankPanel() {
  S.qbProgress = S.qbProgress || {};
  const pro = isPro();

  const cards = QB_SECTIONS.map(function(sec) {
    const prog = S.qbProgress[sec.code] || {mcqDone:0, simsDone:0};
    const mcqDone = prog.mcqDone || 0;

      'style="background:var(--surf);border:1.5px solid var(--bdr);border-radius:16px;padding:22px 22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden" ' +
      'onmouseover="this.style.borderColor=\'' + sec.color + '\';this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'var(--shadow-md)\'" ' +
      'onmouseout="this.style.borderColor=\'var(--bdr)\';this.style.transform=\'\';this.style.boxShadow=\'\'">' +
      '<div style="position:absolute;top:0;left:0;bottom:0;width:5px;background:' + sec.color + ';border-radius:16px 0 0 16px"></div>' +
      '<div style="padding-left:10px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
          '<span style="font-size:12px;font-weight:900;color:' + sec.color + ';background:' + sec.color + '18;padding:4px 12px;border-radius:20px;letter-spacing:.04em">' + sec.code + '</span>' +
          '<span style="font-size:11px;color:var(--mut)">' + mcqDone + ' / ' + sec.mcqTotal + ' done</span>' +
        '</div>' +
        '<div style="font-size:14px;font-weight:800;color:var(--txt);margin-bottom:12px;line-height:1.35">' + sec.full + '</div>' +
        '<div style="height:6px;background:var(--surf3);border-radius:4px;overflow:hidden;margin-bottom:12px">' +
          '<div style="height:100%;width:' + pct + '%;background:' + sec.color + ';border-radius:4px;transition:width .5s"></div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
            '<span style="font-size:10px;color:var(--mut);background:var(--surf2);border:1px solid var(--bdr);padding:3px 9px;border-radius:6px">' + sec.mcqTotal + '+ MCQ</span>' +
            '<span style="font-size:10px;color:var(--mut);background:var(--surf2);border:1px solid var(--bdr);padding:3px 9px;border-radius:6px">' + sec.simsTotal + ' SIMs</span>' +
            (pro ? '' : '<span style="font-size:10px;color:var(--ora);background:var(--ora-bg);border:1px solid var(--ora-bdr);padding:3px 9px;border-radius:6px;font-weight:700">5 free</span>') +
          '</div>' +
          '<span style="font-size:20px;color:var(--mut)">›</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const freeNote = pro ? '' :
    '<div style="background:var(--ora-bg);border:1px solid var(--ora-bdr);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:24px;cursor:pointer" onclick="openUpgradeModal(\'Full Question Bank\')">' +
      '<div style="font-size:28px">🔓</div>' +
      '<div style="flex:1">' +
        '<div style="font-size:13px;font-weight:800;color:var(--ora)">Unlock the Full Question Bank</div>' +
        '<div style="font-size:12px;color:var(--sub);margin-top:2px">Pro unlocks 500+ MCQs, all TBS SIMs, timed sets, and random quizzes per section.</div>' +
      '</div>' +
      '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openUpgradeModal(\'Full Question Bank\')">Upgrade</button>' +
    '</div>';

  const totalDone = QB_SECTIONS.reduce(function(a,s){ return a + ((S.qbProgress[s.code]||{}).mcqDone||0); }, 0);
  const totalQ = QB_SECTIONS.reduce(function(a,s){ return a + s.mcqTotal; }, 0);
  const totalPct = Math.round(totalDone/totalQ*100);

  const statsBar =
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px">' +
      '<div class="card card-pad" style="text-align:center;padding:14px">' +
        '<div style="font-size:26px;font-weight:900;color:var(--ind);letter-spacing:-.04em">' + totalDone + '</div>' +
        '<div style="font-size:11px;color:var(--mut);margin-top:2px">Questions Done</div>' +
      '</div>' +
      '<div class="card card-pad" style="text-align:center;padding:14px">' +
        '<div style="font-size:26px;font-weight:900;color:var(--grn);letter-spacing:-.04em">' + totalPct + '%</div>' +
        '<div style="font-size:11px;color:var(--mut);margin-top:2px">Overall Progress</div>' +
      '</div>' +
      '<div class="card card-pad" style="text-align:center;padding:14px">' +
        '<div style="font-size:26px;font-weight:900;color:var(--ora);letter-spacing:-.04em">' + QB_SECTIONS.length + '</div>' +
        '<div style="font-size:11px;color:var(--mut);margin-top:2px">Sections Available</div>' +
      '</div>' +
    '</div>';

  return statsBar + freeNote +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">' +
      cards +
    '</div>';
}

function _buildDecksView(){

    <button onclick="_fc.view='decks';_fcRender()" style="padding:9px 18px;border:none;background:transparent;font-size:13px;font-weight:800;cursor:pointer;border-bottom:2px solid var(--ind);color:var(--ind);margin-bottom:-2px">My Decks <span style="background:var(--ind);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px">${deckArr.length}</span></button>

  if(!deckArr.length)return tabBar+`<div style="text-align:center;padding:60px 24px"><div style="font-size:48px;margin-bottom:16px;opacity:.2">📚</div><div style="font-size:15px;font-weight:800;margin-bottom:8px;color:var(--sub)">No saved decks yet</div><div style="font-size:12px;color:var(--mut)">Generate flashcards and click "Save deck" to build your library.</div></div>`;
  return tabBar+`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">`+
    deckArr.map(d=>{
      const now=Date.now();
      const due=d.cards.filter(c=>(c.nextReview||0)<=now).length;
      const mastered=d.cards.filter(c=>(c.timesCorrect||0)>=3).length;
      const pct=d.cards.length?Math.round(mastered/d.cards.length*100):0;
      return `<div class="card card-pad" style="cursor:pointer" onclick="fcLoadDeck('${d.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
          <div style="flex:1;min-width:0">
            ${d.section?`<span class="badge badge-${d.section}" style="font-size:9px;margin-bottom:5px;display:inline-flex">${d.section}</span><br>`:''}
            <div style="font-size:13px;font-weight:800;line-height:1.3;margin-top:2px">${d.name}</div>
            <div style="font-size:10px;color:var(--mut);margin-top:2px">${d.cards.length} cards · ${new Date(d.created).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <button onclick="event.stopPropagation();fcDeleteDeck('${d.id}')" style="background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--mut);padding:0 4px;line-height:1">×</button>
        </div>
        <div style="height:4px;background:var(--surf3);border-radius:4px;margin-bottom:8px"><div style="height:100%;width:${pct}%;background:var(--grn);border-radius:4px"></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;color:var(--mut)">${mastered}/${d.cards.length} mastered</span>
          ${due>0?`<span style="font-size:11px;font-weight:700;color:var(--ora)">${due} due today</span>`:`<span style="font-size:11px;color:var(--grn)">✓ Up to date</span>`}
        </div>
      </div>`;
    }).join('')+'</div>';
}

// ── Score Predictor ────────────────────────────────────────────────────────
function _buildScorePrediction() {
  const sections = S.sections || [];
  if (!sections.length) {
    return '<div style="font-size:12px;color:var(--mut);text-align:center;padding:16px">Add exam sections in your profile to see predictions.</div>';
  }
  return sections.map(function(sec) {
    const logged = getSectionHours(sec);
    const target = EXAMS[sec].studyHours;
    const paceScore = Math.min(1, logged / target);
    const qbProg = S.qbProgress && S.qbProgress[sec] ? S.qbProgress[sec] : {};
    const mcqDone = qbProg.mcqDone || 0;
    const mcqScore = Math.min(1, mcqDone / 30);
    // Weighted prediction: pace 50%, QB activity 30%, base 20%
    const rawPct = 0.20 * 0.65 + paceScore * 0.50 + mcqScore * 0.30;
    const predictedScore = Math.round(55 + rawPct * 35); // range 55-90
    const confidence = mcqDone >= 10 ? 'High' : mcqDone >= 3 ? 'Medium' : 'Low';
    const confColor = confidence === 'High' ? 'var(--grn)' : confidence === 'Medium' ? 'var(--amb)' : 'var(--mut)';
    const scoreColor = predictedScore >= 75 ? 'var(--grn)' : predictedScore >= 68 ? 'var(--amb)' : 'var(--red)';
    const barW = Math.round((predictedScore - 50) / 50 * 100);
    return '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bdr)">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="badge badge-' + sec + '">' + sec + '</span>' +
          '<span style="font-size:11px;color:var(--mut)">Confidence: <span style="color:' + confColor + ';font-weight:700">' + confidence + '</span></span>' +
        '</div>' +
        '<div style="font-size:22px;font-weight:900;color:' + scoreColor + ';letter-spacing:-.04em">' + predictedScore + '<span style="font-size:12px;font-weight:600;opacity:.6"> /99</span></div>' +
      '</div>' +
      '<div style="height:8px;background:var(--surf3);border-radius:4px;overflow:hidden">' +
        '<div style="height:100%;width:' + barW + '%;background:' + scoreColor + ';border-radius:4px;transition:width .6s"></div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:4px">' +
        '<span style="font-size:10px;color:var(--mut)">50</span>' +
        '<span style="font-size:10px;color:var(--sub);font-weight:700">' + (predictedScore >= 75 ? '✓ On track to pass' : 'Need more practice') + '</span>' +
        '<span style="font-size:10px;color:var(--mut)">99</span>' +
      '</div>' +
    '</div>';
  }).join('') +
  '<div style="font-size:10px;color:var(--mut);margin-top:4px;line-height:1.6">Prediction based on your hours logged and QB activity. Accuracy improves with more practice data. Pass score = 75.</div>';
}

// ── Exam Day Protocol ──────────────────────────────────────────────────────
function _buildExamDayProtocol() {
  const today = new Date();
  const sections = S.sections || [];
  // Find nearest upcoming exam date
  let nearestSec = null, nearestDays = Infinity;
  sections.forEach(function(s) {
    if (S.examDates && S.examDates[s]) {
      const d = Math.round((new Date(S.examDates[s] + ' 00:00:00') - today) / 86400000);
      if (d > 0 && d < nearestDays) { nearestDays = d; nearestSec = s; }
    }
  });

  const protocol = [
    { day: '14+', label: 'Two Weeks Out', items: ['Lock in your exam date if not set', 'Complete your final full mock exam', 'Identify your 3 weakest topic areas', 'Switch to review mode — no new material'] },
    { day: '7', label: 'One Week Out', items: ['Review wrong answers from mock exam only', 'Reduce study sessions to 90 min max', 'Get your NTS and test center details confirmed', 'Prepare your approved materials list (ID, pencils)'] },
    { day: '3', label: 'Three Days Out', items: ['Light review: flashcards only — no heavy reading', 'Do a test run drive to the Prometric center', 'Set up your sleep schedule (in bed by 10pm)', 'Prepare your breakfast and outfit the night before'] },
    { day: '1', label: 'Day Before', items: ['Zero new material — trust your preparation', 'Light 30-min walk or workout (reduces cortisol)', 'Review your personal formula sheet once', 'Sleep 8 hours — this is mandatory, not optional'] },
    { day: '0', label: 'Exam Day', items: ['Eat a real breakfast with protein and complex carbs', 'Arrive 30 minutes early — no exceptions', 'If testlet 2 gets harder, smile — you\'re doing well', 'Flag hard MCQs and come back — never leave blank'] },
  ];

  const statusKey = 'examDayProtocol_' + (nearestSec || 'default');
  const checked = S[statusKey] || {};

  let html = '';
  if (nearestSec) {
    html += '<div style="background:var(--amb-bg);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">' +
      '<div style="font-size:24px">⏳</div>' +
      '<div><div style="font-size:12px;font-weight:800;color:var(--amb)">' + nearestDays + ' days until ' + nearestSec + '</div>' +
      '<div style="font-size:11px;color:var(--sub)">Your personalized protocol is active</div></div>' +
    '</div>';
  } else {
    html += '<div style="font-size:11px;color:var(--mut);margin-bottom:12px">Set your exam dates in your profile to activate the countdown.</div>';
  }

  protocol.forEach(function(phase) {
    const phaseKey = statusKey + '_' + phase.day;
    const phaseDone = checked[phase.day] || 0;
    html += '<div style="margin-bottom:12px">' +
      '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--amb);margin-bottom:6px">Day ' + phase.day + ' — ' + phase.label + '</div>' +
      phase.items.map(function(item, idx) {
        const ck = checked[phase.day + '_' + idx] || false;
        return '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;cursor:pointer" onclick="toggleProtocolCheck(\'' + phase.day + '\',\'' + idx + '\')">' +
          '<div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ' + (ck ? 'var(--grn)' : 'var(--bdr2)') + ';background:' + (ck ? 'var(--grn)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s">' +
            (ck ? '<span style="color:#fff;font-size:10px;font-weight:900">✓</span>' : '') +
          '</div>' +
          '<span style="font-size:12px;color:' + (ck ? 'var(--mut)' : 'var(--sub)') + ';text-decoration:' + (ck ? 'line-through' : 'none') + ';line-height:1.5">' + item + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  });

  return html;
}

function toggleProtocolCheck(phase, idx) {
  const nearestSec = (function() {
    const sections = S.sections || [];
    let ns = null, nd = Infinity;
    sections.forEach(function(s) {
      if (S.examDates && S.examDates[s]) {
        const d = Math.round((new Date(S.examDates[s] + ' 00:00:00') - new Date()) / 86400000);
        if (d > 0 && d < nd) { nd = d; ns = s; }
      }
    });
    return ns;
  })();
  const statusKey = 'examDayProtocol_' + (nearestSec || 'default');
  if (!S[statusKey]) S[statusKey] = {};
  S[statusKey][phase + '_' + idx] = !S[statusKey][phase + '_' + idx];
  saveState();
  const el = document.getElementById('page-content');
  if (el && currentTab === 'studylab') el.innerHTML = buildStudyLab();
}

function generateMnemonic() {
  const input = (document.getElementById('mnem-input')?.value || '').trim().toLowerCase();
  if (!input) { showToast('Enter a CPA concept first', 'err'); return; }

  const resultEl = document.getElementById('mnem-result');
  if (!resultEl) return;

  // Show loading state briefly
  resultEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--mut);font-size:12px">Generating mnemonic…</div>';

  setTimeout(function() {
    // Try exact match first
    let mnem = MNEMONIC_DB[input];

    // Try partial match
    if (!mnem) {
      const keys = Object.keys(MNEMONIC_DB);
      for (let i = 0; i < keys.length; i++) {
        if (input.includes(keys[i]) || keys[i].includes(input)) {
          mnem = MNEMONIC_DB[keys[i]];
          break;
        }
      }
    }

    // Generate custom mnemonic if no match
    if (!mnem) {
      mnem = _generateCustomMnemonic(input);
    }

    // Save to history
    if (!window._mnemHistory) window._mnemHistory = [];
    window._mnemHistory = window._mnemHistory.filter(function(h) { return h.input !== input; });
    window._mnemHistory.unshift({ input: input, mnem: mnem });
    if (window._mnemHistory.length > 5) window._mnemHistory.pop();

    // Render result
    resultEl.innerHTML =
      '<div style="background:' + mnem.color + '12;border:1.5px solid ' + mnem.color + '35;border-radius:14px;padding:18px">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:' + mnem.color + ';margin-bottom:8px">' + mnem.title + '</div>' +
        '<div style="font-size:32px;font-weight:900;letter-spacing:.04em;color:' + mnem.color + ';margin-bottom:6px;font-family:monospace">' + mnem.acronym + '</div>' +
        '<div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:8px;line-height:1.5">' + mnem.expansion + '</div>' +
        '<div style="background:var(--amb-bg);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 12px;margin-bottom:10px">' +
          '<span style="font-size:11px;font-weight:800;color:var(--amb)">Memory Hook: </span>' +
          '<span style="font-size:12px;color:var(--sub);font-style:italic">' + mnem.hook + '</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--sub);line-height:1.7">' + mnem.detail + '</div>' +
      '</div>';

    // Render history
    const histEl = document.getElementById('mnem-history');
    if (histEl && window._mnemHistory.length > 1) {
      histEl.innerHTML = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:6px">Recent</div>' +
        window._mnemHistory.slice(1).map(function(h) {
          return '<button onclick="document.getElementById(\'mnem-input\').value=\'' + h.input + '\';generateMnemonic()" ' +
            'style="font-size:11px;padding:3px 9px;background:var(--surf2);border:1px solid var(--bdr);color:var(--sub);border-radius:6px;cursor:pointer;margin-right:5px;margin-bottom:4px">' +
            h.input + '</button>';
        }).join('');
    }
  }, 380);
}

function _generateCustomMnemonic(input) {
  // Extract meaningful words (skip stop words)
  const stop = new Set(['the','a','an','of','in','and','or','for','to','with','is','are','was','were','be','by','on','at']);
  const words = input.split(/[\s\-\/,]+/).filter(function(w) { return w.length > 2 && !stop.has(w); });
  const acronymLetters = words.map(function(w) { return w[0].toUpperCase(); }).join('');
  const expansionWords = words.map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' · ');

  // Build a sentence from the acronym letters
  const letterWords = {
    A:'Always',B:'Be',C:'Carefully',D:'Document',E:'Every',F:'Find',G:'Generate',
    H:'Handle',I:'Identify',J:'Journal',K:'Know',L:'List',M:'Measure',N:'Note',
    O:'Organize',P:'Prepare',Q:'Quantify',R:'Record',S:'Scrutinize',T:'Test',
    U:'Understand',V:'Verify',W:'Watch',X:'eXamine',Y:'Yield',Z:'Zero-out'
  };
  const sentence = acronymLetters.split('').map(function(l) { return letterWords[l] || l; }).join(' ');

  return {
    title: input.charAt(0).toUpperCase() + input.slice(1),
    acronym: acronymLetters || input.slice(0,4).toUpperCase(),
    expansion: expansionWords || 'Custom concept — add your own expansion',
    hook: '"' + sentence + '" — review your source material to reinforce this concept.',
    detail: 'This is a custom-generated mnemonic for "' + input + '". For best results, study the concept deeply and adapt the mnemonic to your own understanding. The strongest mnemonics are ones you create yourself.',
    color: 'var(--ind)'
  };
}

[{"q":"question","choices":["choice A","choice B","choice C","choice D"],"correct":0,"exp":"explanation"},...]

The "correct" field is the 0-based index of the correct choice.

Material:
${text.slice(0,6000)}`);
        const parsed=_fcParseJSON(raw);
        if(Array.isArray(parsed)) qs=parsed.filter(q=>q.q&&Array.isArray(q.choices)&&q.choices.length===4&&typeof q.correct==='number').slice(0,12);
      }

function _generateFlashcards(text,maxCount,focusType){
  maxCount=maxCount||15;
  const cards=[];
  const seenQ=new Set();
  const add=(q,a)=>{
    q=(q||'').trim();a=(a||'').trim();
    if(!q||!a||q.length<8||a.length<4)return;
    const k=q.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,35);
    if(seenQ.has(k))return;
    seenQ.add(k);
    cards.push({q,a});
  };

  const lines=text.replace(/\r\n/g,'\n').split('\n');
  let currentHeader='';

  // Pass 1: detect headers and grouped lists
  const listGroups=[];
  let curList=null;
  lines.forEach(line=>{
    const l=line.trim();
    if(!l)return;
    // Header detection
    if(/^#{1,4}\s/.test(l)){currentHeader=l.replace(/^#+\s*/,'');curList=null;return;}
    if(l.length<60&&l.length>4&&/^[A-Z][^.!?]*$/.test(l)&&!/[,;:]/.test(l)){currentHeader=l;curList=null;return;}
    // Numbered list
    const nm=l.match(/^(\d+)[\.\)]\s+(.{5,200})$/);
    if(nm){
      if(!curList)curList={header:currentHeader,type:'numbered',items:[]};
      curList.items.push(nm[2].trim());
      return;
    }
    // Bullet list
    const bm=l.match(/^[•\-\*\u2022]\s+(.{5,200})$/);
    if(bm){
      if(!curList)curList={header:currentHeader,type:'bullet',items:[]};
      curList.items.push(bm[1].trim());
      return;
    }
    // End of list
    if(curList&&curList.items.length>=3){listGroups.push({...curList});curList=null;}
    else curList=null;
  });
  if(curList&&curList.items.length>=3)listGroups.push({...curList});

  // Build cards from list groups
  if(focusType!=='definitions'){
    listGroups.forEach(lg=>{
      if(lg.header&&lg.items.length>=3){
        const q=`What are the ${lg.type==='numbered'?'steps/items in':'key points of'} ${lg.header}?`;
        const a=lg.items.map((item,i)=>lg.type==='numbered'?`${i+1}) ${item}`:`• ${item}`).join('\n');
        add(q,a);
      }
    });
  }

  // Pass 2: sentence-level patterns
  const sentences=text.replace(/\r\n/g,'\n').split(/(?<=[.!?])\s+|\n{2,}/).filter(s=>s.trim().length>15&&s.trim().length<600);
  sentences.forEach(raw=>{
    const s=raw.trim();

    // Pattern: "X is/are/means/defined as Y"
    const def=/^(.{5,70}?)\s+(is|are|refers? to|is defined as|means?|represents?)\s+(.{10,300})/i.exec(s);
    if(def&&!/^(this|that|it|they|we|you|there)\b/i.test(def[1])&&focusType!=='rules'&&focusType!=='applied'){
      const term=def[1].replace(/^\d+[\.\)]\s*/,'').trim();
      add(`What is ${term}?`,def[3].replace(/\.$/,'').trim()+'.');
    }

    // Pattern: "X requires/must/shall/cannot Y"
    const req=/^(.{5,80}?)\s+(requires?|must|shall|should|cannot|may not|is required to)\s+(.{10,300})/i.exec(s);
    if(req&&focusType!=='definitions'){
      const subj=req[1].replace(/^\d+[\.\)]\s*/,'').trim();
      add(`What does ${subj} ${req[2].toLowerCase()}?`,req[3].replace(/\.$/,'').trim()+'.');
    }

    // Pattern: Colon "Term: definition"
    const colon=/^([A-Z][^:]{3,60}):\s+(.{15,300})/.exec(s);
    if(colon){add(colon[1].trim()+':',colon[2].trim());}

    // Pattern: "Under/Per [standard], X"
    const under=/^(?:Under|Per|According to|Pursuant to)\s+(.{3,60}?),\s+(.{15,300})/i.exec(s);
    if(under&&focusType!=='definitions'){add(`Under ${under[1]}, what applies?`,under[2].trim());}

    // Pattern: "X consists of/includes N [things]"
    const list=/^(.{5,70}?)\s+(?:consists? of|includes?|contains?)\s+(\d+)\s+(.{5,60})/i.exec(s);
    if(list){add(`What are the ${list[2]} ${list[3].split(' ').slice(0,5).join(' ')}?`,s.replace(/\.$/,'').trim()+'.');}

    // Pattern: difference/comparison
    const comp=/(?:difference between|compared to|in contrast to)\s+(.{3,50}?)\s+and\s+(.{3,50})/i.exec(s);
    if(comp&&focusType!=='definitions'){add(`What is the difference between ${comp[1].trim()} and ${comp[2].trim()}?`,s.trim());}

    // Pattern: percentage/threshold rules
    const num=/^(.{5,70}?)\s+(?:is|equals?|of)\s+(\d+(?:\.\d+)?%|\$[\d,]+)/i.exec(s);
    if(num&&s.length<200){add(`What is the ${num[1].trim()} threshold or amount?`,s.trim());}
  });

  return cards.slice(0,maxCount);
}

function _generateQuiz(text){
  const cards=_generateFlashcards(text,20,'mixed');
  if(cards.length<3)return[];
  const questions=[];
  cards.slice(0,12).forEach((fc,idx)=>{
    const correct=fc.a.trim();
    if(correct.length<5||correct.length>200)return;
    const others=cards.filter((_,i)=>i!==idx).map(o=>o.a.trim()).filter(a=>a.length>=5&&a.length<=200&&a!==correct).sort(()=>Math.random()-.5).slice(0,3);
    if(others.length<2)return;
    while(others.length<3)others.push('None of the above');
    const choices=[correct,...others].sort(()=>Math.random()-.5).slice(0,4);
    // ensure correct is still in choices
    if(!choices.includes(correct)){choices[0]=correct;}
    questions.push({q:fc.q,choices:choices.map(c=>c.slice(0,140)),correct:choices.indexOf(correct),exp:`Based on the material: "${fc.a.slice(0,120)}"${fc.a.length>120?'…':''}`});
  });
  return questions.slice(0,10);
}

function _generateSummary(text){
  const sentences=text.replace(/\r\n/g,'\n').split(/(?<=[.!?])\s+|\n+/).filter(s=>s.trim().length>25);
  const kw=['must','requires','defined','means','critical','key','under','rule','standard','percent','%','section','exam','shall','cannot','prohibited'];
  const scored=sentences.map(s=>{
    let score=0;const low=s.toLowerCase();
    kw.forEach(k=>{if(low.includes(k))score+=1.5;});
    if(/\d/.test(s))score+=1;
    if(s.length<120)score+=0.5;
    if(s.length>300)score-=2;
    return{s:s.trim(),score};
  });
  scored.sort((a,b)=>b.score-a.score);
  return'Key Points:\n\n'+scored.slice(0,8).map(x=>'• '+x.s).join('\n\n');
}

function fcSetInputMode(mode) {

  document.getElementById('fc-mode-pdf').className = mode==='pdf'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';

function fcLoadPdf(input) {
  const file = input.files?.[0];
  if (!file) return;
  const statusEl = document.getElementById('fc-pdf-status');
  if (statusEl) { statusEl.style.display='block'; statusEl.textContent='Reading PDF…'; }
  // Use FileReader to read PDF as text via a simple approach
  // Note: true PDF text extraction requires pdf.js — we'll use jsPDF's read or show a message
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // Try to extract text from PDF binary (very basic — works for text PDFs)
      const binary = new Uint8Array(e.target.result);
      let text = '';
      // Extract readable ASCII from PDF binary
      let chunk = '';
      for (let i = 0; i < binary.length; i++) {
        const c = binary[i];
        if (c >= 32 && c < 127) {
          chunk += String.fromCharCode(c);
        } else {
          if (chunk.length > 4) text += chunk + ' ';
          chunk = '';
        }
      }
      // Clean up PDF artifacts
      text = text.replace(/\(([^)]{3,})\)/g,'$1').replace(/\/[A-Za-z]+\s+/g,' ').replace(/\s{3,}/g,' ').trim();
      if (text.length > 100) {
        const inputEl = document.getElementById('fc-input-text');
        if (inputEl) inputEl.value = text.slice(0, 8000);
        if (statusEl) { statusEl.textContent = '✓ PDF loaded — ' + Math.round(text.length/1000) + 'k chars extracted. Click Generate to process.'; }
        showToast('PDF loaded successfully ✓', 'ok');
      } else {
        if (statusEl) { statusEl.textContent = 'PDF loaded but text is image-based. Please copy-paste the text manually.'; statusEl.style.color='var(--amb)'; }
        showToast('PDF appears to be image-based — paste text instead', 'info');
      }
    } catch(err) {
      if (statusEl) { statusEl.textContent = 'Could not extract PDF text. Please paste text manually.'; statusEl.style.color='var(--red)'; }
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── SRS GRADING ──
function fcSRSGrade(grade){ // 0=missed, 1=almost, 2=correct
  const card=_fc.cards[_fc.current];
  if(!card)return;
  if(!card.ease)card.ease=2.5;
  if(!card.interval)card.interval=1;
  if(!card.timesCorrect)card.timesCorrect=0;
  if(!card.timesMissed)card.timesMissed=0;

  if(grade===2){
    card.timesCorrect++;
    card.ease=Math.max(1.3,card.ease+0.1);
    card.interval=Math.max(1,Math.round(card.interval*card.ease));
  } else if(grade===1){
    card.interval=Math.max(1,Math.round(card.interval*0.8));
  } else {
    card.timesMissed++;
    card.ease=Math.max(1.3,card.ease-0.2);
    card.interval=1;
  }
  card.nextReview=Date.now()+card.interval*86400000;

  // Persist to saved deck
  if(_fc.activeDeckId){
    const decks=_fcGetDecks();
    const deck=decks[_fc.activeDeckId];
    if(deck){
      const ci=deck.cards.findIndex(c=>c.id===card.id);
      if(ci>=0)Object.assign(deck.cards[ci],{ease:card.ease,interval:card.interval,nextReview:card.nextReview,timesCorrect:card.timesCorrect,timesMissed:card.timesMissed});
      _fcDecks=decks;_fcSaveDecks();
    }
  }

  _fc.current++;
  _fc.flipped=false;
  _fcRender();
}

// We deliberately do NOT specify topics — that comes from the user's
// Becker / Gleim / Roger / Wiley material. We tell them HOW to study
// and WHICH section needs attention most, based on actual progress data.
