// CURRENT SECTION HELPER
// ═══════════════════════════════════════════════
function getCurrentSection(){
  // Returns the section whose exam date is soonest in the future (not yet passed).
  // Fallback: first non-passed section. Fallback: first section in list.
  const passed=new Set(S.sectionPassed||[]);
  const now=Date.now();
  const withDates=(S.sections||[])
    .filter(s=>!passed.has(s)&&S.examDates?.[s])
    .map(s=>({s,t:new Date(S.examDates[s]+' 00:00:00').getTime()}))
    .filter(x=>x.t>now)
    .sort((a,b)=>a.t-b.t);
  if(withDates.length) return withDates[0].s;
  const first=(S.sections||[]).find(s=>!passed.has(s));
  return first||(S.sections||[])[0]||'FAR';
}

// ═══════════════════════════════════════════════
// READINESS SCORE
// ═══════════════════════════════════════════════

// Fix 3: recency-weighted hours — recent study counts more than stale history
function getDecayedSectionHours(section){
  if(!S)return 0;
  const now=Date.now();
  return(S.activities||[])
    .filter(a=>a.section===section)
    .reduce((sum,a)=>{
      const weeksSince=(now-new Date(a.date).getTime())/(7*86400000);
      const w=weeksSince<=4?1:weeksSince<=12?0.85:weeksSince<=24?0.65:0.45;
      return sum+(a.hours||0)*w;
    },0);
}

function calcReadinessScore(){
  const passed=new Set(S.sectionPassed||[]);
  if((S.sections||[]).every(s=>passed.has(s)))return{score:100,label:'All Sections Passed!',color:'var(--grn)',tier:'passed',breakdown:[]};

  const s=getCurrentSection();
  const logged=getSectionHours(s);
  const decayed=getDecayedSectionHours(s);
  const goal=getHourGoal(s);
  const targetDate=S.examDates?.[s];

  // Fix 1+3: volume based on where you should be TODAY in your timeline, using decayed hrs
  let volumePts;
  if(targetDate){
    const examMs=new Date(targetDate+' 00:00:00').getTime();
    const sectionActs=(S.activities||[]).filter(a=>a.section===s).sort((a,b)=>a.date.localeCompare(b.date));
    const startMs=sectionActs.length?new Date(sectionActs[0].date.slice(0,10)+'T00:00:00').getTime():(S.created||Date.now()-90*86400000);
    const totalMs=Math.max(1,examMs-startMs);
    const fracElapsed=Math.max(0,Math.min(1.5,(Date.now()-startMs)/totalMs));
    const expectedNow=goal*fracElapsed;
    volumePts=expectedNow<5
      ?Math.min(50,Math.round(decayed/goal*50))
      :Math.min(50,Math.round(decayed/expectedNow*50));
  } else {
    volumePts=Math.min(50,Math.round(decayed/goal*50));
  }

  // Fix 2+5: pacing uses actual observed pace (last 28 days), smooth curve
  let pacingPts=15;
  if(targetDate){
    const daysLeft=Math.round((new Date(targetDate+' 00:00:00')-Date.now())/86400000);
    const weeksLeft=Math.max(0.5,daysLeft/7);
    const needed=Math.max(0,goal-logged);
    const hrsPerWeek=needed/weeksLeft;
    const last28=(S.activities||[]).filter(a=>Date.now()-new Date(a.date).getTime()<28*86400000);
    const actualPace=last28.reduce((a,b)=>a+(b.hours||0),0)/4;
    const available=actualPace>0.5?actualPace:(S.hoursPerWeek||15);
    if(daysLeft<0) pacingPts=0;
    else if(hrsPerWeek<=0) pacingPts=20;
    else{
      const ratio=available/hrsPerWeek;
      pacingPts=Math.max(0,Math.min(20,Math.round(20*Math.pow(Math.min(1.2,ratio)/1.2,1.5))));
    }
  }

  // Fix 4: practice scores — fix object vs array bug, avg last 3, anchor 80, trend bonus
  const sScores=(S.practiceScores||{})[s]||[];
  let scorePts=0;
  if(sScores.length){
    const recent=sScores.slice(-3);
    const avg=recent.reduce((a,b)=>a+b.score,0)/recent.length;
    scorePts=Math.min(28,Math.round(avg/80*28));
    if(recent.length>=2&&recent[recent.length-1].score>recent[0].score) scorePts=Math.min(30,scorePts+2);
  }

  // Fix 6: consistency — active days with >=0.5h in last 14 days (not raw streak)
  const twoWeeksAgo=Date.now()-14*86400000;
  const activeDays=new Set();
  (S.activities||[]).forEach(a=>{
    if(new Date(a.date).getTime()>twoWeeksAgo&&(a.hours||0)>=0.5) activeDays.add(a.date.slice(0,10));
  });
  const consistencyPts=Math.min(10,Math.round(activeDays.size/10*10));

  const score=Math.min(99,volumePts+pacingPts+scorePts+consistencyPts);
  const breakdown=[{section:s,score,volumePts,pacingPts,scorePts,consistencyPts,logged,decayed:Math.round(decayed)}];

  let label,color,tier;
  if(score<35){label='Just Getting Started';color='#ef4444';tier='start';}
  else if(score<50){label='Building Foundation';color='#f59e0b';tier='building';}
  else if(score<65){label='On Track';color='var(--ind)';tier='track';}
  else if(score<80){label='Strong Progress';color='var(--grn)';tier='strong';}
  else{label='Exam Ready 🎯';color='var(--grn)';tier='ready';}
  return{score,label,color,tier,breakdown,section:s};
}

function adjustHourGoal(section,delta,btn){
  if(!window._tempHourGoals)window._tempHourGoals={};
  const cur=window._tempHourGoals[section]||getHourGoal(section);
  const next=Math.max(50,Math.min(400,cur+delta));
  window._tempHourGoals[section]=next;
  const lbl=document.getElementById('hg-'+section);
  if(lbl)lbl.textContent=next+'h';
}

function applyHourGoalPreset(key,btn){
  const preset=HOUR_GOAL_PRESETS[key];
  if(!preset)return;
  S.studyIntensity=key;
  // Update buttons
  btn.parentElement.querySelectorAll('button').forEach((b,i)=>{
    const k=['fast','standard','thorough'][i];
    const active=k===key;
    b.style.borderColor=active?'var(--ora)':'var(--bdr)';
    b.style.background=active?'var(--ora-bg)':'var(--surf2)';
    b.querySelector('div').style.color=active?'var(--ora)':'var(--txt)';
  });
  // Apply preset values
  (S.sections||[]).forEach(s=>{
    const v=preset.goals[s]||EXAMS[s]?.studyHours||150;
    if(!window._tempHourGoals)window._tempHourGoals={};
    window._tempHourGoals[s]=v;
    const lbl=document.getElementById('hg-'+s);
    if(lbl)lbl.textContent=v+'h';
  });
}

function saveHourGoals(){
  if(!S)return;
  if(!S.hourGoals)S.hourGoals={};
  Object.assign(S.hourGoals,window._tempHourGoals||{});
  saveState();
  showToast('Hour goals saved','ok');
  renderTab();
}

// PACING ALERT (behind alert banner)
// ═══════════════════════════════════════════════
function buildPacingAlert(){
  const behind=[];
  // Only alert for the current active section (one at a time)
  const s=getCurrentSection();
  const passed=new Set(S.sectionPassed||[]);
  if(!passed.has(s)){
    const ex=EXAMS[s];
    const logged=getSectionHours(s);
    const targetDate=S.examDates?.[s];
    if(targetDate){
      const daysLeft=Math.round((new Date(targetDate+' 00:00:00')-Date.now())/86400000);
      if(daysLeft>0){
        const weeksLeft=Math.max(0.5,daysLeft/7);
        const needed=Math.max(0,getHourGoal(s)-logged);
        const hrsPerWeek=needed/weeksLeft;
        const last28a=(S.activities||[]).filter(a=>Date.now()-new Date(a.date).getTime()<28*86400000);
        const actualPaceA=last28a.reduce((a,b)=>a+(b.hours||0),0)/4;
        const available=actualPaceA>0.5?actualPaceA:(S.hoursPerWeek||15);
        if(hrsPerWeek>available){
          const catchUpHrsToday=(hrsPerWeek/7).toFixed(1);
          behind.push({s,daysLeft,hrsPerWeek:hrsPerWeek.toFixed(1),catchUpHrsToday,needed:Math.round(needed),available:available.toFixed(1)});
        }
      }
    }
  }

  // Also check: hasn't studied in 2+ days with an upcoming exam
  const lastActivity=(S.activities||[]).slice(-1)[0];
  const daysSinceStudy=lastActivity?Math.round((Date.now()-new Date(lastActivity.date))/86400000):99;
  const hasUpcomingExam=(S.sections||[]).some(s=>S.examDates?.[s]&&new Date(S.examDates[s]+' 00:00:00')>Date.now());
  const inactiveAlert=daysSinceStudy>=2&&hasUpcomingExam;

  if(!behind.length&&!inactiveAlert) return '';

  const alerts=[];
  if(inactiveAlert&&daysSinceStudy>=2){
    alerts.push(`<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;margin-bottom:8px">
      <div style="font-size:18px;flex-shrink:0">⏰</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#92400e">You haven't studied in ${daysSinceStudy} days</div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">Every day away from the material makes it harder to retain. Even 30 minutes today keeps the streak alive.</div>
      </div>
      <button class="btn btn-sm" style="background:#f59e0b;color:#fff;border:none;flex-shrink:0;white-space:nowrap" onclick="openPostModal()">Log Session →</button>
    </div>`);
  }

  behind.forEach(b=>{
    alerts.push(`<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:10px;margin-bottom:8px">
      <div style="font-size:18px;flex-shrink:0">📉</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#991b1b"><span class="badge badge-${b.s}" style="margin-right:6px">${b.s}</span>${b.daysLeft} days to exam · ${b.needed}h still to cover</div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">At your current ${b.available}h/wk pace you won't make it. You need <strong>${b.hrsPerWeek}h/week</strong> — about <strong>${b.catchUpHrsToday}h/day</strong>. Either increase your hours or push your exam date.</div>
      </div>
      <button class="btn btn-sm" style="background:#ef4444;color:#fff;border:none;flex-shrink:0;white-space:nowrap" onclick="switchTab('dashboard');setTimeout(()=>document.getElementById('schedule-section')?.scrollIntoView({behavior:'smooth'}),100)">Reschedule →</button>
    </div>`);
  });

  return`<div style="margin-bottom:20px">${alerts.join('')}</div>`;
}

// WEEKLY COMMITMENT CONTRACT
// ═══════════════════════════════════════════════
function buildWeeklyCommitment(){
  // Get start of this week (Monday)
  const now=new Date();
  const dayOfWeek=now.getDay()===0?6:now.getDay()-1; // 0=Mon
  const weekStart=new Date(Date.now()-dayOfWeek*86400000);
  weekStart.setHours(0,0,0,0);
  const weekKey=weekStart.toISOString().slice(0,10);

  if(!S.commitments) S.commitments={};
  const commitment=S.commitments[weekKey];
  const weekHrsLogged=S.activities.filter(a=>new Date(a.date)>=weekStart).reduce((acc,a)=>acc+(a.hours||0),0);

  const curSec=getCurrentSection();
  const curEx=EXAMS[curSec];

  if(!commitment){
    // Show "set your commitment" prompt
    return`<div class="card card-pad" style="margin-bottom:20px;border-left:3px solid var(--ora)">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-size:28px;flex-shrink:0">🤝</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800;margin-bottom:3px">Set Your <span class="badge badge-${curSec}" style="vertical-align:middle;margin:0 2px">${curSec}</span> Goal This Week</div>
          <div style="font-size:12px;color:var(--sub)">Candidates who commit to a weekly goal are <strong>3× more likely</strong> to stay on track. How many hours of ${curEx?.full||curSec} this week?</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        ${[5,10,15,20,25].map(h=>`<button class="btn btn-ghost btn-sm" onclick="setWeeklyCommitment(${h})" style="flex:1;min-width:60px;justify-content:center">${h}h</button>`).join('')}
        <button class="btn btn-ghost btn-sm" onclick="setCustomCommitment()" style="flex:1;min-width:60px;justify-content:center">Custom</button>
      </div>
    </div>`;
  }

  const pct=Math.min(100,Math.round(weekHrsLogged/commitment*100));
  const remaining=Math.max(0,commitment-weekHrsLogged).toFixed(1);
  const daysLeftInWeek=7-dayOfWeek;
  const hrsPerDayNeeded=daysLeftInWeek>0?(parseFloat(remaining)/daysLeftInWeek).toFixed(1):'0';
  const met=weekHrsLogged>=commitment;

  return`<div class="card card-pad" style="margin-bottom:20px;${met?'border-left:3px solid var(--grn);background:var(--grn-bg)':'border-left:3px solid var(--ind)'}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mut)">This Week — <span class="badge badge-${curSec}" style="font-size:9px;vertical-align:middle">${curSec}</span></div>
        <div style="font-size:16px;font-weight:900;margin-top:2px">${met?'✅ Goal Crushed!':remaining+'h left to hit your '+commitment+'h goal'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:28px;font-weight:900;color:${met?'var(--grn)':'var(--ind)'};line-height:1">${pct}<span style="font-size:14px">%</span></div>
        <div style="font-size:10px;color:var(--mut)">${weekHrsLogged.toFixed(1)} / ${commitment}h</div>
      </div>
    </div>
    <div class="prog-bar" style="height:8px;margin-bottom:${met?'0':'10px'}">
      <div class="prog-fill" style="width:${pct}%;background:${met?'var(--grn)':'var(--ind)'}"></div>
    </div>
    ${!met?`<div style="font-size:11px;color:var(--sub)">${daysLeftInWeek} days left in week · needs <strong>${hrsPerDayNeeded}h/day</strong> to hit your commitment</div>`:''}
    <div style="margin-top:10px;display:flex;gap:8px">
      ${!met?`<button class="btn btn-primary btn-sm" onclick="openPostModal()" style="flex-shrink:0">+ Log Session</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="clearWeeklyCommitment('${weekKey}')" style="flex-shrink:0;margin-left:auto;color:var(--mut)">Change goal</button>
    </div>
  </div>`;
}

function setWeeklyCommitment(hrs){
  const now=new Date();
  const dayOfWeek=now.getDay()===0?6:now.getDay()-1;
  const weekStart=new Date(Date.now()-dayOfWeek*86400000);
  weekStart.setHours(0,0,0,0);
  const weekKey=weekStart.toISOString().slice(0,10);
  if(!S.commitments) S.commitments={};
  S.commitments[weekKey]=hrs;
  saveState();
  switchTab('dashboard');
  showToast(`Committed to ${hrs}h this week 🤝 Let's go!`,'ok');
}

function setCustomCommitment(){
  const val=prompt('Enter your weekly hour goal (e.g. 12):');
  const hrs=parseFloat(val);
  if(!hrs||hrs<1||hrs>100){showToast('Enter a number between 1 and 100','err');return;}
  setWeeklyCommitment(Math.round(hrs*2)/2);
}

function clearWeeklyCommitment(weekKey){
  if(!S.commitments) return;
  delete S.commitments[weekKey];
  saveState();
  switchTab('dashboard');
}

function buildDashboard(){
  const totalHrs=getTotalHours();
  const weekHrs=getWeekHours();
  const streak=getStreak();
  const weekGoal=S.hoursPerWeek||15;
  const weekPct=Math.min(100,Math.round(weekHrs/weekGoal*100));
  const today=todayStr();

  // 7-day chart data
  const last7=[];
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    const hrs=S.activities.filter(a=>a.date.slice(0,10)===d).reduce((a,b)=>a+(b.hours||0),0);
    last7.push({d,hrs,isToday:d===today,day:new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})});
  }
  const maxHrs=Math.max(...last7.map(d=>d.hrs),1);
  const chartBars=last7.map(d=>`
  <div class="week-bar-wrap">
    <div class="week-bar${d.isToday?' today-bar':''}" style="height:${Math.max(4,Math.round(d.hrs/maxHrs*88))}px" title="${d.hrs}h"></div>
    <div class="week-day-lbl">${d.day.slice(0,2)}</div>
  </div>`).join('');

  // Pacing per section
  const pacingCards=(S.sections||[]).map(s=>{
    const ex=EXAMS[s];
    const logged=getSectionHours(s);
    const pct=Math.min(100,Math.round(logged/getHourGoal(s)*100));
    const targetDate=S.examDates?.[s];
    const status=S.sectionStatus?.[s]||'planned';
    const passed=(S.sectionPassed||[]).includes(s);
    let paceMsg='';let paceClass='';
    if(targetDate&&!passed){
      const daysLeft=Math.round((new Date(targetDate+' 00:00:00')-Date.now())/86400000);
      const weeksLeft=Math.max(0.5,daysLeft/7);
      const needed=Math.max(0,getHourGoal(s)-logged);
      const hrsPerWeek=(needed/weeksLeft).toFixed(1);
      const available=S.hoursPerWeek||15;
      if(daysLeft<0){paceMsg='Exam date passed';paceClass='behind';}
      else if(parseFloat(hrsPerWeek)>available){paceMsg=`Need ${hrsPerWeek}h/wk — behind (you have ${available}h/wk)`;paceClass='behind';}
      else if(parseFloat(hrsPerWeek)<available*0.75){paceMsg=`${hrsPerWeek}h/wk needed — comfortable pace`;paceClass='on-pace';}
      else{paceMsg=`${hrsPerWeek}h/wk needed — tight but doable`;paceClass='ahead';}
    } else if(passed){paceMsg='Passed!';}
    else{paceMsg='Add a target date to see your pace';}

    return`<div class="pacing-card">
      <div style="width:44px;height:44px;flex-shrink:0">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="18" fill="none" stroke="var(--bdr2)" stroke-width="4"/>
          <circle cx="22" cy="22" r="18" fill="none" stroke="${ex.color}" stroke-width="4" stroke-dasharray="${2*Math.PI*18}" stroke-dashoffset="${2*Math.PI*18*(1-pct/100)}" stroke-linecap="round" transform="rotate(-90 22 22)"/>
          <text x="22" y="26" text-anchor="middle" font-size="9" font-weight="800" fill="${ex.color}">${pct}%</text>
        </svg>
      </div>
      <div class="pc-bar-wrap">
        <div class="pc-name">
          <span><span class="badge badge-${s}" style="margin-right:5px">${s}</span>${ex.full}</span>
          <span style="font-size:11px;color:var(--mut);font-weight:400">${logged}/${getHourGoal(s)}h</span>
        </div>
        <div class="prog-bar" style="margin:4px 0"><div class="prog-fill" style="width:${pct}%;background:${ex.color}"></div></div>
        <div class="pc-pace ${paceClass}">${paceMsg}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${targetDate?`<div style="font-size:10px;color:var(--mut)">Target</div><div style="font-size:12px;font-weight:700">${new Date(targetDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:''}
        <select onchange="updateSectionStatus('${s}',this.value)" style="margin-top:6px;padding:3px 6px;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;color:var(--sub);font-size:10px;outline:none;cursor:pointer">
          <option value="planned"${status==='planned'?' selected':''}>Planned</option>
          <option value="studying"${status==='studying'?' selected':''}>Studying</option>
          <option value="passed"${(S.sectionPassed||[]).includes(s)?' selected':''}>Passed ✓</option>
        </select>
      </div>
    </div>`;
  }).join('');

  // Calendar
  const calHTML=buildCalendar();

  const pacingAlert=buildPacingAlert();
  const readinessCard=buildReadinessCard();
  const commitmentCard=buildWeeklyCommitment();

  return`
<div style="max-width:880px;margin:0 auto">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px">
    <div>
      <h1 style="font-size:28px;font-weight:900;line-height:1;letter-spacing:-.03em">Hey, ${S.name}.</h1>
      <p style="color:var(--sub);font-size:13px;margin-top:6px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>
    </div>
    <button onclick="openStrugglingModal()" style="display:flex;align-items:center;gap:7px;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;flex-shrink:0" onmouseover="this.style.borderColor='var(--bdr2)'" onmouseout="this.style.borderColor='var(--bdr)'">
      <span style="font-size:14px">💪</span> Feeling stuck?
    </button>
  </div>

  ${pacingAlert}

  <div class="stats-grid" style="margin-bottom:var(--sp-5)">
    ${[
      {v:Math.round(totalHrs),l:'Total Hours',c:'var(--ora)'},
      {v:weekHrs.toFixed(1),l:'This Week',c:'var(--ind)'},
      {v:streak,l:'Day Streak',c:'#f59e0b',hot:streak>1},
      {v:(S.sectionPassed||[]).length+'/4',l:'Sections Passed',c:'var(--grn)'},
    ].map(s=>`<div class="stat-box" style="border-top:3px solid ${s.c}${s.hot?';background:linear-gradient(160deg,var(--surf),var(--amb-bg));box-shadow:0 0 0 1.5px rgba(245,158,11,.22),var(--shadow)':''}">${s.hot?`<div style="font-size:16px;margin-bottom:2px">🔥</div>`:''}<div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('')}
  </div>

  ${readinessCard}

  ${commitmentCard}

  <div class="card card-pad" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div class="section-title" style="margin-bottom:2px">Weekly Pacing</div>
        <div style="font-size:12px;color:var(--mut)">${weekHrs.toFixed(1)} of ${weekGoal} hrs</div>

      <div style="font-size:32px;font-weight:900;letter-spacing:-.04em;line-height:1;color:${weekPct>=100?'var(--grn)':weekPct>=70?'var(--amb)':'var(--ora)'}">${weekPct}<span style="font-size:16px;font-weight:700;opacity:.6">%</span></div>
    </div>
    <div class="prog-bar" style="height:10px;margin-bottom:14px"><div class="prog-fill" style="width:${weekPct}%;background:${weekPct>=100?'var(--grn)':weekPct>=70?'var(--amb)':'var(--ind)'}"></div></div>
    <div class="week-chart">${chartBars}</div>
    <div style="font-size:10px;color:var(--mut);text-align:center">Last 7 days · <span style="color:var(--ind)">■</span> = today</div>
  </div>

  <div class="card card-pad" style="margin-bottom:36px">
    <div class="section-title">Exam Pacing</div>
    ${pacingCards}
  </div>

  <div class="card card-pad" style="margin-bottom:20px">
    <div class="section-title">Study Calendar</div>
    ${calHTML}
  </div>

  <div class="card card-pad" style="margin-bottom:20px">
    <div class="section-title">Study Heat Map — Last 16 Weeks</div>
    ${buildHeatMap()}
  </div>

  <div class="card card-pad" style="margin-bottom:40px">
    <div class="section-title">Score Tracker</div>
    ${buildScoreTracker()}
  </div>

  <!-- Ask Ledger teaser on Dashboard -->
  <div class="card card-pad" style="margin-bottom:16px;background:linear-gradient(135deg,var(--ind-bg),var(--pur-bg));border-color:rgba(90,95,207,.25)">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--ind),var(--pur));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🤖</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:800;margin-bottom:3px">Ask Ledger</div>
        <div style="font-size:12px;color:var(--sub)">Your AI study coach — get personalized pacing, weak-spot alerts, and instant answers.</div>
      </div>
      <button onclick="switchTab('studylab');setTimeout(()=>openStudyLabTab('coach'),50)" class="btn btn-ind btn-sm" style="flex-shrink:0;white-space:nowrap">Open →</button>
    </div>
  </div>

  ${buildAdvancedAnalytics()}

  <div id="schedule-section">${buildStudySchedule()}</div>


</div>`;
}

function buildCalendar(){
  const now=new Date();
  const yr=now.getFullYear();
  const mo=now.getMonth();
  const first=new Date(yr,mo,1);
  const last=new Date(yr,mo+1,0);
  const startDow=first.getDay();
  const today=todayStr();

  // Build log map
  const logMap={};
  (S.activities||[]).forEach(a=>{
    const d=a.date.slice(0,10);
    if(!logMap[d])logMap[d]=[];
    logMap[d].push(a);
  });

  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let cells='';
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  cells+=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${new Date(yr,mo,1-startDow+i).getDate()}</div></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today;
    const logs=logMap[ds]||[];
    const examToday=Object.entries(S.examDates||{}).find(([,v])=>v===ds);
    cells+=`<div class="cal-day${isT?' is-today':''}" onclick="openDayLog('${ds}')">
      <div class="cal-day-num">${d}</div>
      ${examToday?`<div class="cal-pill" style="background:${EXAMS[examToday[0]].color}">🎯 ${examToday[0]}</div>`:''}
      ${logs.slice(0,2).map(a=>`<div class="cal-pill" style="background:${EXAMS[a.section]?.color||'#6366f1'}">✓ ${a.section} ${a.hours}h</div>`).join('')}
    </div>`;
  }
  const trail=(7-(startDow+last.getDate())%7)%7;
  for(let i=1;i<=trail;i++)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  return`<div style="font-size:14px;font-weight:700;margin-bottom:10px">${months[mo]} ${yr}</div><div class="cal-grid">${cells}</div>`;
}

function _achPreviewHTML(earnedIds, sectionId, showInfoBtn){
  const earned=new Set(earnedIds);
  const sorted=[...ACHIEVEMENTS].sort((a,b)=>(earned.has(a.id)?0:1)-(earned.has(b.id)?0:1));
  const makeItem=a=>{
    const e=earned.has(a.id);
    return`<div class="ach-item${e?' earned':''}"${showInfoBtn?' style="position:relative"':''}>
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      ${showInfoBtn?`<button onclick="event.stopPropagation();showAchInfo('${a.id}')" style="position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;color:var(--mut);font-size:9px;font-weight:800;width:14px;height:14px;border-radius:50%;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;padding:0;line-height:1">i</button>`:''}
    </div>`;
  };
  const preview=sorted.slice(0,8);
  const rest=sorted.slice(8);
  return`<div class="ach-grid" id="${sectionId}-preview">${preview.map(makeItem).join('')}</div>
    ${rest.length?`<div class="ach-grid" id="${sectionId}-rest" style="display:none;margin-top:8px">${rest.map(makeItem).join('')}</div>
    <button onclick="toggleAchSection('${sectionId}',${ACHIEVEMENTS.length})" id="${sectionId}-btn" style="margin-top:10px;width:100%;padding:9px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer">View all ${ACHIEVEMENTS.length} achievements ↓</button>`:''}`;
}
function toggleAchSection(id,total){
  const rest=document.getElementById(id+'-rest');
  const btn=document.getElementById(id+'-btn');
  if(!rest)return;
  const open=rest.style.display!=='none';
  rest.style.display=open?'none':'grid';
  if(btn)btn.textContent=open?`View all ${total} achievements ↓`:'Show less ↑';
}

  })():''}

  <!-- PRO: Weekly Progress Report -->
  ${isPro()?
    '<div class="card card-pad" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="section-title" style="margin-bottom:0">📝 Progress Report</div><span class="pro-plan-badge badge-pro">Pro</span></div><div style="background:var(--surf2);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px"><span style="font-size:32px">📊</span><div style="flex:1"><div style="font-size:13px;font-weight:700">Week of '+new Date(Date.now()-7*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div><div style="font-size:11px;color:var(--mut);margin-top:3px">'+Math.round(getWeekHours())+'h studied · '+getStreak()+' day streak · '+(S.activities||[]).filter(a=>new Date(a.date)>new Date(Date.now()-7*86400000)).length+' sessions</div></div><button class="btn btn-ind btn-sm" onclick="openProgressReport()">📊 View Report</button></div></div>'
    :

  }

  <!-- PRO+: Accountability Partner -->
  ${isPro()?`

        const weekAgo=new Date(Date.now()-7*86400000);

        const myHrs=S.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);

        '</div>'+

      }

      if(!candidates.length) return '<div style="font-size:12px;color:var(--sub)">Follow someone first to add them as your study partner.</div>';

        '</div>';
    })()}
  </div>`:''}

  <!-- SOCIAL CONNECT -->
  <div class="card card-pad">
    <div class="section-title">Connect Your Socials</div>
    <p style="font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.6">Share your CPA journey on LinkedIn and Facebook. Connected profiles are visible on your public study card.</p>
    <div class="social-link-row${(S.social?.linkedin)?` connected`:''}" onclick="openSocialModal('linkedin')">

// EXPLORE
// ═══════════════════════════════════════════════
function buildExplore(){
  // Full leaderboard (weekly hrs)
  const weekAgo=new Date(Date.now()-7*86400000);
  const entries=[];
  const myHrs=S.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
  entries.push({name:S.name,hrs:myHrs,totalHrs:Math.round(getTotalHours()),initials:S.name.slice(0,2).toUpperCase(),color:'#6366f1',isYou:true,streak:getStreak(),section:S.sections[0]});
  MOCK_FRIENDS.forEach(f=>{
    const hrs=f.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
    entries.push({name:f.name,hrs,totalHrs:f.totalHours,initials:f.initials,color:f.color,isYou:false,streak:f.streak,section:f.currentSection||'CPA ✅'});
  });
  entries.sort((a,b)=>b.hrs-a.hrs);
  const medals=['🥇','🥈','🥉'];
  const myRank=entries.findIndex(e=>e.isYou)+1;
  const tierBadge=(tier)=>tier==='elite'?'<span style="font-size:8px;font-weight:800;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;margin-left:5px;text-transform:uppercase">Elite</span>':tier==='pro'?'<span style="font-size:8px;font-weight:800;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:linear-gradient(135deg,#d44000,#d97706);color:#fff;margin-left:5px;text-transform:uppercase">Pro</span>':'';
  let lbRows;
  if(!isPro()){
    const youEntry=entries.find(e=>e.isYou);
    // Rows above the user — rendered but blurred
    const aboveRows=entries.slice(0,myRank-1).map((e,i)=>`
      <div class="lb-row" style="filter:blur(4px);user-select:none;pointer-events:none">
        <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||i+1}</div>
        <div class="avatar" style="width:32px;height:32px;font-size:11px;border-radius:50%;background:${e.color};color:#fff;flex-shrink:0">${e.initials}</div>
        <div class="lb-name">${e.name}</div>
        <div style="font-size:10px;color:var(--mut);margin-right:8px">🔥${e.streak}d</div>
        <div class="lb-hrs">${e.hrs.toFixed(1)}h</div>
      </div>`).join('');
    // Rows below the user — visible
    const belowRows=entries.slice(myRank).map((e,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${myRank+i+1}</div>
        <div class="avatar" style="width:32px;height:32px;font-size:11px;border-radius:50%;background:${e.color};color:#fff;flex-shrink:0">${e.initials}</div>
        <div class="lb-name">${e.name}</div>
        <div style="font-size:10px;color:var(--mut);margin-right:8px">🔥${e.streak}d</div>
        <div class="lb-hrs">${e.hrs.toFixed(1)}h</div>
      </div>`).join('');
    lbRows=`
      <div style="position:relative">
        ${aboveRows}
        ${myRank>1?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="openUpgradeModal('Full Leaderboard')">
          <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:8px 14px;text-align:center;box-shadow:var(--shadow-md)">
            <div style="font-size:11px;font-weight:800;color:var(--ora);margin-bottom:1px">${myRank-1} candidate${myRank>2?'s':''} ranked above you</div>
            <div style="font-size:10px;color:var(--sub);font-weight:600">Unlock with Pro →</div>
          </div>
        </div>`:''}
      </div>
      <div class="lb-row lb-you">
        <div class="lb-rank">${myRank}</div>
        <div class="avatar" style="width:32px;height:32px;font-size:11px;border-radius:50%;background:#6366f1;color:#fff;flex-shrink:0">${youEntry?youEntry.initials:'?'}</div>
        <div class="lb-name">You</div>
        <div style="font-size:10px;color:var(--mut);margin-right:8px">🔥${youEntry?youEntry.streak:0}d</div>
        <div class="lb-hrs">${youEntry?youEntry.hrs.toFixed(1):0}h</div>
      </div>
      ${belowRows}`;
  } else {
    lbRows=entries.map((e,i)=>{
      const friendTier=e.isYou?(SUB.tier||'free'):MOCK_FRIENDS.find(f=>f.name===e.name)?.tier||'free';
      return`<div class="lb-row${e.isYou?' lb-you':''}" style="${!e.isYou?'cursor:pointer;':''}" ${!e.isYou?`onclick="openUserProfile('${MOCK_FRIENDS.find(f=>f.name===e.name)?.id||'you'}')"`:''}>
      <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||i+1}</div>
      <div class="avatar" style="width:32px;height:32px;font-size:11px;border-radius:50%;background:${e.color};color:#fff;flex-shrink:0">${e.initials}</div>
      <div class="lb-name">${e.name}${e.isYou?' (you)':''}${tierBadge(friendTier)}</div>
      <div style="font-size:10px;color:var(--mut);margin-right:8px">🔥${e.streak}d</div>
      <div class="lb-hrs">${e.hrs.toFixed(1)}h</div>
    </div>`;
    }).join('');
  }

  // Challenges
  const joinedChallengeIds=S.challenges||[];
  const challengeCards=CHALLENGES.map(c=>{
    const canAccess=isPro()||c.free;
    const joined=joinedChallengeIds.includes(c.id);
    const prog=joined?getChallengeProgress(c):0;
    const done=(S.challengeCompleted||[]).includes(c.id)||(joined&&prog>=c.target);
    const pct=joined?Math.min(100,Math.round(prog/c.target*100)):0;
    let actionBtn;
    if(!canAccess) actionBtn='<button class="challenge-pro-badge" onclick="openUpgradeModal(\'All Challenges\')">🔒 Pro</button>';
    else if(done) actionBtn='<span style="font-size:11px;color:var(--grn);font-weight:700">✅ Complete</span>';
    else if(joined) actionBtn='<button class="btn btn-ghost btn-xs" style="color:var(--mut);font-size:10px" onclick="leaveChallenge(\''+c.id+'\')">Leave</button>';
    else actionBtn='<button class="btn btn-ghost btn-xs" onclick="joinChallenge(\''+c.id+'\')">Join</button>';
    const lockedStyle=!canAccess?'opacity:.55;filter:grayscale(.4);':'';
    return'<div class="challenge-card" style="border-color:'+(done?'var(--grn)':joined?'rgba(99,102,241,.4)':'var(--bdr)')+';background:'+(done?'var(--grn-bg)':joined?'var(--ind-bg)':'var(--surf)')+';'+lockedStyle+'"><div style="display:flex;align-items:flex-start;gap:10px"><div style="font-size:24px;flex-shrink:0">'+c.icon+'</div><div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div class="challenge-title" style="margin:0">'+c.title+'</div></div><div class="challenge-meta">'+c.desc+'</div>'+(joined?'<div style="margin:8px 0 4px"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:4px"><span>Progress</span><span>'+prog+' / '+c.target+'</span></div><div style="height:5px;background:var(--surf3);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(done?'var(--grn)':'var(--ind)')+';border-radius:4px;transition:width .4s"></div></div></div>':'')+'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><div></div>'+actionBtn+'</div><div style="margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--amb-bg);border-radius:20px;font-size:10px;font-weight:700;color:var(--amb)">🏅 '+c.reward+'</div></div></div></div>';
  }).join('')+
  (isElite()?'<div style="margin-top:6px;padding:12px 14px;background:linear-gradient(135deg,rgba(147,51,234,.08),rgba(212,64,0,.05));border:1.5px solid rgba(147,51,234,.2);border-radius:12px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:12px;font-weight:800;color:var(--pur)">✦ Elite — Create Custom Challenge</div><div style="font-size:11px;color:var(--mut);margin-top:2px">Set your own goal and invite your club members.</div></div><button class="btn btn-sm" style="background:var(--pur);color:#fff" onclick="showToast(\'Custom challenge creator coming soon! 🔮\',\'info\')">Create</button></div>':'');

  // Find friends
  const friendCards=MOCK_FRIENDS.map(f=>{
    const isFollowing=(S.following||[]).includes(f.id);
    const isPending=!isFollowing&&(S.pendingRequests||[]).includes(f.id);
    const weekHrs=f.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
    return`<div class="friend-card">
      <div class="avatar av-md" style="background:${f.color};color:#fff;cursor:pointer" onclick="openUserProfile('${f.id}')">${f.initials}</div>
      <div class="friend-info" style="cursor:pointer" onclick="openUserProfile('${f.id}')">
        <div class="friend-name">${f.name} ${f.passedSections.length===4?'🏆':''}${f.isPrivate?'<span style="font-size:10px;color:var(--mut)">🔒</span>':''}${f.tier==='elite'?'<span style="font-size:8px;font-weight:800;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;margin-left:4px;text-transform:uppercase">Elite</span>':f.tier==='pro'?'<span style="font-size:8px;font-weight:800;letter-spacing:.06em;padding:2px 5px;border-radius:4px;background:linear-gradient(135deg,#d44000,#d97706);color:#fff;margin-left:4px;text-transform:uppercase">Pro</span>':''}</div>
        <div class="friend-meta">${f.state} · ${f.currentSection||'CPA Achieved!'} · ${f.streak}d streak · ${weekHrs.toFixed(1)}h this week</div>

      ${inactiveCount>0?`<div style="font-size:10px;color:var(--mut);margin-top:8px;text-align:center">${inactiveCount} member${inactiveCount!==1?'s':''} taking a rest day</div>`:''}
    </div>
    ${buddyMatches.length?`<div class="card card-pad" style="margin-bottom:16px;border-left:3px solid var(--ind)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="font-size:18px">🤝</div>

          <div class="section-title" style="margin-bottom:0">Also Studying ${myCurrentSection}</div>

let postFeeling='💪';let postDiff=3;
function openPostModal(prefSection=''){
  postFeeling='💪';postDiff=3;
  const sectionOpts=(S.sections||['FAR','AUD','REG','TCP']).map(s=>`<option value="${s}"${s===prefSection?' selected':''}>${s} — ${EXAMS[s]?.full||s}</option>`).join('');
  const feelingOpts=['💪','😤','😅','🤔','😵','🔥'].map(f=>`<div class="feeling-opt${f===postFeeling?' selected':''}" onclick="selectFeeling('${f}',this)">${f}</div>`).join('');
  const diffOpts=[1,2,3,4,5].map(d=>`<div class="diff-opt${d===postDiff?' selected':''}" onclick="selectDiff(${d},this)">${d}</div>`).join('');

  document.getElementById('post-modal-body').innerHTML=`
<div class="form-grp">
  <label>Exam Section</label>
  <select id="pm-section">${sectionOpts}</select>
</div>
<div class="form-row">
  <div class="form-grp">
    <label>Hours Studied</label>
    <input id="pm-hours" type="number" min="0.5" max="16" step="0.5" placeholder="e.g. 2.5">
  </div>
  <div class="form-grp">
    <label>Date</label>
    <input id="pm-date" type="date" value="${todayStr()}">
  </div>
</div>
<div class="form-grp">
  <label>Material Covered <span style="color:var(--mut);font-weight:400">(optional)</span></label>
  <input id="pm-material" type="text" maxlength="120" placeholder="e.g. Governmental Accounting — Fund Structure">
</div>
<div class="form-grp">
  <label>Session Notes <span style="color:var(--mut);font-weight:400">(optional)</span></label>
  <textarea id="pm-caption" maxlength="500" placeholder="How did it go? What clicked? What's still tricky?"></textarea>
</div>
<div class="form-row">
  <div class="form-grp">
    <label>How'd it feel?</label>
    <div class="feeling-row" id="feeling-row">${feelingOpts}</div>
  </div>
  <div class="form-grp">
    <label>Difficulty (1–5)</label>
    <div class="diff-row" id="diff-row">${diffOpts}</div>
  </div>
</div>
<div style="display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surf2);border-radius:9px;margin-bottom:6px;margin-top:2px;cursor:pointer" onclick="document.getElementById('pm-private').checked=!document.getElementById('pm-private').checked">
  <input type="checkbox" id="pm-private" style="width:15px;height:15px;accent-color:var(--ind);cursor:pointer" onclick="event.stopPropagation()">
  <div>
    <div style="font-size:12px;font-weight:700;color:var(--txt)">Post privately</div>
    <div style="font-size:11px;color:var(--mut)">Others see "logged a session" — hours stay hidden</div>
  </div>
</div>
<button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:4px" onclick="submitPost()">📝 Post Session</button>`;
  document.getElementById('post-modal').classList.add('open');
}
function closePostModal(){document.getElementById('post-modal').classList.remove('open');}
function selectFeeling(f,el){
  postFeeling=f;
  document.querySelectorAll('#feeling-row .feeling-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function selectDiff(d,el){
  postDiff=d;
  document.querySelectorAll('#diff-row .diff-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function submitPost(){
  const btn=document.querySelector('#post-modal .btn-primary');
  if(btn?.disabled)return;
  const section=document.getElementById('pm-section')?.value;
  const hours=parseFloat(document.getElementById('pm-hours')?.value)||0;
  const date=document.getElementById('pm-date')?.value||todayStr();
  const material=(document.getElementById('pm-material')?.value?.trim()||'').slice(0,120);
  const caption=(document.getElementById('pm-caption')?.value?.trim()||'').slice(0,500);
  if(!section){showToast('Select a section','err');return;}
  if(hours<=0){showToast('Enter the number of hours you studied','err');return;}
  if(hours>16){showToast('Hours capped at 16 per session','err');return;}
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const isPrivate=document.getElementById('pm-private')?.checked||false;
  const act={id:'u'+Date.now(),date:date+'T'+new Date().toTimeString().slice(0,8),section,hours,material,caption,difficulty:postDiff,feeling:postFeeling,kudos:[],comments:[],private:isPrivate};
  S.activities.push(act);
  saveState();
  checkAchievements();
  checkChallengeAchievements();
  closePostModal();
  showToast(`Logged ${hours}h for ${section}! 💪`,'ok');
  currentTab='feed';
  renderApp();
}

function giveProps(actId,userId){
  if(userId==='you'){showToast("Can't give yourself props 😄",'err');return;}
  // Find in mock friends
  const friend=MOCK_FRIENDS.find(f=>f.id===userId);
  let act=null;
  if(friend)act=friend.activities.find(a=>a.id===actId);
  if(!act){showToast("Something went wrong — try reloading",'err');return;}
  const hasProps=act.kudos.includes('you');
  if(hasProps){act.kudos=act.kudos.filter(k=>k!=='you');}
  else{act.kudos.push('you');S.propsGiven=(S.propsGiven||0)+1;saveState();checkAchievements();}
  // Animate button
  const btn=document.querySelector(`[data-aid="${actId}"][data-uid="${userId}"] .ac-action`)||
    document.querySelector(`.activity-card[data-aid="${actId}"] .ac-action`);
  if(btn)btn.classList.add('props-anim');
  if(!hasProps)showToast('Props given! 👏','ok');
  renderTab();
}

function openComments(actId,userId){
  let act=null;
  let actOwner='';
  if(userId==='you'){
    act=S.activities.find(a=>a.id===actId);
    actOwner=S.name;
  } else {
    const friend=MOCK_FRIENDS.find(f=>f.id===userId);
    if(friend){act=friend.activities.find(a=>a.id===actId);actOwner=friend.name;}
  }
  if(!act)return;
  const renderCommentsBody=()=>{
    const comments=act.comments||[];
    const commentsHTML=comments.length?comments.map(c=>`
    <div class="comment-row">
      <div class="avatar" style="width:28px;height:28px;font-size:9px;border-radius:50%;background:var(--ind);color:#fff;flex-shrink:0">${esc(c.user).slice(0,2)}</div>
      <div class="comment-body">
        <div class="comment-author">${esc(c.user)}</div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px">No comments yet. Be the first!</div>`;
    document.getElementById('comments-modal-body').innerHTML=`
<div style="margin-bottom:10px;padding:10px;background:var(--surf2);border-radius:8px;font-size:12px;color:var(--sub)">
  <strong>${actOwner}</strong> · ${act.section} · ${act.hours}h
  ${act.caption?`<br><span style="color:var(--mut)">"${act.caption}"</span>`:''}
</div>
<div class="comments-wrap" style="background:transparent;padding:0;border:none">${commentsHTML}</div>
<div class="add-comment">
  <input id="comment-input" type="text" maxlength="300" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment('${actId}','${userId}')">
  <button class="btn btn-ind btn-sm" onclick="addComment('${actId}','${userId}')">Post</button>
</div>`;
  };
  renderCommentsBody();
  document.getElementById('comments-modal').classList.add('open');
}
function closeCommentsModal(){document.getElementById('comments-modal').classList.remove('open');}
function addComment(actId,userId){
  const input=document.getElementById('comment-input');
  const text=(input?.value?.trim()||'').slice(0,300);
  if(!text)return;
  let act=null;
  if(userId==='you'){act=S.activities.find(a=>a.id===actId);}
  else{const f=MOCK_FRIENDS.find(f=>f.id===userId);if(f)act=f.activities.find(a=>a.id===actId);}
  if(!act)return;
  if(!act.comments)act.comments=[];
  act.comments.push({user:S.name,text});
  if(userId==='you')saveState();
  input.value='';
  openComments(actId,userId);
  renderTab();
}

function shareActivity(actId){
  const url = window.location.href;
  if(navigator.share){
    navigator.share({title:'My CPA Study Session — Ledger',text:'Check out my study session on Ledger!',url})
      .catch(e=>{ if(e.name!=='AbortError') _fallbackShare(url); });
    return;
  }
  _fallbackShare(url);
}
function _fallbackShare(url){
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(url)
      .then(()=>showToast('Link copied! 📋','ok'))
      .catch(()=>_execCommandShare(url));
    return;
  }
  _execCommandShare(url);
}
function _execCommandShare(url){
  // Works on iOS Safari, older Android, and browsers without Clipboard API
  try{
    const ta=document.createElement('textarea');
    ta.value=url;
    ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    // iOS Safari needs this extra selection step
    const range=document.createRange();
    range.selectNodeContents(ta);
    const sel=window.getSelection();
    if(sel){sel.removeAllRanges();sel.addRange(range);}
    ta.setSelectionRange(0,99999);
    const ok=document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){showToast('Link copied! 📋','ok');return;}
  }catch(e){}
  _showShareDialog(url);
}

  overlay=document.createElement('div');
  overlay.id='_share-overlay';

// ── Session photo helpers ──────────────────────────────────────────────────
function _compressImage(dataURL, maxW, maxH, quality, cb){
  const img=new Image();
  img.onload=function(){
    let w=img.width,h=img.height;
    const ratio=Math.min(1, maxW/w, maxH/h);
    const cw=Math.round(w*ratio), ch=Math.round(h*ratio);
    const canvas=document.createElement('canvas');
    canvas.width=cw; canvas.height=ch;
    canvas.getContext('2d').drawImage(img,0,0,cw,ch);
    cb(canvas.toDataURL('image/jpeg',quality));
  };
  img.src=dataURL;
}
function _sessPhotoPickerHTML(){
  return '<label for="sess-photo-inp" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--surf2);border:1.5px dashed var(--bdr2);border-radius:10px;cursor:pointer;color:var(--sub);font-size:13px;font-weight:600;width:100%;box-sizing:border-box">' +
    '<span style="font-size:20px">📷</span>Add photo from camera or library' +
    '<input type="file" id="sess-photo-inp" accept="image/*" style="display:none" onchange="handleSessionPhotoUpload(this)">' +
  '</label>';
}
function clearSessionPhoto(){
  TS.sessionPhoto=null;
  const area=document.getElementById('sess-photo-area');
  if(area) area.innerHTML=_sessPhotoPickerHTML();
}
function handleSessionPhotoUpload(input){
  const file=input.files?.[0];
  if(!file)return;
  if(file.size>15*1024*1024){showToast('Image must be under 15 MB','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    _compressImage(e.target.result,1200,1200,0.72,function(compressed){
      TS.sessionPhoto=compressed;
      const area=document.getElementById('sess-photo-area');
      if(area){
        area.innerHTML=
          '<div style="position:relative;display:inline-block;width:100%">' +
            '<img src="'+compressed+'" style="width:100%;max-height:220px;object-fit:cover;border-radius:10px;display:block">' +
            '<button onclick="clearSessionPhoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</button>' +
          '</div>';
      }
    });
  };
  reader.readAsDataURL(file);
}

function _isUserPrivate(uid){
  const mock=MOCK_FRIENDS.find(f=>f.id===uid);
  if(mock) return !!mock.isPrivate;
  return !!(window._cachedPrivacy&&window._cachedPrivacy[uid]);
}

function toggleAccountPrivacy(val){
  S.isPrivate=val;
  const track=document.getElementById('privacy-toggle-track');
  if(track){
    track.style.background=val?'var(--ind)':'var(--surf3)';
    const dot=track.querySelector('span');
    if(dot) dot.style.left=val?'21px':'3px';
  }
  saveState();
  showToast(val?'Account set to private — only followers can see your activity':'Account is now public','ok');
}

function _sendFollowRequest(uid, btn){
  if(!S.pendingRequests) S.pendingRequests=[];
  if(S.pendingRequests.includes(uid)){
    // Cancel request
    S.pendingRequests=S.pendingRequests.filter(id=>id!==uid);
    if(btn){btn.textContent='Follow';btn.classList.remove('following');btn.style.background='';btn.style.color='';}
    saveState();
    showToast('Follow request cancelled','info');
  } else {
    S.pendingRequests.push(uid);
    if(btn){btn.textContent='Requested';btn.classList.remove('following');btn.style.background='var(--surf2)';btn.style.color='var(--sub)';}
    saveState();
    showToast('Follow request sent','ok');
  }
}

function toggleFollow(fId,btn){
  const following=S.following||[];
  const idx=following.indexOf(fId);
  if(idx>=0){
    following.splice(idx,1);
    S.following=following;
    if(btn){btn.textContent='Follow';btn.classList.remove('following');btn.style.background='';btn.style.color='';}
    saveState();checkAchievements();
    showToast('Unfollowed','info');
  } else if(_isUserPrivate(fId)){
    _sendFollowRequest(fId,btn);
  } else {
    following.push(fId);
    S.following=following;
    if(btn){btn.textContent='Following';btn.classList.add('following');btn.style.background='';btn.style.color='';}
    saveState();checkAchievements();saveFollowToFirestore();
    showToast('Following! Their sessions will now appear in your feed.','ok');
  }
}

function updateSectionStatus(section,status){
  if(!S.sectionStatus)S.sectionStatus={};
  S.sectionStatus[section]=status;
  if(status==='passed'){
    if(!S.sectionPassed)S.sectionPassed=[];
    if(!S.sectionPassed.includes(section)){
      const _priorAch=new Set(S.achievements||[]);
      S.sectionPassed.push(section);showToast(`🎉 ${section} marked as PASSED!`,'ok');
      checkAchievements();checkShareTrigger(_priorAch);
    } else { checkAchievements(); }
  } else {
    S.sectionPassed=(S.sectionPassed||[]).filter(s=>s!==section);
  }
  saveState();
  renderTab();
}

function openDayLog(dateStr){
  const logs=(S.activities||[]).filter(a=>a.date.slice(0,10)===dateStr);
  const fmt=new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const examOn=Object.entries(S.examDates||{}).find(([,v])=>v===dateStr);
  let html='';
  if(examOn)html+=`<div style="background:${EXAMS[examOn[0]].color}15;border:1px solid ${EXAMS[examOn[0]].color}44;border-radius:10px;padding:12px 14px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:${EXAMS[examOn[0]].color}">🎯 EXAM TARGET DATE</div><div style="font-size:14px;font-weight:700">${examOn[0]} — ${EXAMS[examOn[0]].full}</div></div>`;
  if(logs.length){
    html+=logs.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surf2);border-radius:8px;margin-bottom:6px">
      <div><span class="badge badge-${a.section}" style="margin-right:6px">${a.section}</span><strong>${a.hours}h</strong>${a.caption?`<div style="font-size:11px;color:var(--mut);margin-top:2px">${a.caption}</div>`:''}</div>

  } else if(!examOn){html+=`<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px">No sessions on this day.</div>`;}
  // Temp show as alert-like using toast
  const modal=document.getElementById('post-modal');
  document.getElementById('post-modal-body').innerHTML=`
<div style="font-size:13px;color:var(--sub);margin-bottom:14px;font-weight:600">${fmt}</div>
${html}
<div style="display:flex;gap:8px;margin-top:8px">

  document.getElementById('post-modal').querySelector('.modal-title').textContent=fmt;

function deleteActivity(id){
  S.activities=S.activities.filter(a=>a.id!==id);

  closePostModal();

function ssUpdateSection(){
  const sec=document.getElementById('ss-sec')?.value;
  if(sec){
    TS.section=sec;
    const ex=EXAMS[sec];
    if(ex){
      const bar=document.querySelector('.sess-color-bar');
      if(bar)bar.style.background=`linear-gradient(90deg,${ex.color},${ex.color}88)`;
    }
  }
}

function startTimer(){
  const sec=document.getElementById('ss-sec')?.value||TS.section;
  const mat=document.getElementById('ss-mat')?.value?.trim()||'';
  const goal=parseFloat(document.getElementById('ss-goal')?.value)||0;
  const date=document.getElementById('ss-date')?.value||todayStr();
  if(!sec){showToast('Select a section','err');return;}
  TS.section=sec;TS.material=mat;TS.goalHours=goal;TS.date=date;
  TS.elapsed=0;TS.startTime=Date.now();TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();
  updateNavChip();
}

function pauseTimer(){
  if(TS.phase!=='active')return;
  clearInterval(timerInterval);timerInterval=null;
  TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='paused';
  renderSessCard();updateNavChip();
}

function resumeTimer(){
  if(TS.phase!=='paused')return;
  TS.startTime=Date.now()-(TS.elapsed*1000);
  TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();updateNavChip();
}

function endSession(){
  clearInterval(timerInterval);timerInterval=null;
  if(TS.phase==='active')TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='recap';
  renderSessCard();updateNavChip();
}

function updateNavChip(){
  const chip=document.getElementById('nav-sess-chip');
  const btn=document.getElementById('nav-log-btn');
  if(!chip)return;
  const isActive=TS.phase==='active'||TS.phase==='paused';
  if(isActive){
    chip.style.display='inline-flex';
    chip.innerHTML=`<span class="active-sess-chip" onclick="openSessionModal()"><span class="rec-dot" ${TS.phase==='paused'?'style="animation:none;opacity:.4"':''}></span>${TS.section} <span class="active-sess-time" id="topbar-timer">${fmtElapsed(TS.elapsed)}</span></span>`;
    if(btn){btn.textContent='Resume';btn.onclick=()=>openSessionModal();}
  } else {
    chip.style.display='none';
    if(btn){btn.textContent='▶ Start Session';btn.onclick=()=>openSessionModal();}
  }
}

function addConceptTag(){
  const inp=document.getElementById('concept-inp');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val||TS.concepts.includes(val))return;
  TS.concepts.push(val);
  inp.value='';
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
  inp.focus();
}

function removeConceptTag(idx){
  TS.concepts.splice(idx,1);
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
}

function setSessFeeling(f){
  TS.feeling=f;
  document.querySelectorAll('.feeling-r-btn').forEach(b=>b.classList.toggle('sel',b.textContent===f));
}

function setSessDiff(d){
  TS.difficulty=d;
  document.querySelectorAll('.diff-r-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===d));
}

function saveSession(){
  const saveBtn=document.querySelector('.sess-save-btn');
  if(saveBtn?.disabled)return;
  const notes=(document.getElementById('sess-notes-ta')?.value?.trim()||'').slice(0,500);
  const section=document.getElementById('recap-sec')?.value||TS.section;
  const date=document.getElementById('recap-date')?.value||TS.date||todayStr();
  const hours=parseFloat((TS.elapsed/3600).toFixed(2));
  if(!section){showToast('No section selected','err');return;}
  if(TS.elapsed<30){showToast('Sessions must be at least 30 seconds to save','err');return;}
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving…';}
  const act={
    id:'u'+Date.now(),
    date:date+'T'+new Date().toTimeString().slice(0,8),
    section,hours:Math.max(0.1,hours),
    material:TS.material,
    caption:notes,
    difficulty:TS.difficulty,
    feeling:TS.feeling,
    concepts:[...TS.concepts],
    elapsed:TS.elapsed,
    photo:TS.sessionPhoto||null,
    kudos:[],comments:[]
  };
  const _priorScore=calcReadinessScore().score;
  S.activities.push(act);
  const _priorAch=new Set(S.achievements||[]);
  saveState();checkAchievements();checkChallengeAchievements();
  document.getElementById('sess-overlay')?.classList.remove('open');
  tsReset();updateNavChip();
  const _newScore=calcReadinessScore().score;
  const _delta=_newScore-_priorScore;
  if(_delta>0) showToast(`Session saved! Readiness +${_delta} → ${_newScore}`,'ok');
  else showToast(`Session posted! ${fmtDur(act.elapsed)} for ${section}`,'ok');
  currentTab='feed';renderApp();
  checkShareTrigger(_priorAch);
}

function discardSession(){
  clearInterval(timerInterval);timerInterval=null;
  tsReset();
  document.getElementById('sess-overlay')?.classList.remove('open');
  updateNavChip();
}

async function openUserProfile(userId){
  if(userId==='you'||userId===AUTH?.uid){switchTab('profile');return;}
  let el=document.getElementById('uprofile-modal');
  if(!el){
    el=document.createElement('div');
    el.id='uprofile-modal';
    el.className='modal-overlay';
    el.style.cssText='align-items:flex-start;padding:0;overflow-y:auto';
    el.innerHTML=`<div id="uprofile-page" onclick="event.stopPropagation()" style="width:100%;max-width:700px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column"><div id="uprofile-content" style="flex:1"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)closeUserProfile();});
    document.body.appendChild(el);
  }
  el.classList.add('open');
  document.getElementById('uprofile-content').innerHTML=`<div style="padding:80px;text-align:center;color:var(--mut);font-size:13px">Loading…</div>`;
  const mock=MOCK_FRIENDS.find(x=>x.id===userId);
  if(mock){_renderFullUserProfile(_normProfileMock(mock));return;}
  if(firebaseDb){
    try{
      const snap=await firebaseDb.collection('users').doc(userId).get();
      if(snap.exists){_renderFullUserProfile(_normProfileFirestore(snap.data()));return;}
    }catch(e){}
  }
  document.getElementById('uprofile-content').innerHTML=`<div style="padding:80px 40px;text-align:center"><div style="font-size:32px;margin-bottom:12px">🔍</div><div style="font-size:14px;font-weight:700;color:var(--txt)">Profile not found</div><button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="closeUserProfile()">Close</button></div>`;
}

function _normProfileMock(f){
  const allSecs=[...new Set([...(f.passedSections||[]),(f.currentSection||null)].filter(Boolean))];
  return{uid:f.id,name:f.name,initials:f.initials,color:f.color,bio:f.bio||'',state:f.state,city:'',locationState:'',school:'',classYear:'',disc:f.currentSection||'',sections:allSecs,sectionPassed:f.passedSections||[],hoursTotal:f.totalHours||0,streak:f.streak||0,sessionCount:f.activities.length,weekHrs:f.activities.filter(a=>new Date(a.date)>new Date(Date.now()-7*86400000)).reduce((s,a)=>s+(a.hours||0),0),activities:f.activities||[],achievements:[],avatar:'',profilePic:'',tier:'free',firmName:'',isMock:true,isPrivate:!!f.isPrivate};
}
function _normProfileFirestore(u){
  const name=u.displayName||'CPA Candidate';
  const initials=name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
  const colors=['#d44000','#5a5fcf','#0ea574','#9333ea','#0fb5aa'];
  const color=colors[name.charCodeAt(0)%colors.length];
  return{uid:u.uid,name,initials,color:u.color||color,bio:u.bio||'',state:u.state||'',city:u.city||'',locationState:u.locationState||'',school:u.school||'',classYear:u.classYear||'',disc:u.disc||'',sections:u.sections||[],sectionPassed:u.sectionPassed||[],hoursTotal:u.hoursTotal||0,streak:0,sessionCount:0,weekHrs:0,activities:[],achievements:u.achievements||[],avatar:u.avatar||'',profilePic:u.profilePic||'',tier:u.tier||'free',firmName:u.firmName||'',isMock:false};
}

function _renderFullUserProfile(u){
  const isFollowing=(S.following||[]).includes(u.uid);

function toggleFollowViewProfile(uid){
  if(!S.following)S.following=[];
  const btn=document.getElementById('vp-follow-btn');
  const idx=S.following.indexOf(uid);
  if(idx>=0){
    S.following.splice(idx,1);
    saveState();saveFollowToFirestore();checkAchievements();
    if(btn){btn.textContent='+ Follow';btn.style.background='var(--ora)';btn.style.border='1px solid transparent';}
    showToast('Unfollowed','info');
  } else if(_isUserPrivate(uid)){
    if(!S.pendingRequests)S.pendingRequests=[];
    if(S.pendingRequests.includes(uid)){
      S.pendingRequests=S.pendingRequests.filter(id=>id!==uid);
      if(btn){btn.textContent='+ Follow';btn.style.background='var(--ora)';btn.style.border='1px solid transparent';}
      saveState();showToast('Follow request cancelled','info');
    } else {
      S.pendingRequests.push(uid);
      if(btn){btn.textContent='Requested';btn.style.background='rgba(255,255,255,.15)';btn.style.border='1px solid rgba(255,255,255,.25)';}
      saveState();showToast('Follow request sent','ok');
    }
  } else {
    S.following.push(uid);
    saveState();saveFollowToFirestore();checkAchievements();
    if(btn){btn.textContent='✓ Following';btn.style.background='rgba(255,255,255,.15)';btn.style.border='1px solid rgba(255,255,255,.25)';}
    showToast('Following!','ok');
  }
}



function closeUserProfile(){document.getElementById('uprofile-modal')?.classList.remove('open');}


function toggleFollowProfile(userId,btn){
  const following=S.following||[];
  const idx=following.indexOf(userId);
  if(idx>=0){following.splice(idx,1);}else{following.push(userId);}
  S.following=following;saveState();checkAchievements();
  const isNow=(S.following||[]).includes(userId);
  btn.textContent=isNow?'✓ Following':'+ Follow';
  btn.className=`btn ${isNow?'btn-ghost':'btn-primary'}`;
  btn.style.flex='1';btn.style.justifyContent='center';
  showToast(isNow?'Following! Sessions will appear in your feed.':'Unfollowed','ok');
  renderUserProfile(userId);
}

function openDirectMessage(userId, displayName, displayInitials){
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  const name=f?.name||displayName||'User';
  const initials=f?.initials||displayInitials||(name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase())||'??';
  const color=f?.color||'#5a5fcf';
  if(!S.clubs)S.clubs=[];
  let directClub=(S.clubs).find(c=>c.isDM&&c.members.includes(userId));
  if(!directClub){
    const clubId='c'+Date.now();
    directClub={id:clubId,name,icon:initials[0]||'💬',color,desc:'Direct message',isPrivate:true,isDM:true,members:['you',userId],created:Date.now()};
    S.clubs.push(directClub);
    if(!S.clubMessages)S.clubMessages={};
    S.clubMessages[clubId]=[{author:'system',text:`Conversation started with ${name}`,time:new Date().toISOString(),isSystem:true}];
    saveState();
  }
  closeUserProfile();
  openClubChat(directClub.id);
}

function promptInviteToClub(userId){
  const f=MOCK_FRIENDS.find(x=>x.id===userId);if(!f)return;
  const myClubs=(S.clubs||[]).filter(c=>!c.isDM&&c.members.includes('you'));
  if(!myClubs.length){
    if(confirm(`You have no study clubs yet. Create one and invite ${f.name}?`)){createClubModal();}
    return;
  }
  let el=document.getElementById('invite-club-modal');
  if(!el){
    el=document.createElement('div');
    el.id='invite-club-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px"><div class="modal-hdr"><div class="modal-title" id="invite-club-title"></div><button class="modal-close" onclick="document.getElementById('invite-club-modal').classList.remove('open')">×</button></div><div class="modal-body" id="invite-club-body"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
    document.body.appendChild(el);
  }
  document.getElementById('invite-club-title').textContent=`Invite ${f.name} to a Club`;
  document.getElementById('invite-club-body').innerHTML=myClubs.map(c=>`
  <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;border:1px solid var(--bdr);margin-bottom:8px;transition:all .15s" onclick="inviteToClub('${c.id}','${userId}',this)" onmouseover="this.style.borderColor='var(--ind)'" onmouseout="this.style.borderColor='var(--bdr)'">
    <div style="font-size:22px">${c.icon}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:700">${c.name}</div><div style="font-size:11px;color:var(--mut)">${c.members.length} members</div></div>
    <span style="font-size:12px;color:var(--ind);font-weight:600">Invite →</span>
  </div>`).join('');
  el.classList.add('open');
}

function inviteToClub(clubId,userId,el){
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  if(!club||!f)return;
  if(club.members.includes(userId)){showToast(`${f.name} is already in this club!`,'info');return;}
  club.members.push(userId);
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'system',text:`${f.name} was invited to the club`,time:new Date().toISOString(),isSystem:true});
  saveState();
  document.getElementById('invite-club-modal')?.classList.remove('open');
  showToast(`${f.name} invited to ${club.name}! 🎉`,'ok');
  renderTab();
}

}
function getClubMemberInitials(memberId){
  if(memberId==='you')return S.name.slice(0,2).toUpperCase();

  document.querySelectorAll('[data-ico]').forEach(e=>{e.style.borderColor='var(--bdr)';e.style.background='var(--surf2)';});
  el.style.borderColor='var(--ind)';el.style.background='var(--ind-bg)';

function closeCreateClubModal(){document.getElementById('create-club-modal')?.classList.remove('open');}
function saveNewClub(){
  const name=document.getElementById('ncn')?.value?.trim();
  if(!name){showToast('Enter a club name','err');return;}
  const desc=document.getElementById('ncd')?.value?.trim()||'';
  const icon=window._selectedClubIcon||'📚';
  const members=['you'];
  document.querySelectorAll('[id^="cm-"]').forEach(cb=>{if(cb.checked)members.push(cb.value);});
  const clubId='c'+Date.now();
  const club={id:clubId,name,icon,desc,isPrivate:true,members,created:Date.now()};
  if(!S.clubs)S.clubs=[];
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[clubId]=[
    {author:'system',text:`${S.name} created "${name}"`,time:new Date().toISOString(),isSystem:true},
    ...members.filter(m=>m!=='you').map(m=>({author:'system',text:`${getClubMemberName(m)} was invited`,time:new Date().toISOString(),isSystem:true}))
  ];
  saveState();
  closeCreateClubModal();
  showToast(`${icon} "${name}" created!`,'ok');
  renderTab();
  setTimeout(()=>openClubChat(clubId),200);
}

function openClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  let el=document.getElementById('club-chat-modal');
  if(!el){
    el=document.createElement('div');
    el.id='club-chat-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:520px;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden"><div id="club-chat-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)closeClubChat();});
    document.body.appendChild(el);
  }
  renderClubChat(clubId);
  el.classList.add('open');
}

function renderClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  const msgs=(S.clubMessages||{})[clubId]||[];
  const memberAvatars=club.members.slice(0,6).map((m,i)=>`<div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${getClubMemberColor(m)};color:#fff;border:2px solid var(--surf);margin-left:${i===0?0:-8}px;flex-shrink:0" title="${getClubMemberName(m)}">${getClubMemberInitials(m)}</div>`).join('');
  const msgHTML=msgs.map(msg=>{
    if(msg.isSystem)return`<div class="chat-system">— ${msg.text} —</div>`;
    const isMine=msg.author==='you';
    const name=getClubMemberName(msg.author);
    const initials=getClubMemberInitials(msg.author);
    const color=getClubMemberColor(msg.author);
    const timeStr=new Date(msg.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return`<div class="chat-row${isMine?' mine':''}">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${color};color:#fff;flex-shrink:0">${initials}</div>
      <div>
        ${!isMine?`<div style="font-size:10px;color:var(--mut);margin-bottom:2px;font-weight:600">${name}</div>`:''}
        <div class="chat-bub ${isMine?'chat-bub-mine':'chat-bub-them'}">${msg.text}</div>
        <div class="chat-meta${!isMine?' chat-meta-them':''}">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  const el=document.getElementById('club-chat-content');
  if(!el)return;
  const memberCount=club.members.length;
  const dmOtherId=club.isDM?club.members.find(m=>m!=='you'):null;
  const dmFriend=dmOtherId?MOCK_FRIENDS.find(f=>f.id===dmOtherId):null;
  const dmAvatarHtml=dmFriend?('<div class="avatar" style="width:34px;height:34px;border-radius:50%;background:'+getClubMemberColor(dmOtherId)+';color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">'+getClubMemberInitials(dmOtherId)+'</div>'):'💬';
  const iconHtml=club.isDM?dmAvatarHtml:('<span style="font-size:24px">'+club.icon+'</span>');
  const placeholderName=club.isDM&&dmFriend?dmFriend.name.split(' ')[0]:club.name;
  el.innerHTML=`
<div style="flex-shrink:0;padding:16px 20px 14px;border-bottom:1px solid var(--bdr)">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex-shrink:0">${iconHtml}</div>
    <div style="min-width:0;flex:1">
      <div style="font-size:15px;font-weight:800">${club.name}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:1px">${club.isDM?'Direct message':'🔒 Private · '+memberCount+' member'+(memberCount!==1?'s':'')}</div>
    </div>
    <div style="display:flex;align-items:center;padding-right:4px">${memberAvatars}</div>
    <button class="modal-close" onclick="closeClubChat()" style="flex-shrink:0">×</button>
  </div>
</div>
<div class="club-chat-area" id="cca-${clubId}" style="flex:1;padding:12px 20px;height:auto;min-height:0">${msgHTML||'<div class="chat-system">— No messages yet. Say hello! 👋 —</div>'}</div>
<div class="chat-footer" style="flex-shrink:0;padding:10px 20px 16px;border-top:1px solid var(--bdr)">
  <input class="chat-inp" id="cci-${clubId}" placeholder="Message ${placeholderName}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendClubMessage('${clubId}');}">
  <button class="chat-send" onclick="sendClubMessage('${clubId}')">Send</button>
</div>`;
  setTimeout(()=>{
    const area=document.getElementById('cca-'+clubId);
    if(area)area.scrollTop=area.scrollHeight;
    document.getElementById('cci-'+clubId)?.focus();
  },50);
}

function sendClubMessage(clubId){
  const inp=document.getElementById('cci-'+clubId);
  const text=inp?.value?.trim();if(!text)return;
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'you',text,time:new Date().toISOString()});
  saveState();
  inp.value='';
  renderClubChat(clubId);
  // Simulate a reply from a club member for live feel
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const others=(club?.members||[]).filter(m=>m!=='you');
  if(others.length){
    const replies=['Great session! 💪','Keep grinding! 🔥','Same! I just wrapped a session too.','How many MCQs did you do?',"That topic is no joke — you've got this though!",'🧠 Big brain energy','Let\'s crush this exam together 🎯','Nice work! What material did you cover?','On a roll!! 🔥','Solid. That chapter is super testable.'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    const responder=others[Math.floor(Math.random()*others.length)];
    setTimeout(()=>{
      if(!(S.clubMessages||{})[clubId])return;
      S.clubMessages[clubId].push({author:responder,text:reply,time:new Date().toISOString()});
      saveState();
      renderClubChat(clubId);
    },1100+Math.random()*1200);
  }
}
function closeClubChat(){document.getElementById('club-chat-modal')?.classList.remove('open');}

function joinPublicClub(pubId){
  const pc=PUBLIC_CLUBS.find(c=>c.id===pubId);if(!pc)return;
  if(!S.clubs)S.clubs=[];
  if(S.clubs.find(c=>c.id===pubId)){showToast('Already a member!','info');return;}
  const club={id:pubId,name:pc.name,icon:pc.icon,desc:pc.desc,isPrivate:false,isDM:false,isPublic:true,
    members:['you'],created:Date.now()};
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[pubId]=[
    {author:'system',text:'You joined '+pc.name+'! Welcome to the community 🎉',time:new Date().toISOString(),isSystem:true}
  ];
  saveState();
  renderTab();
  showToast('Joined '+pc.name+'! 🎉','ok');
}

function closeNotifModal(){document.getElementById('notif-modal')?.remove();}

function handleNotifNav(targetType, targetId){
  closeNotifModal();
  if(!targetType) return;
  if(targetType==='user' && targetId){
    // Open the user's profile card
    openUserProfile(targetId);
  } else if(targetType==='activity' && targetId){
    // Go to feed and scroll to the post
    switchTab('feed');
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const card=document.querySelector(`.activity-card[data-aid="${targetId}"]`);
        if(card){
          card.scrollIntoView({behavior:'smooth',block:'center'});
          card.style.transition='box-shadow .4s, outline .4s';
          card.style.outline='2px solid var(--ora)';
          card.style.boxShadow='0 0 0 4px rgba(212,64,0,.18)';
          setTimeout(()=>{card.style.outline='';card.style.boxShadow='';},2200);
        }
      });
    });
  } else if(targetType==='profile'){
    // Go to profile/achievements
    switchTab('profile');
  }
}

function clearAllNotifs(){
  S.notifications=[];
  saveState();
  closeNotifModal();
  showToast('Notifications cleared','info');
}

function addNotification(type, icon, text, fromId, targetType, targetId){
  if(!S.notifications) S.notifications=_defaultNotifications();
  S.notifications.unshift({
    id:'n'+Date.now(),type,icon,text,from:fromId||null,
    targetType:targetType||null,targetId:targetId||null,
    time:new Date().toISOString(),read:false
  });
  if(S.notifications.length>50) S.notifications=S.notifications.slice(0,50);
  saveState();
}
