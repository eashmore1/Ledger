          <div style="font-size:30px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1">${streak}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;font-weight:600">Day Streak</div>
        </div>
        <div>
          <div style="font-size:30px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1">${(S.activities||[]).length}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;font-weight:600">Sessions</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROGRESS + WEEK -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card card-pad">
      <div class="section-title">Exam Progress</div>
      ${sectionProgress||'<div style="color:var(--mut);font-size:12px">No sections added yet.</div>'}
    </div>
    <div class="card card-pad" style="text-align:center">
      <div class="section-title">This Week</div>
      <div style="font-size:48px;font-weight:900;color:var(--ora);line-height:1">${weekHrs.toFixed(1)}</div>
      <div style="font-size:12px;color:var(--mut);margin-bottom:14px">hours studied</div>
      <div style="font-size:13px;font-weight:700;color:var(--sub)">Goal: ${S.hoursPerWeek||15} hrs</div>
      <div class="prog-bar" style="margin-top:8px;height:8px"><div class="prog-fill" style="width:${Math.min(100,Math.round(weekHrs/(S.hoursPerWeek||15)*100))}%;background:var(--ora)"></div></div>
    </div>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="card card-pad" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">Achievements (${(S.achievements||[]).length}/${ACHIEVEMENTS.length})</div>
      <span style="font-size:10px;color:var(--mut)">Click <strong>i</strong> on any badge to see how to unlock it</span>
    </div>
    <div class="ach-grid">${achHTML}</div>
  </div>

  <!-- RECENT SESSIONS -->
  <div class="card card-pad" style="margin-bottom:16px">
    <div class="section-title">Recent Sessions (${(S.activities||[]).length} total)</div>
    ${recentActs||`<div class="empty-state" style="padding:24px 0"><div class="empty-icon">📖</div><div class="empty-msg">No sessions logged yet.<br><button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="openSessionModal()">▶ Start First Session</button></div></div>`}
  </div>

  <!-- DIRECT MESSAGES -->
  ${(()=>{
    const dms=(S.clubs||[]).filter(c=>c.isDM);
    if(!dms.length) return '';
    return'<div class="card card-pad" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="section-title" style="margin-bottom:0">💬 Direct Messages ('+dms.length+')</div><button class="btn btn-ghost btn-xs" onclick="openMessagesModal()">View All</button></div>'+dms.slice(0,3).map(c=>{const otherId=c.members.find(m=>m!=='you');const friend=MOCK_FRIENDS.find(f=>f.id===otherId);const msgs=(S.clubMessages||{})[c.id]||[];const lastMsg=msgs.filter(m=>!m.isSystem).slice(-1)[0];return'<div class="my-club-card" onclick="openClubChat(\''+c.id+'\')"><div class="avatar av-md" style="background:'+(friend?.color||'#6366f1')+';color:#fff;flex-shrink:0">'+(friend?.initials||c.name.slice(0,2).toUpperCase())+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+c.name+'</div>'+(lastMsg?'<div style="font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(lastMsg.author==='you'?'You: ':'')+lastMsg.text+'</div>':'<div style="font-size:11px;color:var(--mut)">No messages yet</div>')+'</div><span style="font-size:18px;color:var(--mut)">›</span></div>';}).join('')+'</div>';
  })()}

  <!-- MY CLUBS -->
  <div class="card card-pad" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">🏛️ My Study Clubs (${(S.clubs||[]).filter(c=>!c.isDM).length})</div>
      <button class="btn btn-ghost btn-xs" onclick="createClubModal()">+ Create Club</button>
    </div>
    ${(()=>{
      const clubs=(S.clubs||[]).filter(c=>!c.isDM);
      if(!clubs.length) return'<div style="text-align:center;padding:18px 0;color:var(--mut);font-size:13px">No clubs yet — create one or join a public club in Explore.<br><button class="btn btn-ind btn-sm" style="margin-top:10px" onclick="createClubModal()">✨ Create First Club</button></div>';
      return clubs.map(c=>{
        const msgs=(S.clubMessages||{})[c.id]||[];
        const lastMsg=msgs.filter(m=>!m.isSystem).slice(-1)[0];
        return'<div class="my-club-card" onclick="openClubView(\''+c.id+'\')"><div class="club-ico">'+c.icon+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+c.name+'</div><div style="font-size:11px;color:var(--mut);margin-top:1px">'+(c.isPublic?'🌐 Public':'🔒 Private')+' · '+c.members.length+' member'+(c.members.length!==1?'s':'')+'</div>'+(lastMsg?'<div style="font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(lastMsg.author==='you'?'You':getClubMemberName(lastMsg.author))+': '+lastMsg.text+'</div>':'<div style="font-size:11px;color:var(--mut);margin-top:2px">No messages yet</div>')+'</div><span style="font-size:18px;color:var(--mut)">›</span></div>';
      }).join('')+'<button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="openMessagesModal()">View All Clubs →</button>';
    })()}
  </div>

  <!-- Streak Shield pill (subtle) -->
  ${isPro()?(()=>{
    const shieldsUsed=S.shieldsUsed||0;
    const shieldsTotal=isElite()?999:3;
    const remaining=isElite()?'∞':shieldsTotal-shieldsUsed;
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;margin-bottom:12px;cursor:pointer" onclick="useStreakShield()" title="Streak Shield — protects your streak if you miss a day"><span style="font-size:14px">🛡️</span><span style="font-size:12px;font-weight:700;color:var(--sub)">Streak Shield</span><span style="font-size:11px;color:var(--mut)">'+remaining+' remaining</span><button class="btn btn-ghost btn-xs" style="margin-left:auto" onclick="event.stopPropagation();useStreakShield()">Use</button></div>';
  })():''}

  <!-- PRO: Weekly Progress Report -->
  ${isPro()?
    '<div class="card card-pad" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="section-title" style="margin-bottom:0">📝 Progress Report</div><span class="pro-plan-badge badge-pro">Pro</span></div><div style="background:var(--surf2);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px"><span style="font-size:32px">📊</span><div style="flex:1"><div style="font-size:13px;font-weight:700">Week of '+new Date(Date.now()-7*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div><div style="font-size:11px;color:var(--mut);margin-top:3px">'+Math.round(getWeekHours())+'h studied · '+getStreak()+' day streak · '+(S.activities||[]).filter(a=>new Date(a.date)>new Date(Date.now()-7*86400000)).length+' sessions</div></div><button class="btn btn-ind btn-sm" onclick="openProgressReport()">📊 View Report</button></div></div>'
    :
    '<div class="card card-pad pro-lock-wrap" style="margin-bottom:16px"><div class="section-title">📝 Weekly Progress Reports</div><div style="opacity:.3;pointer-events:none;user-select:none;background:var(--surf2);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px"><span style="font-size:32px">📄</span><div><div style="font-size:13px;font-weight:700">Week of Apr 7–14</div><div style="font-size:11px;color:var(--mut)">Your automated study summary PDF</div></div><div style="margin-left:auto;background:var(--bdr);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--mut)">Download PDF</div></div>'+proLockHTML('Weekly Progress Reports','Unlock Reports')+'</div>'
  }

  <!-- SOCIAL CONNECT -->
  <div class="card card-pad">
    <div class="section-title">Connect Your Socials</div>
    <p style="font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.6">Share your CPA journey on LinkedIn and Facebook. Connected profiles are visible on your public study card.</p>
    <div class="social-link-row${(S.social?.linkedin)?` connected`:''}" onclick="openSocialModal('linkedin')">
      <div class="soc-icon soc-li">in</div>
      <div class="soc-link-info">
        <div class="soc-link-name">LinkedIn${S.social?.linkedin?' ✓':''}</div>
        <div class="soc-link-url">${S.social?.linkedin||'Not connected — click to add'}</div>
      </div>
      <span style="font-size:11px;color:${S.social?.linkedin?'var(--grn)':'var(--mut)'}">
        ${S.social?.linkedin?'Connected':'Connect →'}
      </span>
    </div>
    <div class="social-link-row${(S.social?.facebook)?` connected`:''}" onclick="openSocialModal('facebook')">
      <div class="soc-icon soc-fb">f</div>
      <div class="soc-link-info">
        <div class="soc-link-name">Facebook${S.social?.facebook?' ✓':''}</div>
        <div class="soc-link-url">${S.social?.facebook||'Not connected — click to add'}</div>
      </div>
      <span style="font-size:11px;color:${S.social?.facebook?'var(--grn)':'var(--mut)'}">
        ${S.social?.facebook?'Connected':'Connect →'}
      </span>
    </div>
  </div>
</div>`;
}

// EXPLORE
// ═══════════════════════════════════════════════
function buildExplore(){
  // Full leaderboard (weekly hrs)
  const weekAgo=new Date(Date.now()-7*86400000);
  const entries=[];
  const myHrs=S.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
  entries.push({name:S.name,hrs:myHrs,totalHrs:Math.round(getTotalHours()),initials:S.name.slice(0,2).toUpperCase(),color:'#6366f1',isYou:true,streak:getStreak(),section:S.sections[0]});
  MOCK_FRIENDS.forEach(f=>{
    const hrs=f.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
    entries.push({name:f.name,hrs,totalHrs:f.totalHours,initials:f.initials,color:f.color,isYou:false,streak:f.streak,section:f.currentSection||'CPA ✅'});
  });
  entries.sort((a,b)=>b.hrs-a.hrs);
  const medals=['🥇','🥈','🥉'];
  const lbRows=entries.map((e,i)=>`
  <div class="lb-row${e.isYou?' lb-you':''}" style="${!e.isYou?'cursor:pointer;':''}" ${!e.isYou?`onclick="openUserProfile('${MOCK_FRIENDS.find(f=>f.name===e.name)?.id||'you'}')"`:''}>
    <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||i+1}</div>
    <div class="avatar" style="width:32px;height:32px;font-size:11px;border-radius:50%;background:${e.color};color:#fff;flex-shrink:0">${e.initials}</div>
    <div class="lb-name">${e.name}${e.isYou?' (you)':''}</div>
    <div style="font-size:10px;color:var(--mut);margin-right:8px">🔥${e.streak}d</div>
    <div class="lb-hrs">${e.hrs.toFixed(1)}h</div>
  </div>`).join('');

  // Challenges
  const joinedChallengeIds=S.challenges||[];
  const challengeCards=CHALLENGES.map(c=>{
    const joined=joinedChallengeIds.includes(c.id);
    const prog=joined?getChallengeProgress(c):0;
    const done=(S.challengeCompleted||[]).includes(c.id)||(joined&&prog>=c.target);
    const pct=joined?Math.min(100,Math.round(prog/c.target*100)):0;
    let actionBtn;
    if(done) actionBtn='<span style="font-size:11px;color:var(--grn);font-weight:700">✅ Complete</span>';
    else if(joined) actionBtn='<button class="btn btn-ghost btn-xs" style="color:var(--mut);font-size:10px" onclick="leaveChallenge(\''+c.id+'\')">Leave</button>';
    else actionBtn='<button class="btn btn-ghost btn-xs" onclick="joinChallenge(\''+c.id+'\')">Join</button>';
    return'<div class="challenge-card" style="border-color:'+(done?'var(--grn)':joined?'rgba(99,102,241,.4)':'var(--bdr)')+';background:'+(done?'var(--grn-bg)':joined?'var(--ind-bg)':'var(--surf)')+'"><div style="display:flex;align-items:flex-start;gap:10px"><div style="font-size:24px;flex-shrink:0">'+c.icon+'</div><div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div class="challenge-title" style="margin:0">'+c.title+'</div><span style="font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:'+c.diffColor+'22;color:'+c.diffColor+';text-transform:uppercase;letter-spacing:.05em;white-space:nowrap">'+c.difficulty+'</span></div><div class="challenge-meta">'+c.desc+'</div>'+(joined?'<div style="margin:8px 0 4px"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:4px"><span>Progress</span><span>'+prog+' / '+c.target+'</span></div><div style="height:5px;background:var(--surf3);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(done?'var(--grn)':'var(--ind)')+';border-radius:4px;transition:width .4s"></div></div></div>':'')+'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><div class="challenge-participants">👥 '+c.participants.toLocaleString()+' · Ends '+c.endDate+'</div>'+actionBtn+'</div><div style="margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--amb-bg);border-radius:20px;font-size:10px;font-weight:700;color:var(--amb)">🏅 '+c.reward+'</div></div></div></div>';
  }).join('');

  // Find friends
  const friendCards=MOCK_FRIENDS.map(f=>{
    const isFollowing=(S.following||[]).includes(f.id);
    const weekHrs=f.activities.filter(a=>new Date(a.date)>weekAgo).reduce((a,b)=>a+(b.hours||0),0);
    return`<div class="friend-card">
      <div class="avatar av-md" style="background:${f.color};color:#fff;cursor:pointer" onclick="openUserProfile('${f.id}')">${f.initials}</div>
      <div class="friend-info" style="cursor:pointer" onclick="openUserProfile('${f.id}')">
        <div class="friend-name">${f.name} ${f.passedSections.length===4?'🏆':''}</div>
        <div class="friend-meta">${f.state} · ${f.currentSection||'CPA Achieved!'} · ${f.streak}d streak · ${weekHrs.toFixed(1)}h this week</div>
        ${f.bio?`<div style="font-size:10px;color:var(--mut);margin-top:2px;font-style:italic">"${f.bio}"</div>`:''}
        ${f.passedSections.length?`<div style="margin-top:3px;display:flex;gap:4px;flex-wrap:wrap">${f.passedSections.map(s=>`<span class="badge badge-${s}" style="font-size:8px">${s} ✓</span>`).join('')}</div>`:''}
      </div>
      <button class="follow-btn${isFollowing?' following':''}" onclick="event.stopPropagation();toggleFollow('${f.id}',this)">${isFollowing?'Following':'Follow'}</button>
    </div>`;
  }).join('');

  // Study clubs
  const myAllClubs=(S.clubs||[]).filter(c=>!c.isDM);
  const joinedPubIds=myAllClubs.map(c=>c.id);
  const myClubRows=myAllClubs.map(c=>{
    const msgs=(S.clubMessages||{})[c.id]||[];
    const lastMsg=msgs.filter(m=>!m.isSystem).slice(-1)[0];
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background .12s" onclick="openClubView(\''+c.id+'\')" onmouseover="this.style.background=\'var(--surf2)\'" onmouseout="this.style.background=\'transparent\'"><div style="font-size:22px;width:38px;text-align:center;flex-shrink:0">'+c.icon+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+c.name+' <span style="font-size:9px;color:'+(c.isPublic?'var(--grn)':'var(--ind)')+';font-weight:700">'+(c.isPublic?'🌐':'🔒')+'</span></div><div style="font-size:11px;color:var(--mut)">'+c.members.length+' member'+(c.members.length!==1?'s':'')+'</div>'+(lastMsg?'<div style="font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(lastMsg.author==='you'?'You':getClubMemberName(lastMsg.author))+': '+lastMsg.text+'</div>':'')+'</div><span style="font-size:16px;color:var(--mut)">›</span></div>';
  }).join('');
  const discoverRows=PUBLIC_CLUBS.filter(c=>!joinedPubIds.includes(c.id)).map(c=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)"><div style="font-size:24px;width:40px;text-align:center;flex-shrink:0">'+c.icon+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+c.name+'</div><div style="font-size:11px;color:var(--mut)">'+c.desc.slice(0,55)+'…</div><div style="font-size:10px;color:var(--mut);margin-top:2px">👥 '+c.memberCount.toLocaleString()+' members</div></div><button class="btn btn-ind btn-xs" onclick="joinPublicClub(\''+c.id+'\')">Join</button></div>').join('');
  const clubSection=(myAllClubs.length?'<div style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">'+myClubRows+'</div>':'')+'<div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin:8px 0">Discover Clubs</div>'+discoverRows;

  return`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:960px;margin:0 auto">
  <div>
    <div class="card card-pad" style="margin-bottom:16px">
      <div class="section-title">📈 Weekly Leaderboard</div>
      <div style="font-size:11px;color:var(--mut);margin-bottom:10px">Hours logged in the last 7 days</div>
      ${lbRows}
    </div>
    <div class="card card-pad">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">🏛️ Study Clubs</div>
        <button class="btn btn-ind btn-xs" onclick="${isPro()?'createClubModal()':'openUpgradeModal(\'Unlimited Study Clubs\')'}">+ Create</button>
      </div>
      ${!isPro()&&myAllClubs.length>=1?'<div class="free-limit-banner" onclick="openUpgradeModal(\'Unlimited Study Clubs\')"><span style="font-size:20px">🔒</span><div style="flex:1"><div style="font-size:12px;font-weight:800;color:var(--ora)">Free plan: 1 club limit</div><div style="font-size:11px;color:var(--sub)">Upgrade to Pro for unlimited clubs + priority channels</div></div><span style="font-size:11px;font-weight:700;color:var(--ora)">Upgrade →</span></div>':''}
      ${clubSection}
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:10px" onclick="openMessagesModal()">My Clubs & Messages →</button>
    </div>
  </div>
  <div>
    <div class="card card-pad" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">⚡ Challenges</div>
        <span style="font-size:10px;color:var(--mut)">${(S.challenges||[]).length} joined · ${(S.challengeCompleted||[]).length} done</span>
      </div>
      <div style="max-height:520px;overflow-y:auto;padding-right:2px">${challengeCards}</div>
    </div>
    <div style="margin-bottom:16px">${buildQuestionBank()}</div>
    <div class="card card-pad">
      <div class="section-title">👥 Find CPA Candidates</div>
      ${friendCards}
    </div>
  </div>
</div>`;
}

let postFeeling='💪';let postDiff=3;
function openPostModal(prefSection=''){
  postFeeling='💪';postDiff=3;
  const sectionOpts=(S.sections||['FAR','AUD','REG','TCP']).map(s=>`<option value="${s}"${s===prefSection?' selected':''}>${s} — ${EXAMS[s]?.full||s}</option>`).join('');
  const feelingOpts=['💪','😤','😅','🤔','😵','🔥'].map(f=>`<div class="feeling-opt${f===postFeeling?' selected':''}" onclick="selectFeeling('${f}',this)">${f}</div>`).join('');
  const diffOpts=[1,2,3,4,5].map(d=>`<div class="diff-opt${d===postDiff?' selected':''}" onclick="selectDiff(${d},this)">${d}</div>`).join('');

  document.getElementById('post-modal-body').innerHTML=`
<div class="form-grp">
  <label>Exam Section</label>
  <select id="pm-section">${sectionOpts}</select>
</div>
<div class="form-row">
  <div class="form-grp">
    <label>Hours Studied</label>
    <input id="pm-hours" type="number" min="0.5" max="16" step="0.5" placeholder="e.g. 2.5">
  </div>
  <div class="form-grp">
    <label>Date</label>
    <input id="pm-date" type="date" value="${todayStr()}">
  </div>
</div>
<div class="form-grp">
  <label>Material Covered <span style="color:var(--mut);font-weight:400">(optional)</span></label>
  <input id="pm-material" type="text" placeholder="e.g. Governmental Accounting — Fund Structure">
</div>
<div class="form-grp">
  <label>Caption / Notes <span style="color:var(--mut);font-weight:400">(optional)</span></label>
  <textarea id="pm-caption" placeholder="How did it go? What clicked? What's still tricky?"></textarea>
</div>
<div class="form-row">
  <div class="form-grp">
    <label>How'd it feel?</label>
    <div class="feeling-row" id="feeling-row">${feelingOpts}</div>
  </div>
  <div class="form-grp">
    <label>Difficulty (1–5)</label>
    <div class="diff-row" id="diff-row">${diffOpts}</div>
  </div>
</div>
<button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:4px" onclick="submitPost()">📝 Post Session</button>`;
  document.getElementById('post-modal').classList.add('open');
}
function closePostModal(){document.getElementById('post-modal').classList.remove('open');}
function selectFeeling(f,el){
  postFeeling=f;
  document.querySelectorAll('#feeling-row .feeling-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function selectDiff(d,el){
  postDiff=d;
  document.querySelectorAll('#diff-row .diff-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function submitPost(){
  const section=document.getElementById('pm-section')?.value;
  const hours=parseFloat(document.getElementById('pm-hours')?.value)||0;
  const date=document.getElementById('pm-date')?.value||todayStr();
  const material=document.getElementById('pm-material')?.value?.trim()||'';
  const caption=document.getElementById('pm-caption')?.value?.trim()||'';
  if(!section){showToast('Select a section','err');return;}
  if(hours<=0){showToast('Enter valid hours','err');return;}
  const act={id:'u'+Date.now(),date:date+'T'+new Date().toTimeString().slice(0,8),section,hours,material,caption,difficulty:postDiff,feeling:postFeeling,kudos:[],comments:[]};
  S.activities.push(act);
  saveState();
  checkAchievements();
  checkChallengeAchievements();
  closePostModal();
  showToast(`Logged ${hours}h for ${section}! 💪`,'ok');
  currentTab='feed';
  renderApp();

function giveProps(actId,userId){
  if(userId==='you'){showToast("Can't give yourself props 😄",'err');return;}
  // Find in mock friends
  const friend=MOCK_FRIENDS.find(f=>f.id===userId);
  let act=null;
  if(friend)act=friend.activities.find(a=>a.id===actId);
  if(!act){showToast("Activity not found",'err');return;}
  const hasProps=act.kudos.includes('you');
  if(hasProps){act.kudos=act.kudos.filter(k=>k!=='you');}
  else{act.kudos.push('you');S.propsGiven=(S.propsGiven||0)+1;saveState();checkAchievements();}
  // Animate button
  const btn=document.querySelector(`[data-aid="${actId}"][data-uid="${userId}"] .ac-action`)||
    document.querySelector(`.activity-card[data-aid="${actId}"] .ac-action`);
  if(btn)btn.classList.add('props-anim');
  if(!hasProps)showToast('Props given! 👏','ok');
  renderTab();
}

function openComments(actId,userId){
  let act=null;
  let actOwner='';
  if(userId==='you'){
    act=S.activities.find(a=>a.id===actId);
    actOwner=S.name;
  } else {
    const friend=MOCK_FRIENDS.find(f=>f.id===userId);
    if(friend){act=friend.activities.find(a=>a.id===actId);actOwner=friend.name;}
  }
  if(!act)return;
  const renderCommentsBody=()=>{
    const comments=act.comments||[];
    const commentsHTML=comments.length?comments.map(c=>`
    <div class="comment-row">
      <div class="avatar" style="width:28px;height:28px;font-size:9px;border-radius:50%;background:var(--ind);color:#fff;flex-shrink:0">${c.user.slice(0,2)}</div>
      <div class="comment-body">
        <div class="comment-author">${c.user}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px">No comments yet. Be the first!</div>`;
    document.getElementById('comments-modal-body').innerHTML=`
<div style="margin-bottom:10px;padding:10px;background:var(--surf2);border-radius:8px;font-size:12px;color:var(--sub)">
  <strong>${actOwner}</strong> · ${act.section} · ${act.hours}h
  ${act.caption?`<br><span style="color:var(--mut)">"${act.caption}"</span>`:''}
</div>
<div class="comments-wrap" style="background:transparent;padding:0;border:none">${commentsHTML}</div>
<div class="add-comment">
  <input id="comment-input" type="text" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment('${actId}','${userId}')">
  <button class="btn btn-ind btn-sm" onclick="addComment('${actId}','${userId}')">Post</button>
</div>`;
  };
  renderCommentsBody();
  document.getElementById('comments-modal').classList.add('open');
}
function closeCommentsModal(){document.getElementById('comments-modal').classList.remove('open');}
function addComment(actId,userId){
  const input=document.getElementById('comment-input');
  const text=input?.value?.trim();
  if(!text)return;
  let act=null;
  if(userId==='you'){act=S.activities.find(a=>a.id===actId);}
  else{const f=MOCK_FRIENDS.find(f=>f.id===userId);if(f)act=f.activities.find(a=>a.id===actId);}
  if(!act)return;
  if(!act.comments)act.comments=[];
  act.comments.push({user:S.name,text});
  if(userId==='you')saveState();
  input.value='';
  openComments(actId,userId);
  renderTab();
}

function shareActivity(actId){
  if(navigator.share){navigator.share({title:'Ledger Study Session',text:`Check out my CPA study session on Ledger!`,url:window.location.href});}
  else{navigator.clipboard?.writeText(window.location.href);showToast('Link copied to clipboard!','info');}
}

function toggleFollow(fId,btn){
  const following=S.following||[];
  const idx=following.indexOf(fId);
  if(idx>=0){following.splice(idx,1);btn.textContent='Follow';btn.classList.remove('following');}
  else{following.push(fId);btn.textContent='Following';btn.classList.add('following');}
  S.following=following;
  saveState();
  checkAchievements();
  showToast(idx>=0?'Unfollowed':'Following! Their sessions will now appear in your feed.','ok');
}

function updateSectionStatus(section,status){
  if(!S.sectionStatus)S.sectionStatus={};
  S.sectionStatus[section]=status;
  if(status==='passed'){
    if(!S.sectionPassed)S.sectionPassed=[];
    if(!S.sectionPassed.includes(section)){S.sectionPassed.push(section);showToast(`🎉 ${section} marked as PASSED!`,'ok');}
    checkAchievements();
  } else {
    S.sectionPassed=(S.sectionPassed||[]).filter(s=>s!==section);
  }
  saveState();
  renderTab();
}

  const fmt=new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

${html}

function deleteActivity(id){

function openSessionModal(prefSection='', prefMaterial=''){
  const overlay=document.getElementById('sess-overlay');
  if(!overlay)return;
  if(!S){showToast('Complete setup first','err');return;}
  if(TS.phase==='active'||TS.phase==='paused'){overlay.classList.add('open');renderSessCard();return;}
  if(prefSection)TS.section=prefSection;
  else if(!TS.section&&S.sections?.length)TS.section=S.sections[0];
  if(prefMaterial)TS.material=prefMaterial;
  TS.phase='setup';
  TS.date=todayStr();
  overlay.classList.add('open');
  renderSessCard();
}

function closeSessOverlay(){
  if(TS.phase==='active'){pauseTimer();}
  document.getElementById('sess-overlay')?.classList.remove('open');

          <input id="recap-date" type="date" value="${TS.date||todayStr()}" style="width:100%;padding:9px 12px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:13px;outline:none">

function ssUpdateSection(){
  const sec=document.getElementById('ss-sec')?.value;
  if(sec){
    TS.section=sec;
    const ex=EXAMS[sec];
    if(ex){
      const bar=document.querySelector('.sess-color-bar');
      if(bar)bar.style.background=`linear-gradient(90deg,${ex.color},${ex.color}88)`;
    }
  }
}

function startTimer(){
  const sec=document.getElementById('ss-sec')?.value||TS.section;
  const mat=document.getElementById('ss-mat')?.value?.trim()||'';
  const goal=parseFloat(document.getElementById('ss-goal')?.value)||0;
  const date=document.getElementById('ss-date')?.value||todayStr();
  if(!sec){showToast('Select a section','err');return;}
  TS.section=sec;TS.material=mat;TS.goalHours=goal;TS.date=date;
  TS.elapsed=0;TS.startTime=Date.now();TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();
  updateNavChip();
}

function pauseTimer(){
  if(TS.phase!=='active')return;
  clearInterval(timerInterval);timerInterval=null;
  TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='paused';
  renderSessCard();updateNavChip();
}

function resumeTimer(){
  if(TS.phase!=='paused')return;
  TS.startTime=Date.now()-(TS.elapsed*1000);
  TS.phase='active';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(TS.phase==='active'){
      TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
      const cl=document.getElementById('sess-clock');
      if(cl)cl.textContent=fmtElapsed(TS.elapsed);
      const chip=document.getElementById('topbar-timer');
      if(chip)chip.textContent=fmtElapsed(TS.elapsed);
    }
  },1000);
  renderSessCard();updateNavChip();
}

function endSession(){
  clearInterval(timerInterval);timerInterval=null;
  if(TS.phase==='active')TS.elapsed=Math.floor((Date.now()-TS.startTime)/1000);
  TS.phase='recap';
  renderSessCard();updateNavChip();
}

function updateNavChip(){
  const chip=document.getElementById('nav-sess-chip');
  const btn=document.getElementById('nav-log-btn');
  if(!chip)return;
  const isActive=TS.phase==='active'||TS.phase==='paused';
  if(isActive){
    chip.style.display='inline-flex';
    chip.innerHTML=`<span class="active-sess-chip" onclick="openSessionModal()"><span class="rec-dot" ${TS.phase==='paused'?'style="animation:none;opacity:.4"':''}></span>${TS.section} <span class="active-sess-time" id="topbar-timer">${fmtElapsed(TS.elapsed)}</span></span>`;
    if(btn){btn.textContent='Resume';btn.onclick=()=>openSessionModal();}
  } else {
    chip.style.display='none';
    if(btn){btn.textContent='▶ Start Session';btn.onclick=()=>openSessionModal();}
  }
}

function addConceptTag(){
  const inp=document.getElementById('concept-inp');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val||TS.concepts.includes(val))return;
  TS.concepts.push(val);
  inp.value='';
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
  inp.focus();
}

function removeConceptTag(idx){
  TS.concepts.splice(idx,1);
  const wrap=document.getElementById('concept-tags-wrap');
  if(wrap)wrap.innerHTML=TS.concepts.map((c,i)=>`<span class="concept-tag">${c}<span class="concept-tag-x" onclick="removeConceptTag(${i})">×</span></span>`).join('')||'<span style="font-size:11px;color:var(--mut)">No concepts yet</span>';
}

function setSessFeeling(f){
  TS.feeling=f;
  document.querySelectorAll('.feeling-r-btn').forEach(b=>b.classList.toggle('sel',b.textContent===f));
}

function setSessDiff(d){
  TS.difficulty=d;
  document.querySelectorAll('.diff-r-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===d));
}

function saveSession(){
  const notes=document.getElementById('sess-notes-ta')?.value?.trim()||'';
  const section=document.getElementById('recap-sec')?.value||TS.section;
  const date=document.getElementById('recap-date')?.value||TS.date||todayStr();
  const hours=parseFloat((TS.elapsed/3600).toFixed(2));
  if(!section){showToast('No section selected','err');return;}
  if(TS.elapsed<30){showToast('Session too short (< 30s)','err');return;}
  const act={
    id:'u'+Date.now(),
    date:date+'T'+new Date().toTimeString().slice(0,8),
    section,hours:Math.max(0.1,hours),
    material:TS.material,
    caption:notes,
    difficulty:TS.difficulty,
    feeling:TS.feeling,
    concepts:[...TS.concepts],
    elapsed:TS.elapsed,
    kudos:[],comments:[]
  };
  S.activities.push(act);
  saveState();checkAchievements();checkChallengeAchievements();
  document.getElementById('sess-overlay')?.classList.remove('open');
  tsReset();updateNavChip();
  showToast(`Session posted! ${fmtDur(act.elapsed)} for ${section} 🎉`,'ok');
  currentTab='feed';renderApp();
}

function discardSession(){
  clearInterval(timerInterval);timerInterval=null;
  tsReset();
  document.getElementById('sess-overlay')?.classList.remove('open');
  updateNavChip();
}

}

function renderUserProfile(userId){

    const ex=EXAMS[s];if(!ex)return'';

    return`<div style="margin-bottom:10px">

      <div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${pct}%;background:${ex.color}"></div></div>

        <div style="font-size:12px;font-weight:700">${a.section} — ${a.hours}h</div>
        ${a.material?`<div style="font-size:11px;color:var(--ind);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📖 ${a.material}</div>`:''}
        ${a.caption?`<div style="font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">"${a.caption}"</div>`:''}
      </div>
      <div style="font-size:10px;color:var(--mut);flex-shrink:0">${timeAgo(a.date)}</div>

<div class="uprofile-hero">
  <div style="position:relative;z-index:1">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="avatar av-xl" style="background:${f.color};color:#fff;border:3px solid rgba(255,255,255,.4)">${f.initials}</div>
        <div>
          <div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:3px">${f.name} ${f.passedSections.length===4?'🏆':''}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.75)">${f.state}${f.passedSections.length?' · ✅ '+f.passedSections.join(', ')+' Passed':''}</div>
          ${f.bio?`<div style="font-size:12px;color:rgba(255,255,255,.65);margin-top:8px;max-width:300px;line-height:1.5;font-style:italic">"${f.bio}"</div>`:''}

function toggleFollowProfile(userId,btn){
  const following=S.following||[];
  const idx=following.indexOf(userId);
  if(idx>=0){following.splice(idx,1);}else{following.push(userId);}
  S.following=following;saveState();checkAchievements();
  const isNow=(S.following||[]).includes(userId);
  btn.textContent=isNow?'✓ Following':'+ Follow';
  btn.className=`btn ${isNow?'btn-ghost':'btn-primary'}`;
  btn.style.flex='1';btn.style.justifyContent='center';
  showToast(isNow?'Following! Sessions will appear in your feed.':'Unfollowed','ok');
  renderUserProfile(userId);
}

function openDirectMessage(userId){
  // Find or create a direct club with this user
  const f=MOCK_FRIENDS.find(x=>x.id===userId);if(!f)return;
  if(!S.clubs)S.clubs=[];
  let directClub=(S.clubs).find(c=>c.members.length===2&&c.members.includes('you')&&c.members.includes(userId));
  if(!directClub){
    const clubId='c'+Date.now();
    directClub={id:clubId,name:`${f.name}`,icon:f.initials[0]||'💬',desc:'Direct message',isPrivate:true,isDM:true,members:['you',userId],created:Date.now()};
    S.clubs.push(directClub);
    if(!S.clubMessages)S.clubMessages={};
    S.clubMessages[clubId]=[{author:'system',text:`Conversation started with ${f.name}`,time:new Date().toISOString(),isSystem:true}];
    saveState();
  }
  openClubChat(directClub.id);
}

function promptInviteToClub(userId){
  const f=MOCK_FRIENDS.find(x=>x.id===userId);if(!f)return;
  const myClubs=(S.clubs||[]).filter(c=>!c.isDM&&c.members.includes('you'));
  if(!myClubs.length){
    if(confirm(`You have no study clubs yet. Create one and invite ${f.name}?`)){createClubModal();}
    return;
  }
  let el=document.getElementById('invite-club-modal');
  if(!el){
    el=document.createElement('div');
    el.id='invite-club-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px"><div class="modal-hdr"><div class="modal-title" id="invite-club-title"></div><button class="modal-close" onclick="document.getElementById('invite-club-modal').classList.remove('open')">×</button></div><div class="modal-body" id="invite-club-body"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
    document.body.appendChild(el);
  }
  document.getElementById('invite-club-title').textContent=`Invite ${f.name} to a Club`;
  document.getElementById('invite-club-body').innerHTML=myClubs.map(c=>`
  <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;border:1px solid var(--bdr);margin-bottom:8px;transition:all .15s" onclick="inviteToClub('${c.id}','${userId}',this)" onmouseover="this.style.borderColor='var(--ind)'" onmouseout="this.style.borderColor='var(--bdr)'">

    <div style="flex:1"><div style="font-size:13px;font-weight:700">${c.name}</div><div style="font-size:11px;color:var(--mut)">${c.members.length} members</div></div>
    <span style="font-size:12px;color:var(--ind);font-weight:600">Invite →</span>

function inviteToClub(clubId,userId,el){
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const f=MOCK_FRIENDS.find(x=>x.id===userId);
  if(!club||!f)return;
  if(club.members.includes(userId)){showToast(`${f.name} is already in this club!`,'info');return;}
  club.members.push(userId);
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'system',text:`${f.name} was invited to the club`,time:new Date().toISOString(),isSystem:true});
  saveState();
  document.getElementById('invite-club-modal')?.classList.remove('open');
  showToast(`${f.name} invited to ${club.name}! 🎉`,'ok');
  renderTab();
}

function selectClubIcon(icon,el){
  window._selectedClubIcon=icon;
  document.querySelectorAll('[data-ico]').forEach(e=>{e.style.borderColor='var(--bdr)';e.style.background='var(--surf2)';});
  el.style.borderColor='var(--ind)';el.style.background='var(--ind-bg)';
}
function closeCreateClubModal(){document.getElementById('create-club-modal')?.classList.remove('open');}
function saveNewClub(){
  const name=document.getElementById('ncn')?.value?.trim();
  if(!name){showToast('Enter a club name','err');return;}
  const desc=document.getElementById('ncd')?.value?.trim()||'';
  const icon=window._selectedClubIcon||'📚';
  const members=['you'];
  document.querySelectorAll('[id^="cm-"]').forEach(cb=>{if(cb.checked)members.push(cb.value);});
  const clubId='c'+Date.now();
  const club={id:clubId,name,icon,desc,isPrivate:true,members,created:Date.now()};
  if(!S.clubs)S.clubs=[];
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[clubId]=[
    {author:'system',text:`${S.name} created "${name}"`,time:new Date().toISOString(),isSystem:true},
    ...members.filter(m=>m!=='you').map(m=>({author:'system',text:`${getClubMemberName(m)} was invited`,time:new Date().toISOString(),isSystem:true}))
  ];
  saveState();
  closeCreateClubModal();
  showToast(`${icon} "${name}" created!`,'ok');
  renderTab();
  setTimeout(()=>openClubChat(clubId),200);
}

function openClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  let el=document.getElementById('club-chat-modal');
  if(!el){
    el=document.createElement('div');
    el.id='club-chat-modal';
    el.className='modal-overlay';
    el.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:520px;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden"><div id="club-chat-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div></div>`;
    el.addEventListener('click',e=>{if(e.target===el)closeClubChat();});
    document.body.appendChild(el);
  }
  renderClubChat(clubId);
  el.classList.add('open');
}

function renderClubChat(clubId){
  const club=(S.clubs||[]).find(c=>c.id===clubId);if(!club)return;
  const msgs=(S.clubMessages||{})[clubId]||[];
  const memberAvatars=club.members.slice(0,6).map((m,i)=>`<div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${getClubMemberColor(m)};color:#fff;border:2px solid var(--surf);margin-left:${i===0?0:-8}px;flex-shrink:0" title="${getClubMemberName(m)}">${getClubMemberInitials(m)}</div>`).join('');
  const msgHTML=msgs.map(msg=>{
    if(msg.isSystem)return`<div class="chat-system">— ${msg.text} —</div>`;
    const isMine=msg.author==='you';
    const name=getClubMemberName(msg.author);
    const initials=getClubMemberInitials(msg.author);
    const color=getClubMemberColor(msg.author);
    const timeStr=new Date(msg.time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return`<div class="chat-row${isMine?' mine':''}">
      <div class="avatar" style="width:26px;height:26px;font-size:9px;border-radius:50%;background:${color};color:#fff;flex-shrink:0">${initials}</div>
      <div>
        ${!isMine?`<div style="font-size:10px;color:var(--mut);margin-bottom:2px;font-weight:600">${name}</div>`:''}
        <div class="chat-bub ${isMine?'chat-bub-mine':'chat-bub-them'}">${msg.text}</div>
        <div class="chat-meta${!isMine?' chat-meta-them':''}">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  const el=document.getElementById('club-chat-content');
  if(!el)return;
  const memberCount=club.members.length;
  const dmOtherId=club.isDM?club.members.find(m=>m!=='you'):null;
  const dmFriend=dmOtherId?MOCK_FRIENDS.find(f=>f.id===dmOtherId):null;
  const dmAvatarHtml=dmFriend?('<div class="avatar" style="width:34px;height:34px;border-radius:50%;background:'+getClubMemberColor(dmOtherId)+';color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">'+getClubMemberInitials(dmOtherId)+'</div>'):'💬';
  const iconHtml=club.isDM?dmAvatarHtml:('<span style="font-size:24px">'+club.icon+'</span>');
  const placeholderName=club.isDM&&dmFriend?dmFriend.name.split(' ')[0]:club.name;
  el.innerHTML=`
<div style="flex-shrink:0;padding:16px 20px 14px;border-bottom:1px solid var(--bdr)">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex-shrink:0">${iconHtml}</div>
    <div style="min-width:0;flex:1">
      <div style="font-size:15px;font-weight:800">${club.name}</div>
      <div style="font-size:10px;color:var(--mut);margin-top:1px">${club.isDM?'Direct message':'🔒 Private · '+memberCount+' member'+(memberCount!==1?'s':'')}</div>
    </div>
    <div style="display:flex;align-items:center;padding-right:4px">${memberAvatars}</div>
    <button class="modal-close" onclick="closeClubChat()" style="flex-shrink:0">×</button>
  </div>
</div>
<div class="club-chat-area" id="cca-${clubId}" style="flex:1;padding:12px 20px;height:auto;min-height:0">${msgHTML||'<div class="chat-system">— No messages yet. Say hello! 👋 —</div>'}</div>
<div class="chat-footer" style="flex-shrink:0;padding:10px 20px 16px;border-top:1px solid var(--bdr)">
  <input class="chat-inp" id="cci-${clubId}" placeholder="Message ${placeholderName}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendClubMessage('${clubId}');}">
  <button class="chat-send" onclick="sendClubMessage('${clubId}')">Send</button>
</div>`;
  setTimeout(()=>{
    const area=document.getElementById('cca-'+clubId);
    if(area)area.scrollTop=area.scrollHeight;
    document.getElementById('cci-'+clubId)?.focus();
  },50);
}

function sendClubMessage(clubId){
  const inp=document.getElementById('cci-'+clubId);
  const text=inp?.value?.trim();if(!text)return;
  if(!S.clubMessages)S.clubMessages={};
  if(!S.clubMessages[clubId])S.clubMessages[clubId]=[];
  S.clubMessages[clubId].push({author:'you',text,time:new Date().toISOString()});
  saveState();
  inp.value='';
  renderClubChat(clubId);
  // Simulate a reply from a club member for live feel
  const club=(S.clubs||[]).find(c=>c.id===clubId);
  const others=(club?.members||[]).filter(m=>m!=='you');
  if(others.length){
    const replies=['Great session! 💪','Keep grinding! 🔥','Same! I just wrapped a session too.','How many MCQs did you do?',"That topic is no joke — you've got this though!",'🧠 Big brain energy','Let\'s crush this exam together 🎯','Nice work! What material did you cover?','On a roll!! 🔥','Solid. That chapter is super testable.'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    const responder=others[Math.floor(Math.random()*others.length)];
    setTimeout(()=>{
      if(!(S.clubMessages||{})[clubId])return;
      S.clubMessages[clubId].push({author:responder,text:reply,time:new Date().toISOString()});
      saveState();
      renderClubChat(clubId);
    },1100+Math.random()*1200);
  }
}
function closeClubChat(){document.getElementById('club-chat-modal')?.classList.remove('open');}

function joinPublicClub(pubId){
  const pc=PUBLIC_CLUBS.find(c=>c.id===pubId);if(!pc)return;
  if(!S.clubs)S.clubs=[];
  if(S.clubs.find(c=>c.id===pubId)){showToast('Already a member!','info');return;}
  const club={id:pubId,name:pc.name,icon:pc.icon,desc:pc.desc,isPrivate:false,isDM:false,isPublic:true,
    members:['you'],created:Date.now()};
  S.clubs.push(club);
  if(!S.clubMessages)S.clubMessages={};
  S.clubMessages[pubId]=[
    {author:'system',text:'You joined '+pc.name+'! Welcome to the community 🎉',time:new Date().toISOString(),isSystem:true}
  ];
  saveState();
  renderTab();
  showToast('Joined '+pc.name+'! 🎉','ok');
}

function attachTabHandlers(){
  // Animate progress bars from 0 → target width
  document.querySelectorAll('.prog-fill').forEach(el=>{
    const target=el.style.width;
    if(!target||target==='0%')return;
    el.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.width=target;}));
  });

  // Animate weekly chart bars from 0 → target height
  document.querySelectorAll('.week-bar').forEach(el=>{
    const target=el.style.height;
    if(!target||target==='0px')return;
    el.style.height='0px';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.height=target;}));
  });

  // Count-up animation for dashboard stat numbers
  if(currentTab==='dashboard'){
    document.querySelectorAll('.stat-val').forEach(el=>{
      const text=el.textContent.trim();
      if(text.includes('/')||text===''||text==='0')return;
      const num=parseFloat(text);
      if(isNaN(num))return;
      const isDecimal=text.includes('.');
      const duration=680;
      let startTime=null;
      el.textContent=isDecimal?'0.0':'0';
      const tick=(t)=>{
        if(!startTime)startTime=t;
        const p=Math.min((t-startTime)/duration,1);
        const eased=1-Math.pow(1-p,4);
        const val=num*eased;
        el.textContent=isDecimal?val.toFixed(1):String(Math.round(val));
        if(p<1)requestAnimationFrame(tick);
        else el.textContent=isDecimal?num.toFixed(1):String(num);
      };
      requestAnimationFrame(tick);
    });
  }
}

// HEAT MAP
// ═══════════════════════════════════════════════
function buildHeatMap(){
  const logMap={};
  (S.activities||[]).forEach(a=>{
    const d=a.date.slice(0,10);
    logMap[d]=(logMap[d]||0)+(a.hours||0);
  });
  const weeks=16;
  const today=new Date();today.setHours(0,0,0,0);
  // align to Sunday
  const startDay=new Date(today);
  startDay.setDate(today.getDate()-today.getDay()-(weeks-1)*7);

  const cols=[];
  for(let w=0;w<weeks;w++){
    const cells=[];
    for(let d=0;d<7;d++){
      const cur=new Date(startDay);
      cur.setDate(startDay.getDate()+w*7+d);
      if(cur>today){cells.push(`<div style="width:11px;height:11px;border-radius:2px;background:var(--surf2)"></div>`);continue;}
      const key=cur.toISOString().slice(0,10);
      const hrs=logMap[key]||0;
      const intensity=hrs===0?0:hrs<1?1:hrs<2?2:hrs<3?3:4;
      const colors=['var(--surf2)','#fde68a','#fbbf24','#f59e0b','#d97706'];
      const dark_colors=['#1c2030','#4d3800','#7c5e00','#b38600','#d4a000'];
      const bg=isDark?dark_colors[intensity]:colors[intensity];
      cells.push(`<div style="width:11px;height:11px;border-radius:2px;background:${bg};cursor:default" title="${key}: ${hrs.toFixed(1)}h"></div>`);
    }
    cols.push(`<div style="display:flex;flex-direction:column;gap:2px">${cells.join('')}</div>`);
  }
  const monthLabels=[];
  for(let w=0;w<weeks;w+=4){
    const d=new Date(startDay);d.setDate(startDay.getDate()+w*7);
    monthLabels.push(`<div style="flex:1;font-size:9px;color:var(--mut)">${d.toLocaleDateString('en-US',{month:'short'})}</div>`);
  }
  const totalDays=Object.keys(logMap).filter(d=>{const dt=new Date(d+'T12:00:00');return dt>=startDay&&dt<=today;}).length;
  return`
<div style="overflow-x:auto">
  <div style="display:flex;gap:2px;margin-bottom:4px">${monthLabels.join('')}</div>
  <div style="display:flex;gap:2px">${cols.join('')}</div>
  <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--mut)">
    Less
    ${['var(--surf2)','#fde68a','#fbbf24','#f59e0b','#d97706'].map(c=>`<div style="width:11px;height:11px;border-radius:2px;background:${c}"></div>`).join('')}
    More &nbsp;·&nbsp; ${totalDays} active days in last 16 weeks
  </div>
</div>`;
}

function buildScoreTracker(){
  const scores=S.practiceScores||{};
  const sections=S.sections||['FAR','AUD','REG','TCP'];
  const rows=sections.map(s=>{
    const ex=EXAMS[s];
    const sScores=scores[s]||[];

    const avg=sScores.length?Math.round(sScores.reduce((a,b)=>a+b.score,0)/sScores.length):null;
    const trend=sScores.length>=2?(sScores[sScores.length-1].score>sScores[sScores.length-2].score?'📈':'📉'):'—';
    const passed=(S.sectionPassed||[]).includes(s);
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <span class="badge badge-${s}" style="min-width:46px;justify-content:center">${s}</span>

            <div style="width:34px;height:34px;border-radius:8px;background:${sc.score>=75?'var(--grn-bg)':sc.score>=65?'var(--amb-bg)':'var(--red-bg)'};border:1.5px solid ${sc.score>=75?'var(--grn)':sc.score>=65?'var(--amb)':'var(--red)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${sc.score>=75?'var(--grn)':sc.score>=65?'var(--amb)':'var(--red)'}">${sc.score}</div>
            <div style="font-size:8px;color:var(--mut);margin-top:2px">${sc.label||'P'+(i+1)}</div>
          </div>`).join('')}
          ${sScores.length===0?`<span style="font-size:12px;color:var(--mut)">No scores logged yet</span>`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${avg!==null?`<div style="font-size:18px;font-weight:900;color:${avg>=75?'var(--grn)':avg>=65?'var(--amb)':'var(--red)'}">${avg}</div><div style="font-size:9px;color:var(--mut)">avg ${trend}</div>`:''}
        ${passed?`<div class="badge badge-passed" style="margin-top:4px">Passed ✅</div>`:''}
      </div>
      <button class="btn btn-ghost btn-xs" onclick="openScoreModal('${s}')">+ Score</button>

  }).join('');
  return`
<div style="font-size:11px;color:var(--mut);margin-bottom:10px">Log your Becker/Gleim practice exam scores. Target: 75+ consistently before scheduling.</div>
${rows}`;
}

function submitScore(section){
  const score=parseInt(document.getElementById('sc-score')?.value);
  const label=document.getElementById('sc-label')?.value?.trim()||'';
  const date=document.getElementById('sc-date')?.value||todayStr();
  if(isNaN(score)||score<0||score>99){showToast('Enter a valid score 0–99','err');return;}
  if(!S.practiceScores)S.practiceScores={};
  if(!S.practiceScores[section])S.practiceScores[section]=[];
  S.practiceScores[section].push({score,label,date});
  saveState();
  closePostModal();
  showToast(`${section} score ${score} logged! ${score>=75?'🎯 Exam-ready territory!':'Keep grinding 💪'}`,'ok');
  renderTab();
}

function closeEditProfile(){document.getElementById('edit-profile-modal')?.classList.remove('open');}

function selectEpAvatar(emoji, el){
  document.getElementById('ep-avatar-val').value=emoji;
  document.querySelectorAll('.ep-av-opt').forEach(e=>{e.style.borderColor='var(--bdr)';e.style.background='var(--surf2)';});
  el.style.borderColor='var(--ora)';el.style.background='var(--ora-bg)';
  // Update preview if no photo
  const preview=document.getElementById('ep-avatar-preview');
  const emojiSpan=document.getElementById('ep-emoji-preview');
  if(emojiSpan){emojiSpan.textContent=emoji;}
  else if(preview&&!S.profilePic){preview.innerHTML=`<span id="ep-emoji-preview">${emoji}</span>`;}
}

function handleProfilePicUpload(input){
  const file=input.files?.[0];
  if(!file)return;
  if(file.size>5*1024*1024){showToast('Image must be under 5MB','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    // Update preview
    const preview=document.getElementById('ep-avatar-preview');
    if(preview){
      preview.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
      // Add remove button below if not present
    }
    // Store temporarily
    window._pendingProfilePic=dataUrl;
    showToast('Photo ready — click Save Profile to apply ✓','ok');
  };
  reader.readAsDataURL(file);
}

function removeProfilePic(){
  S.profilePic='';
  window._pendingProfilePic=null;
  saveState();
  closeEditProfile();
  showToast('Profile photo removed','info');
  renderApp();
}

function saveEditProfile(){
  const name=document.getElementById('ep-name')?.value?.trim();
  if(!name){showToast('Enter your name','err');return;}
  S.name=name;
  S.state=document.getElementById('ep-state')?.value||S.state;
  S.hoursPerWeek=parseInt(document.getElementById('ep-hrs')?.value)||S.hoursPerWeek||15;
  S.bio=document.getElementById('ep-bio')?.value?.trim()||'';
  S.school=document.getElementById('ep-school')?.value?.trim()||'';
  S.classYear=document.getElementById('ep-classyear')?.value||'';
  S.avatar=document.getElementById('ep-avatar-val')?.value||S.avatar||'🎓';
  if(window._pendingProfilePic){S.profilePic=window._pendingProfilePic;window._pendingProfilePic=null;}
  (S.sections||[]).forEach(s=>{
    const d=document.getElementById('ep-date-'+s)?.value;
    if(d){if(!S.examDates)S.examDates={};S.examDates[s]=d;}
  });
  saveState();
  closeEditProfile();
  showToast('Profile saved! ✓','ok');
  renderApp();
}

function changePassword(){
  const cur=document.getElementById('sec-cur-pass')?.value;
  const nw=document.getElementById('sec-new-pass')?.value;
  const cf=document.getElementById('sec-conf-pass')?.value;
  if(!cur||!nw||!cf){showToast('Fill in all password fields','err');return;}
  if(nw.length<8){showToast('New password must be at least 8 characters','err');return;}
  if(nw!==cf){showToast('Passwords do not match','err');return;}

  showToast('Password updated successfully ✓','ok');
  document.getElementById('sec-cur-pass').value='';

  document.getElementById('sec-conf-pass').value='';
}

// PDF REPORT GENERATION (jsPDF)
// ═══════════════════════════════════════════════
function generatePDFReport(){
  if(typeof window.jspdf==='undefined'){showToast('PDF library loading, try again','err');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,margin=18;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const weekAgo=new Date(Date.now()-7*86400000);

  // — Color helpers —
  const hexToRgb=hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];};
  const setFill=(hex)=>doc.setFillColor(...hexToRgb(hex));
  const setTxt=(hex)=>doc.setTextColor(...hexToRgb(hex));
  const setDraw=(hex)=>doc.setDrawColor(...hexToRgb(hex));

  // ── HEADER BANNER ──
  setFill('#1e1b4b'); doc.rect(0,0,W,38,'F');
  setFill('#f97316'); doc.rect(0,34,W,4,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22); setTxt('#ffffff');
  doc.text('LEDGER',margin,20);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); setTxt('rgba(255,255,255,0.6)');
  doc.text('Social CPA Study Platform',margin,27);
  doc.setFontSize(9); setTxt('#f97316');
  doc.text('WEEKLY PROGRESS REPORT',W-margin,27,{align:'right'});
  doc.setFontSize(8); setTxt('#94a3b8');
  doc.text(dateStr,W-margin,20,{align:'right'});

  let y=50;

  // ── CANDIDATE INFO ──
  doc.setFont('helvetica','bold'); doc.setFontSize(14); setTxt('#0f172a');
  doc.text(S.name||'CPA Candidate',margin,y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); setTxt('#64748b');
  doc.text((S.state||'')+(S.school?' · '+S.school:'')+(S.disc?' · '+S.disc+' Discipline':''),margin,y); y+=10;

  // ── STATS GRID ──
  const stats=[
    {v:Math.round(getTotalHours()),l:'Total Hours',c:'#f97316'},
    {v:getWeekHours().toFixed(1),l:'This Week',c:'#6366f1'},
    {v:getStreak(),l:'Day Streak',c:'#f59e0b'},
    {v:(S.activities||[]).length,l:'Sessions',c:'#10b981'},
    {v:(S.sectionPassed||[]).length+'/4',l:'Sections Passed',c:'#14b8a6'},
    {v:subTierLabel(),l:'Plan',c:'#a855f7'},
  ];
  const boxW=(W-margin*2-10)/3;const boxH=18;
  stats.forEach((s,i)=>{
    const col=i%3; const row=Math.floor(i/3);
    const bx=margin+col*(boxW+5); const by=y+row*(boxH+4);
    setFill('#f8fafc'); setDraw('#e2e8f0'); doc.roundedRect(bx,by,boxW,boxH,3,3,'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(14); setTxt(s.c);
    doc.text(String(s.v),bx+boxW/2,by+10,{align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7); setTxt('#94a3b8');
    doc.text(s.l.toUpperCase(),bx+boxW/2,by+15,{align:'center'});
  }); y+=boxH*2+4+8;

  // ── SECTION PROGRESS ──
  doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
  doc.text('EXAM SECTION PROGRESS',margin,y); y+=6;
  const secColors={FAR:'#ef4444',AUD:'#4f8ef7',REG:'#10b981',TCP:'#14b8a6',BAR:'#f59e0b',ISC:'#a855f7'};
  const secs=S.sections||['FAR','AUD','REG','TCP'];
  const secData=secs.map(s=>{
    const ex=EXAMS[s]; const hrs=getSectionHours(s); const pct=Math.min(100,Math.round(hrs/ex.studyHours*100));
    const passed=(S.sectionPassed||[]).includes(s);
    return[s,ex.full,hrs+'h / '+ex.studyHours+'h',pct+'%',passed?'✓ Passed':S.sectionStatus?.[s]||'Planned'];
  });
  doc.autoTable({
    startY:y,
    head:[['Section','Name','Hours','Progress','Status']],
    body:secData,
    theme:'grid',
    headStyles:{fillColor:[30,27,75],textColor:[255,255,255],fontSize:8,fontStyle:'bold',cellPadding:3},
    bodyStyles:{fontSize:8,cellPadding:3},
    columnStyles:{0:{cellWidth:16,fontStyle:'bold'},1:{cellWidth:60},2:{cellWidth:28},3:{cellWidth:24},4:{cellWidth:30}},
    margin:{left:margin,right:margin},
    alternateRowStyles:{fillColor:[248,250,252]},
  });
  y=doc.lastAutoTable.finalY+8;

  // ── WEEKLY SESSIONS ──
  const weekActs=(S.activities||[]).filter(a=>new Date(a.date)>weekAgo);
  if(weekActs.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('THIS WEEK\'S SESSIONS',margin,y); y+=4;
    doc.autoTable({
      startY:y,
      head:[['Date','Section','Hours','Topic','Difficulty']],
      body:weekActs.map(a=>[
        new Date(a.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        a.section, a.hours+'h',
        (a.material||'General Study').slice(0,40),
        '★'.repeat(a.difficulty||3)+'☆'.repeat(5-(a.difficulty||3))
      ]),
      theme:'grid',
      headStyles:{fillColor:[99,102,241],textColor:[255,255,255],fontSize:8,fontStyle:'bold',cellPadding:3},
      bodyStyles:{fontSize:8,cellPadding:3},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:18},2:{cellWidth:18},3:{cellWidth:90},4:{cellWidth:26}},
      margin:{left:margin,right:margin},
      alternateRowStyles:{fillColor:[248,250,252]},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── ACHIEVEMENTS ──
  const earned=(S.achievements||[]);
  if(earned.length){
    if(y>230){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('ACHIEVEMENTS ('+earned.length+'/'+ACHIEVEMENTS.length+')',margin,y); y+=6;
    const achNames=earned.map(id=>ACHIEVEMENTS.find(a=>a.id===id)?.name||id).join(' · ');
    doc.setFont('helvetica','normal'); doc.setFontSize(8); setTxt('#475569');
    const lines=doc.splitTextToSize(achNames,W-margin*2);
    doc.text(lines,margin,y); y+=lines.length*4+6;
  }

  // ── ALL-TIME SESSIONS TABLE ──
  const allActs=(S.activities||[]).slice().reverse();
  if(allActs.length>weekActs.length){
    if(y>220){doc.addPage();y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(10); setTxt('#0f172a');
    doc.text('ALL SESSIONS ('+allActs.length+' total)',margin,y); y+=4;
    doc.autoTable({
      startY:y,
      head:[['Date','Section','Hours','Topic','Notes']],
      body:allActs.slice(0,50).map(a=>[
        new Date(a.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}),
        a.section, a.hours+'h',
        (a.material||'—').slice(0,35),
        (a.caption||'—').slice(0,30),
      ]),
      theme:'striped',
      headStyles:{fillColor:[30,27,75],textColor:[255,255,255],fontSize:7,fontStyle:'bold',cellPadding:2.5},
      bodyStyles:{fontSize:7,cellPadding:2.5},
      columnStyles:{0:{cellWidth:24},1:{cellWidth:16},2:{cellWidth:16},3:{cellWidth:76},4:{cellWidth:52}},
      margin:{left:margin,right:margin},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── FOOTER ──
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    setFill('#f1f5f9'); doc.rect(0,287,W,10,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); setTxt('#94a3b8');
    doc.text('Generated by Ledger — ledger-cpa.com · '+dateStr,margin,293);
    doc.text('Page '+i+' of '+pageCount,W-margin,293,{align:'right'});
  }

  const fileName='ledger-report-'+S.name.replace(/\s+/g,'-').toLowerCase()+'-'+now.toISOString().slice(0,10)+'.pdf';
  doc.save(fileName);
  showToast('📄 PDF report downloaded!','ok');
}

    {q:'Tax-exempt interest income in relation to a corporation\'s earnings and profits (E&P):',choices:['Excluded from E&P','Increases E&P despite being excluded from taxable income','Decreases E&P','Has no effect on E&P'],correct:1,exp:'Tax-exempt interest is excluded from taxable income but increases E&P \u2014 E&P measures the economic capacity to pay dividends.'},
    {q:'Intercompany sales in a consolidated return are:',choices:['Recognized immediately','Deferred/eliminated until goods are sold to parties outside the consolidated group','Subject to double taxation','Taxed at each entity\'s applicable rate'],correct:1,exp:'Intercompany transactions are eliminated until the goods/services are sold to non-members of the consolidated group.'},
    {q:'Section 351 non-recognition requires transferors to control ___% of the corporation immediately after the exchange.',choices:['51%','67%','80%','100%'],correct:2,exp:'Section 351: transferors must control \u226580% of voting stock and \u226580% of all other stock classes immediately after the transfer.'},
    {q:'Dividends received deduction (DRD) for a corporate shareholder owning 20\u201379% of the distributing corporation:',choices:['50%','65%','70%','100%'],correct:1,exp:'Ownership \u226520% but <80%: DRD is 65%. <20% ownership: 50%. \u226580% ownership: 100% (if consolidated return requirements met).'},
    {q:'The accumulated earnings tax is a penalty tax on:',choices:['All retained earnings','Unreasonable accumulations beyond reasonable business needs to avoid paying dividends','C corporations only if publicly traded','Retained earnings exceeding $250,000'],correct:1,exp:'The AET (20%) penalizes C corporations that accumulate earnings beyond reasonable needs to avoid distributing dividends.'},
    {q:'At-risk rules limit loss deductions to the taxpayer\'s:',choices:['Capital account balance','Share of partnership liabilities + cash contributed','Amount at risk \u2014 actual economic exposure in the activity','Outside basis only'],correct:2,exp:'Section 465 limits deductions to the amount at risk \u2014 generally cash invested plus personally liable debt.'},
    {q:'C corporation with December 31 year-end: income tax return due date is:',choices:['March 15','April 15 with no extension possible','March 15 with 6-month extension to September 15','April 15 with automatic 6-month extension to October 15'],correct:3,exp:'C corps (Dec 31 year-end) file by April 15; they can get an automatic 6-month extension to October 15.'},
    {q:'Section 163(j) limits net business interest expense deduction to:',choices:['30% of adjusted taxable income','50% of AGI','25% of business income','No limit \u2014 all deductible'],correct:0,exp:'Section 163(j): business interest deduction limited to 30% of ATI; disallowed excess carries forward indefinitely.'},
    {q:'A partnership\'s inside basis equals:',choices:['Sum of all partners\' outside bases in their interests','FMV of partnership assets','Cost of assets to the partnership at formation','Book value of assets per financial statements'],correct:0,exp:'Inside basis (entity\'s tax basis in assets) equals the sum of all partners\' outside bases in their partnership interests.'},
    {q:'Passive activity losses can offset:',choices:['Ordinary income from employment','Passive activity income only','Capital gains','Any income with proper election'],correct:1,exp:'Passive activity losses can only offset passive activity income; suspended losses are released when the activity is fully disposed of.'},
    {q:'Post-2017 TCJA, net operating losses can be:',choices:['Carried back 2 years and forward 20 years','Carried forward indefinitely, limited to 80% of taxable income','Carried back 3 years and forward 15 years','Carried forward 20 years without limitation'],correct:1,exp:'Post-TCJA: no carryback (generally); carry forward indefinitely; deductible up to 80% of taxable income in the carryforward year.'},
    {q:'A Section 338 election allows a qualifying stock purchase to be treated as:',choices:['A tax-free reorganization','An asset purchase for tax purposes with a step-up in basis','A partnership interest acquisition','A liquidation of the target'],correct:1,exp:'A Section 338 election treats a qualifying stock purchase as a deemed asset acquisition, allowing a step-up in the target\'s asset basis.'},
    {q:'Under Section 1231, net gains are treated as:',choices:['Always ordinary income','Long-term capital gain (subject to lookback recapture)','Short-term capital gain','Section 1245 ordinary recapture income'],correct:1,exp:'Net Section 1231 gains are LTCG; however, prior Section 1231 losses in the past 5 years are "recaptured" as ordinary income first.'},
    {q:'LIFO conformity rule requires that if LIFO is used for tax:',choices:['It is only disclosed in footnotes','It must be used in financial statements presented to shareholders','It applies to payroll records too','It applies only to the filing entity'],correct:1,exp:'The LIFO conformity rule requires that if a taxpayer elects LIFO for tax purposes, it must also use LIFO in financial statements presented to shareholders, creditors, or the public.'},
    {q:'Excess business loss limitation under Section 461(l) applies to:',choices:['C corporations','S corporations only','Non-corporate taxpayers','Partnerships only at the entity level'],correct:2,exp:'Section 461(l) limits non-corporate taxpayers from deducting business losses that exceed the applicable threshold; excess is treated as an NOL carryforward.'},
    {q:'The QBI (qualified business income) deduction under Section 199A is up to ___% of QBI.',choices:['10%','15%','20%','25%'],correct:2,exp:'Section 199A provides a deduction of up to 20% of qualified business income from pass-through entities and sole proprietorships, subject to limitations.'},
    {q:'In a complete liquidation of a corporation, shareholders recognize:',choices:['Ordinary income equal to distributions received','Capital gain or loss equal to FMV received minus their stock basis','No gain or loss','Dividend income to the extent of E&P'],correct:1,exp:'Upon complete liquidation, shareholders treat amounts received as full payment for their stock \u2014 recognizing capital gain or loss.'},
    {q:'A corporation pays a property distribution to shareholders. The distributing corporation recognizes:',choices:['No gain','Gain (but not loss) as if the property were sold at FMV','Loss equal to the decline in value','Gain only if the property is appreciated'],correct:1,exp:'Under Section 311(b), a corporation recognizes gain (but not loss) on a non-liquidating distribution of appreciated property, as if sold at FMV.'},
    {q:'The transfer pricing rules of Section 482 allow the IRS to:',choices:['Set prices on all intercompany transactions','Reallocate income and deductions among commonly controlled entities to reflect arm\'s-length pricing','Prohibit intercompany transactions','Tax both entities on the same transaction'],correct:1,exp:'Section 482 gives the IRS authority to reallocate income, deductions, and credits between commonly controlled entities to clearly reflect income at arm\'s-length prices.'},
    {q:'Under the check-the-box regulations, a two-member LLC is classified as _____ by default.',choices:['C Corporation','S Corporation','Partnership','Disregarded entity'],correct:2,exp:'A domestic multi-member LLC defaults to partnership classification for tax purposes unless it elects to be treated as a corporation.'},
    {q:'Which of the following triggers Section 1245 ordinary income recapture?',choices:['Sale of land at a gain','Sale of depreciable personal property at a gain, to the extent of accumulated depreciation','Sale of a building using straight-line depreciation','Sale of stock in a C corporation'],correct:1,exp:'Section 1245 recaptures prior depreciation deductions on tangible personal property as ordinary income upon sale, to the extent of accumulated depreciation.'},
    {q:'The dividends-paid deduction (DPD) is available to:',choices:['C corporations to reduce corporate income tax','Regulated investment companies (RICs) and REITs to reduce entity-level tax','S corporations to avoid double taxation','Partnerships distributing cash to partners'],correct:1,exp:'RICs (mutual funds) and REITs can deduct dividends paid to shareholders, effectively eliminating entity-level tax on distributed income.'},
    {q:'An S corporation election is made on Form 2553 and must be filed:',choices:['By March 15 of the election year','By April 15 of the election year','No later than March 15 of the election year or March 15 of the prior year','By the end of the first month of the tax year'],correct:2,exp:'Form 2553 must be filed no later than the 15th day of the third month of the tax year for which the election is to apply, or March 15 of the prior year.'},
    {q:'The earnings stripping rules (now codified at Section 163(j)) were primarily designed to prevent:',choices:['Excessive dividend payments','Thin capitalization / excessive interest deductions that shift income out of the US','Passive activity abuses','S corporation losses exceeding basis'],correct:1,exp:'Section 163(j) was designed to prevent earnings stripping \u2014 the use of excessive intercompany debt to shift income to lower-tax jurisdictions.'},
    {q:'A deferred compensation plan that meets the requirements of Section 409A must:',choices:['Be funded and taxable immediately','Defer the inclusion of income in the year of deferral and comply with distribution timing rules','Allow withdrawal at any time without penalty','Be established only by public companies'],correct:1,exp:'Section 409A governs non-qualified deferred comp plans, requiring compliance with deferral elections, permissible distribution events, and timing rules to avoid immediate taxation and penalties.'},
    {q:'Under Section 382, a net operating loss carryforward is limited after:',choices:['A change in accounting method','An ownership change (>50 percentage point shift among 5%+ shareholders in 3 years)','Any acquisition of stock','A bankruptcy filing'],correct:1,exp:'Section 382 limits NOL use following an ownership change \u2014 defined as a >50 percentage-point shift in ownership among 5%-or-more shareholders within a 3-year period.'},
    {q:'Rev. Proc. 2002-39 allows a corporation to change its tax year without IRS approval if it meets:',choices:['The natural business year test','The 25% gross receipts test','Either the natural business year or ownership tax year test','None \u2014 IRS approval is always required'],correct:2,exp:'Automatic approval to change a tax year is available under Rev. Proc. 2002-39 if the entity qualifies under the natural business year or ownership tax year tests.'},
