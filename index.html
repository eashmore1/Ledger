  BAR: [
    {q:'The DuPont formula expresses ROE as:',choices:['Net income / Total assets','Net profit margin \u00d7 Asset turnover \u00d7 Equity multiplier','EBIT / Total equity','Revenue / Equity'],correct:1,exp:'DuPont: ROE = Net profit margin \u00d7 Asset turnover \u00d7 Financial leverage (equity multiplier).'},
    {q:'Free cash flow equals:',choices:['Net income + depreciation','Operating cash flow \u2013 capital expenditures','EBITDA \u2013 interest expense','Revenue \u2013 total operating expenses'],correct:1,exp:'FCF = Operating cash flow \u2013 Capital expenditures; the cash available after maintaining/expanding asset base.'},
    {q:'The quick ratio excludes _____ from the numerator.',choices:['Cash','Marketable securities','Inventory','Accounts receivable'],correct:2,exp:'Quick ratio = (Cash + Marketable securities + AR) / Current liabilities. Inventory is excluded as the least liquid current asset.'},
    {q:'EBITDA is used to compare companies because it:',choices:['Measures net cash flow directly','Eliminates effects of financing, accounting, and tax differences','Includes working capital changes','Equals free cash flow'],correct:1,exp:'EBITDA normalizes earnings by removing interest, taxes, depreciation, and amortization, enabling cross-company and cross-industry comparison.'},
    {q:'Which financing source has the lowest after-tax cost for a profitable C corporation?',choices:['Common equity','Preferred stock','Debt (interest is tax-deductible)','Retained earnings'],correct:2,exp:'Debt has the lowest after-tax cost because interest expense is tax-deductible, reducing its effective cost vs. equity.'},
    {q:'Weighted average cost of capital (WACC) is used as:',choices:['A profitability metric','The discount rate in DCF valuations to represent the overall required return','A measure of liquidity','An indication of leverage'],correct:1,exp:'WACC is the blended required return on a firm\'s capital (debt + equity) and serves as the discount rate in DCF analysis.'},
    {q:'Operating leverage measures the sensitivity of:',choices:['Debt-to-equity ratio','Operating income to changes in revenue','Financial risk','Asset utilization efficiency'],correct:1,exp:'Degree of Operating Leverage (DOL) = % change in EBIT / % change in revenue. High fixed costs = high operating leverage.'},
    {q:'The Gordon Growth Model values a stock as:',choices:['EPS / discount rate','D1 / (required return \u2013 sustainable growth rate)','Book value per share','FCF / WACC'],correct:1,exp:'Gordon Growth Model: P = D1 / (r \u2013 g), where D1 is next year\'s dividend, r is the required return, and g is the constant growth rate.'},
    {q:'A positive EVA (Economic Value Added) indicates:',choices:['The firm has positive net income','The firm earns above its cost of capital, creating value','Stock price is rising','The firm has no financial leverage'],correct:1,exp:'EVA = NOPAT \u2013 (WACC \u00d7 Invested Capital). Positive EVA means returns exceed the cost of capital, creating shareholder value.'},
    {q:'Days Sales Outstanding (DSO) measures:',choices:['Days to sell inventory','Average collection period for accounts receivable','Days payable to suppliers','Length of operating cycle'],correct:1,exp:'DSO = (AR / Revenue) \u00d7 365. Measures how quickly a company collects its receivables.'},
    {q:'Horizontal analysis compares:',choices:['Different companies in the same period','One company\'s results across multiple time periods','Line items as percentage of base figure in same period','Company results to industry benchmarks'],correct:1,exp:'Horizontal (trend) analysis compares financial data across periods to identify trends and growth rates.'},
    {q:'A company with high fixed costs relative to variable costs has:',choices:['High financial leverage and low operating leverage','Low operating leverage','High operating leverage, meaning profits are more sensitive to revenue changes','Low break-even point'],correct:2,exp:'High fixed costs relative to variable costs = high operating leverage \u2014 profits accelerate (or decline) more dramatically with revenue changes.'},
    {q:'Accounts payable days (DPO) increasing suggests:',choices:['Company is collecting receivables faster','Company is taking longer to pay suppliers','Higher inventory turnover','Lower liquidity always'],correct:1,exp:'Rising DPO means the company is taking longer to pay suppliers \u2014 which may conserve cash but could strain supplier relationships.'},
    {q:'The price/earnings (P/E) ratio is defined as:',choices:['Market price per share / book value per share','Market price per share / earnings per share','Dividends per share / earnings per share','Net income / total equity'],correct:1,exp:'P/E = Market price per share / Earnings per share. It reflects how much investors are paying for each dollar of earnings.'},
    {q:'Net present value (NPV) > 0 means:',choices:['Project earns exactly the required return','Project returns more than the cost of capital \u2014 it creates value','Project has a short payback period','Project has low risk'],correct:1,exp:'NPV > 0 means the present value of future cash flows exceeds the initial investment, meaning the project generates a return above the discount rate.'},
    {q:'The internal rate of return (IRR) is:',choices:['The discount rate that maximizes NPV','The discount rate at which NPV = 0','The rate of return on equity','Annual cash flow / initial investment'],correct:1,exp:'IRR is the discount rate at which the present value of future cash flows equals the initial investment (NPV = 0).'},
    {q:'A leveraged buyout (LBO) is characterized by:',choices:['Acquisition funded primarily with common equity','Acquisition funded with a significant portion of debt using the target\'s assets as collateral','A merger of equals with no debt','A government-funded acquisition'],correct:1,exp:'An LBO uses a large proportion of debt (often 60-90%), secured by the target\'s assets and cash flows, to acquire a company.'},
    {q:'Enterprise value (EV) equals:',choices:['Market capitalization only','Market cap + debt \u2013 cash and equivalents','Total assets \u2013 total liabilities','Revenue \u00d7 P/E multiple'],correct:1,exp:'EV = Market cap + total debt \u2013 cash. It represents the total value of the firm to all capital providers, independent of capital structure.'},
    {q:'The payback period method ignores:',choices:['Initial investment','Cash flows after the payback period and the time value of money','Operating costs','Annual cash inflows'],correct:1,exp:'The payback period ignores the time value of money and all cash flows beyond the payback period \u2014 a significant limitation.'},
    {q:'Vertical (common-size) analysis expresses each line item as a percentage of:',choices:['Prior year\'s total','Industry average','A base figure (revenue for P&L; total assets for balance sheet)','Number of shares outstanding'],correct:2,exp:'Vertical analysis converts dollar amounts to percentages of a base: revenue for the income statement, total assets for the balance sheet.'},
    {q:'Which ratio best measures short-term liquidity including only the most liquid assets?',choices:['Current ratio','Quick ratio','Cash ratio (cash + equivalents / current liabilities)','Debt-to-equity ratio'],correct:2,exp:'The cash ratio is the most conservative liquidity measure, using only cash and cash equivalents relative to current liabilities.'},
    {q:'The sustainable growth rate formula is:',choices:['ROE \u00d7 dividend payout ratio','ROE \u00d7 (1 \u2013 dividend payout ratio) = ROE \u00d7 retention ratio','Net income / total assets','EBITDA / interest expense'],correct:1,exp:'Sustainable growth rate = ROE \u00d7 retention ratio (1 \u2013 dividend payout ratio). It represents the maximum growth achievable without external equity financing.'},
    {q:'In discounted cash flow (DCF) analysis, the terminal value typically represents:',choices:['The value of fixed assets at the end of the forecast period','The present value of all cash flows beyond the explicit forecast period','The net salvage value of assets','Total dividends paid during the forecast period'],correct:1,exp:'Terminal value captures the present value of all cash flows beyond the explicit forecast period, often the largest component of a DCF valuation.'},
    {q:'The Altman Z-score is a model that predicts:',choices:['Stock price appreciation','Probability of corporate bankruptcy within 2 years','Optimal capital structure','Earnings quality'],correct:1,exp:'The Altman Z-score uses five financial ratios to predict the probability of a company filing for bankruptcy within two years.'},
    {q:'A company\'s operating cash flow is negative but net income is positive. The most likely cause is:',choices:['Large dividend payments','Significant increase in working capital (AR, inventory)','High capital expenditures','Large debt repayments'],correct:1,exp:'Growing working capital (AR, inventory increasing faster than AP) consumes cash, making OCF negative despite positive net income.'},
    {q:'Interest coverage ratio = EBIT / Interest expense. A ratio below 1.0 means:',choices:['Strong debt capacity','The company cannot cover interest from operating income','Low leverage','Excellent credit rating'],correct:1,exp:'Interest coverage < 1.0 means EBIT is insufficient to cover interest expense \u2014 a significant financial distress signal.'},
    {q:'Which valuation multiple is most appropriate when comparing companies with different capital structures?',choices:['P/E ratio','EV/EBITDA','Price/book value','Dividend yield'],correct:1,exp:'EV/EBITDA is capital-structure neutral because it uses enterprise value (all providers) and EBITDA (pre-interest) \u2014 making it ideal for cross-company comparison regardless of leverage.'},
    {q:'Break-even analysis determines the sales volume at which:',choices:['Net income equals the prior year','Total revenue equals total costs (fixed + variable)','Gross margin equals 50%','Operating leverage equals 1'],correct:1,exp:'Break-even = Fixed costs / Contribution margin per unit. At this point, total revenue = total costs and net income = $0.'},
    {q:'Return on invested capital (ROIC) measures:',choices:['Return to common shareholders only','How efficiently a company generates returns on all capital employed (debt + equity)','Dividend yield','Annual revenue growth'],correct:1,exp:'ROIC = NOPAT / Invested Capital. It measures operational efficiency in generating returns on all the capital a company has deployed.'},
    {q:'A higher asset turnover ratio (Revenue / Average Total Assets) generally indicates:',choices:['The company has too little debt','The company generates more revenue per dollar of assets \u2014 higher efficiency','The company is over-leveraged','The company has excess cash'],correct:1,exp:'Higher asset turnover indicates the company is generating more revenue from its asset base, reflecting greater operational efficiency.'},

  ISC: [
    {q:'The CIA triad in information security stands for:',choices:['Control, Integrity, Authentication','Confidentiality, Integrity, Availability','Compliance, Integration, Access','Certification, Identity, Authorization'],correct:1,exp:'CIA: Confidentiality (protect from unauthorized access), Integrity (ensure accuracy/completeness), Availability (ensure timely access).'},
    {q:'A SOC 1 report focuses on:',choices:['Customer data security posture','Internal controls relevant to user entities\' financial reporting','IT infrastructure performance metrics','Third-party vendor management'],correct:1,exp:'SOC 1 (SSAE 18) reports on internal controls relevant to the user entity\'s financial reporting.'},
    {q:'Which is a preventive control?',choices:['Audit trail logging','Exception reporting','Password complexity policy','Daily reconciliation reports'],correct:2,exp:'Password policies prevent unauthorized access (preventive). Audit trails and exception reports are detective controls.'},
    {q:'Encryption at rest protects data:',choices:['While transmitted over a network','Stored on disk, database, or other storage media','In active memory during processing','During backup transmission'],correct:1,exp:'Encryption at rest protects stored data; encryption in transit protects data moving across networks.'},
    {q:'Segregation of duties prevents:',choices:['System downtime','One person from initiating, authorizing, and recording the same transaction','Network security breaches','Database corruption'],correct:1,exp:'SoD ensures no single person can both authorize and record a transaction, reducing fraud and error risk.'},
    {q:'A general IT control differs from an application control because it:',choices:['Applies to one specific application only','Is performed manually','Applies across the overall IT environment supporting multiple applications','Requires end-user interaction'],correct:2,exp:'General IT controls (access management, change control, operations) apply across the IT environment. Application controls are specific to individual systems.'},
    {q:'Multi-factor authentication (MFA) requires:',choices:['Two different passwords','Something you know + something you have or are (two or more independent factors)','Biometrics only','PIN plus password (both knowledge factors)'],correct:1,exp:'MFA combines two or more factor types: knowledge (password), possession (token/phone), or inherence (biometric).'},
    {q:'A SQL injection attack exploits:',choices:['Weak network firewall configuration','Unsanitized user input fields in database-connected applications','Physical access to database servers','Social engineering of database administrators'],correct:1,exp:'SQL injection inserts malicious code through input fields, potentially allowing attackers to read, modify, or delete database content.'},
    {q:'Change management controls ensure that:',choices:['Users cannot change their own passwords','System changes are authorized, tested in non-production, and documented before deployment','Daily backups run without fail','Access logs are reviewed monthly'],correct:1,exp:'IT change management ensures all changes are properly authorized, tested, documented, and approved before going into production.'},
    {q:'A SOC 2 report evaluates controls related to:',choices:['Financial statement controls only','Security, availability, processing integrity, confidentiality, and/or privacy (Trust Service Criteria)','Physical facility security','Hardware and network performance'],correct:1,exp:'SOC 2 reports assess controls against the AICPA Trust Service Criteria: security, availability, processing integrity, confidentiality, privacy.'},
    {q:'RPO (Recovery Point Objective) defines:',choices:['How quickly systems must be restored after failure','The maximum acceptable amount of data loss, measured in time','The cost of the recovery process','The number of staff needed for recovery operations'],correct:1,exp:'RPO defines the maximum acceptable data loss measured in time (e.g., "we can tolerate losing up to 4 hours of data").'},
    {q:'An intrusion detection system (IDS) is classified as which type of control?',choices:['Preventive','Detective','Corrective','Compensating'],correct:1,exp:'An IDS detects and alerts on suspicious activity \u2014 it is a detective control, not preventive.'},
    {q:'Data masking is used to:',choices:['Encrypt data in transit between systems','Replace sensitive production data with realistic but fictitious data for non-production use','Create daily backups of production data','Monitor who accesses sensitive records'],correct:1,exp:'Data masking substitutes real sensitive data with realistic test data, allowing development/testing without exposing production data.'},
    {q:'The purpose of a disaster recovery plan (DRP) is to:',choices:['Prevent all system failures from occurring','Restore IT operations and systems to a functional state after a disruption','Train users on new applications','Ensure SOX compliance'],correct:1,exp:'A DRP outlines the steps to restore IT systems, applications, and data after a disaster or significant disruption.'},
    {q:'RTO (Recovery Time Objective) defines:',choices:['Maximum acceptable data loss','The maximum tolerable downtime \u2014 how quickly systems must be restored','Cost to restore systems','Data backup frequency'],correct:1,exp:'RTO is the maximum acceptable time to restore systems after a failure. RPO covers data loss; RTO covers downtime.'},
    {q:'A phishing attack primarily targets:',choices:['Network infrastructure vulnerabilities','Human users through deceptive messages to steal credentials','Database servers directly','Physical security perimeters'],correct:1,exp:'Phishing exploits human psychology by tricking users into revealing credentials or installing malware via deceptive emails/messages.'},
    {q:'A business continuity plan (BCP) differs from a DRP in that a BCP:',choices:['Focuses only on IT systems','Addresses the continuation of ALL critical business functions, not just IT','Is required only by public companies','Covers only natural disaster scenarios'],correct:1,exp:'A BCP covers all critical business processes (people, facilities, suppliers, communications), while a DRP focuses specifically on IT system recovery.'},
    {q:'Which is a characteristic of a hot site in disaster recovery?',choices:['An empty facility with power and connectivity only','A facility with some equipment but no current data','A fully equipped, live-data backup facility that can be activated immediately','A mobile data center on a truck'],correct:2,exp:'A hot site is a fully operational backup facility with mirrored data that can take over operations almost immediately. Cold sites have space/utilities; warm sites have some equipment.'},
    {q:'COBIT (Control Objectives for Information and Related Technologies) is primarily a framework for:',choices:['Network security protocols','IT governance and management of enterprise IT','Software development methodologies','Cloud infrastructure management'],correct:1,exp:'COBIT is a framework created by ISACA for IT governance, enabling organizations to align IT strategy with business goals and manage IT risks and resources.'},
    {q:'A key control for preventing unauthorized access to a database would be:',choices:['Daily backup procedures','Role-based access control (RBAC) limiting access by job function','Antivirus software on workstations','Regular server hardware maintenance'],correct:1,exp:'Role-based access control (RBAC) restricts database access based on defined job roles, ensuring employees can only access data necessary for their function.'},
    {q:'Penetration testing (pen testing) is a security practice that:',choices:['Monitors network traffic in real time','Simulates cyberattacks to identify and exploit vulnerabilities before attackers do','Updates software patches across all systems','Trains employees to identify phishing attempts'],correct:1,exp:'Pen testing involves authorized simulated attacks to discover and exploit security vulnerabilities before malicious actors can.'},
    {q:'Which of the following BEST describes a zero-day exploit?',choices:['An attack using outdated malware','A vulnerability that is unknown to the software vendor and has no patch available','A denial-of-service attack','An attack occurring on the first day of system deployment'],correct:1,exp:'A zero-day exploit targets a vulnerability that is unknown to the vendor (zero days of patch availability), making it especially dangerous.'},
    {q:'Under NIST\'s Cybersecurity Framework, the five core functions are:',choices:['Plan, Test, Deploy, Monitor, Respond','Identify, Protect, Detect, Respond, Recover','Assess, Plan, Implement, Review, Report','Audit, Control, Monitor, Remediate, Document'],correct:1,exp:'The NIST CSF\'s five functions: Identify (understand risks), Protect (implement safeguards), Detect (identify events), Respond (act on incidents), Recover (restore capabilities).'},
    {q:'The concept of "least privilege" in access control means:',choices:['All users get the same minimum level of access','Users are granted only the permissions necessary to perform their job functions','Admin accounts are shared to minimize user counts','Access is granted only during business hours'],correct:1,exp:'Least privilege: users get the minimum access rights needed to perform their duties, reducing the attack surface and limiting damage from compromised accounts.'},
    {q:'Data integrity controls ensure that:',choices:['Data is confidential and encrypted','Data is accurate, complete, and has not been altered without authorization','Data is available 24/7','Data is backed up hourly'],correct:1,exp:'Data integrity controls detect and prevent unauthorized modification of data, ensuring it remains accurate and complete throughout its lifecycle.'},
    {q:'An audit log (audit trail) is an example of which type of control?',choices:['Preventive','Detective','Corrective','Directive'],correct:1,exp:'Audit logs are detective controls \u2014 they record events so that unauthorized activity can be identified and investigated after the fact.'},
    {q:'Tokenization replaces sensitive data (e.g., credit card numbers) with:',choices:['Encrypted versions of the original data','A non-sensitive placeholder (token) with no exploitable mathematical relationship to the original','A hash of the original data','Compressed data'],correct:1,exp:'Tokenization substitutes sensitive data with a random, non-sensitive token stored in a token vault. Unlike encryption, tokens have no mathematical relationship to the original data.'},
    {q:'The COSO Internal Control framework\'s five components are:',choices:['Plan, Act, Check, Do, Review','Control Environment, Risk Assessment, Control Activities, Information & Communication, Monitoring','Identify, Assess, Control, Monitor, Improve','Governance, Risk, Compliance, Audit, Technology'],correct:1,exp:'COSO 2013: Control Environment, Risk Assessment, Control Activities, Information & Communication, and Monitoring Activities.'},
    {q:'Which type of malware encrypts a victim\'s files and demands payment for decryption?',choices:['Spyware','Ransomware','Adware','Trojan horse'],correct:1,exp:'Ransomware encrypts files or locks systems, demanding ransom (usually cryptocurrency) for decryption keys. It\'s one of the most prevalent cyber threats today.'},
    {q:'The primary risk addressed by a data loss prevention (DLP) solution is:',choices:['Malware infiltration','Unauthorized transfer or exfiltration of sensitive data outside the organization','System availability during attacks','Credential theft'],correct:1,exp:'DLP solutions monitor, detect, and block the unauthorized transfer or exfiltration of sensitive data, protecting against insider threats and accidental data leakage.'},

  const allQs = QB_QUESTIONS[section] || [];
  if (!allQs.length) { showToast('Questions coming soon for ' + section, 'info'); return; }

  // Build question set based on type
  let qs = [];
  if (type === 'mcq') {
    qs = isPro() ? [...allQs] : allQs.slice(0, 5);
  } else if (type === 'timed') {
    qs = [...allQs].sort(function(){ return Math.random() - 0.5; }).slice(0, 10);
  } else if (type === 'random') {
    qs = [...allQs].sort(function(){ return Math.random() - 0.5; });
  } else if (type === 'sims') {
    // SIMs: show 3 scenario-based questions with explanation focus
    qs = [...allQs].filter(function(_,i){ return i%3===0; }).slice(0,5);
  }

  _quiz = {
    active: true, section, type,
    questions: qs, current: 0,
    selected: null, answered: false,
    score: 0, timerInterval: null,
    timeLeft: type === 'timed' ? qs.length * 60 : 0,
    results: [],
  };

  let overlay = document.getElementById('quiz-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'quiz-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:700;overflow-y:auto;animation:fadeIn .2s ease';
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'block';
  _renderQuiz();

  if (type === 'timed') {
    _quiz.timerInterval = setInterval(function() {
      _quiz.timeLeft--;
      const el = document.getElementById('quiz-timer');
      if (el) {
        const m = Math.floor(_quiz.timeLeft / 60), s = _quiz.timeLeft % 60;
        el.textContent = m + ':' + String(s).padStart(2,'0');
        el.style.color = _quiz.timeLeft < 60 ? 'var(--red)' : _quiz.timeLeft < 180 ? 'var(--amb)' : 'var(--grn)';
      }
      if (_quiz.timeLeft <= 0) { clearInterval(_quiz.timerInterval); _finishQuiz(); }
    }, 1000);
  }
}

function closeQuizOverlay() {
  if (_quiz.timerInterval) clearInterval(_quiz.timerInterval);
  _quiz.active = false;
  const overlay = document.getElementById('quiz-overlay');
  if (overlay) overlay.style.display = 'none';
}

function _renderQuiz() {
  const overlay = document.getElementById('quiz-overlay');
  if (!overlay) return;
  const { section, type, questions, current, selected, answered, score, timeLeft } = _quiz;
  const q = questions[current];
  const total = questions.length;
  const sec = QB_SECTIONS.find(function(s){ return s.code === section; });
  const color = sec ? sec.color : '#6366f1';
  const choiceLetters = ['A','B','C','D'];
  const typeLabels = {mcq:'MCQ Practice', sims:'Task-Based SIMs', timed:'Timed Set', random:'Random Quiz'};
  const pct = total > 0 ? Math.round(current / total * 100) : 0;

  const timerHTML = type === 'timed'
    ? '<div style="display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px"><span>⏱</span><span id="quiz-timer" style="font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--grn)">' + Math.floor(timeLeft/60) + ':' + String(timeLeft%60).padStart(2,'0') + '</span></div>'
    : '';

  const choicesHTML = q.choices.map(function(c, i) {
    let bg = 'var(--surf2)', border = '2px solid var(--bdr)', txtColor = 'var(--txt)', badge = '';
    if (answered) {
      if (i === q.correct) { bg = 'var(--grn-bg)'; border = '2px solid var(--grn)'; badge = '<span style="margin-left:auto;font-size:11px;font-weight:800;color:var(--grn);flex-shrink:0">✓ Correct</span>'; }
      else if (i === selected && i !== q.correct) { bg = 'var(--red-bg)'; border = '2px solid var(--red)'; badge = '<span style="margin-left:auto;font-size:11px;font-weight:800;color:var(--red);flex-shrink:0">✗ Wrong</span>'; }
      else { border = '2px solid var(--bdr)'; }
    } else if (i === selected) {
      bg = color + '15'; border = '2px solid ' + color;
    }
    const click = answered ? '' : 'onclick="_selectAnswer(' + i + ')"';
    return '<div ' + click + ' style="display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:' + border + ';background:' + bg + ';border-radius:11px;margin-bottom:9px;cursor:' + (answered?'default':'pointer') + ';transition:all .15s">' +
      '<span style="width:26px;height:26px;border-radius:50%;background:' + (i===selected&&!answered ? color : answered&&i===q.correct ? 'var(--grn)' : answered&&i===selected ? 'var(--red)' : 'var(--bdr2)') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">' + choiceLetters[i] + '</span>' +
      '<span style="font-size:13px;line-height:1.55;color:' + txtColor + ';padding-top:3px;flex:1">' + c + '</span>' +
      badge +
    '</div>';
  }).join('');

  const expHTML = answered
    ? '<div style="background:var(--ind-bg);border:1px solid rgba(90,95,207,.25);border-radius:10px;padding:14px 16px;margin-top:4px">' +
        '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ind);margin-bottom:6px">📖 Explanation</div>' +
        '<div style="font-size:13px;color:var(--sub);line-height:1.65">' + q.exp + '</div>' +
      '</div>'
    : '';

  const actionBtn = answered
    ? (current < total - 1
        ? '<button onclick="_nextQuestion()" style="flex:1;padding:13px;background:' + color + ';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer">Next Question →</button>'
        : '<button onclick="_finishQuiz()" style="flex:1;padding:13px;background:var(--grn);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer">🎉 See Results</button>'
      )
    : '<button onclick="_submitAnswer()" style="flex:1;padding:13px;background:' + (selected===null?'var(--bdr)':'var(--ind)') + ';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer" ' + (selected===null?'disabled':'') + '>Submit Answer</button>';

  overlay.innerHTML =
    '<div style="max-width:720px;margin:0 auto;padding:24px 16px 80px">' +
    // Header
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">' +
      '<button onclick="closeQuizOverlay()" style="padding:8px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)">← Back</button>' +
      '<span class="badge badge-' + section + '" style="font-size:12px;padding:4px 10px">' + section + '</span>' +
      '<div style="font-size:13px;font-weight:700;color:var(--sub);flex:1">' + typeLabels[type] + '</div>' +
      timerHTML +
      '<div style="font-size:12px;color:var(--mut)">' + (current+1) + ' / ' + total + '</div>' +
    '</div>' +
    // Progress bar
    '<div style="height:5px;background:var(--bdr);border-radius:4px;margin-bottom:24px;overflow:hidden">' +
      '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:4px;transition:width .4s"></div>' +
    '</div>' +
    // Question card
    '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:26px;margin-bottom:16px;box-shadow:var(--shadow-md)">' +
      '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:' + color + ';margin-bottom:12px">Question ' + (current+1) + ' of ' + total + '</div>' +
      '<div style="font-size:16px;font-weight:600;line-height:1.6;color:var(--txt);margin-bottom:22px">' + q.q + '</div>' +
      choicesHTML +
      expHTML +
    '</div>' +
    // Action
    '<div style="display:flex;gap:10px">' +
      actionBtn +
    '</div>' +
    '</div>';
}

function _selectAnswer(idx) {
  if (_quiz.answered) return;
  _quiz.selected = idx;
  _renderQuiz();
}

function _submitAnswer() {
  if (_quiz.selected === null) return;
  _quiz.answered = true;
  const q = _quiz.questions[_quiz.current];
  const correct = _quiz.selected === q.correct;
  if (correct) _quiz.score++;
  _quiz.results.push({ correct, selected: _quiz.selected, correctIdx: q.correct });
  _renderQuiz();
}

function _nextQuestion() {
  _quiz.current++;
  _quiz.selected = null;
  _quiz.answered = false;
  _renderQuiz();
}

function _finishQuiz() {
  if (_quiz.timerInterval) clearInterval(_quiz.timerInterval);
  const { section, score, questions, results, type } = _quiz;
  const total = questions.length;
  const pct = Math.round(score / total * 100);
  const sec = QB_SECTIONS.find(function(s){ return s.code === section; });
  const color = sec ? sec.color : '#6366f1';
  const grade = pct >= 75 ? {label:'Great job!', icon:'🎉', c:'var(--grn)'} : pct >= 55 ? {label:'Keep pushing', icon:'📈', c:'var(--amb)'} : {label:'Keep studying', icon:'📚', c:'var(--red)'};

  // Save progress
  S.qbProgress = S.qbProgress || {};
  S.qbProgress[section] = S.qbProgress[section] || {mcqDone:0, simsDone:0};
  if (type === 'sims') S.qbProgress[section].simsDone = (S.qbProgress[section].simsDone||0) + score;
  else S.qbProgress[section].mcqDone = Math.min((S.qbProgress[section].mcqDone||0) + total, 9999);
  saveState();

  const overlay = document.getElementById('quiz-overlay');
  if (!overlay) return;

  const reviewRows = questions.map(function(q, i) {
    const r = results[i] || {};
    const letters = ['A','B','C','D'];
    return '<div style="padding:14px 0;border-bottom:1px solid var(--bdr)">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        '<span style="width:22px;height:22px;border-radius:50%;background:' + (r.correct?'var(--grn)':'var(--red)') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">' + (r.correct?'✓':'✗') + '</span>' +
        '<span style="font-size:12px;color:var(--sub)">Q' + (i+1) + '</span>' +
      '</div>' +
      '<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:8px;line-height:1.5">' + q.q + '</div>' +
      '<div style="font-size:12px;color:' + (r.correct?'var(--grn)':'var(--red)') + ';font-weight:700;margin-bottom:4px">' + (r.correct?'Your answer: ':'You chose: ') + letters[r.selected!==undefined?r.selected:r.correctIdx] + ' — ' + q.choices[r.selected!==undefined?r.selected:r.correctIdx] + '</div>' +
      (!r.correct && r.selected !== undefined ? '<div style="font-size:12px;color:var(--grn);font-weight:700;margin-bottom:6px">Correct: ' + letters[q.correct] + ' — ' + q.choices[q.correct] + '</div>' : '') +
      '<div style="font-size:11px;color:var(--sub);background:var(--ind-bg);border-radius:7px;padding:9px 12px;line-height:1.6">' + q.exp + '</div>' +
    '</div>';
  }).join('');

  overlay.innerHTML =
    '<div style="max-width:720px;margin:0 auto;padding:32px 16px 80px">' +
    // Score hero
    '<div style="background:linear-gradient(155deg,#0e0804,#1c1008,#0e0804);border-radius:20px;padding:36px 28px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden">' +
      '<div style="position:absolute;inset:0;background:radial-gradient(ellipse at -10% 65%,rgba(249,115,22,.6),transparent 50%),radial-gradient(ellipse at 100% 0%,rgba(90,95,207,.2),transparent 40%)"></div>' +
      '<div style="position:relative;z-index:1">' +
        '<div style="font-size:44px;margin-bottom:10px">' + grade.icon + '</div>' +
        '<div style="font-size:68px;font-weight:900;color:' + grade.c + ';line-height:1;letter-spacing:-3px">' + pct + '%</div>' +
        '<div style="font-size:16px;font-weight:800;color:' + grade.c + ';margin-top:6px">' + grade.label + '</div>' +
        '<div style="color:rgba(255,255,255,.6);font-size:13px;margin-top:8px">' + score + ' of ' + total + ' correct</div>' +
      '</div>' +
    '</div>' +
    // Actions
    '<div style="display:flex;gap:10px;margin-bottom:24px">' +
      '<button onclick="openQuizModal(\'' + section + '\',\'' + type + '\')" style="flex:1;padding:12px;background:' + color + ';color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer">↺ Retry</button>' +
      '<button onclick="closeQuizOverlay()" style="flex:1;padding:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">← Back to Question Bank</button>' +
    '</div>' +
    // Review
    '<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:20px 22px">' +
      '<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:4px">Answer Review</div>' +
      reviewRows +
    '</div>' +
    '</div>';
}

function openQBSection(code) {
  const sec = QB_SECTIONS.find(function(s){ return s.code === code; });
  if (!sec) return;
  const pro = isPro();
  const prog = (S.qbProgress || {})[code] || {mcqDone:0, simsDone:0};

  let overlay = document.getElementById('qb-section-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'qb-section-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:650;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
    overlay.addEventListener('click', function(e){ if(e.target===overlay) closeQBSection(); });
    document.body.appendChild(overlay);
  }

  const modes = [
    {type:'mcq',    icon:'\u{1F4DD}', label:'MCQ Practice',      desc: pro ? 'Work through all ' + sec.mcqTotal + '+ questions' : 'Try 5 free questions', free:true},
    {type:'random', icon:'\u{1F500}', label:'Random Quiz',        desc:'Shuffled questions, any order',  free:false},
    {type:'timed',  icon:'\u23F1', label:'Timed Set',          desc:'10 questions, beat the clock',   free:false},
    {type:'sims',   icon:'\u{1F4CB}', label:'Task-Based SIMs',   desc:'Scenario-focused practice',       free:false},
  ];

  const modeCards = modes.map(function(m) {
    const locked = !pro && !m.free;
    return '<div onclick="' + (locked ? 'openUpgradeModal(\'Question Bank \u2014 ' + m.label + '\')' : 'closeQBSection();openQuizModal(\'' + code + '\',\'' + m.type + '\')') + '" ' +
      'style="display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:13px;border:1.5px solid ' + (locked ? 'var(--bdr)' : 'var(--bdr)') + ';background:var(--surf2);cursor:pointer;transition:all .15s;margin-bottom:10px" ' +
      'onmouseover="if(' + (!locked) + '){this.style.borderColor=\'' + sec.color + '\';this.style.background=\'' + sec.color + '12\'}" ' +
      'onmouseout="this.style.borderColor=\'var(--bdr)\';this.style.background=\'var(--surf2)\'">' +
      '<span style="font-size:24px;width:36px;text-align:center;flex-shrink:0">' + m.icon + '</span>' +
      '<div style="flex:1">' +
        '<div style="font-size:14px;font-weight:700;color:' + (locked ? 'var(--mut)' : 'var(--txt)') + '">' + m.label + (locked ? ' <span style="font-size:10px;font-weight:800;color:var(--ora);background:var(--ora-bg);padding:2px 7px;border-radius:20px;margin-left:4px">PRO</span>' : '') + '</div>' +
        '<div style="font-size:12px;color:var(--mut);margin-top:2px">' + m.desc + '</div>' +
      '</div>' +
      '<span style="font-size:18px;color:' + (locked ? 'var(--bdr2)' : sec.color) + '">' + (locked ? '\uD83D\uDD12' : '\u203A') + '</span>' +
    '</div>';
  }).join('');

  const pct = Math.min(100, Math.round((prog.mcqDone || 0) / sec.mcqTotal * 100));

  overlay.innerHTML =
    '<div style="background:var(--surf);border-radius:20px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden">' +
    // Header
    '<div style="background:' + sec.color + ';padding:24px 24px 20px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<span style="font-size:13px;font-weight:900;color:#fff;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;letter-spacing:.02em">' + code + '</span>' +
        '</div>' +
        '<button onclick="closeQBSection()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">\u00d7</button>' +
      '</div>' +
      '<div style="font-size:20px;font-weight:800;color:#fff;margin-top:10px">' + sec.full + '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:4px">' + sec.mcqTotal + '+ MCQs \u00b7 ' + sec.simsTotal + ' SIMs \u00b7 Progress: ' + (prog.mcqDone||0) + ' questions answered</div>' +
      // Progress bar
      '<div style="margin-top:14px;height:5px;background:rgba(255,255,255,.25);border-radius:4px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:#fff;border-radius:4px;transition:width .5s"></div>' +
      '</div>' +
    '</div>' +
    // Modes
    '<div style="padding:20px 24px 24px">' +
      '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:14px">Choose a practice mode</div>' +
      modeCards +
    '</div>' +
    '</div>';

  overlay.style.display = 'flex';
}

function closeQBSection() {
  const overlay = document.getElementById('qb-section-overlay');
  if (overlay) overlay.style.display = 'none';
}

function buildQuestionBank() {
  S.qbProgress = S.qbProgress || {};
  const pro = isPro();

  const cards = QB_SECTIONS.map(function(sec) {
    const prog = S.qbProgress[sec.code] || {mcqDone:0, simsDone:0};
    const mcqDone = prog.mcqDone || 0;
    const pct = Math.min(100, Math.round(mcqDone / sec.mcqTotal * 100));

    return '<div onclick="openQBSection(\'' + sec.code + '\')" ' +
      'style="background:var(--surf);border:1.5px solid var(--bdr);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden" ' +
      'onmouseover="this.style.borderColor=\'' + sec.color + '\';this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'var(--shadow-md)\'" ' +
      'onmouseout="this.style.borderColor=\'var(--bdr)\';this.style.transform=\'\';this.style.boxShadow=\'\'">' +
      '<div style="position:absolute;top:0;left:0;bottom:0;width:4px;background:' + sec.color + ';border-radius:14px 0 0 14px"></div>' +
      '<div style="padding-left:8px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
          '<span style="font-size:11px;font-weight:900;color:' + sec.color + ';background:' + sec.color + '18;padding:3px 10px;border-radius:20px;letter-spacing:.04em">' + sec.code + '</span>' +
          '<span style="font-size:11px;color:var(--mut)">' + mcqDone + ' / ' + sec.mcqTotal + ' done</span>' +
        '</div>' +
        '<div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;line-height:1.4">' + sec.full + '</div>' +
        '<div style="height:5px;background:var(--surf3);border-radius:4px;overflow:hidden;margin-bottom:10px">' +
          '<div style="height:100%;width:' + pct + '%;background:' + sec.color + ';border-radius:4px;transition:width .5s"></div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
            '<span style="font-size:10px;color:var(--mut);background:var(--surf2);border:1px solid var(--bdr);padding:3px 8px;border-radius:6px">' + sec.mcqTotal + '+ MCQ</span>' +
            '<span style="font-size:10px;color:var(--mut);background:var(--surf2);border:1px solid var(--bdr);padding:3px 8px;border-radius:6px">' + sec.simsTotal + ' SIMs</span>' +
            (pro ? '' : '<span style="font-size:10px;color:var(--ora);background:var(--ora-bg);border:1px solid var(--ora-bdr);padding:3px 8px;border-radius:6px;font-weight:700">5 free</span>') +
          '</div>' +
          '<span style="font-size:18px;color:var(--mut)">\u203a</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const freeNote = pro ? '' :
    '<div style="background:var(--ora-bg);border:1px solid var(--ora-bdr);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;cursor:pointer" onclick="openUpgradeModal(\'Full Question Bank\')">' +
      '<div style="flex:1">' +
        '<div style="font-size:13px;font-weight:800;color:var(--ora)">Unlock the Full Question Bank</div>' +
        '<div style="font-size:12px;color:var(--sub);margin-top:2px">Pro unlocks 500+ MCQs, all TBS SIMs, timed sets, and random quizzes per section.</div>' +
      '</div>' +
      '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openUpgradeModal(\'Full Question Bank\')">Upgrade</button>' +
    '</div>';

  return '<div style="max-width:860px;margin:0 auto">' +
    '<div style="margin-bottom:24px">' +
      '<h1 style="font-size:22px;font-weight:900;letter-spacing:-.02em">Question Bank</h1>' +
      '<p style="color:var(--mut);font-size:13px;margin-top:4px">Select a section to start practicing.</p>' +
    '</div>' +
    freeNote +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">' +
      cards +
    '</div>' +
  '</div>';
}

// IN-APP PROGRESS REPORT

let _prRange = 7; // 7 or 30

function openProgressReport() {
  let el = document.getElementById('progress-report-modal');
  if (!el) {
    el = document.createElement('div');
    el.id = 'progress-report-modal';
    el.style.cssText = 'display:none;position:fixed;inset:0;background:var(--bg);z-index:600;overflow-y:auto';
    document.body.appendChild(el);
  }
  el.style.display = 'block';
  renderProgressReport();
}

function closeProgressReport() {
  const el = document.getElementById('progress-report-modal');
  if (el) el.style.display = 'none';
}

function renderProgressReport() {
  const el = document.getElementById('progress-report-modal');
  if (!el) return;
  const days = _prRange;
  const cutoff = new Date(Date.now() - days * 86400000);
  const acts = (S.activities || []).filter(function(a){ return new Date(a.date) >= cutoff; });
  const totalHrs = acts.reduce(function(s,a){ return s+(a.hours||0); }, 0);
  const sessions = acts.length;
  const streak = getStreak();
  const sectionsActive = [...new Set(acts.map(function(a){ return a.section; }))].length;

  // 7-day chart
  const today = todayStr();
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0,10);
    const hrs = (S.activities||[]).filter(function(a){ return a.date.slice(0,10)===d; }).reduce(function(s,b){ return s+(b.hours||0); },0);
    last7.push({d, hrs, isToday: d===today, day: new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})});
  }
  const maxHrs = Math.max(...last7.map(function(d){ return d.hrs; }), 1);
  const chartBars = last7.map(function(d) {
    return '<div class="week-bar-wrap">' +
      '<div class="week-bar' + (d.isToday?' today-bar':'') + '" style="height:' + Math.max(4,Math.round(d.hrs/maxHrs*88)) + 'px" title="' + d.hrs.toFixed(1) + 'h"></div>' +
      '<div class="week-day-lbl">' + d.day.slice(0,1) + '</div>' +
    '</div>';
  }).join('');

  // Section breakdown
  const sectionRows = (S.sections || []).map(function(s) {
    const target = EXAMS[s].studyHours;
    const logged = getSectionHours(s);
    const rangeHrs = acts.filter(function(a){ return a.section===s; }).reduce(function(sum,a){ return sum+(a.hours||0); },0);
    const pct = Math.min(100, Math.round(logged / target * 100));
    return '<div style="margin-bottom:14px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="badge badge-' + s + '">' + s + '</span>' +
          '<span style="font-size:12px;font-weight:600">' + EXAMS[s].full + '</span>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<span style="font-size:13px;font-weight:800;color:' + EXAMS[s].color + '">' + rangeHrs.toFixed(1) + 'h</span>' +
          '<span style="font-size:10px;color:var(--mut)"> this period · ' + logged + 'h total</span>' +
        '</div>' +
      '</div>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%;background:' + EXAMS[s].color + '"></div></div>' +
      '<div style="font-size:10px;color:var(--mut);margin-top:3px">' + pct + '% of ' + target + 'h target</div>' +
    '</div>';
  }).join('');

  // Days studied in last 30
  const last30dates = new Set();
  const thirtyAgo = new Date(Date.now() - 30 * 86400000);
  (S.activities||[]).forEach(function(a){ if(new Date(a.date)>=thirtyAgo) last30dates.add(a.date.slice(0,10)); });
  const daysStudied30 = last30dates.size;
  const habitScore = Math.round(daysStudied30 / 30 * 100);

  // Top study day
  const dayCounts = {};
  (S.activities||[]).forEach(function(a){
    const dow = new Date(a.date).toLocaleDateString('en-US',{weekday:'long'});
    dayCounts[dow] = (dayCounts[dow]||0) + (a.hours||0);
  });
  const topDay = Object.keys(dayCounts).sort(function(a,b){ return dayCounts[b]-dayCounts[a]; })[0] || 'N/A';

  // Insights
  const insights = [];
  const weekHrs = getWeekHours();
  const weekGoal = S.hoursPerWeek || 15;
  if (weekHrs >= weekGoal) {
    insights.push('You hit your weekly goal of ' + weekGoal + 'h this week. Keep this pace to stay on track for your exam dates.');
  } else {
    insights.push('You\'ve logged ' + weekHrs.toFixed(1) + 'h this week vs your ' + weekGoal + 'h goal. ' + (weekGoal - weekHrs).toFixed(1) + 'h more to reach it.');
  }
  if (streak >= 7) {
    insights.push('Your ' + streak + '-day streak is exceptional — consistency is the #1 predictor of passing. Protect it.');
  } else if (streak > 0) {
    insights.push('You\'re on a ' + streak + '-day streak. Aim for 7 days to build lasting study momentum.');
  }
  if (habitScore >= 70) {
    insights.push('You studied ' + daysStudied30 + ' of the last 30 days (' + habitScore + '%). That study habit score puts you in the top tier of CPA candidates.');
  } else {
    insights.push('You studied ' + daysStudied30 + '/30 days (' + habitScore + '% habit score). Increasing consistency — even short sessions — will compound your progress.');
  }

  el.innerHTML =
    '<div style="max-width:860px;margin:0 auto;padding:32px 24px 80px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">' +
        '<div>' +
          '<h1 style="font-size:26px;font-weight:900;letter-spacing:-.03em">📊 Your Progress Report</h1>' +
          '<p style="font-size:12px;color:var(--mut);margin-top:3px">' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + ' · ' + S.name + '</p>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div style="display:flex;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;overflow:hidden">' +
            '<button onclick="_prRange=7;renderProgressReport()" style="padding:6px 14px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:' + (days===7?'var(--ora)':'transparent') + ';color:' + (days===7?'#fff':'var(--sub)') + '">7 Days</button>' +
            '<button onclick="_prRange=30;renderProgressReport()" style="padding:6px 14px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:' + (days===30?'var(--ora)':'transparent') + ';color:' + (days===30?'#fff':'var(--sub)') + '">30 Days</button>' +
          '</div>' +
          '<button onclick="closeProgressReport()" style="padding:8px 16px;background:var(--surf);border:1.5px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)">✕ Close</button>' +
        '</div>' +
      '</div>' +

      '<div class="stats-grid" style="margin-bottom:20px">' +
        [
          {v:totalHrs.toFixed(1),l:'Hours ('+days+'d)',c:'var(--ora)'},
          {v:sessions,l:'Sessions',c:'var(--ind)'},
          {v:streak+'d',l:'Active Streak',c:'#f59e0b'},
          {v:sectionsActive,l:'Sections Active',c:'var(--grn)'},
        ].map(function(s){ return '<div class="stat-box" style="border-top:3px solid '+s.c+'"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>'; }).join('') +
      '</div>' +

      '<div class="card card-pad" style="margin-bottom:16px">' +
        '<div class="section-title">Section Breakdown</div>' +
        sectionRows +
      '</div>' +

      '<div class="card card-pad" style="margin-bottom:16px">' +
        '<div class="section-title">Study Trend — Last 7 Days</div>' +
        '<div class="week-chart">' + chartBars + '</div>' +
        '<div style="font-size:10px;color:var(--mut);text-align:center;margin-top:4px">Hours per day · <span style="color:var(--ind)">■</span> Today</div>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' +
        '<div class="card card-pad">' +
          '<div class="section-title">Session Consistency</div>' +
          '<div style="font-size:32px;font-weight:900;color:' + (habitScore>=70?'var(--grn)':habitScore>=40?'var(--amb)':'var(--red)') + '">' + habitScore + '%</div>' +
          '<div style="font-size:12px;color:var(--sub);margin-top:4px">' + daysStudied30 + ' of last 30 days studied</div>' +
          '<div class="prog-bar" style="margin-top:10px"><div class="prog-fill" style="width:' + habitScore + '%;background:' + (habitScore>=70?'var(--grn)':habitScore>=40?'var(--amb)':'var(--red)') + '"></div></div>' +
        '</div>' +
        '<div class="card card-pad">' +
          '<div class="section-title">Study Patterns</div>' +
          '<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Top Study Day</div>' +
          '<div style="font-size:18px;font-weight:800;color:var(--ora)">' + topDay + '</div></div>' +
          '<div><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Total Hours (All Time)</div>' +
          '<div style="font-size:18px;font-weight:800;color:var(--ind)">' + Math.round(getTotalHours()) + 'h</div></div>' +
        '</div>' +
      '</div>' +

      '<div class="card card-pad">' +
        '<div class="section-title">💡 Study Insights</div>' +
        insights.map(function(ins){ return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)">' +
          '<span style="color:var(--ora);font-size:16px;flex-shrink:0">→</span>' +
          '<p style="font-size:13px;color:var(--sub);line-height:1.65;margin:0">' + ins + '</p>' +
        '</div>'; }).join('') +
      '</div>' +
    '</div>';
}

const _coachResponses = [
  {k:['behind','pace','slow'],r:'Based on your current pace, you should add at least one extra session per week on your weakest section. Even 45 minutes of focused MCQ practice compounds fast.'},
  {k:['far','financial'],r:'FAR has the lowest pass rate. Prioritize governmental accounting, leases (ASC 842), and pensions — those topics are heavily tested and candidates consistently underestimate them.'},
  {k:['aud','audit'],r:'AUD rewards professional skepticism thinking. Practice reading answer choices from the auditor\'s perspective, not the client\'s. Focus on risk assessment and evidence standards.'},
  {k:['reg','tax'],r:'REG requires memorization AND application. Create a quick-reference sheet for entity taxation rules, SE tax, and the most-tested deduction limits. Test yourself daily.'},
  {k:['streak','motivation'],r:'Streaks create momentum, but what matters more is session quality. A focused 90-minute session beats 3 distracted hours. Protect your deep work time.'},
  {k:['exam','date','schedule'],r:'Set your exam date before you feel ready — it creates urgency. Most candidates who pass schedule first, then study. Aim for 6–8 focused weeks per section.'},
  {k:['tired','burnout','rest'],r:'Rest is part of your study plan. If your energy is low, a 30-minute review is better than a burned-out 4-hour session. Recovery prevents long-term burnout.'},
  {k:['score','pass','probability'],r:'Scoring consistently 70%+ on practice MCQs is the strongest predictor of passing. Focus on understanding wrong answers more than celebrating right ones.'},
];

function _coachReply(msg) {
  const lower = msg.toLowerCase();
  for (let i = 0; i < _coachResponses.length; i++) {
    if (_coachResponses[i].k.some(function(k){ return lower.includes(k); })) {
      return _coachResponses[i].r;
    }
  }
  return 'Great question. The key to CPA success is consistency over intensity. Log your sessions daily, review your weak areas weekly, and trust the process. You\'re making progress.';
}

function buildAIStudyCoach() {
  if (!isPro()) {
    return '<div class="card card-pad pro-lock-wrap" style="margin-bottom:16px">' +
      '<div class="section-title">🤖 AI Study Coach</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;opacity:.3;pointer-events:none;user-select:none">' +
        '<div style="background:var(--surf2);border-radius:10px;padding:14px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">Today\'s Focus</div><div style="font-size:11px;color:var(--mut)">FAR — Gov. Accounting<br>Rec: 2.5 hrs today</div></div>' +
        '<div style="background:var(--surf2);border-radius:10px;padding:14px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">Weak Spot Alert</div><div style="font-size:11px;color:var(--mut)">Behind on REG by 12h<br>Need 2.5h/day to catch up</div></div>' +
        '<div style="background:var(--surf2);border-radius:10px;padding:14px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">Pass Probability</div><div style="font-size:22px;font-weight:900;color:var(--grn)">67%</div></div>' +
        '<div style="background:var(--surf2);border-radius:10px;padding:14px"><div style="font-size:12px;font-weight:700;margin-bottom:4px">Next Milestone</div><div style="font-size:11px;color:var(--mut)">50h → Dedicated badge<br>Almost there!</div></div>' +
      '</div>' +
      proLockHTML('AI Study Coach', 'Unlock AI Coach') +
    '</div>';
  }

  const sections = S.sections || [];
  const totalTarget = sections.reduce(function(sum,s){ return sum + EXAMS[s].studyHours; }, 0);
  const totalLogged = getTotalHours();

  // Find section most needing attention (biggest gap relative to target)
  let worstSection = sections[0] || 'FAR';
  let worstGap = 0;
  let focusSection = sections[0] || 'FAR';
  let focusGap = 0;
  sections.forEach(function(s) {
    const target = EXAMS[s].studyHours;
    const logged = getSectionHours(s);
    const gap = target - logged;
    if (gap > worstGap) { worstGap = gap; worstSection = s; }
    if (gap > focusGap && !(S.sectionPassed||[]).includes(s)) { focusGap = gap; focusSection = s; }
  });

  // Pass probability (capped at 95)
  const overallPct = totalTarget > 0 ? Math.min(95, Math.round(totalLogged / totalTarget * 100)) : 5;
  // Gauge arc
  const gaugeAngle = Math.round(overallPct / 100 * 180);
  const r = 46;
  const cx = 60, cy = 60;
  const toRad = function(deg){ return deg * Math.PI / 180; };
  const arcX = function(deg){ return cx + r * Math.cos(toRad(180 + deg)); };
  const arcY = function(deg){ return cy + r * Math.sin(toRad(180 + deg)); };
  const gaugeColor = overallPct >= 70 ? '#0ea574' : overallPct >= 45 ? '#f59e0b' : '#e84040';
  const gaugePath = 'M ' + (cx-r) + ' ' + cy + ' A ' + r + ' ' + r + ' 0 0 1 ' + (cx+r) + ' ' + cy;
  const fillPath = gaugeAngle > 0
    ? 'M ' + (cx-r) + ' ' + cy + ' A ' + r + ' ' + r + ' 0 ' + (gaugeAngle>180?1:0) + ' 1 ' + arcX(gaugeAngle) + ' ' + arcY(gaugeAngle)
    : '';

  // Coach message
  const focusTarget = EXAMS[focusSection].studyHours;
  const focusLogged = getSectionHours(focusSection);
  const focusRemain = Math.max(0, focusTarget - focusLogged);
  const examDate = S.examDates && S.examDates[focusSection];
  let daysLeft = examDate ? Math.round((new Date(examDate+' 00:00:00') - Date.now()) / 86400000) : 60;
  if (daysLeft <= 0) daysLeft = 60;
  const hrsPerDay = daysLeft > 0 ? (focusRemain / daysLeft).toFixed(1) : '?';
  const coachMsg = 'You\'re ' + focusRemain + 'h away from your ' + focusSection + ' target. ' +
    'At your current pace, you need ' + hrsPerDay + 'h/day' + (daysLeft<60?' over the next ' + daysLeft + ' days':'') + ' to hit your goal. ' +
    (overallPct >= 70 ? 'Your overall pace is strong — keep it up.' : 'Increasing consistency now will compound significantly by exam day.');

  // Next milestone
  const totalHrs = Math.round(totalLogged);
  const milestones = [10,50,100,250,500];
  const nextMile = milestones.find(function(m){ return m > totalHrs; }) || null;
  const milestoneHTML = nextMile
    ? 'Next: <strong>' + nextMile + 'h</strong> milestone — only <strong>' + (nextMile-totalHrs) + 'h</strong> away!'
    : 'You\'ve passed all major milestones! 🏆';

  // Coach chat messages state
  if (!window._coachChat) window._coachChat = [];

  const chatMsgs = window._coachChat.map(function(m) {
    return '<div style="display:flex;' + (m.mine?'justify-content:flex-end':'') + ';margin-bottom:8px">' +
      '<div style="max-width:80%;padding:9px 13px;border-radius:' + (m.mine?'16px 16px 4px 16px':'16px 16px 16px 4px') + ';font-size:12px;line-height:1.55;' +
        (m.mine?'background:var(--ind);color:#fff':'background:var(--surf2);border:1px solid var(--bdr);color:var(--txt)') + '">' +
        m.text +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="card card-pad" style="margin-bottom:16px">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
      '<div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ind),var(--pur));display:flex;align-items:center;justify-content:center;font-size:18px">🤖</div>' +
      '<div><div style="font-size:15px;font-weight:800">AI Study Coach</div>' +
      '<div style="font-size:11px;color:var(--mut)">Personalized insights based on your data</div></div>' +
    '</div>' +

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">' +
      '<div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:14px">' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:6px">Today\'s Focus</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
          '<span class="badge badge-' + focusSection + '">' + focusSection + '</span>' +
          '<span style="font-size:12px;font-weight:700">' + EXAMS[focusSection].full.split(' ')[0] + '</span>' +
        '</div>' +
        '<div style="font-size:13px;font-weight:800;color:var(--ora)">' + hrsPerDay + 'h/day recommended</div>' +
        '<div style="font-size:11px;color:var(--mut);margin-top:2px">' + focusRemain + 'h remaining to target</div>' +
      '</div>' +
      '<div style="background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px">' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--red);margin-bottom:6px">Weak Spot Alert</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
          '<span class="badge badge-' + worstSection + '">' + worstSection + '</span>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--sub)">' + worstGap + 'h behind target — needs most attention</div>' +
      '</div>' +
    '</div>' +

    '<div style="display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:16px">' +
      '<div style="text-align:center">' +
        '<svg width="120" height="68" viewBox="0 0 120 68">' +
          '<path d="' + gaugePath + '" fill="none" stroke="var(--bdr2)" stroke-width="10" stroke-linecap="round"/>' +
          (fillPath ? '<path d="' + fillPath + '" fill="none" stroke="' + gaugeColor + '" stroke-width="10" stroke-linecap="round"/>' : '') +
          '<text x="60" y="58" text-anchor="middle" font-size="20" font-weight="900" fill="' + gaugeColor + '">' + overallPct + '%</text>' +
        '</svg>' +
        '<div style="font-size:10px;color:var(--mut);margin-top:-4px">Pass Probability</div>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:6px">Coach Message</div>' +
        '<p style="font-size:12px;color:var(--sub);line-height:1.65;margin:0">' + coachMsg + '</p>' +
        '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--grn)">' + milestoneHTML + '</div>' +
      '</div>' +
    '</div>' +

    '<div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:14px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:10px">Ask Coach</div>' +
      '<div id="coach-chat-msgs" style="min-height:60px;max-height:200px;overflow-y:auto;margin-bottom:10px">' +
        (chatMsgs || '<div style="font-size:12px;color:var(--mut);text-align:center;padding:10px">Ask me anything about your CPA prep...</div>') +
      '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<input id="coach-input" type="text" placeholder="e.g. I\'m behind on REG, what should I do?" ' +
          'style="flex:1;padding:9px 12px;background:var(--surf);border:1.5px solid var(--bdr);border-radius:9px;color:var(--txt);font-size:12px;outline:none" ' +
          'onkeydown="if(event.key===\'Enter\')sendCoachMessage()" ' +
          'onfocus="this.style.borderColor=\'var(--ind)\'" onblur="this.style.borderColor=\'var(--bdr)\'">' +
        '<button onclick="sendCoachMessage()" style="padding:9px 16px;background:var(--ind);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer">Send</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function sendCoachMessage() {
  const inp = document.getElementById('coach-input');
  if (!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = '';
  if (!window._coachChat) window._coachChat = [];
  window._coachChat.push({mine:true, text:msg});
  const reply = _coachReply(msg);
  setTimeout(function() {
    window._coachChat.push({mine:false, text:reply});
    const msgsEl = document.getElementById('coach-chat-msgs');
    if (msgsEl) {
      const mineDiv = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><div style="max-width:80%;padding:9px 13px;border-radius:16px 16px 4px 16px;font-size:12px;line-height:1.55;background:var(--ind);color:#fff">' + msg + '</div></div>';
      const replyDiv = '<div style="display:flex;margin-bottom:8px"><div style="max-width:80%;padding:9px 13px;border-radius:16px 16px 16px 4px;font-size:12px;line-height:1.55;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt)">' + reply + '</div></div>';
      if (msgsEl.querySelector('[style*="Ask me anything"]')) msgsEl.innerHTML = '';
      msgsEl.innerHTML += mineDiv + replyDiv;
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
  }, 420);
}

      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;opacity:.3;pointer-events:none;user-select:none">' +
        '<div class="stat-box"><div class="stat-val" style="color:var(--ind)">—</div><div class="stat-lbl">Best Study Day</div></div>' +
        '<div class="stat-box"><div class="stat-val" style="color:var(--grn)">—</div><div class="stat-lbl">Avg Session</div></div>' +
        '<div class="stat-box"><div class="stat-val" style="color:var(--amb)">—</div><div class="stat-lbl">Peak Hour</div></div>' +
      '</div>' +
      proLockHTML('Advanced Analytics', 'Unlock Analytics') +
    '</div>';
  }

  const acts = S.activities || [];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Best day of week
  const dayTotals = [0,0,0,0,0,0,0];
  const dayCounts = [0,0,0,0,0,0,0];
  acts.forEach(function(a) {
    const d = new Date(a.date+'T12:00:00').getDay();
    dayTotals[d] += (a.hours||0);
    dayCounts[d]++;
  });
  const dayAvgs = dayTotals.map(function(t,i){ return dayCounts[i]>0?t/dayCounts[i]:0; });
  const bestDayIdx = dayAvgs.indexOf(Math.max.apply(null, dayAvgs));
  const bestDay = acts.length > 0 ? days[bestDayIdx] : '—';

  // Avg session length
  const avgSession = acts.length > 0 ? (acts.reduce(function(s,a){ return s+(a.hours||0); },0)/acts.length).toFixed(1) : '—';

  // Section breakdown by time (last 30 days)
  const thirtyAgo = new Date(Date.now()-30*86400000);
  const recentActs = acts.filter(function(a){ return new Date(a.date)>=thirtyAgo; });
  const secTotals = {};
  recentActs.forEach(function(a){ secTotals[a.section]=(secTotals[a.section]||0)+(a.hours||0); });
  const totalSec = Object.values(secTotals).reduce(function(s,v){ return s+v; },0)||1;

  const sectionBars = Object.entries(secTotals).sort(function(a,b){ return b[1]-a[1]; }).map(function(e) {
    const pct = Math.round(e[1]/totalSec*100);
    const sec = e[0];
    const color = (window.EXAMS&&window.EXAMS[sec]) ? EXAMS[sec].color : '#6366f1';
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
      '<span class="badge badge-' + sec + '" style="min-width:38px;text-align:center">' + sec + '</span>' +
      '<div style="flex:1;background:var(--surf2);border-radius:4px;height:10px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:4px;transition:width .5s"></div>' +
      '</div>' +
      '<span style="font-size:11px;font-weight:700;color:var(--sub);min-width:32px;text-align:right">' + e[1].toFixed(1) + 'h</span>' +
    '</div>';
  }).join('');

  // Day-of-week bar chart
  const maxDayAvg = Math.max.apply(null, dayAvgs.concat([0.1]));
  const dowBars = dayAvgs.map(function(avg, i) {
    const h = Math.max(4, Math.round(avg/maxDayAvg*48));
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
      '<div style="width:24px;height:' + h + 'px;background:' + (i===bestDayIdx?'var(--ind)':'var(--bdr2)') + ';border-radius:4px;transition:height .4s"></div>' +
      '<div style="font-size:9px;color:var(--mut);font-weight:600">' + days[i].slice(0,1) + '</div>' +
    '</div>';
  }).join('');

  return '<div class="card card-pad" style="margin-bottom:16px">' +
    '<div class="section-title">📊 Advanced Analytics</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">' +
      '<div class="stat-box" style="border-top:3px solid var(--ind)"><div class="stat-val" style="color:var(--ind)">' + bestDay + '</div><div class="stat-lbl">Best Study Day</div></div>' +
      '<div class="stat-box" style="border-top:3px solid var(--grn)"><div class="stat-val" style="color:var(--grn)">' + avgSession + 'h</div><div class="stat-lbl">Avg Session</div></div>' +
      '<div class="stat-box" style="border-top:3px solid var(--amb)"><div class="stat-val" style="color:var(--amb)">' + acts.length + '</div><div class="stat-lbl">Total Sessions</div></div>' +
    '</div>' +
    '<div style="margin-bottom:14px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:10px">Avg Hours by Day of Week</div>' +
      '<div style="display:flex;gap:6px;align-items:flex-end;height:60px">' + dowBars + '</div>' +
    '</div>' +
    (sectionBars ? '<div>' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:10px">Section Focus (Last 30 Days)</div>' +
      sectionBars +
    '</div>' : '') +
  '</div>';
}

// ═══════════════════════════════════════════════
// SMART STUDY SCHEDULE
// ═══════════════════════════════════════════════
let _scheduleEditMode = false;

function _generateSchedule() {
  const sections = S.sections || ['FAR'];
  const weeklyHrs = S.hoursPerWeek || 15;
  const studyDays = [1,2,3,4,5]; // Mon-Fri by default
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Weight sections by remaining hours
  const weights = {};
  let totalWeight = 0;
  sections.forEach(function(s) {
    const rem = Math.max(1, EXAMS[s].studyHours - getSectionHours(s));
    weights[s] = rem;
    totalWeight += rem;
  });

  // Distribute hours across study days proportionally
  const hrsPerDay = weeklyHrs / studyDays.length;
  const schedule = days.map(function(d, i) {
    if (!studyDays.includes(i)) return {day:d, active:false, hours:0, section:''};
    // Round-robin sections weighted by remaining hours
    let pick = sections[0];
    let best = 0;
    sections.forEach(function(s) {
      if (weights[s]/totalWeight > best) { best = weights[s]/totalWeight; pick = s; }
    });
    // Alternate through sections
    const idx = studyDays.indexOf(i);
    pick = sections[idx % sections.length];
    return {day:d, active:true, hours:parseFloat(hrsPerDay.toFixed(1)), section:pick};
  });
  return schedule;
}

function saveStudySchedule() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const schedule = days.map(function(d, i) {
    const activeEl = document.getElementById('sched-active-' + i);
    const hrsEl = document.getElementById('sched-hrs-' + i);
    const secEl = document.getElementById('sched-sec-' + i);
    return {
      day: d,
      active: activeEl ? activeEl.checked : false,
      hours: hrsEl ? parseFloat(hrsEl.value)||0 : 0,
      section: secEl ? secEl.value : '',
    };
  });
  S.studySchedule = schedule;
  const totalHrs = parseInt(document.getElementById('sched-weekly-hrs')?.value || S.hoursPerWeek || 15);
  S.hoursPerWeek = totalHrs;
  saveState();
  _scheduleEditMode = false;
  showToast('Schedule saved ✓','ok');
  const el = document.getElementById('schedule-section');
  if (el) el.innerHTML = buildStudySchedule();
}

function toggleScheduleEdit() {
  _scheduleEditMode = !_scheduleEditMode;
  const el = document.getElementById('schedule-section');
  if (el) el.innerHTML = buildStudySchedule();
}

function buildStudySchedule() {
  const pro = isPro();
  S.studySchedule = S.studySchedule || null;
  const schedule = S.studySchedule || _generateSchedule();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const sections = S.sections || ['FAR','AUD','REG','TCP'];
  const weeklyHrs = S.hoursPerWeek || 15;
  const editMode = _scheduleEditMode && pro;

  const secOpts = sections.map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');

  const dayRows = schedule.map(function(item, i) {
    const isToday = new Date().getDay() === i;
    const color = item.section && EXAMS[item.section] ? EXAMS[item.section].color : 'var(--mut)';
    if (editMode) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);' + (isToday?'background:var(--ora-bg);border-radius:8px;padding:10px 8px;':'') + '">' +
        '<input type="checkbox" id="sched-active-' + i + '"' + (item.active?' checked':'') + ' style="accent-color:var(--ora);width:15px;height:15px;cursor:pointer">' +
        '<div style="width:34px;font-size:11px;font-weight:800;color:' + (isToday?'var(--ora)':'var(--mut)') + '">' + item.day + '</div>' +
        '<select id="sched-sec-' + i + '" style="padding:5px 8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:12px;font-weight:700;outline:none">' +
          sections.map(function(s){ return '<option value="' + s + '"' + (s===item.section?' selected':'') + '>' + s + '</option>'; }).join('') +
        '</select>' +
        '<input id="sched-hrs-' + i + '" type="number" min="0" max="12" step="0.5" value="' + (item.hours||0) + '" ' +
          'style="width:56px;padding:5px 8px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:12px;font-weight:700;outline:none;text-align:center">' +
        '<span style="font-size:11px;color:var(--mut)">hrs</span>' +
      '</div>';
    }
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);' + (isToday?'background:var(--ora-bg);border-radius:8px;padding:10px 8px;margin:0 -4px;':'') + '">' +
      '<div style="width:34px;font-size:11px;font-weight:800;color:' + (isToday?'var(--ora)':'var(--sub)') + '">' + item.day + (isToday?' 📍':'') + '</div>' +
      (item.active && item.section
        ? '<div style="flex:1;background:' + color + '18;border:1px solid ' + color + '33;border-radius:7px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between">' +
            '<span style="font-size:12px;font-weight:700;color:' + color + '">' + item.section + ' — ' + EXAMS[item.section]?.full?.split(' ')[0] + '</span>' +
            '<span style="font-size:12px;font-weight:800;color:' + color + '">' + item.hours + 'h</span>' +
          '</div>'
        : '<div style="flex:1;background:var(--surf2);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--mut);font-style:italic">Rest day 🛌</div>'
      ) +
    '</div>';
  }).join('');

  const totalPlanned = schedule.filter(function(d){ return d.active; }).reduce(function(s,d){ return s+d.hours; },0);

  const editControls = editMode
    ? '<div style="background:var(--ind-bg);border:1px solid rgba(90,95,207,.2);border-radius:10px;padding:14px;margin-bottom:14px">' +
        '<div style="font-size:11px;font-weight:700;color:var(--ind);margin-bottom:10px">Edit Mode</div>' +
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">' +
          '<span style="font-size:12px;font-weight:600;color:var(--sub)">Weekly goal:</span>' +
          '<input id="sched-weekly-hrs" type="range" min="5" max="30" value="' + weeklyHrs + '" ' +
            'style="flex:1;accent-color:var(--ind)" oninput="document.getElementById(\'sched-hrs-lbl\').textContent=this.value+\'h\'">' +
          '<span id="sched-hrs-lbl" style="font-size:13px;font-weight:800;color:var(--ind);min-width:30px">' + weeklyHrs + 'h</span>' +
        '</div>' +
        '<div style="display:flex;gap:8px">' +
          '<button onclick="saveStudySchedule()" style="flex:1;padding:9px;background:var(--grn);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer">✓ Save Schedule</button>' +
          '<button onclick="toggleScheduleEdit()" style="padding:9px 14px;background:transparent;border:1.5px solid var(--bdr);border-radius:9px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer">Cancel</button>' +
        '</div>' +
      '</div>'
    : '';

  return '<div id="schedule-section">' +
    '<div class="card card-pad">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
        '<div>' +
          '<div class="section-title" style="margin-bottom:2px">📅 Smart Study Schedule</div>' +
          '<div style="font-size:11px;color:var(--mut)">' + totalPlanned.toFixed(1) + 'h planned this week</div>' +
        '</div>' +
        (pro
          ? '<button onclick="toggleScheduleEdit()" style="padding:6px 14px;background:' + (editMode?'var(--ind)':'var(--surf2)') + ';border:1.5px solid ' + (editMode?'var(--ind)':'var(--bdr)') + ';border-radius:8px;font-size:11px;font-weight:700;color:' + (editMode?'#fff':'var(--sub)') + ';cursor:pointer">✏️ Customize</button>'
          : '<button onclick="openUpgradeModal(\'Smart Study Schedule\')" style="padding:6px 14px;background:transparent;border:1.5px solid var(--bdr);border-radius:8px;font-size:11px;font-weight:700;color:var(--mut);cursor:pointer">🔒 Customize</button>'
        ) +
      '</div>' +
      editControls +
      dayRows +
    '</div>' +
  '</div>';
}
